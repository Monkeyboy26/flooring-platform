    // ========== RepCreateOrderView ==========
    function RepCreateOrderView({ navigate, terminalRef, terminalStatus, connectReader }) {
      const [form, setForm] = useState({
        customer_name: '', customer_email: '', phone: '',
        delivery_method: 'shipping',
        shipping_line1: '', shipping_line2: '', shipping_city: '', shipping_state: '', shipping_zip: '',
        payment_method: 'card',
        check_number: ''
      });
      const [cashDrawerOpen, setCashDrawerOpen] = useState(null); // null = loading, true/false
      const [items, setItems] = useState([]);
      const [showTapModal, setShowTapModal] = useState(false);
      const [skuSearch, setSkuSearch] = useState('');
      const [skuResults, setSkuResults] = useState([]);
      const [skuSearching, setSkuSearching] = useState(false);
      const [addBoxes, setAddBoxes] = useState(1);
      const [showCustom, setShowCustom] = useState(false);
      const [customItem, setCustomItem] = useState({ product_name: '', unit_price: '', num_boxes: 1, description: '' });
      const [vendors, setVendors] = useState([]);
      const [customVendor, setCustomVendor] = useState('');
      const [promoCode, setPromoCode] = useState('');
      const [promoResult, setPromoResult] = useState(null);
      const [promoError, setPromoError] = useState('');
      const [promoLoading, setPromoLoading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [editingItemKey, setEditingItemKey] = useState(null);
      const [editField, setEditField] = useState(null); // 'price' | 'cost' | 'qty'
      const [editValue, setEditValue] = useState('');
      const [customerSearch, setCustomerSearch] = useState('');
      const [customerResults, setCustomerResults] = useState([]);
      const [customerSearching, setCustomerSearching] = useState(false);
      const [selectedCustomer, setSelectedCustomer] = useState(null);
      const [customerMatch, setCustomerMatch] = useState(null);
      const [customerMode, setCustomerMode] = useState('search'); // 'search' | 'new'
      const customerSearchTimer = useRef(null);
      const [emailError, setEmailError] = useState('');
      const [phoneError, setPhoneError] = useState('');

      const { addressInputRef, previousAddresses, showPrevAddresses, setShowPrevAddresses, selectPreviousAddress } = useAddressAutofill({
        fieldMap: { line1: 'shipping_line1', line2: 'shipping_line2', city: 'shipping_city', state: 'shipping_state', zip: 'shipping_zip' },
        setForm, selectedCustomer, isReadonly: false
      });

      useEffect(() => {
        repFetch('/api/rep/vendors').then(d => setVendors(d.vendors || [])).catch(() => {});
        repFetch('/api/rep/cash-drawer/current').then(d => setCashDrawerOpen(!!d.drawer)).catch(() => setCashDrawerOpen(false));
      }, []);

      const searchCustomers = (q) => {
        setCustomerSearch(q);
        if (customerSearchTimer.current) clearTimeout(customerSearchTimer.current);
        if (q.trim().length < 2) { setCustomerResults([]); setCustomerSearching(false); return; }
        setCustomerSearching(true);
        customerSearchTimer.current = setTimeout(async () => {
          try {
            const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(q.trim()));
            setCustomerResults(data.results || []);
          } catch (e) { setCustomerResults([]); }
          setCustomerSearching(false);
        }, 300);
      };

      const selectCustomer = (c) => {
        setSelectedCustomer(c);
        setForm(f => ({
          ...f,
          customer_name: c.name || '',
          customer_email: c.email || '',
          phone: c.phone || '',
          shipping_line1: c.address_line1 || f.shipping_line1,
          shipping_line2: c.address_line2 || f.shipping_line2,
          shipping_city: c.city || f.shipping_city,
          shipping_state: c.state || f.shipping_state,
          shipping_zip: c.zip || f.shipping_zip
        }));
        setCustomerSearch('');
        setCustomerResults([]);
        setCustomerMatch(null);
      };

      const clearCustomer = () => {
        setSelectedCustomer(null);
        setForm(f => ({ ...f, customer_name: '', customer_email: '', phone: '' }));
        setCustomerMatch(null);
        setEmailError('');
        setPhoneError('');
      };

      const checkCustomerMatch = async (field) => {
        if (selectedCustomer) return;
        const val = field === 'email' ? form.customer_email : form.phone;
        if (!val || val.trim().length < 3) { setCustomerMatch(null); return; }
        try {
          const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(val));
          if (data.results && data.results.length > 0) {
            setCustomerMatch(data.results[0]);
          } else {
            setCustomerMatch(null);
          }
        } catch (e) { setCustomerMatch(null); }
      };

      const searchSku = async (q) => {
        setSkuSearch(q);
        if (q.length < 2) { setSkuResults([]); return; }
        setSkuSearching(true);
        try {
          const data = await repFetch('/api/rep/skus/search?q=' + encodeURIComponent(q));
          setSkuResults(data.results || []);
        } catch (e) {}
        setSkuSearching(false);
      };

      const addSkuItem = (r) => {
        const numBoxes = parseInt(addBoxes) || 1;
        const unitPrice = parseFloat(r.retail_price || 0);
        const sqftPerBox = parseFloat(r.sqft_per_box || 0);
        setItems(prev => [...prev, {
          _key: Date.now(),
          sku_id: r.sku_id,
          product_name: r.product_name + (r.variant_name ? ' \u2014 ' + r.variant_name : ''),
          vendor_id: r.vendor_id,
          vendor_name: r.vendor_name,
          vendor_sku: r.vendor_sku,
          unit_price: unitPrice,
          num_boxes: numBoxes,
          subtotal: unitPrice * numBoxes,
          sqft_per_box: sqftPerBox,
          is_sample: r.is_sample,
          sell_by: r.sell_by,
          cost: parseFloat(r.cost || 0)
        }]);
        setSkuSearch('');
        setSkuResults([]);
        setAddBoxes(1);
      };

      const addCustom = () => {
        const numBoxes = parseInt(customItem.num_boxes) || 1;
        const unitPrice = parseFloat(customItem.unit_price);
        if (!customItem.product_name.trim() || isNaN(unitPrice)) return;
        const selectedVendor = vendors.find(v => v.id === customVendor);
        setItems(prev => [...prev, {
          _key: Date.now(),
          sku_id: null,
          product_name: customItem.product_name.trim(),
          vendor_name: selectedVendor?.name || 'Custom',
          vendor_id: customVendor || null,
          unit_price: unitPrice,
          num_boxes: numBoxes,
          subtotal: unitPrice * numBoxes,
          description: customItem.description || null,
          is_custom: true,
          cost: 0
        }]);
        setCustomItem({ product_name: '', unit_price: '', num_boxes: 1, description: '' });
        setCustomVendor('');
        setShowCustom(false);
      };

      const removeItem = (key) => {
        setItems(prev => prev.filter(i => i._key !== key));
        setPromoResult(null);
        setPromoCode('');
      };

      const startEdit = (key, field, currentValue) => {
        setEditingItemKey(key);
        setEditField(field);
        setEditValue(String(currentValue));
      };

      const cancelEdit = () => {
        setEditingItemKey(null);
        setEditField(null);
        setEditValue('');
      };

      const saveEdit = () => {
        const val = parseFloat(editValue);
        if (isNaN(val) || val < 0) { cancelEdit(); return; }
        setItems(prev => prev.map(item => {
          if (item._key !== editingItemKey) return item;
          if (editField === 'price') {
            return { ...item, unit_price: val, subtotal: val * item.num_boxes };
          } else if (editField === 'cost') {
            return { ...item, cost: val };
          } else if (editField === 'qty') {
            const qty = Math.max(1, Math.round(val));
            return { ...item, num_boxes: qty, subtotal: item.unit_price * qty };
          }
          return item;
        }));
        setPromoResult(null);
        setPromoCode('');
        cancelEdit();
      };

      const subtotal = items.filter(i => !i.is_sample).reduce((sum, i) => sum + i.subtotal, 0);
      const discount = promoResult ? promoResult.discount_amount : 0;
      const total = subtotal - discount;

      const applyPromo = async () => {
        if (!promoCode.trim()) return;
        setPromoLoading(true);
        setPromoError('');
        try {
          const promoItems = items.map(i => ({
            sku_id: i.sku_id,
            product_id: i.product_id || null,
            subtotal: i.subtotal,
            is_sample: i.is_sample || false
          }));
          const data = await repFetch('/api/rep/promo-codes/validate', {
            method: 'POST',
            body: JSON.stringify({ code: promoCode, items: promoItems, customer_email: form.customer_email })
          });
          if (data.valid) {
            setPromoResult(data);
            setPromoError('');
          } else {
            setPromoError(data.error || 'Invalid promo code');
          }
        } catch (err) { setPromoError(err.message); }
        setPromoLoading(false);
      };

      const createOrderWithPI = async (stripePaymentIntentId) => {
        setSaving(true);
        try {
          const orderItems = items.map(i => {
            if (i.sku_id) return { sku_id: i.sku_id, num_boxes: i.num_boxes };
            return { product_name: i.product_name, unit_price: i.unit_price, vendor_id: i.vendor_id || null, num_boxes: i.num_boxes, description: i.description };
          });
          const body = {
            customer_name: form.customer_name,
            customer_email: form.customer_email,
            phone: form.phone || undefined,
            delivery_method: form.delivery_method,
            payment_method: form.payment_method,
            items: orderItems,
            promo_code: promoResult ? promoResult.code : undefined,
            check_number: form.payment_method === 'check' ? form.check_number : undefined,
            stripe_payment_intent_id: stripePaymentIntentId || undefined
          };
          if (form.delivery_method === 'shipping') {
            body.shipping_address = {
              line1: form.shipping_line1,
              line2: form.shipping_line2 || undefined,
              city: form.shipping_city,
              state: form.shipping_state,
              zip: form.shipping_zip
            };
          }
          const data = await repFetch('/api/rep/orders', {
            method: 'POST',
            body: JSON.stringify(body)
          });
          if (data.order) {
            navigate('order-detail', data.order.id);
          }
        } catch (err) { alert(err.message); }
        setSaving(false);
      };

      const createOrder = async () => {
        if (!form.customer_name || !form.customer_email || items.length === 0) return;
        if (form.payment_method === 'card') {
          if (terminalStatus !== 'connected') {
            if (terminalStatus === 'disconnected') {
              const confirmed = window.confirm('Terminal not connected. Connect now?');
              if (confirmed) connectReader();
            } else {
              alert('Stripe Terminal is not connected. Please connect the reader first.');
            }
            return;
          }
          setShowTapModal(true);
          return;
        }
        createOrderWithPI(null);
      };

      const canCreate = form.customer_name && form.customer_email && isValidEmail(form.customer_email) && items.length > 0 &&

                    {customerResults.map((c, i) => (

                          padding: '0.15rem 0.5rem', borderRadius: '9999px', fontWeight: 600, textTransform: 'uppercase',
                          marginLeft: '0.5rem', flexShrink: 0 }}>
                          {c.type === 'order' ? 'prev order' : c.type}
                        </span>
                      </div>

                  </div>

              </div>

                    <label>Name</label>
                    <span>{selectedCustomer.name}</span>
                  </div>
                  <div className="order-info-item">
                    <label>Email</label>
                    <span>{selectedCustomer.email}</span>
                  </div>
                  <div className="order-info-item">
                    <label>Phone</label>
                    <span>{selectedCustomer.phone || form.phone || '\u2014'}</span>

                  <label>City *</label>
                  <input type="text" value={form.shipping_city} onChange={e => setForm(f => ({ ...f, shipping_city: e.target.value }))} />

                  <div className="form-group">
                    <label>State *</label>
                    <input type="text" value={form.shipping_state} onChange={e => setForm(f => ({ ...f, shipping_state: e.target.value }))} maxLength={2} />
                  </div>
                  <div className="form-group">
                    <label>ZIP *</label>
                    <input type="text" value={form.shipping_zip} onChange={e => setForm(f => ({ ...f, shipping_zip: e.target.value }))} maxLength={10} />
                  </div>
                </div>
              </div>
            )}
            {form.delivery_method === 'pickup' && (

                  <span>
                    <strong>Roma Flooring Designs</strong><br />

                    Anaheim, CA 92806
                  </span>
                </div>
              </div>
            )}
          </div>

                    <div className="search-results">
                      {skuResults.map((r, i) => (
                        <div key={i} className="search-result-item" onMouseDown={() => addSkuItem(r)}>

                          <div className="product-meta">
                            {r.vendor_name || ''} {r.internal_sku && '\u2022 ' + r.internal_sku} {r.retail_price && '\u2022 $' + parseFloat(r.retail_price).toFixed(2)}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ width: '80px' }}>
                  <input type="number" min="1" value={addBoxes} onChange={e => setAddBoxes(parseInt(e.target.value) || 1)}
                    placeholder="Qty" style={{ width: '100%', padding: '0.75rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                </div>
                <button className={'btn ' + (showCustom ? 'btn-secondary' : 'btn-primary')} onClick={() => setShowCustom(!showCustom)} style={{ whiteSpace: 'nowrap' }}>
                  {showCustom ? 'Cancel' : '+ Custom Item'}
                </button>
              </div>
              {showCustom && (
                <div style={{ background: 'var(--stone-50)', border: '1px solid var(--stone-200)', padding: '1.25rem', marginBottom: '0.75rem' }}>
                  <div style={{ fontSize: '0.75rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-600)', marginBottom: '0.75rem' }}>Add Custom Item</div>
                  <div className="resp-grid-4" style={{ gap: '0.75rem', alignItems: 'end' }}>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label>Product Name *</label>
                      <input type="text" value={customItem.product_name} onChange={e => setCustomItem(c => ({ ...c, product_name: e.target.value }))} placeholder="e.g. Custom transition strip" />
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label>Vendor</label>
                      <select value={customVendor} onChange={e => setCustomVendor(e.target.value)} style={{ width: '100%', padding: '0.75rem 1rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }}>
                        <option value="">Optional...</option>
                        {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                      </select>
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label>Unit Price *</label>
                      <input type="number" step="0.01" min="0" value={customItem.unit_price} onChange={e => setCustomItem(c => ({ ...c, unit_price: e.target.value }))} placeholder="0.00" />
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label>Qty *</label>
                      <input type="number" min="1" value={customItem.num_boxes} onChange={e => setCustomItem(c => ({ ...c, num_boxes: e.target.value }))} />

                  <div style={{ display: 'flex', gap: '0.75rem', marginTop: '0.75rem', alignItems: 'end' }}>
                    <div className="form-group" style={{ marginBottom: 0, flex: 1 }}>
                      <label>Description</label>
                      <input type="text" value={customItem.description} onChange={e => setCustomItem(c => ({ ...c, description: e.target.value }))} placeholder="Optional notes" />
                    </div>
                    <button className="btn btn-primary" onClick={addCustom} disabled={!customItem.product_name.trim() || !customItem.unit_price}>Add</button>
                  </div>
                </div>
              )}
            </div>
            <div className="table-scroll-wrapper"><table className="rep-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Description</th>
                  <th>Type</th>
                  <th>SqFt</th>
                  <th>Qty</th>
                  <th>Unit Price</th>
                  <th>Subtotal</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {items.map(item => (
                  <React.Fragment key={item._key}>
                    <tr>
                      <td data-label="Product" style={{ fontWeight: 500 }}>
                        {item.product_name}
                        {item.is_custom && <span className="badge badge-draft" style={{ marginLeft: '0.5rem', fontSize: '0.6rem' }}>Custom</span>}
                      </td>
                      <td data-label="Description" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{item.description || item.vendor_name || '\u2014'}</td>
                      <td data-label="Type">
                        <span className={'badge ' + (item.is_sample ? 'badge-draft' : 'badge-active')}>
                          {item.is_sample ? 'Sample' : 'Product'}
                        </span>
                      </td>
                      <td data-label="SqFt">{item.sqft_per_box ? (item.sqft_per_box * item.num_boxes).toFixed(1) : '\u2014'}</td>
                      <td data-label="Qty">
                        {editingItemKey === item._key && editField === 'qty' ? (
                          <input type="number" min="1" step="1" value={editValue} onChange={e => setEditValue(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') cancelEdit(); }}
                            style={{ width: '60px', padding: '0.3rem 0.5rem', fontSize: '0.8125rem', border: '1px solid var(--gold)' }} autoFocus />
                        ) : (
                          <span>{item.num_boxes} <span style={{ fontSize: '0.7rem', color: 'var(--stone-400)' }}>{item.sell_by === 'sqft' ? 'box' : item.sell_by === 'unit' ? 'ea' : ''}</span></span>
                        )}
                      </td>
                      <td data-label="Unit Price">
                        {editingItemKey === item._key && editField === 'price' ? (
                          <input type="number" step="0.01" min="0" value={editValue} onChange={e => setEditValue(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') cancelEdit(); }}
                            style={{ width: '90px', padding: '0.3rem 0.5rem', fontSize: '0.8125rem', border: '1px solid var(--gold)' }} autoFocus />
                        ) : (
                          '$' + item.unit_price.toFixed(2)
                        )}
                      </td>
                      <td data-label="Subtotal">${item.subtotal.toFixed(2)}</td>
                      <td data-label="" className="actions">
                        {(editingItemKey === item._key && (editField === 'price' || editField === 'qty')) ? (
                          <>
                            <button className="btn btn-success btn-sm" onClick={saveEdit}>Save</button>
                            <button className="btn btn-secondary btn-sm" onClick={cancelEdit}>Cancel</button>

                        ) : (
                          <div style={{ display: 'flex', gap: '0.25rem' }}>
                            {!item.is_sample && (
                              <button className="btn btn-secondary btn-sm" onClick={() => startEdit(item._key, 'price', item.unit_price.toFixed(2))}>
                                Edit Price
                              </button>
                            )}
                            <button className="btn btn-secondary btn-sm" onClick={() => startEdit(item._key, 'qty', item.num_boxes)}>
                              Edit Qty
                            </button>
                            <button className="btn btn-sm btn-secondary" style={{ color: '#dc2626', fontSize: '0.7rem' }}
                              onClick={() => removeItem(item._key)}>Remove</button>
                          </div>
                        )}
                      </td>
                    </tr>
                  </React.Fragment>

            </table></div>

            items.filter(i => i.sku_id && !i.is_sample).forEach(item => {
              const vKey = item.vendor_id || '_unknown';
              if (!vendorGroups[vKey]) {

              vendorGroups[vKey].items.push(item);

                </p>

                  const poCost = group.items.reduce((sum, i) => sum + (i.cost || 0) * i.num_boxes, 0);
                  const poRetail = group.items.reduce((sum, i) => sum + i.subtotal, 0);
                  const margin = poRetail > 0 ? ((poRetail - poCost) / poRetail * 100) : 0;
                  return (
                    <div key={vKey} style={{ marginBottom: '2rem', border: '1px solid var(--stone-200)', padding: '1.5rem' }}>

                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                          <strong>{group.vendor_name}</strong>

                          <tr>

                            <th>Vendor SKU</th>
                            <th>Qty</th>
                            <th>Retail Price</th>
                            <th>Cost</th>
                            <th>Margin</th>
                            <th style={{ textAlign: 'right' }}>Subtotal (Cost)</th>
                          </tr>
                        </thead>
                        <tbody>
                          {group.items.map(item => {
                            const itemCost = item.cost || 0;
                            const itemRetail = item.unit_price || 0;
                            const itemMargin = itemRetail > 0 ? ((itemRetail - itemCost) / itemRetail * 100) : 0;
                            const isEditingCost = editingItemKey === item._key && editField === 'cost';
                            const isEditingQty = editingItemKey === item._key && editField === 'qty';
                            return (
                              <tr key={item._key}>
                                <td data-label="Product">{item.product_name || '\u2014'}</td>
                                <td data-label="Vendor SKU">{item.vendor_sku || '\u2014'}</td>
                                <td data-label="Qty">{item.num_boxes}</td>
                                <td data-label="Retail Price">{itemRetail ? '$' + itemRetail.toFixed(2) : '\u2014'}</td>
                                <td data-label="Cost">
                                  {isEditingCost ? (
                                    <span style={{ display: 'flex', gap: '0.25rem', alignItems: 'center' }}>
                                      <input type="number" step="0.01" min="0" value={editValue}
                                        onChange={e => setEditValue(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') cancelEdit(); }}
                                        style={{ width: '80px', padding: '0.2rem 0.4rem', fontSize: '0.8125rem' }} autoFocus />
                                      <button onClick={saveEdit}
                                        style={{ fontSize: '0.7rem', padding: '0.15rem 0.4rem', background: 'var(--green, #16a34a)', color: 'white', border: 'none', cursor: 'pointer' }}>Save</button>
                                      <button onClick={cancelEdit}
                                        style={{ fontSize: '0.7rem', padding: '0.15rem 0.4rem', border: '1px solid var(--stone-300)', background: 'white', cursor: 'pointer' }}>Cancel</button>
                                    </span>
                                  ) : (
                                    <span>
                                      ${itemCost.toFixed(2)}{' '}
                                      <button onClick={() => startEdit(item._key, 'cost', itemCost.toFixed(2))}
                                        style={{ fontSize: '0.65rem', padding: '0.1rem 0.3rem', background: 'none', border: '1px solid var(--stone-300)', cursor: 'pointer', color: 'var(--stone-600)' }}>Edit</button>
                                    </span>
                                  )}
                                </td>
                                <td data-label="Margin" style={{ color: itemMargin <= 0 ? 'var(--red, #dc2626)' : 'inherit', fontWeight: itemMargin <= 0 ? 600 : 400 }}>
                                  {itemRetail > 0 ? itemMargin.toFixed(1) + '%' : '\u2014'}
                                </td>
                                <td data-label="Subtotal" style={{ textAlign: 'right' }}>${(itemCost * item.num_boxes).toFixed(2)}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table></div>
                      <div style={{ textAlign: 'right', marginTop: '0.75rem', fontWeight: 600, fontSize: '0.9rem' }}>
                        PO Total: ${poCost.toFixed(2)}
                        {poRetail > 0 && (
                          <span style={{ marginLeft: '1rem', fontSize: '0.8rem', fontWeight: 500, color: margin < 20 ? '#dc2626' : '#16a34a' }}>
                            ({margin.toFixed(1)}% margin)
                          </span>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* Promo Code */}
          <div className="form-card">
            <h3>Promo Code</h3>
            {promoResult ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                <span style={{ background: '#dcfce7', color: '#166534', padding: '0.25rem 0.6rem', borderRadius: '4px', fontSize: '0.8rem', fontWeight: 600 }}>{promoResult.code}</span>
                <span style={{ color: '#16a34a', fontSize: '0.875rem' }}>-${promoResult.discount_amount.toFixed(2)}</span>
                <button className="btn btn-danger btn-sm" onClick={() => { setPromoResult(null); setPromoCode(''); }}>Remove</button>
              </div>
            ) : (
              <div>
                <div style={{ display: 'flex', gap: '0.5rem', maxWidth: '360px' }}>
                  <input type="text" value={promoCode} onChange={e => { setPromoCode(e.target.value.toUpperCase()); setPromoError(''); }}
                    onKeyDown={e => e.key === 'Enter' && applyPromo()}
                    placeholder="Enter promo code" style={{ flex: 1, padding: '0.75rem 1rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                  <button className="btn btn-primary btn-sm" onClick={applyPromo} disabled={promoLoading || !promoCode.trim() || items.length === 0}>
                    {promoLoading ? '...' : 'Apply'}
                  </button>
                </div>
                {promoError && <div style={{ color: '#dc2626', fontSize: '0.8rem', marginTop: '0.3rem' }}>{promoError}</div>}
              </div>
            )}
          </div>

          {/* Payment Method */}
          <div className="form-card">
            <h3>Payment Method</h3>
            <div className="mobile-stack" style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap', marginBottom: '0.75rem' }}>
              {[
                { value: 'card', label: 'Card', icon: '\uD83D\uDCB3' },
                { value: 'cash', label: 'Cash', icon: '\uD83D\uDCB5' },
                { value: 'check', label: 'Check', icon: '\uD83D\uDCC4' },
                { value: 'stripe', label: 'Payment Request', icon: '\u2709' }
              ].map(opt => (
                <button key={opt.value} type="button"
                  className={form.payment_method === opt.value ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                  style={{ padding: '0.5rem 1rem', fontSize: '0.8125rem', flex: 1, minWidth: '60px' }}
                  onClick={() => setForm(f => ({ ...f, payment_method: opt.value }))}>
                  {opt.icon} {opt.label}
                </button>
              ))}
            </div>
            {form.payment_method === 'check' && (
              <div style={{ maxWidth: '300px' }}>
                <label style={{ fontSize: '0.8125rem' }}>Check #</label>
                <input type="text" value={form.check_number} onChange={e => setForm(f => ({ ...f, check_number: e.target.value }))}
                  placeholder="Enter check number" style={{ width: '100%', padding: '0.6rem 0.75rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem', marginTop: '0.25rem' }} />
              </div>
            )}
            {form.payment_method === 'cash' && cashDrawerOpen === false && (
              <div style={{ padding: '0.5rem 0.75rem', background: '#fef3c7', border: '1px solid #f59e0b', borderRadius: '6px', fontSize: '0.8125rem', color: '#92400e' }}>
                No cash drawer open. Open one from the Cash Drawer tab first.
              </div>
            )}
            {form.payment_method === 'card' && terminalStatus !== 'connected' && (
              <div style={{ padding: '0.5rem 0.75rem', background: '#fef3c7', border: '1px solid #f59e0b', borderRadius: '6px', fontSize: '0.8125rem', color: '#92400e', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span>Terminal not connected.</span>
                <button className="terminal-connect-btn" onClick={connectReader} style={{ marginLeft: '0.5rem' }}>Connect</button>
              </div>
            )}
            {form.payment_method === 'card' && terminalStatus === 'connected' && (
              <div style={{ padding: '0.5rem 0.75rem', background: '#f0fdf4', border: '1px solid #86efac', borderRadius: '6px', fontSize: '0.8125rem', color: '#166534' }}>
                Tap to Pay ready
              </div>
            )}
          </div>

          {/* Order Totals */}
          <div className="form-card">
            <h3>Order Totals</h3>
            <div style={{ maxWidth: '350px', marginLeft: 'auto' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', fontSize: '0.875rem' }}>
                <span>Subtotal</span>
                <span>${subtotal.toFixed(2)}</span>
              </div>
              {discount > 0 && (
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', fontSize: '0.875rem', color: '#16a34a' }}>
                  <span>Discount ({promoResult.code})</span>
                  <span>-${discount.toFixed(2)}</span>
                </div>
              )}
              {form.delivery_method === 'pickup' ? (
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', fontSize: '0.875rem' }}>
                  <span>Shipping (Store Pickup)</span>
                  <span style={{ color: '#16a34a', fontWeight: 500 }}>FREE</span>
                </div>
              ) : null}
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.75rem 0', fontSize: '1.1rem', fontWeight: 600, borderTop: '2px solid var(--stone-200)' }}>
                <span>Total</span>
                <span>${total.toFixed(2)}</span>
              </div>
              <button className="btn btn-primary" style={{ width: '100%', padding: '0.875rem', marginTop: '0.5rem' }}
                onClick={createOrder} disabled={saving || !canCreate}>
                {saving ? 'Creating Order...' : form.payment_method === 'card' ? 'Tap to Pay' : 'Create Order'}
              </button>
            </div>

          {showTapModal && (
            <TapToPayModal
              amount={total}
              terminal={terminalRef.current}
              onSuccess={(piId) => { setShowTapModal(false); createOrderWithPI(piId); }}
              onCancel={() => setShowTapModal(false)}
            />
          )}
        </div>
      );

    // ========== RepSampleRequestCreateView ==========
    function RepSampleRequestCreateView({ navigate }) {
      const [customerName, setCustomerName] = useState('');
      const [customerEmail, setCustomerEmail] = useState('');
      const [customerPhone, setCustomerPhone] = useState('');
      const [addrLine1, setAddrLine1] = useState('');
      const [addrLine2, setAddrLine2] = useState('');
      const [addrCity, setAddrCity] = useState('');
      const [addrState, setAddrState] = useState('');
      const [addrZip, setAddrZip] = useState('');
      const [deliveryMethod, setDeliveryMethod] = useState('shipping');
      const [notes, setNotes] = useState('');
      const [items, setItems] = useState([]);
      const [skuSearch, setSkuSearch] = useState('');
      const [skuResults, setSkuResults] = useState([]);
      const [skuSearching, setSkuSearching] = useState(false);
      const [saving, setSaving] = useState(false);

      const searchSku = async (q) => {
        setSkuSearch(q);
        if (q.length < 2) { setSkuResults([]); return; }
        setSkuSearching(true);
        try {
          const data = await repFetch('/api/rep/skus/search?q=' + encodeURIComponent(q));
          setSkuResults(data.results || []);
        } catch (e) {}
        setSkuSearching(false);
      };

      const addProduct = (r) => {
        if (items.length >= 5) return alert('Maximum 5 items per sample request');
        if (items.find(i => i.product_id === r.product_id)) return alert('This product is already added');
        setItems(prev => [...prev, {
          _key: Date.now(),
          product_id: r.product_id || null,
          sku_id: r.sku_id,
          product_name: r.product_name,
          collection: r.collection,
          variant_name: r.variant_name,
          vendor_name: r.vendor_name
        }]);
        setSkuSearch('');
        setSkuResults([]);
      };

      const removeItem = (key) => setItems(prev => prev.filter(i => i._key !== key));

      const submitRequest = async () => {
        if (!customerName.trim()) return alert('Customer name is required');
        if (!customerEmail.trim()) return alert('Customer email is required');
        if (!customerPhone.trim()) return alert('Customer phone is required');
        if (deliveryMethod === 'shipping') {
          if (!addrLine1.trim()) return alert('Shipping address is required');
          if (!addrCity.trim()) return alert('City is required');
          if (!addrState.trim()) return alert('State is required');
          if (!addrZip.trim()) return alert('ZIP code is required');
        }
        if (!items.length) return alert('Add at least one product');
        setSaving(true);
        try {
          const body = {
            customer_name: customerName.trim(),
            customer_email: customerEmail.trim() || null,
            customer_phone: customerPhone.trim() || null,
            delivery_method: deliveryMethod,
            shipping_address_line1: deliveryMethod === 'shipping' ? (addrLine1.trim() || null) : null,
            shipping_address_line2: deliveryMethod === 'shipping' ? (addrLine2.trim() || null) : null,
            shipping_city: deliveryMethod === 'shipping' ? (addrCity.trim() || null) : null,
            shipping_state: deliveryMethod === 'shipping' ? (addrState.trim() || null) : null,
            shipping_zip: deliveryMethod === 'shipping' ? (addrZip.trim() || null) : null,
            notes: notes.trim() || null,
            items: items.map(i => ({ product_id: i.product_id, sku_id: i.sku_id }))
          };
          const created = await repFetch('/api/rep/sample-requests', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          navigate('sample-detail', created.sample_request.id);
        } catch (err) {
          alert('Error: ' + (err.message || 'Failed to create'));
        }
        setSaving(false);
      };

      return (
        <div>
          <div className="content-header">
            <h1>New Sample Request</h1>
            <button className="btn btn-secondary" onClick={() => navigate('samples')}>Back to Samples</button>
          </div>

          <div className="form-card">
            <h3>Customer Information</h3>
            <div className="form-grid">
              <div className="form-group">
                <label>Customer Name *</label>
                <input value={customerName} onChange={e => setCustomerName(e.target.value)} placeholder="Full name" required />
              </div>
              <div className="form-group">
                <label>Email *</label>
                <input type="email" value={customerEmail} onChange={e => setCustomerEmail(e.target.value)} placeholder="customer@email.com" required />
              </div>
              <div className="form-group">
                <label>Phone *</label>
                <input value={customerPhone} onChange={e => setCustomerPhone(e.target.value)} placeholder="(555) 123-4567" required />
              </div>
            </div>
          </div>

          <div className="form-card">
            <h3>Delivery Method</h3>
            <div style={{ display: 'flex', gap: '1.5rem', marginBottom: '1rem' }}>
              <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', fontSize: '0.875rem' }}>
                <input type="radio" name="sr-delivery" value="pickup" checked={deliveryMethod === 'pickup'}
                  onChange={() => setDeliveryMethod('pickup')} style={{ accentColor: 'var(--gold)' }} />
                In-Store Pickup <span style={{ color: '#15803d', fontWeight: 600 }}>(Free)</span>
              </label>
              <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', fontSize: '0.875rem' }}>
                <input type="radio" name="sr-delivery" value="shipping" checked={deliveryMethod === 'shipping'}
                  onChange={() => setDeliveryMethod('shipping')} style={{ accentColor: 'var(--gold)' }} />
                Ship to Customer <span style={{ color: 'var(--stone-500)', fontSize: '0.8125rem' }}>($12 flat rate)</span>
              </label>
            </div>
            {deliveryMethod === 'pickup' && (
              <div style={{ background: '#f0fdf4', border: '1px solid #bbf7d0', padding: '0.75rem 1rem', fontSize: '0.8125rem', color: '#166534' }}>
                Customer will pick up samples at the showroom. No shipping charge.
              </div>
            )}
            {deliveryMethod === 'shipping' && (
              <div className="form-grid" style={{ marginTop: '0.5rem' }}>
                <div className="form-group full">
                  <label>Address Line 1 *</label>
                  <input value={addrLine1} onChange={e => setAddrLine1(e.target.value)} placeholder="Street address" required />
                </div>
                <div className="form-group full">
                  <label>Address Line 2</label>
                  <input value={addrLine2} onChange={e => setAddrLine2(e.target.value)} placeholder="Apt, suite, unit..." />
                </div>
                <div className="form-group">
                  <label>City *</label>
                  <input value={addrCity} onChange={e => setAddrCity(e.target.value)} placeholder="City" required />
                </div>
                <div className="form-group">
                  <label>State *</label>
                  <input value={addrState} onChange={e => setAddrState(e.target.value)} placeholder="CA" maxLength={2} required />
                </div>
                <div className="form-group">
                  <label>ZIP *</label>
                  <input value={addrZip} onChange={e => setAddrZip(e.target.value)} placeholder="90210" maxLength={10} required />
                </div>
              </div>
            )}
          </div>

          <div className="form-card">
            <h3>Products (max 5)</h3>
            <div className="form-group">
              <label>Search Products</label>
              <input value={skuSearch} onChange={e => searchSku(e.target.value)} placeholder="Search by product name, SKU, or collection..." />
            </div>
            {skuResults.length > 0 && (
              <div style={{ border: '1px solid var(--stone-200)', maxHeight: 300, overflow: 'auto', marginBottom: '1.5rem' }}>
                {skuResults.map(r => (
                  <div key={r.sku_id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.75rem 1rem', borderBottom: '1px solid var(--stone-100)', cursor: 'pointer' }}
                    onClick={() => addProduct(r)}>
                    <div>
                      <div style={{ fontWeight: 500, fontSize: '0.875rem' }}>{r.product_name}{r.variant_name ? ' \u2014 ' + r.variant_name : ''}</div>
                      <div style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>
                        {r.collection || ''}{r.vendor_name ? ' \u00b7 ' + r.vendor_name : ''}{r.internal_sku ? ' \u00b7 ' + r.internal_sku : ''}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {items.length === 0 && (
              <div style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem', border: '1px dashed var(--stone-200)' }}>
                Search and add products for the sample request
              </div>
            )}

            {items.map(item => (
              <div key={item._key} className="visit-product-card">
                <div className="visit-product-info">
                  <div className="vp-name">{item.product_name}{item.variant_name ? ' \u2014 ' + item.variant_name : ''}</div>
                  <div className="vp-collection">{item.collection || ''}{item.vendor_name ? ' \u00b7 ' + item.vendor_name : ''}</div>
                  <div style={{ fontSize: '0.8125rem', fontWeight: 500, color: '#15803d', marginTop: '0.25rem' }}>Free Sample</div>
                </div>
                <button className="btn btn-sm" onClick={() => removeItem(item._key)}
                  style={{ color: 'var(--red)', background: 'var(--red-light)', border: 'none', padding: '0.3rem 0.6rem', cursor: 'pointer', fontSize: '0.75rem' }}>Remove</button>
              </div>
            ))}
          </div>

          <div className="form-card">
            <h3>Notes</h3>
            <div className="form-group full">
              <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Any special instructions or notes..." rows="3" />
            </div>
          </div>

          {deliveryMethod === 'shipping' && (
            <div style={{ background: '#fefce8', border: '1px solid #fde68a', padding: '0.75rem 1rem', marginBottom: '1.5rem', fontSize: '0.8125rem', color: '#854d0e' }}>
              Samples are free. Flat-rate $12 shipping applies.
            </div>
          )}

          <div style={{ display: 'flex', gap: '1rem', justifyContent: 'flex-end' }}>
            <button className="btn btn-primary" disabled={saving} onClick={submitRequest}>
              {saving ? 'Submitting...' : 'Submit Sample Request'}
            </button>
          </div>
        </div>
      );
    }

    // ========== RepSampleRequestDetailView ==========
    function RepSampleRequestDetailView({ navigate, editId }) {
      const [sr, setSr] = useState(null);
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [trackingInput, setTrackingInput] = useState('');
      const [showTrackingInput, setShowTrackingInput] = useState(false);
      const [acting, setActing] = useState(false);

      const load = useCallback(() => {
        setLoading(true);
        repFetch('/api/rep/sample-requests/' + editId)
          .then(d => { setSr(d.sample_request); setItems(d.items || []); setLoading(false); })
          .catch(() => setLoading(false));
      }, [editId]);

      useEffect(load, [load]);

      const markShipped = async () => {
        setActing(true);
        try {
          await repFetch('/api/rep/sample-requests/' + editId + '/ship', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tracking_number: trackingInput.trim() || null })
          });
          setShowTrackingInput(false);
          load();
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
        setActing(false);
      };

      const markDelivered = async () => {
        setActing(true);
        try {
          await repFetch('/api/rep/sample-requests/' + editId + '/deliver', { method: 'PUT' });
          load();
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
        setActing(false);
      };

      const cancelRequest = async () => {
        if (!confirm('Cancel this sample request?')) return;
        setActing(true);
        try {
          await repFetch('/api/rep/sample-requests/' + editId + '/cancel', { method: 'PUT' });
          load();
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
        setActing(false);
      };

      const deleteRequest = async () => {
        if (!confirm('Delete this sample request? This cannot be undone.')) return;
        try {
          await repFetch('/api/rep/sample-requests/' + editId, { method: 'DELETE' });
          navigate('samples');
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
      };

      const [editingNoteId, setEditingNoteId] = useState(null);
      const [noteDraft, setNoteDraft] = useState('');
      const [selectedItems, setSelectedItems] = useState(new Set());
      const [cancellingItems, setCancellingItems] = useState(false);

      const toggleSelectItem = (itemId) => {
        setSelectedItems(prev => {
          const next = new Set(prev);
          if (next.has(itemId)) next.delete(itemId);
          else next.add(itemId);
          return next;
        });
      };

      const cancelSelectedItems = async () => {
        if (!selectedItems.size) return;
        const count = selectedItems.size;
        if (!confirm(`Cancel ${count} selected sample${count !== 1 ? 's' : ''}? This cannot be undone.`)) return;
        setCancellingItems(true);
        try {
          for (const itemId of selectedItems) {
            await repFetch('/api/rep/sample-requests/' + editId + '/items/' + itemId + '/status', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ status: 'cancelled' })
            });
          }
          setSelectedItems(new Set());
          load();
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
        setCancellingItems(false);
      };

      const [paymentActing, setPaymentActing] = useState(false);

      const markPaymentCollected = async (collected) => {
        setPaymentActing(true);
        try {
          await repFetch('/api/rep/sample-requests/' + editId + '/payment-status', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ collected })
          });
          load();
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
        setPaymentActing(false);
      };

      const [addSkuSearch, setAddSkuSearch] = useState('');
      const [addSkuResults, setAddSkuResults] = useState([]);
      const [addSkuSearching, setAddSkuSearching] = useState(false);
      const [addingItem, setAddingItem] = useState(false);

      const searchSkuToAdd = async (q) => {
        setAddSkuSearch(q);
        if (q.length < 2) { setAddSkuResults([]); return; }
        setAddSkuSearching(true);
        try {
          const data = await repFetch('/api/rep/skus/search?q=' + encodeURIComponent(q));
          setAddSkuResults(data.results || []);
        } catch (e) {}
        setAddSkuSearching(false);
      };

      const addItemToRequest = async (result) => {
        const activeCount = items.filter(i => i.status !== 'cancelled').length;
        if (activeCount >= 5) return alert('Maximum 5 active items per sample request');
        if (items.find(i => i.product_id === result.product_id && i.status !== 'cancelled')) return alert('This product is already in the request');
        setAddingItem(true);
        try {
          const data = await repFetch('/api/rep/sample-requests/' + editId + '/add-items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items: [{ product_id: result.product_id, sku_id: result.sku_id }] })
          });
          setAddSkuSearch('');
          setAddSkuResults([]);
          load();
        } catch (err) { alert('Error: ' + (err.message || 'Failed to add item')); }
        setAddingItem(false);
      };

      const [vendorShipTo, setVendorShipTo] = useState({}); // { [vendor_id]: 'store' | 'customer' }
      const [sendingVendorId, setSendingVendorId] = useState(null);
      const [vendorSendResults, setVendorSendResults] = useState({}); // { [vendor_id]: { sent, error, vendor_email } }

      const sendToVendor = async (vendorId, vendorName) => {
        const shipTo = vendorShipTo[vendorId] || 'store';
        if (!confirm(`Send sample request to ${vendorName}? Samples will ship to ${shipTo === 'store' ? 'store' : 'customer'}.`)) return;
        setSendingVendorId(vendorId);
        try {
          const data = await repFetch('/api/rep/sample-requests/' + editId + '/send-to-vendor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ vendor_id: vendorId, ship_to: shipTo })
          });
          setVendorSendResults(prev => ({ ...prev, [vendorId]: data }));
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
        setSendingVendorId(null);
      };

      const toggleItemReady = async (itemId, currentStatus) => {
        const newStatus = currentStatus === 'ready' ? 'pending' : 'ready';
        try {
          const data = await repFetch('/api/rep/sample-requests/' + editId + '/items/' + itemId + '/status', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
          });
          setItems(prev => prev.map(it => it.id === itemId ? { ...it, status: data.item.status } : it));
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
      };

      const saveItemNote = async (itemId) => {
        try {
          const data = await repFetch('/api/rep/sample-requests/' + editId + '/items/' + itemId + '/status', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ notes: noteDraft })
          });
          setItems(prev => prev.map(it => it.id === itemId ? { ...it, notes: data.item.notes } : it));
          setEditingNoteId(null);
        } catch (err) { alert('Error: ' + (err.message || 'Failed')); }
      };

      if (loading) return <div className="loading">Loading sample request...</div>;
      if (!sr) return <div className="loading">Sample request not found</div>;

      const addressParts = [sr.shipping_address_line1, sr.shipping_address_line2].filter(Boolean);
      const cityLine = [sr.shipping_city, sr.shipping_state].filter(Boolean).join(', ');
      if (sr.shipping_zip && cityLine) addressParts.push(cityLine + ' ' + sr.shipping_zip);
      else if (cityLine) addressParts.push(cityLine);
      else if (sr.shipping_zip) addressParts.push(sr.shipping_zip);

      return (
        <div>
          <div className="content-header">
            <h1>Sample Request {sr.request_number}</h1>
            <button className="btn btn-secondary" onClick={() => navigate('samples')}>Back to Samples</button>
          </div>

          <div className="resp-grid-2" style={{ gap: '1.5rem', marginBottom: '1.5rem' }}>
            <div className="form-card">
              <h3>Customer</h3>
              <div style={{ fontSize: '0.875rem', lineHeight: 1.8 }}>
                <div><strong>{sr.customer_name}</strong></div>
                {sr.customer_email && <div style={{ color: 'var(--stone-500)' }}>{sr.customer_email}</div>}
                {sr.customer_phone && <div style={{ color: 'var(--stone-500)' }}>{sr.customer_phone}</div>}
              </div>
              <div style={{ marginTop: '1rem' }}>
                <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Delivery</div>
                {sr.delivery_method === 'pickup' ? (
                  <div style={{ fontSize: '0.875rem', color: '#15803d', fontWeight: 500 }}>In-Store Pickup (Free)</div>
                ) : (
                  addressParts.length > 0
                    ? addressParts.map((l, i) => <div key={i} style={{ fontSize: '0.875rem', color: 'var(--stone-600)' }}>{l}</div>)
                    : <div style={{ fontSize: '0.875rem', color: 'var(--stone-500)' }}>Shipping ($12 flat rate)</div>
                )}
              </div>
            </div>

            <div className="form-card">
              <h3>Status</h3>
              <div style={{ marginBottom: '1rem' }}>
                <span className={'badge badge-' + sr.status} style={{ fontSize: '0.875rem', padding: '0.35rem 0.75rem' }}>{sr.status}</span>
              </div>
              <div style={{ fontSize: '0.8125rem', color: 'var(--stone-500)', lineHeight: 2 }}>
                <div>Created: {new Date(sr.created_at).toLocaleString()}</div>
                {sr.shipped_at && <div>Shipped: {new Date(sr.shipped_at).toLocaleString()}</div>}
                {sr.delivered_at && <div>Delivered: {new Date(sr.delivered_at).toLocaleString()}</div>}
                {sr.cancelled_at && <div>Cancelled: {new Date(sr.cancelled_at).toLocaleString()}</div>}
              </div>
              {sr.tracking_number && (
                <div style={{ marginTop: '0.75rem' }}>
                  <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Tracking</div>
                  <div style={{ fontFamily: 'monospace', fontSize: '0.9375rem', fontWeight: 500, color: 'var(--stone-800)' }}>{sr.tracking_number}</div>
                </div>
              )}
            </div>
          </div>

          {/* Actions — hidden when delivered or cancelled */}
          {sr.status !== 'delivered' && sr.status !== 'cancelled' && (
          <div className="form-card" style={{ marginBottom: '1.5rem' }}>
            <h3>Actions</h3>
            <div style={{ display: 'flex', gap: '0.75rem', flexWrap: 'wrap', alignItems: 'center' }}>
              {sr.status === 'requested' && !showTrackingInput && (
                <button className="btn btn-primary" disabled={acting} onClick={() => setShowTrackingInput(true)}>Mark Shipped</button>
              )}
              {showTrackingInput && (
                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                  <input
                    placeholder="Tracking number (optional)"
                    value={trackingInput} onChange={e => setTrackingInput(e.target.value)}
                    style={{ padding: '0.5rem 0.75rem', border: '1px solid var(--stone-200)', fontSize: '0.8125rem', maxWidth: 240, width: '100%' }}
                  />
                  <button className="btn btn-primary" disabled={acting} onClick={markShipped}>
                    {acting ? 'Shipping...' : 'Confirm Ship'}
                  </button>
                  <button className="btn btn-secondary" onClick={() => setShowTrackingInput(false)}>Cancel</button>
                </div>
              )}
              {sr.status === 'shipped' && (
                <button className="btn btn-primary" disabled={acting} onClick={markDelivered}>
                  {acting ? 'Updating...' : 'Mark Delivered'}
                </button>
              )}
              {(sr.status === 'requested' || sr.status === 'shipped') && (
                <button className="btn btn-secondary" disabled={acting} onClick={cancelRequest}
                  style={{ color: 'var(--red)', borderColor: 'var(--red)' }}>Cancel Request</button>
              )}
              {sr.status === 'requested' && (
                <button className="btn btn-secondary" disabled={acting} onClick={deleteRequest}
                  style={{ color: 'var(--red)', borderColor: 'var(--red)' }}>Delete</button>
              )}
            </div>
          </div>
          )}

          {/* Notes */}
          {sr.notes && (
            <div className="form-card" style={{ marginBottom: '1.5rem' }}>
              <h3>Notes</h3>
              <p style={{ fontSize: '0.875rem', color: 'var(--stone-600)', margin: 0, whiteSpace: 'pre-wrap' }}>{sr.notes}</p>
            </div>
          )}

          {/* Workflow Checklist */}
          {(() => {
            const activeItems = items.filter(i => i.status !== 'cancelled');
            const isShipping = sr.delivery_method !== 'pickup';

            // Compute steps
            const steps = [];

            // 1. Shipping payment collected (only for shipping orders)
            if (isShipping) {
              steps.push({
                label: 'Shipping payment collected',
                done: !!sr.shipping_payment_collected,
                detail: sr.shipping_payment_collected
                  ? (sr.shipping_payment_collected_at ? 'Collected ' + new Date(sr.shipping_payment_collected_at).toLocaleDateString() : 'Collected')
                  : null,
                action: !sr.shipping_payment_collected ? 'collect_payment' : (sr.shipping_payment_collected ? 'uncollect_payment' : null)
              });
            }

            // 2. Vendor emails sent
            const vendorsTotal = new Set(activeItems.map(i => i.vendor_id || 'unknown')).size;
            const vendorsNotified = new Set(activeItems.filter(i => i.vendor_notified_at).map(i => i.vendor_id || 'unknown')).size;
            steps.push({
              label: 'Vendor emails sent',
              done: activeItems.length > 0 && vendorsNotified === vendorsTotal,
              detail: vendorsTotal > 0 ? `${vendorsNotified} of ${vendorsTotal} vendor${vendorsTotal !== 1 ? 's' : ''} notified` : 'No items'
            });

            // 3. All samples ready
            const readyCount = activeItems.filter(i => i.status === 'ready').length;
            steps.push({
              label: 'All samples ready',
              done: activeItems.length > 0 && readyCount === activeItems.length,
              detail: activeItems.length > 0 ? `${readyCount} of ${activeItems.length} ready` : 'No items'
            });

            // 4. Order shipped / Ready for pickup
            const isFinalStep = sr.status === 'shipped' || sr.status === 'delivered';
            steps.push({
              label: isShipping ? 'Order shipped' : 'Ready for pickup',
              done: isFinalStep,
              detail: isFinalStep
                ? (sr.shipped_at ? new Date(sr.shipped_at).toLocaleDateString() : (sr.status === 'delivered' ? 'Delivered' : 'Shipped'))
                : null
            });

            const completedCount = steps.filter(s => s.done).length;
            const totalSteps = steps.length;
            const pct = totalSteps > 0 ? (completedCount / totalSteps * 100) : 0;

            return (
              <div className="form-card" style={{ marginBottom: '1.5rem' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                  <h3 style={{ margin: 0 }}>Workflow Checklist</h3>
                  <span style={{ fontSize: '0.8125rem', color: pct === 100 ? '#15803d' : 'var(--stone-500)', fontWeight: 500 }}>
                    {completedCount} of {totalSteps} steps complete
                  </span>
                </div>

                {/* Progress bar */}
                <div style={{ display: 'flex', gap: '0.25rem', marginBottom: '1.25rem' }}>
                  {steps.map((_, i) => (
                    <div key={i} style={{
                      flex: 1, height: 6, borderRadius: 3,
                      background: i < completedCount ? '#15803d' : 'var(--stone-200)',
                      transition: 'background 0.3s'
                    }} />
                  ))}
                </div>

                {/* Steps */}
                {steps.map((step, i) => (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'center', gap: '0.75rem',
                    padding: '0.5rem 0',
                    borderBottom: i < steps.length - 1 ? '1px solid var(--stone-100)' : 'none'
                  }}>
                    {/* Check icon */}
                    <div style={{
                      width: 24, height: 24, borderRadius: '50%', flexShrink: 0,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      background: step.done ? '#dcfce7' : 'var(--stone-100)',
                      color: step.done ? '#15803d' : 'var(--stone-400)',
                      fontSize: '0.75rem', fontWeight: 700,
                      border: step.done ? '2px solid #15803d' : '2px solid var(--stone-300)'
                    }}>
                      {step.done ? '\u2713' : (i + 1)}
                    </div>
                    {/* Label + detail */}
                    <div style={{ flex: 1 }}>
                      <div style={{
                        fontSize: '0.875rem', fontWeight: 500,
                        color: step.done ? '#15803d' : 'var(--stone-700)'
                      }}>
                        {step.label}
                      </div>
                      {step.detail && (
                        <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)', marginTop: '0.125rem' }}>
                          {step.detail}
                        </div>
                      )}
                    </div>
                    {/* Action button */}
                    {step.action === 'collect_payment' && (
                      <button
                        className="btn btn-primary"
                        style={{ fontSize: '0.75rem', padding: '0.25rem 0.75rem' }}
                        disabled={paymentActing}
                        onClick={() => markPaymentCollected(true)}
                      >
                        {paymentActing ? 'Saving...' : 'Mark as Collected'}
                      </button>
                    )}
                    {step.action === 'uncollect_payment' && (
                      <button
                        className="btn btn-secondary"
                        style={{ fontSize: '0.75rem', padding: '0.25rem 0.5rem', color: 'var(--stone-500)' }}
                        disabled={paymentActing}
                        onClick={() => markPaymentCollected(false)}
                      >
                        Undo
                      </button>
                    )}
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Samples section */}
          {(() => {
            const activeItems = items.filter(i => i.status !== 'cancelled');
            const cancelledCount = items.length - activeItems.length;
            const readyCount = activeItems.filter(i => i.status === 'ready').length;
            const total = activeItems.length;
            return (
              <>
              {/* Header row: title + readiness bar */}
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: sr.status === 'requested' ? '0' : '1rem', flexWrap: 'wrap' }}>
                <h3 style={{ margin: 0 }}>Samples ({items.length})</h3>
                {total > 0 && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                    <div style={{ width: 100, height: 6, background: 'var(--stone-200)', borderRadius: 3, overflow: 'hidden' }}>
                      <div style={{ width: (readyCount / total * 100) + '%', height: '100%', background: readyCount === total ? '#15803d' : '#d97706', borderRadius: 3, transition: 'width 0.3s' }} />
                    </div>
                    <span style={{ fontSize: '0.8125rem', color: 'var(--stone-500)', whiteSpace: 'nowrap' }}>{readyCount} of {total} ready</span>
                  </div>
                )}
                {cancelledCount > 0 && (
                  <span style={{ fontSize: '0.75rem', color: '#dc2626', fontWeight: 500 }}>{cancelledCount} cancelled</span>
                )}
              </div>

              {/* Actions bar: add sample search + selection actions (only when open) */}
              {sr.status === 'requested' && (
                <div style={{ padding: '0.75rem 0', marginBottom: '0.5rem', borderBottom: '1px solid var(--stone-100)' }}>
                  {/* Add sample search */}
                  {total < 5 ? (
                    <div style={{ marginBottom: '0.75rem' }}>
                      <div style={{ position: 'relative' }}>
                        <input
                          type="text"
                          placeholder="Search to add a sample..."
                          value={addSkuSearch}
                          onChange={e => searchSkuToAdd(e.target.value)}
                          style={{ width: '100%', padding: '0.5rem 0.75rem', border: '1px solid var(--stone-200)', fontSize: '0.8125rem', boxSizing: 'border-box' }}
                        />
                        {addSkuSearching && (
                          <div style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', fontSize: '0.75rem', color: 'var(--stone-400)' }}>Searching...</div>
                        )}
                        {addSkuResults.length > 0 && (
                          <div style={{
                            position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 100,
                            background: '#fff', border: '1px solid var(--stone-200)', borderTop: 'none',
                            maxHeight: 240, overflowY: 'auto', boxShadow: '0 4px 12px rgba(0,0,0,0.1)'
                          }}>
                            {addSkuResults.map(r => (
                              <div key={r.sku_id || r.product_id} style={{
                                display: 'flex', alignItems: 'center', gap: '0.75rem', padding: '0.5rem 0.75rem',
                                borderBottom: '1px solid var(--stone-100)', cursor: 'pointer'
                              }} onClick={() => !addingItem && addItemToRequest(r)}>
                                {r.primary_image && (
                                  <img src={r.primary_image} alt="" style={{ width: 40, height: 40, objectFit: 'cover', borderRadius: 4, flexShrink: 0 }} />
                                )}
                                <div style={{ flex: 1, minWidth: 0 }}>
                                  <div style={{ fontSize: '0.8125rem', fontWeight: 500, color: 'var(--stone-800)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                    {r.product_name}{r.variant_name ? ' \u2014 ' + r.variant_name : ''}
                                  </div>
                                  <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)' }}>
                                    {r.vendor_name}{r.collection ? ' \u00b7 ' + r.collection : ''}
                                  </div>
                                </div>
                                <button className="btn btn-primary" style={{ fontSize: '0.75rem', padding: '0.2rem 0.5rem', flexShrink: 0 }} disabled={addingItem}>
                                  {addingItem ? '...' : 'Add'}
                                </button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                      <div style={{ fontSize: '0.75rem', color: 'var(--stone-400)', marginTop: '0.25rem' }}>
                        {total} of 5 samples used
                      </div>
                    </div>
                  ) : (
                    <p style={{ fontSize: '0.8125rem', color: 'var(--stone-500)', margin: '0 0 0.75rem' }}>
                      Maximum 5 samples reached. Cancel an item to add a new one.
                    </p>
                  )}

                  {/* Selection actions */}
                  <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center', flexWrap: 'wrap' }}>
                    <button
                      className="btn btn-secondary"
                      disabled={!selectedItems.size || cancellingItems}
                      onClick={cancelSelectedItems}
                      style={{ color: 'var(--red)', borderColor: 'var(--red)' }}
                    >
                      {cancellingItems ? 'Cancelling...' : `Cancel Selected (${selectedItems.size})`}
                    </button>
                    {selectedItems.size > 0 && (
                      <button className="btn btn-secondary" style={{ fontSize: '0.8125rem' }} onClick={() => setSelectedItems(new Set())}>
                        Clear Selection
                      </button>
                    )}
                    <button className="btn btn-secondary" style={{ fontSize: '0.8125rem' }} onClick={() => {
                      const cancellable = items.filter(i => i.status !== 'cancelled').map(i => i.id);
                      setSelectedItems(new Set(cancellable));
                    }}>
                      Select All
                    </button>
                  </div>
                </div>
              )}
              </>
            );
          })()}

          {/* Vendor-grouped items */}
          {(() => {
            // Group items by vendor
            const vendorMap = {};
            items.forEach(item => {
              const vid = item.vendor_id || 'unknown';
              if (!vendorMap[vid]) {
                vendorMap[vid] = {
                  vendor_id: item.vendor_id,
                  vendor_name: item.vendor_name || 'Unknown Vendor',
                  vendor_email: item.vendor_email || null,
                  items: []
                };
              }
              vendorMap[vid].items.push(item);
            });
            const vendorGroups = Object.values(vendorMap);

            const isPickup = sr.delivery_method === 'pickup';
            const customerAddr = [sr.shipping_address_line1, sr.shipping_address_line2].filter(Boolean);
            const customerCityLine = [sr.shipping_city, sr.shipping_state].filter(Boolean).join(', ');
            if (sr.shipping_zip && customerCityLine) customerAddr.push(customerCityLine + ' ' + sr.shipping_zip);
            else if (customerCityLine) customerAddr.push(customerCityLine);
            else if (sr.shipping_zip) customerAddr.push(sr.shipping_zip);

            return vendorGroups.map(group => {
              const vid = group.vendor_id || 'unknown';
              const shipTo = vendorShipTo[vid] || 'store';
              const sendResult = vendorSendResults[vid];
              const isSending = sendingVendorId === vid;

              return (
                <div key={vid} className="form-card" style={{ marginBottom: '1.25rem' }}>
                  {/* Vendor header */}
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.75rem' }}>
                    <div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.25rem' }}>
                        <h3 style={{ margin: 0 }}>{group.vendor_name}</h3>
                        <span style={{ fontSize: '0.75rem', color: 'var(--stone-500)', background: 'var(--stone-100)', padding: '0.15rem 0.5rem', borderRadius: '0.25rem' }}>
                          {group.items.length} sample{group.items.length !== 1 ? 's' : ''}
                        </span>
                      </div>
                      {group.vendor_email ? (
                        <div style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{group.vendor_email}</div>
                      ) : (
                        <div style={{ fontSize: '0.8125rem', color: '#dc2626', fontStyle: 'italic' }}>No email configured</div>
                      )}
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      {/* Show persisted "Sent" badge from DB or session result */}
                      {(() => {
                        const notifiedItem = group.items.find(i => i.vendor_notified_at);
                        if (sendResult && sendResult.sent) {
                          return (
                            <span style={{ fontSize: '0.75rem', fontWeight: 600, color: '#15803d', background: '#dcfce7', padding: '0.25rem 0.5rem', borderRadius: '0.25rem' }}>
                              &#10003; Sent
                            </span>
                          );
                        }
                        if (sendResult && !sendResult.sent) {
                          return (
                            <span style={{ fontSize: '0.75rem', fontWeight: 500, color: '#dc2626', background: '#fee2e2', padding: '0.25rem 0.5rem', borderRadius: '0.25rem' }}>
                              Failed: {sendResult.error}
                            </span>
                          );
                        }
                        if (notifiedItem) {
                          return (
                            <span style={{ fontSize: '0.75rem', fontWeight: 600, color: '#15803d', background: '#dcfce7', padding: '0.25rem 0.5rem', borderRadius: '0.25rem' }}>
                              &#10003; Sent {new Date(notifiedItem.vendor_notified_at).toLocaleDateString()}
                            </span>
                          );
                        }
                        return null;
                      })()}
                      <button
                        className="btn btn-primary"
                        style={{ fontSize: '0.8125rem', padding: '0.375rem 0.75rem' }}
                        disabled={!group.vendor_email || isSending || !group.vendor_id}
                        onClick={() => sendToVendor(group.vendor_id, group.vendor_name)}
                      >
                        {isSending ? 'Sending...' : 'Send to Vendor'}
                      </button>
                    </div>
                  </div>

                  {/* Ship-to selector */}
                  <div style={{ background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: '0.375rem', padding: '0.75rem 1rem', marginBottom: '1rem' }}>
                    <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-400)', marginBottom: '0.5rem', fontWeight: 500 }}>Ship To</div>
                    {isPickup ? (
