    // ========== RepCashDrawerView ==========
    function RepCashDrawerView({ navigate }) {
      const [drawer, setDrawer] = useState(null);
      const [transactions, setTransactions] = useState([]);
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);
      const [openingBalance, setOpeningBalance] = useState('200.00');
      const [opening, setOpening] = useState(false);

      // Close drawer modal
      const [showCloseModal, setShowCloseModal] = useState(false);
      const [actualBalance, setActualBalance] = useState('');
      const [closeNotes, setCloseNotes] = useState('');
      const [closing, setClosing] = useState(false);
      const [closeResult, setCloseResult] = useState(null);

      // Cash in/out modal
      const [showTxnModal, setShowTxnModal] = useState(null); // 'cash_in' | 'cash_out' | null
      const [txnAmount, setTxnAmount] = useState('');
      const [txnDescription, setTxnDescription] = useState('');
      const [txnSaving, setTxnSaving] = useState(false);

      const load = async () => {
        try {
          const [currentData, historyData] = await Promise.all([
            repFetch('/api/rep/cash-drawer/current'),
            repFetch('/api/rep/cash-drawer/history')
          ]);
          setDrawer(currentData.drawer);
          setTransactions(currentData.transactions || []);
          setHistory(historyData.drawers || []);
        } catch (err) {}
        setLoading(false);
      };

      useEffect(() => { load(); }, []);

      const openDrawer = async () => {
        const bal = parseFloat(openingBalance);
        if (isNaN(bal) || bal < 0) return;
        setOpening(true);
        try {
          const data = await repFetch('/api/rep/cash-drawer/open', {
            method: 'POST',
            body: JSON.stringify({ opening_balance: bal })
          });
          setDrawer(data.drawer);
          setTransactions([]);
        } catch (err) { alert(err.message); }
        setOpening(false);
      };

      const closeDrawer = async () => {
        const actual = parseFloat(actualBalance);
        if (isNaN(actual) || actual < 0) return;
        setClosing(true);
        try {
          const data = await repFetch('/api/rep/cash-drawer/close', {
            method: 'POST',
            body: JSON.stringify({ actual_balance: actual, notes: closeNotes || undefined })
          });
          setCloseResult(data.drawer);
          setDrawer(null);
          setTransactions([]);
          // Refresh history
          const historyData = await repFetch('/api/rep/cash-drawer/history');
          setHistory(historyData.drawers || []);
        } catch (err) { alert(err.message); }
        setClosing(false);
      };

      const recordTxn = async () => {
        const amt = parseFloat(txnAmount);
        if (isNaN(amt) || amt <= 0 || !showTxnModal) return;
        setTxnSaving(true);
        try {
          const data = await repFetch('/api/rep/cash-drawer/transaction', {
            method: 'POST',
            body: JSON.stringify({ type: showTxnModal, amount: amt, description: txnDescription || undefined })
          });
          setDrawer(data.drawer);
          setTransactions(prev => [...prev, data.transaction]);
          setShowTxnModal(null);
          setTxnAmount('');
          setTxnDescription('');
        } catch (err) { alert(err.message); }
        setTxnSaving(false);
      };

      if (loading) return <div className="loading">Loading...</div>;

      const fmtTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      };
      const fmtDate = (ts) => {
        if (!ts) return '';
        return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      };
      const fmtMoney = (v) => '$' + parseFloat(v || 0).toFixed(2);

      // Summary computations for open drawer
      const cashSales = transactions.filter(t => t.type === 'sale').reduce((s, t) => s + parseFloat(t.amount), 0);
      const cashRefunds = transactions.filter(t => t.type === 'refund').reduce((s, t) => s + parseFloat(t.amount), 0);
      const cashIn = transactions.filter(t => t.type === 'cash_in').reduce((s, t) => s + parseFloat(t.amount), 0);
      const cashOut = transactions.filter(t => t.type === 'cash_out').reduce((s, t) => s + parseFloat(t.amount), 0);

      return (
        <div>
          <div className="content-header">
            <h1>Cash Drawer</h1>
            {drawer && <span style={{ fontSize: '0.875rem', color: 'var(--stone-500)' }}>Opened {fmtTime(drawer.opened_at)}</span>}
          </div>

          {/* Close result banner */}
          {closeResult && (
            <div style={{ padding: '1rem 1.25rem', marginBottom: '1.5rem', borderRadius: '8px',
              background: parseFloat(closeResult.over_short) === 0 ? '#dcfce7' : parseFloat(closeResult.over_short) > 0 ? '#dbeafe' : '#fef3c7',
              border: '1px solid ' + (parseFloat(closeResult.over_short) === 0 ? '#86efac' : parseFloat(closeResult.over_short) > 0 ? '#93c5fd' : '#fcd34d') }}>
              <div style={{ fontWeight: 600, marginBottom: '0.25rem' }}>Drawer Closed</div>
              <div style={{ fontSize: '0.875rem' }}>
                Expected: {fmtMoney(closeResult.expected_balance)} | Actual: {fmtMoney(closeResult.actual_balance)} |{' '}
                {parseFloat(closeResult.over_short) === 0 ? 'Exact' :
                  parseFloat(closeResult.over_short) > 0 ? '+' + fmtMoney(closeResult.over_short) + ' over' :
                  fmtMoney(Math.abs(parseFloat(closeResult.over_short))) + ' short'}
              </div>
              <button className="btn btn-secondary btn-sm" style={{ marginTop: '0.5rem' }} onClick={() => setCloseResult(null)}>Dismiss</button>
            </div>
          )}

          {!drawer ? (
            /* ===== Drawer Closed State ===== */
            <div>
              <div className="form-card">
                <h3>Open Cash Drawer</h3>
                <p style={{ color: 'var(--stone-500)', fontSize: '0.875rem', marginBottom: '1rem' }}>No cash drawer is currently open.</p>
                <div className="form-group" style={{ maxWidth: '240px' }}>
                  <label>Opening Balance</label>
                  <div style={{ position: 'relative' }}>
                    <span style={{ position: 'absolute', left: '0.75rem', top: '50%', transform: 'translateY(-50%)', color: 'var(--stone-400)' }}>$</span>
                    <input type="number" min="0" step="0.01" value={openingBalance}
                      onChange={e => setOpeningBalance(e.target.value)}
                      style={{ width: '100%', padding: '0.75rem 1rem 0.75rem 1.5rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                  </div>
                </div>
                <button className="btn btn-primary" onClick={openDrawer} disabled={opening}>
                  {opening ? 'Opening...' : 'Open Cash Drawer'}
                </button>
              </div>

              {/* History */}
              {history.length > 0 && (
                <div className="form-card" style={{ marginTop: '1.5rem' }}>
                  <h3>Recent History</h3>
                  <div className="table-scroll-wrapper"><table className="data-table">
                    <thead>
                      <tr>
                        <th>Date</th>
                        <th>Opening</th>
                        <th>Expected</th>
                        <th>Actual</th>
                        <th>Over/Short</th>
                      </tr>
                    </thead>
                    <tbody>
                      {history.map(h => {
                        const os = parseFloat(h.over_short || 0);
                        return (
                          <tr key={h.id}>
                            <td data-label="Date">{fmtDate(h.closed_at)}</td>
                            <td data-label="Opening">{fmtMoney(h.opening_balance)}</td>
                            <td data-label="Expected">{fmtMoney(h.expected_balance)}</td>
                            <td data-label="Actual">{fmtMoney(h.actual_balance)}</td>
                            <td data-label="Over/Short" style={{ color: os === 0 ? 'var(--stone-500)' : os > 0 ? '#2563eb' : '#dc2626', fontWeight: 500 }}>
                              {os === 0 ? 'Exact' : (os > 0 ? '+' : '-') + '$' + Math.abs(os).toFixed(2)}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table></div>
                </div>
              )}
            </div>
          ) : (
            /* ===== Drawer Open State ===== */
            <div>
              <div className="form-card">
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1rem', marginBottom: '1.5rem' }}>
                  <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Opening Balance</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600 }}>{fmtMoney(drawer.opening_balance)}</div>
                  </div>
                  {cashSales > 0 && <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Cash Sales</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: '#16a34a' }}>+{fmtMoney(cashSales)}</div>
                  </div>}
                  {cashRefunds > 0 && <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Refunds</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: '#dc2626' }}>-{fmtMoney(cashRefunds)}</div>
                  </div>}
                  {cashIn > 0 && <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Cash In</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: '#16a34a' }}>+{fmtMoney(cashIn)}</div>
                  </div>}
                  {cashOut > 0 && <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Cash Out</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: '#dc2626' }}>-{fmtMoney(cashOut)}</div>
                  </div>}
                  <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Expected Balance</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 700 }}>{fmtMoney(drawer.expected_balance)}</div>
                  </div>
                </div>

                <div style={{ display: 'flex', gap: '0.75rem', flexWrap: 'wrap' }}>
                  <button className="btn btn-secondary" onClick={() => { setShowTxnModal('cash_in'); setTxnAmount(''); setTxnDescription(''); }}>+ Cash In</button>
                  <button className="btn btn-secondary" onClick={() => { setShowTxnModal('cash_out'); setTxnAmount(''); setTxnDescription(''); }}>- Cash Out</button>
                  <button className="btn btn-primary" style={{ marginLeft: 'auto' }}
                    onClick={() => { setShowCloseModal(true); setActualBalance(''); setCloseNotes(''); }}>Close Drawer</button>
                </div>
              </div>

              {/* Transactions */}
              {transactions.length > 0 && (
                <div className="form-card" style={{ marginTop: '1.5rem' }}>
                  <h3>Today's Transactions</h3>
                  <div className="table-scroll-wrapper"><table className="data-table">
                    <thead>
                      <tr>
                        <th>Time</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th style={{ textAlign: 'right' }}>Amount</th>
                      </tr>
                    </thead>
                    <tbody>
                      {transactions.map(t => {
                        const isCredit = ['sale', 'cash_in'].includes(t.type);
                        const typeLabels = { sale: 'Sale', refund: 'Refund', cash_in: 'Cash In', cash_out: 'Cash Out' };
                        return (
                          <tr key={t.id}>
                            <td data-label="Time">{fmtTime(t.created_at)}</td>
                            <td data-label="Type"><span className={'badge badge-' + (isCredit ? 'confirmed' : 'cancelled')} style={{ fontSize: '0.75rem' }}>{typeLabels[t.type] || t.type}</span></td>
                            <td data-label="Description" style={{ fontSize: '0.8125rem', color: 'var(--stone-600)' }}>{t.description || '\u2014'}</td>
                            <td data-label="Amount" style={{ textAlign: 'right', fontWeight: 500, color: isCredit ? '#16a34a' : '#dc2626' }}>
                              {isCredit ? '+' : '-'}{fmtMoney(t.amount)}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table></div>
                </div>
              )}
            </div>
          )}

          {/* Cash In/Out Modal */}
          {showTxnModal && (
            <div className="modal-overlay" onClick={() => setShowTxnModal(null)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>{showTxnModal === 'cash_in' ? 'Cash In' : 'Cash Out'}</h3>
                <div className="form-group">
                  <label>Amount</label>
                  <div style={{ position: 'relative' }}>
                    <span style={{ position: 'absolute', left: '0.75rem', top: '50%', transform: 'translateY(-50%)', color: 'var(--stone-400)' }}>$</span>
                    <input type="number" min="0.01" step="0.01" value={txnAmount} onChange={e => setTxnAmount(e.target.value)}
                      placeholder="0.00" autoFocus
                      style={{ width: '100%', padding: '0.75rem 1rem 0.75rem 1.5rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                  </div>
                </div>
                <div className="form-group">
                  <label>Reason</label>
                  <input type="text" value={txnDescription} onChange={e => setTxnDescription(e.target.value)}
                    placeholder={showTxnModal === 'cash_in' ? 'e.g. Change added' : 'e.g. Bank deposit'}
                    style={{ width: '100%', padding: '0.75rem 1rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowTxnModal(null)}>Cancel</button>
                  <button className="btn btn-primary" onClick={recordTxn} disabled={txnSaving || !txnAmount || parseFloat(txnAmount) <= 0}>
                    {txnSaving ? 'Recording...' : 'Record'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Close Drawer Modal */}
          {showCloseModal && (
            <div className="modal-overlay" onClick={() => setShowCloseModal(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>Close Cash Drawer</h3>
                <div style={{ marginBottom: '1rem', padding: '0.75rem', background: 'var(--stone-50)', borderRadius: '6px' }}>
                  <span style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>Expected Balance:</span>
                  <span style={{ fontSize: '1.1rem', fontWeight: 600, marginLeft: '0.5rem' }}>{fmtMoney(drawer.expected_balance)}</span>
                </div>
                <div className="form-group">
                  <label>Actual Count</label>
                  <div style={{ position: 'relative' }}>
                    <span style={{ position: 'absolute', left: '0.75rem', top: '50%', transform: 'translateY(-50%)', color: 'var(--stone-400)' }}>$</span>
                    <input type="number" min="0" step="0.01" value={actualBalance} onChange={e => setActualBalance(e.target.value)}

                      style={{ width: '100%', padding: '0.75rem 1rem 0.75rem 1.5rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                  </div>
                </div>
                <div className="form-group">
                  <label>Notes (optional)</label>
                  <input type="text" value={closeNotes} onChange={e => setCloseNotes(e.target.value)}

                  <button className="btn btn-secondary" onClick={() => setShowCloseModal(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={() => { closeDrawer(); setShowCloseModal(false); }}

                    {closing ? 'Closing...' : 'Close & Reconcile'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== RepTasksListView ==========
    function RepTasksListView({ navigate }) {
      const [tasks, setTasks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [statusFilter, setStatusFilter] = useState('open');
      const [priorityFilter, setPriorityFilter] = useState('');
      const [sourceFilter, setSourceFilter] = useState('');
      const [search, setSearch] = useState('');
      const [showModal, setShowModal] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [snoozeMenuId, setSnoozeMenuId] = useState(null);
      const [confirmCompleteTask, setConfirmCompleteTask] = useState(null);

      // Completed history state
      const [showCompleted, setShowCompleted] = useState(false);
      const [completedTasks, setCompletedTasks] = useState([]);
      const [completedLoading, setCompletedLoading] = useState(false);
      const [completedPeriod, setCompletedPeriod] = useState('7');

      const load = useCallback(() => {
        setLoading(true);
        const params = new URLSearchParams();
        if (statusFilter) params.set('status', statusFilter);
        if (priorityFilter) params.set('priority', priorityFilter);
        if (sourceFilter) params.set('source', sourceFilter);
        if (search) params.set('search', search);
        repFetch('/api/rep/tasks?' + params.toString())
          .then(d => { setTasks(d.tasks || []); setLoading(false); })
          .catch(() => setLoading(false));
      }, [statusFilter, priorityFilter, sourceFilter, search]);

      useEffect(load, [load]);

      const loadCompleted = useCallback(() => {
        setCompletedLoading(true);
        const days = parseInt(completedPeriod) || 7;
        const from = new Date(Date.now() - days * 86400000).toISOString().split('T')[0];
        repFetch('/api/rep/tasks?status=completed&completed_from=' + from)
          .then(d => { setCompletedTasks(d.tasks || []); setCompletedLoading(false); })
          .catch(() => setCompletedLoading(false));
      }, [completedPeriod]);

      useEffect(() => { if (showCompleted) loadCompleted(); }, [showCompleted, loadCompleted]);

      // Close snooze menu on outside click
      useEffect(() => {
        if (!snoozeMenuId) return;
        const handler = () => setSnoozeMenuId(null);
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, [snoozeMenuId]);

      const handleCheckboxClick = (task) => {
        if (task.status === 'completed') {
          // Reopen immediately, no confirmation needed
          reopenTask(task.id);
        } else {
          setConfirmCompleteTask(task);
        }
      };

      const completeTask = async (id) => {
        await repFetch('/api/rep/tasks/' + id + '/complete', { method: 'PUT' });
        setConfirmCompleteTask(null);
        load();
        if (showCompleted) loadCompleted();
      };

      const reopenTask = async (id) => {
        await repFetch('/api/rep/tasks/' + id + '/reopen', { method: 'PUT' });
        load();
        if (showCompleted) loadCompleted();
      };

      const deleteTask = async (id) => {
        if (!confirm('Delete this task?')) return;
        await repFetch('/api/rep/tasks/' + id, { method: 'DELETE' });
        load();
      };

      const dismissTask = async (id) => {
        await repFetch('/api/rep/tasks/' + id + '/dismiss', { method: 'PUT' });
        load();
      };

      const snoozeTask = async (id, days) => {
        const d = new Date(Date.now() + days * 86400000);
        const dateStr = d.toISOString().split('T')[0];
        await repFetch('/api/rep/tasks/' + id + '/snooze', {
          method: 'PUT', body: JSON.stringify({ snooze_until: dateStr })
        });
        setSnoozeMenuId(null);
        load();
      };

      const formatDue = (dateStr) => {
        if (!dateStr) return null;
        const d = new Date(dateStr + 'T00:00:00');
        const today = new Date(); today.setHours(0,0,0,0);
        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
        const diff = Math.floor((d - today) / 86400000);
        if (diff < 0) return { text: Math.abs(diff) + 'd overdue', cls: 'task-overdue', bg: '#fef2f2', color: '#dc2626' };
        if (diff === 0) return { text: 'Today', cls: 'task-today', bg: '#fefce8', color: '#92400e' };
        if (diff === 1) return { text: 'Tomorrow', cls: '', bg: '#f0fdf4', color: '#15803d' };
        if (diff <= 7) return { text: d.toLocaleDateString('en-US', { weekday: 'short' }), cls: '', bg: '#eff6ff', color: '#2563eb' };
        return { text: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), cls: '', bg: 'var(--stone-100)', color: 'var(--stone-600)' };
      };

      const formatCompletedDate = (dateStr) => {
        if (!dateStr) return '';
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      };

      const openEdit = (task) => {
        if (task.source === 'auto') return; // Auto-tasks are not editable
        setEditingTask(task); setShowModal(true);
      };
      const openNew = () => { setEditingTask(null); setShowModal(true); };

      const renderTaskRow = (t, opts = {}) => {
        const due = formatDue(t.due_date);
        const isDone = t.status === 'completed';
        const isAuto = t.source === 'auto';
        return (
          <div className="task-row" key={t.id} style={{ flexWrap: 'wrap' }}>
            <div className={'task-check' + (isDone ? ' done' : '')} onClick={() => handleCheckboxClick(t)}>
              {isDone && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M5 13l4 4L19 7"/></svg>}
            </div>
            <span className={'priority-dot ' + t.priority} title={t.priority + ' priority'} />
            <div className={'task-title' + (isDone ? ' done' : '')} style={{ cursor: isAuto && !isDone ? 'default' : isDone ? 'default' : 'pointer' }} onClick={() => !isDone && openEdit(t)}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                {t.title}
                {isAuto && <span style={{ fontSize: '0.6rem', fontWeight: 700, color: '#2563eb', background: '#eff6ff', padding: '0.1rem 0.4rem', borderRadius: '1rem', letterSpacing: '0.05em', whiteSpace: 'nowrap' }}>AUTO</span>}
              </div>
              {t.description && <div style={{ fontSize: '0.75rem', color: 'var(--stone-400)', marginTop: '0.125rem', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.description}</div>}
              {isAuto && (t.customer_name || t.customer_email || t.customer_phone) && (
                <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)', marginTop: '0.2rem', display: 'flex', gap: '0.75rem', flexWrap: 'wrap' }}>
                  {t.customer_name && <span>{t.customer_name}</span>}
                  {t.customer_email && <a href={'mailto:' + t.customer_email} onClick={e => e.stopPropagation()} style={{ color: '#2563eb' }}>{t.customer_email}</a>}
                  {t.customer_phone && <a href={'tel:' + t.customer_phone} onClick={e => e.stopPropagation()} style={{ color: '#2563eb' }}>{t.customer_phone}</a>}
                </div>
              )}
              {isDone && t.completed_at && <div style={{ fontSize: '0.7rem', color: 'var(--stone-400)', marginTop: '0.15rem', textDecoration: 'none' }}>Completed {formatCompletedDate(t.completed_at)}</div>}
            </div>
            <div className="task-meta">
              {t.linked_order_number && <span className="task-link" onClick={() => navigate('order-detail', t.linked_order_id)}>{t.linked_order_number}</span>}
              {t.linked_quote_number && <span className="task-link" onClick={() => navigate('quote-edit', t.linked_quote_id)}>{t.linked_quote_number}</span>}
              {t.linked_estimate_number && <span className="task-link" onClick={() => navigate('estimate-edit', t.linked_estimate_id)}>{t.linked_estimate_number}</span>}
              {t.linked_deal_title && <span className="task-link">{t.linked_deal_title}</span>}
              {due && <span className="task-due" style={{ background: due.bg, color: due.color }}>{due.text}</span>}
              {/* Snooze button */}
              {t.status === 'open' && (
                <div style={{ position: 'relative', display: 'inline-block' }}>
                  <button className="btn btn-secondary btn-sm" title="Snooze" onClick={(e) => { e.stopPropagation(); setSnoozeMenuId(snoozeMenuId === t.id ? null : t.id); }}
                    style={{ padding: '0.2rem 0.4rem', minWidth: 0, fontSize: '0.75rem', color: 'var(--stone-400)' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                  </button>
                  {snoozeMenuId === t.id && (
                    <div onClick={e => e.stopPropagation()} style={{ position: 'absolute', right: 0, top: '100%', marginTop: '0.25rem', background: 'white', border: '1px solid var(--stone-200)', borderRadius: '0.5rem', boxShadow: '0 4px 12px rgba(0,0,0,0.1)', zIndex: 100, minWidth: '140px', padding: '0.25rem 0' }}>
                      {[{ label: 'Tomorrow', days: 1 }, { label: 'In 3 days', days: 3 }, { label: 'Next week', days: 7 }, { label: 'In 2 weeks', days: 14 }].map(opt => (
                        <button key={opt.days} onClick={() => snoozeTask(t.id, opt.days)} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '0.4rem 0.75rem', background: 'none', border: 'none', cursor: 'pointer', fontSize: '0.8rem', color: 'var(--stone-700)' }}
                          onMouseEnter={e => e.target.style.background = 'var(--stone-50)'} onMouseLeave={e => e.target.style.background = 'none'}>
                          {opt.label}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              )}
              {/* Dismiss for auto, Delete for manual */}
              {!isDone && isAuto ? (
                <button className="btn btn-secondary btn-sm" onClick={() => dismissTask(t.id)} title="Dismiss" style={{ padding: '0.2rem 0.4rem', minWidth: 0, fontSize: '0.75rem', color: 'var(--stone-400)' }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
              ) : !isDone ? (
                <button className="btn btn-secondary btn-sm" onClick={() => deleteTask(t.id)} title="Delete" style={{ padding: '0.2rem 0.4rem', minWidth: 0, fontSize: '0.75rem', color: 'var(--stone-400)' }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              ) : null}
            </div>
          </div>
        );
      };

      return (
        <div>
          <div className="content-header">
            <h1>Tasks</h1>
            <button className="btn btn-primary" onClick={openNew}>+ New Task</button>
          </div>
          <div className="filter-bar">
            <input type="text" placeholder="Search tasks..." value={search} onChange={e => setSearch(e.target.value)} />
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              <option value="open">Open</option>
              <option value="">All</option>
            </select>
            <select value={priorityFilter} onChange={e => setPriorityFilter(e.target.value)}>
              <option value="">All Priorities</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <select value={sourceFilter} onChange={e => setSourceFilter(e.target.value)}>
              <option value="">All Sources</option>
              <option value="auto">Auto-generated</option>
              <option value="manual">Manual</option>
            </select>
            <span className="filter-count">{tasks.length} task{tasks.length !== 1 ? 's' : ''}</span>
          </div>
          {loading ? <div className="loading">Loading tasks...</div> : tasks.length === 0 ? (
            <div className="form-card" style={{ textAlign: 'center', padding: '2rem', color: 'var(--stone-400)' }}>
              {statusFilter === 'open' ? 'No open tasks. You\'re all caught up!' : 'No tasks found.'}
            </div>
          ) : (
            <div className="form-card" style={{ padding: '0.5rem 1rem' }}>
              {tasks.map(t => renderTaskRow(t))}
            </div>
          )}

          {/* Completed Tasks History */}
          <div style={{ marginTop: '1.5rem' }}>
            <button onClick={() => setShowCompleted(!showCompleted)} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.5rem 0', color: 'var(--stone-500)', fontSize: '0.85rem', fontWeight: 500 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ transform: showCompleted ? 'rotate(90deg)' : 'rotate(0)', transition: 'transform 0.15s' }}><path d="M9 18l6-6-6-6"/></svg>
              Completed Tasks
              {showCompleted && completedTasks.length > 0 && <span style={{ fontSize: '0.75rem', color: 'var(--stone-400)' }}>({completedTasks.length})</span>}
            </button>
            {showCompleted && (
              <div style={{ marginTop: '0.5rem' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '0.75rem' }}>
                  <span style={{ fontSize: '0.8rem', color: 'var(--stone-500)' }}>Show last:</span>
                  {[{ label: '7 days', value: '7' }, { label: '30 days', value: '30' }, { label: '90 days', value: '90' }].map(p => (
                    <button key={p.value} onClick={() => setCompletedPeriod(p.value)}
                      style={{ padding: '0.25rem 0.6rem', fontSize: '0.8rem', borderRadius: '1rem', border: '1px solid ' + (completedPeriod === p.value ? '#2563eb' : 'var(--stone-200)'), background: completedPeriod === p.value ? '#eff6ff' : 'white', color: completedPeriod === p.value ? '#2563eb' : 'var(--stone-500)', cursor: 'pointer', fontWeight: completedPeriod === p.value ? 600 : 400 }}>
                      {p.label}
                    </button>
                  ))}
                </div>
                {completedLoading ? <div className="loading">Loading...</div> : completedTasks.length === 0 ? (
                  <div className="form-card" style={{ textAlign: 'center', padding: '1.5rem', color: 'var(--stone-400)' }}>
                    No completed tasks in the last {completedPeriod} days.
                  </div>
                ) : (
                  <div className="form-card" style={{ padding: '0.5rem 1rem', opacity: 0.85 }}>
                    {completedTasks.map(t => renderTaskRow(t))}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Confirm Complete Modal */}
          {confirmCompleteTask && (
            <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) setConfirmCompleteTask(null); }}>
              <div className="modal-content" style={{ maxWidth: 420 }}>
                <div className="modal-header">
                  <h2>Complete Task</h2>
                  <button className="modal-close" onClick={() => setConfirmCompleteTask(null)}>&times;</button>
                </div>
                <div className="modal-body" style={{ padding: '1.25rem' }}>
                  <p style={{ margin: '0 0 0.75rem', color: 'var(--stone-700)' }}>Mark this task as completed?</p>
                  <div style={{ background: 'var(--stone-50)', borderRadius: '0.5rem', padding: '0.75rem 1rem' }}>
                    <div style={{ fontWeight: 500, display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                      <span className={'priority-dot ' + confirmCompleteTask.priority} />
                      {confirmCompleteTask.title}
                      {confirmCompleteTask.source === 'auto' && <span style={{ fontSize: '0.6rem', fontWeight: 700, color: '#2563eb', background: '#eff6ff', padding: '0.1rem 0.4rem', borderRadius: '1rem' }}>AUTO</span>}
                    </div>
                    {confirmCompleteTask.customer_name && <div style={{ fontSize: '0.8rem', color: 'var(--stone-500)', marginTop: '0.25rem' }}>{confirmCompleteTask.customer_name}</div>}
                    {confirmCompleteTask.description && <div style={{ fontSize: '0.8rem', color: 'var(--stone-400)', marginTop: '0.25rem' }}>{confirmCompleteTask.description}</div>}
                  </div>
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setConfirmCompleteTask(null)}>Cancel</button>
                  <button className="btn btn-primary" onClick={() => completeTask(confirmCompleteTask.id)}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{ marginRight: '0.4rem' }}><path d="M5 13l4 4L19 7"/></svg>
                    Complete
                  </button>
                </div>
              </div>
            </div>
          )}

          {showModal && <TaskCreateEditModal task={editingTask} onClose={() => { setShowModal(false); setEditingTask(null); }} onSaved={load} navigate={navigate} />}
        </div>
      );
    }

    // ========== TaskCreateEditModal ==========
    function TaskCreateEditModal({ task, onClose, onSaved, navigate, prefill }) {
      const [title, setTitle] = useState(task ? task.title : (prefill && prefill.title) || '');
      const [description, setDescription] = useState(task ? task.description || '' : '');
      const [dueDate, setDueDate] = useState(task && task.due_date ? task.due_date.split('T')[0] : '');
      const [priority, setPriority] = useState(task ? task.priority : 'medium');
      const [linkedOrderId, setLinkedOrderId] = useState(task ? task.linked_order_id : (prefill && prefill.linked_order_id) || null);
      const [linkedQuoteId, setLinkedQuoteId] = useState(task ? task.linked_quote_id : (prefill && prefill.linked_quote_id) || null);
      const [linkedEstimateId, setLinkedEstimateId] = useState(task ? task.linked_estimate_id : (prefill && prefill.linked_estimate_id) || null);
      const [linkedDealId, setLinkedDealId] = useState(task ? task.linked_deal_id : (prefill && prefill.linked_deal_id) || null);
      const [saving, setSaving] = useState(false);

      const setQuickDate = (days) => {
        const d = new Date(Date.now() + days * 86400000);
        setDueDate(d.toISOString().split('T')[0]);
      };

      const quickDateMatch = (days) => {
        if (!dueDate) return false;
        const target = new Date(Date.now() + days * 86400000).toISOString().split('T')[0];
        return dueDate === target;
      };

      const priorities = [
        { key: 'low', label: 'Low', color: '#16a34a', bg: '#f0fdf4' },
        { key: 'medium', label: 'Medium', color: '#d97706', bg: '#fefce8' },
        { key: 'high', label: 'High', color: '#dc2626', bg: '#fef2f2' }
      ];

      const save = async () => {
        if (!title.trim()) return;
        setSaving(true);
        const body = {
          title: title.trim(), description: description || null,
          due_date: dueDate || null, priority,
          linked_order_id: linkedOrderId, linked_quote_id: linkedQuoteId,
          linked_estimate_id: linkedEstimateId, linked_deal_id: linkedDealId
        };
        if (task) {
          await repFetch('/api/rep/tasks/' + task.id, { method: 'PUT', body: JSON.stringify(body) });
        } else {
          await repFetch('/api/rep/tasks', { method: 'POST', body: JSON.stringify(body) });
        }
        setSaving(false);
        onSaved();
        onClose();
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey && title.trim()) {
          e.preventDefault();
          save();
        }
      };

      return (
        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="modal-content" style={{ maxWidth: 500, borderRadius: '0.75rem', overflow: 'hidden' }}>
            {/* Header with colored accent */}
            <div style={{ background: priority === 'high' ? '#fef2f2' : priority === 'medium' ? '#fefce8' : '#f0fdf4', padding: '1.25rem 1.5rem 1rem', borderBottom: '1px solid var(--stone-100)', transition: 'background 0.2s' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <h2 style={{ margin: 0, fontSize: '1.1rem', color: 'var(--stone-800)' }}>{task ? 'Edit Task' : 'New Task'}</h2>
                <button className="modal-close" onClick={onClose} style={{ background: 'none', border: 'none', fontSize: '1.4rem', cursor: 'pointer', color: 'var(--stone-400)', lineHeight: 1, padding: '0.25rem' }}>&times;</button>
              </div>
            </div>

            <div style={{ padding: '1.25rem 1.5rem' }}>
              {/* Title */}
              <input type="text" value={title} onChange={e => setTitle(e.target.value)} onKeyDown={handleKeyDown}
                placeholder="What needs to be done?" autoFocus
                style={{ width: '100%', padding: '0.7rem 0.85rem', fontSize: '0.95rem', border: '1.5px solid var(--stone-200)', borderRadius: '0.5rem', outline: 'none', boxSizing: 'border-box', transition: 'border-color 0.15s' }}
                onFocus={e => e.target.style.borderColor = '#2563eb'} onBlur={e => e.target.style.borderColor = 'var(--stone-200)'} />

              {/* Description */}
              <textarea rows="2" value={description} onChange={e => setDescription(e.target.value)}
                placeholder="Add details or notes..."
                style={{ width: '100%', marginTop: '0.75rem', padding: '0.6rem 0.85rem', fontSize: '0.85rem', border: '1.5px solid var(--stone-200)', borderRadius: '0.5rem', outline: 'none', resize: 'vertical', fontFamily: 'inherit', boxSizing: 'border-box', transition: 'border-color 0.15s' }}
                onFocus={e => e.target.style.borderColor = '#2563eb'} onBlur={e => e.target.style.borderColor = 'var(--stone-200)'} />

              {/* Priority selector */}
              <div style={{ marginTop: '1rem' }}>
                <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.4rem', display: 'block' }}>Priority</label>
                <div style={{ display: 'flex', gap: '0.5rem' }}>
                  {priorities.map(p => (
                    <button key={p.key} onClick={() => setPriority(p.key)}
                      style={{ flex: 1, padding: '0.5rem', borderRadius: '0.5rem', border: priority === p.key ? '2px solid ' + p.color : '1.5px solid var(--stone-200)', background: priority === p.key ? p.bg : 'white', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.35rem', fontSize: '0.8rem', fontWeight: priority === p.key ? 600 : 400, color: priority === p.key ? p.color : 'var(--stone-500)', transition: 'all 0.15s' }}>
                      <span style={{ width: 8, height: 8, borderRadius: '50%', background: p.color, opacity: priority === p.key ? 1 : 0.4, transition: 'opacity 0.15s' }} />
                      {p.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Due date */}
              <div style={{ marginTop: '1rem' }}>
                <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '0.4rem', display: 'block' }}>Due Date</label>
                <div style={{ display: 'flex', gap: '0.4rem', marginBottom: '0.5rem', flexWrap: 'wrap' }}>
                  {[{ label: 'Today', days: 0 }, { label: 'Tomorrow', days: 1 }, { label: 'In 3 days', days: 3 }, { label: 'Next week', days: 7 }].map(q => (
                    <button key={q.days} onClick={() => setQuickDate(q.days)}
                      style={{ padding: '0.3rem 0.65rem', fontSize: '0.75rem', borderRadius: '1rem', border: quickDateMatch(q.days) ? '1.5px solid #2563eb' : '1px solid var(--stone-200)', background: quickDateMatch(q.days) ? '#eff6ff' : 'white', color: quickDateMatch(q.days) ? '#2563eb' : 'var(--stone-500)', cursor: 'pointer', fontWeight: quickDateMatch(q.days) ? 600 : 400, transition: 'all 0.15s' }}>
                      {q.label}
                    </button>
                  ))}
                  {dueDate && (
                    <button onClick={() => setDueDate('')}
                      style={{ padding: '0.3rem 0.65rem', fontSize: '0.75rem', borderRadius: '1rem', border: '1px solid var(--stone-200)', background: 'white', color: 'var(--stone-400)', cursor: 'pointer' }}>
                      Clear
                    </button>
                  )}
                </div>
                <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                  style={{ width: '100%', padding: '0.5rem 0.75rem', fontSize: '0.85rem', border: '1.5px solid var(--stone-200)', borderRadius: '0.5rem', outline: 'none', boxSizing: 'border-box', color: dueDate ? 'var(--stone-700)' : 'var(--stone-400)' }} />
              </div>
            </div>

            {/* Actions */}
            <div style={{ padding: '1rem 1.5rem', borderTop: '1px solid var(--stone-100)', display: 'flex', justifyContent: 'flex-end', gap: '0.75rem', background: 'var(--stone-50)' }}>
              <button className="btn btn-secondary" onClick={onClose} style={{ borderRadius: '0.5rem' }}>Cancel</button>
              <button onClick={save} disabled={saving || !title.trim()}
                style={{ padding: '0.55rem 1.25rem', borderRadius: '0.5rem', border: 'none', background: !title.trim() ? 'var(--stone-200)' : '#2563eb', color: !title.trim() ? 'var(--stone-400)' : 'white', cursor: !title.trim() ? 'not-allowed' : 'pointer', fontWeight: 600, fontSize: '0.85rem', display: 'flex', alignItems: 'center', gap: '0.4rem', transition: 'background 0.15s' }}>
                {saving ? 'Saving...' : (
                  <>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 13l4 4L19 7"/></svg>
                    {task ? 'Update' : 'Create Task'}
                  </>
                )}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ========== RepPurchaseOrdersListView ==========
    function RepPurchaseOrdersListView({ navigate }) {
      const [pos, setPOs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [statusFilter, setStatusFilter] = useState('');
      const [vendorFilter, setVendorFilter] = useState('');
      const [search, setSearch] = useState('');
      const [vendors, setVendors] = useState([]);
      const [showCreate, setShowCreate] = useState(false);
      const [newVendorId, setNewVendorId] = useState('');
      const [newNotes, setNewNotes] = useState('');
      const [creating, setCreating] = useState(false);

      const load = useCallback(() => {
        setLoading(true);
        const params = new URLSearchParams();
        if (statusFilter) params.set('status', statusFilter);
        if (vendorFilter) params.set('vendor_id', vendorFilter);
        if (search) params.set('search', search);
        repFetch('/api/rep/purchase-orders?' + params.toString())
          .then(data => { setPOs(data.purchase_orders || []); setLoading(false); })
          .catch(() => setLoading(false));
      }, [statusFilter, vendorFilter, search]);

      useEffect(load, [load]);

      useEffect(() => {
        repFetch('/api/rep/vendors').then(data => setVendors(data.vendors || [])).catch(() => {});
      }, []);

      const createPO = async () => {
        if (!newVendorId) return;
        setCreating(true);
        try {
          const data = await repFetch('/api/rep/purchase-orders', {
            method: 'POST', body: JSON.stringify({ vendor_id: newVendorId, notes: newNotes || null })
          });
          if (data.error) throw new Error(data.error);
          setShowCreate(false); setNewVendorId(''); setNewNotes('');
          navigate('purchase-order-detail', data.purchase_order.id);
        } catch (err) { alert(err.message); }
        setCreating(false);
      };

      const statusBadge = (s) => {
        const cls = { draft: 'badge-draft', sent: 'badge-sent', acknowledged: 'badge-acknowledged', fulfilled: 'badge-fulfilled', cancelled: 'badge-cancelled' };
        return <span className={'badge ' + (cls[s] || 'badge-draft')}>{s}</span>;
      };

      return (
        <div>
          <div className="content-header">
            <h1>Purchase Orders</h1>
            <button className="btn btn-primary" onClick={() => setShowCreate(true)}>+ New Purchase Order</button>
          </div>
          <div className="filter-bar">
            <input type="text" placeholder="Search PO#, vendor, order#..." value={search} onChange={e => setSearch(e.target.value)} />
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              <option value="">All Statuses</option>
              {['draft','sent','acknowledged','fulfilled','cancelled'].map(s => (
                <option key={s} value={s}>{s.charAt(0).toUpperCase() + s.slice(1)}</option>
              ))}
            </select>
            <select value={vendorFilter} onChange={e => setVendorFilter(e.target.value)}>
              <option value="">All Vendors</option>
              {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
            <span className="filter-count">{pos.length} PO{pos.length !== 1 ? 's' : ''}</span>
          </div>
          {loading ? <div className="loading">Loading purchase orders...</div> : (
            <div className="table-scroll-wrapper"><table className="rep-table">
              <thead>
                <tr>
                  <th>PO #</th>
                  <th>Vendor</th>
                  <th>Order #</th>
                  <th>Items</th>
                  <th>Subtotal</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {pos.map(po => (
                  <tr key={po.id}>
                    <td data-label="PO #" style={{ fontWeight: 500 }}>{po.po_number}</td>
                    <td data-label="Vendor">{po.vendor_name}</td>
                    <td data-label="Order #">{po.order_number ? <span style={{ color: 'var(--gold)', cursor: 'pointer' }} onClick={() => navigate('order-detail', po.order_id)}>{po.order_number}</span> : <span style={{ color: 'var(--stone-400)', fontStyle: 'italic' }}>Standalone</span>}</td>
                    <td data-label="Items">{po.item_count}</td>
                    <td data-label="Subtotal">${parseFloat(po.subtotal || 0).toFixed(2)}</td>
                    <td data-label="Status">{statusBadge(po.status)}</td>
                    <td data-label="Date" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{new Date(po.created_at).toLocaleDateString()}</td>
                    <td data-label="" className="actions">
                      <button className="btn btn-secondary btn-sm" onClick={() => navigate('purchase-order-detail', po.id)}>View</button>
                    </td>
                  </tr>
                ))}
                {pos.length === 0 && (
                  <tr><td colSpan="8" style={{ textAlign: 'center', padding: '2rem', color: 'var(--stone-400)' }}>No purchase orders found</td></tr>
                )}
              </tbody>
            </table></div>
          )}

          {showCreate && (
            <div className="modal-backdrop" onClick={() => setShowCreate(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: '480px' }}>
                <div className="modal-header"><h2>New Purchase Order</h2></div>
                <div className="modal-body">
                  <div className="form-group">
                    <label>Vendor *</label>
                    <select value={newVendorId} onChange={e => setNewVendorId(e.target.value)}
                      style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-300)', borderRadius: '6px' }}>
                      <option value="">Select vendor...</option>
                      {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Notes</label>
                    <textarea value={newNotes} onChange={e => setNewNotes(e.target.value)} placeholder="Optional notes..."
                      style={{ width: '100%', minHeight: '80px', padding: '0.5rem', border: '1px solid var(--stone-300)', borderRadius: '6px', fontFamily: 'Inter, sans-serif', resize: 'vertical' }} />
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="btn btn-secondary" onClick={() => setShowCreate(false)}>Cancel</button>
                  <button className="btn btn-primary" disabled={!newVendorId || creating} onClick={createPO}>
                    {creating ? 'Creating...' : 'Create PO'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== RepPurchaseOrderDetailView ==========
    function RepPurchaseOrderDetailView({ navigate, editId }) {
      const [po, setPO] = useState(null);
      const [items, setItems] = useState([]);
      const [activity, setActivity] = useState([]);
      const [loading, setLoading] = useState(true);
      const [poUpdating, setPoUpdating] = useState(false);
      const [addingItem, setAddingItem] = useState(false);
      const [addItemMode, setAddItemMode] = useState('sku');
      const [addItemSku, setAddItemSku] = useState('');
      const [skuSearchResults, setSkuSearchResults] = useState([]);
      const [skuSearching, setSkuSearching] = useState(false);
      const skuSearchTimer = useRef(null);
      const [newPOItem, setNewPOItem] = useState({ product_name: '', vendor_sku: '', qty: 1, cost: '', sell_by: 'sqft' });

      const load = async () => {
        setLoading(true);
        try {
          const data = await repFetch('/api/rep/purchase-orders/' + editId + '/detail');
          setPO(data.purchase_order);
          setItems(data.purchase_order.items || []);
          setActivity(data.activity || []);
        } catch (err) { console.error(err); }
        setLoading(false);
      };
      useEffect(() => { load(); }, [editId]);

      const isDraft = po && po.status === 'draft';
      const isSentOrLater = po && ['sent', 'acknowledged', 'fulfilled'].includes(po.status);

      const updatePOItem = async (itemId, updates) => {
        try {
          await repFetch('/api/rep/purchase-orders/' + editId + '/items/' + itemId, {
            method: 'PUT', body: JSON.stringify(updates)
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const addPOItem = async (itemData) => {
        try {
          await repFetch('/api/rep/purchase-orders/' + editId + '/items', {
            method: 'POST', body: JSON.stringify(itemData)
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const deletePOItem = async (itemId) => {
        if (!confirm('Delete this line item?')) return;
        try {
          await repFetch('/api/rep/purchase-orders/' + editId + '/items/' + itemId, {
            method: 'DELETE'
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const approveAndSend = async () => {
        if (!confirm('Approve & send this PO to the vendor?')) return;
        setPoUpdating(true);
        try {
          await repFetch('/api/rep/purchase-orders/' + editId + '/approve', { method: 'POST' });
          load();
        } catch (err) { alert(err.message); }
        setPoUpdating(false);
      };

      const updatePOItemStatus = async (itemId, status) => {
        try {
          await repFetch('/api/rep/purchase-orders/' + editId + '/items/' + itemId + '/status', {
            method: 'PUT', body: JSON.stringify({ status })
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const bulkUpdatePOItemStatus = async (status) => {
        if (!confirm('Set all non-terminal items to ' + status + '?')) return;
        try {
          await repFetch('/api/rep/purchase-orders/' + editId + '/items/bulk-status', {
            method: 'PUT', body: JSON.stringify({ status })
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const handleSkuSearch = (q) => {
        setAddItemSku(q);
        if (skuSearchTimer.current) clearTimeout(skuSearchTimer.current);
        if (q.length >= 2) {
          setSkuSearching(true);
          skuSearchTimer.current = setTimeout(async () => {
            try {
              const data = await repFetch('/api/rep/skus/search?q=' + encodeURIComponent(q));
              setSkuSearchResults((data.results || []).map(r => ({
                sku_id: r.sku_id, product_name: r.product_name || r.collection || '', variant_name: r.variant_name || '',
                color: r.color || '', vendor_sku: r.vendor_sku || '', internal_sku: r.internal_sku || '',
                vendor_name: r.vendor_name || '', sell_by: r.sell_by || 'sqft', cost: r.vendor_cost || 0,
                retail_price: r.retail_price || 0, price_basis: r.price_basis || 'per_sqft',
                sqft_per_box: r.sqft_per_box || 1,
                primary_image: r.primary_image || null
              })));
            } catch (e) {}
            setSkuSearching(false);
          }, 250);
        } else { setSkuSearchResults([]); setSkuSearching(false); }
      };

      const selectSkuResult = async (r) => {
        const isPerSqft = r.price_basis === 'per_sqft' || r.price_basis === 'sqft';
        const sqftPerBox = parseFloat(r.sqft_per_box || 1);
        const rawCost = parseFloat(r.cost || 0);
        const rawRetail = parseFloat(r.retail_price || 0);
        const itemCost = isPerSqft ? rawCost * sqftPerBox : rawCost;
        const itemRetail = isPerSqft ? rawRetail * sqftPerBox : rawRetail;
        await addPOItem({
          sku_id: r.sku_id, product_name: r.product_name + (r.color ? ' — ' + r.color : ''),
          vendor_sku: r.vendor_sku || r.internal_sku, qty: 1,
          cost: itemCost.toFixed(2), retail_price: itemRetail > 0 ? itemRetail.toFixed(2) : null,
          sell_by: r.sell_by
        });
        setAddItemSku(''); setSkuSearchResults([]); setAddingItem(false);
      };

      const actionLabel = (action) => {
        const labels = { sent: 'Sent', resent: 'Resent', revised_and_sent: 'Revised & Sent', acknowledged: 'Acknowledged', fulfilled: 'Fulfilled', cancelled: 'Cancelled', reverted: 'Reverted to Draft', created: 'Created', notes_updated: 'Notes Updated', edi_sent: 'Sent via EDI', edi_acknowledged: 'EDI Acknowledged', edi_shipped: 'EDI Ship Notice', edi_invoiced: 'EDI Invoice Received' };
        return labels[action] || action;
      };

      const statusBadge = (s) => {
        const cls = { draft: 'badge-draft', sent: 'badge-sent', acknowledged: 'badge-acknowledged', fulfilled: 'badge-fulfilled', cancelled: 'badge-cancelled' };
        return <span className={'badge ' + (cls[s] || 'badge-draft')}>{s}</span>;
      };

      if (loading) return <div className="loading">Loading purchase order...</div>;
      if (!po) return <div className="loading">Purchase order not found</div>;

      return (
        <div>
          <div className="content-header">
            <button className="btn btn-secondary btn-sm" onClick={() => navigate('purchase-orders')}>&larr; Back to Purchase Orders</button>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '1.5rem' }}>
            <h1 style={{ margin: 0 }}><code style={{ fontSize: 'inherit', background: 'var(--stone-50)', padding: '0.1rem 0.5rem', borderRadius: '6px', border: '1px solid var(--stone-200)' }}>{po.po_number}</code></h1>
            {statusBadge(po.status)}
          </div>

          {/* PO Status Stepper */}
          {(() => {
            const steps = ['draft', 'sent', 'acknowledged', 'fulfilled'];
            const stepLabels = { draft: 'Draft', sent: 'Sent', acknowledged: 'Acknowledged', fulfilled: 'Fulfilled' };
            const stepTimestamps = {
              draft: po.created_at,
              sent: activity.find(a => a.action === 'sent' || a.action === 'edi_sent')?.created_at,
              acknowledged: activity.find(a => a.action === 'acknowledged' || a.action === 'edi_acknowledged')?.created_at,
              fulfilled: activity.find(a => a.action === 'fulfilled')?.created_at
            };
            const isCancelled = po.status === 'cancelled';
            const currentIdx = isCancelled
              ? (stepTimestamps.acknowledged ? 2 : stepTimestamps.sent ? 1 : 0)
              : steps.indexOf(po.status);
            const getStepState = (idx) => {
              if (isCancelled) return idx <= currentIdx ? 'cancelled' : 'upcoming';
              if (idx < currentIdx) return 'completed';
              if (idx === currentIdx) return 'current';
              return 'upcoming';
            };

            return (
              <div className="form-card">
                <h3>PO Status</h3>

                {isCancelled && (
                  <div className="stepper-cancelled-banner">Purchase Order Cancelled</div>
                )}

                <div className="order-stepper">
                  {steps.slice(1).map((step, idx) => {
                    const prevState = getStepState(idx);
                    const curState = getStepState(idx + 1);
                    const connClass = (prevState === 'completed' && (curState === 'completed' || curState === 'current'))
                      ? 'completed'
                      : (prevState === 'cancelled' ? 'completed' : 'upcoming');
                    const pct = 100 / (steps.length - 1);
                    const leftPct = idx * pct;
                    return (
                      <div key={'conn-' + idx} className={'stepper-connector ' + connClass}
                        style={{ left: 'calc(' + (leftPct + pct * 0.15) + '% + 18px)', width: 'calc(' + (pct * 0.7) + '% - 36px)' }} />
                    );
                  })}
                  {steps.map((step, idx) => {
                    const state = getStepState(idx);
                    const ts = stepTimestamps[step];
                    return (
                      <div key={step} className={'stepper-step ' + state}>
                        <div className="stepper-circle">
                          {state === 'completed' ? '\u2713' : state === 'cancelled' ? '\u2717' : (idx + 1)}
                        </div>
                        <div className="stepper-label">{stepLabels[step]}</div>
                        {ts && (state === 'completed' || state === 'current' || state === 'cancelled') && (
                          <div className="stepper-timestamp">{new Date(ts).toLocaleDateString()}</div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {isDraft && items.length > 0 && (
                  <div className="stepper-actions">
                    <button className="btn btn-primary" disabled={poUpdating} onClick={approveAndSend}>
                      {poUpdating ? 'Sending...' : 'Approve & Send to Vendor'}
                    </button>
                  </div>
                )}
              </div>
            );
          })()}

          {/* PO Info Card */}
          <div className="form-card">
            <h3>PO Information</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '1rem' }}>
              <div>
                <div style={{ fontSize: '0.6875rem', color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Vendor</div>
                <div style={{ fontWeight: 500 }}>{po.vendor_name}</div>
              </div>
              <div>
                <div style={{ fontSize: '0.6875rem', color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>PO Number</div>
                <div style={{ fontWeight: 500 }}><code style={{ fontSize: '0.875rem', background: 'var(--stone-50)', padding: '0.1rem 0.35rem', borderRadius: '4px', border: '1px solid var(--stone-200)' }}>{po.po_number}</code></div>
              </div>
              <div>
                <div style={{ fontSize: '0.6875rem', color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Status</div>
                <div>{statusBadge(po.status)}</div>
              </div>
              <div>
                <div style={{ fontSize: '0.6875rem', color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Order</div>
                <div>{po.order_number
                  ? <span style={{ color: 'var(--gold)', cursor: 'pointer', fontWeight: 500 }} onClick={() => navigate('order-detail', po.order_id)}>{po.order_number}</span>
                  : <span style={{ color: 'var(--stone-400)', fontStyle: 'italic' }}>Standalone</span>}
                </div>
              </div>
              <div>
                <div style={{ fontSize: '0.6875rem', color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Created</div>
                <div style={{ fontSize: '0.875rem' }}>{new Date(po.created_at).toLocaleString()}</div>
              </div>
              {po.approved_by_name && (
                <div>
                  <div style={{ fontSize: '0.6875rem', color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Approved By</div>
                  <div style={{ fontSize: '0.875rem' }}>{po.approved_by_name}{po.approved_at ? ' on ' + new Date(po.approved_at).toLocaleDateString() : ''}</div>
                </div>
              )}
            </div>
          </div>

          {/* Line Items Card */}
          <div className="form-card">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
              <h3 style={{ margin: 0, paddingBottom: 0, borderBottom: 'none' }}>Line Items</h3>
              {isDraft && !addingItem && (
                <button className="btn btn-secondary btn-sm" onClick={() => { setAddingItem(true); setAddItemMode('sku'); }}>+ Add Item</button>
              )}
            </div>

            {isDraft && addingItem && (
              <div style={{ marginBottom: '1rem', padding: '1rem', background: 'var(--stone-50)', border: '1px solid var(--stone-200)', borderRadius: '8px' }}>
                <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.75rem' }}>
                  <button className={addItemMode === 'sku' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'} onClick={() => setAddItemMode('sku')}>SKU Search</button>
                  <button className={addItemMode === 'manual' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'} onClick={() => setAddItemMode('manual')}>Manual Entry</button>
                  <div style={{ flex: 1 }}></div>
                  <button className="btn btn-sm btn-secondary" onClick={() => { setAddingItem(false); setSkuSearchResults([]); setAddItemSku(''); }}>Cancel</button>
                </div>

                {addItemMode === 'sku' ? (
                  <div style={{ position: 'relative' }}>
                    <input type="text" value={addItemSku} placeholder="Type SKU or product name..."
                      onChange={e => handleSkuSearch(e.target.value)}
                      style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-200)', borderRadius: '6px' }} />
                    {skuSearching && skuSearchResults.length === 0 && addItemSku.length >= 2 && (
                      <div className="search-results"><div className="search-loading-indicator">Searching...</div></div>
                    )}
                    {!skuSearching && skuSearchResults.length === 0 && addItemSku.length >= 2 && (
                      <div className="search-results"><div className="search-no-results">No results found</div></div>
                    )}
                    {skuSearchResults.length > 0 && (
                      <div className="search-results">
                        {skuSearchResults.map((r, i) => (
                          <div key={i} className="search-result-item" onClick={() => selectSkuResult(r)}>
                            {r.primary_image
                              ? <img className="sku-thumb" src={optimizeImg(r.primary_image, 96)} alt="" loading="lazy" />
                              : <div className="sku-thumb-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
                            }
                            <div className="sku-info">
                              <div className="sku-name">
                                {r.product_name}{r.color ? ' — ' + r.color : ''}{r.variant_name && r.variant_name !== r.color ? ' · ' + r.variant_name : ''}
                              </div>
                              <div className="product-meta">
                                {r.vendor_name}{r.vendor_sku ? ' · ' + r.vendor_sku : r.internal_sku ? ' · ' + r.internal_sku : ''}
                                {r.cost ? ' · Cost $' + parseFloat(r.cost).toFixed(2) + '/' + (r.sell_by === 'unit' ? 'ea' : 'sqft') : ''}
                                {r.retail_price ? ' · Retail $' + parseFloat(r.retail_price).toFixed(2) : ''}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ) : (
                  <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'flex-end', flexWrap: 'wrap' }}>
                    <div style={{ flex: 2, minWidth: '140px' }}>
                      <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Product Name *</label>
                      <input type="text" value={newPOItem.product_name} onChange={e => setNewPOItem({...newPOItem, product_name: e.target.value})}
                        style={{ width: '100%', padding: '0.4rem 0.5rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '6px' }} />
                    </div>
                    <div style={{ flex: 1, minWidth: '100px' }}>
                      <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Vendor SKU</label>
                      <input type="text" value={newPOItem.vendor_sku} onChange={e => setNewPOItem({...newPOItem, vendor_sku: e.target.value})}
                        style={{ width: '100%', padding: '0.4rem 0.5rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '6px' }} />
                    </div>
                    <div style={{ width: '70px' }}>
                      <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Qty *</label>
                      <input type="number" min="1" value={newPOItem.qty} onChange={e => setNewPOItem({...newPOItem, qty: parseInt(e.target.value) || 1})}
                        style={{ width: '100%', padding: '0.4rem 0.5rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '6px' }} />
                    </div>
                    <div style={{ width: '90px' }}>
                      <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Cost *</label>
                      <input type="number" step="0.01" min="0" value={newPOItem.cost} onChange={e => setNewPOItem({...newPOItem, cost: e.target.value})}
                        placeholder="0.00"
                        style={{ width: '100%', padding: '0.4rem 0.5rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '6px' }} />
                    </div>
                    <div style={{ width: '80px' }}>
                      <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Sell By</label>
                      <select value={newPOItem.sell_by} onChange={e => setNewPOItem({...newPOItem, sell_by: e.target.value})}
                        style={{ width: '100%', padding: '0.4rem 0.3rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '6px' }}>
                        <option value="sqft">sqft</option>
                        <option value="unit">unit</option>
                      </select>
                    </div>
                    <button className="btn btn-primary btn-sm" disabled={!newPOItem.product_name || !newPOItem.cost}
                      onClick={() => { addPOItem(newPOItem); setNewPOItem({ product_name: '', vendor_sku: '', qty: 1, cost: '', sell_by: 'sqft' }); setAddingItem(false); }}>
                      Add
                    </button>
                  </div>
                )}
              </div>
            )}

            <div className="table-scroll-wrapper">
            <table className="admin-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Vendor SKU</th>
                  <th>Qty</th>
                  <th>Retail Price</th>
                  <th>Cost</th>
                  <th>Margin</th>
                  {isSentOrLater && <th>Status</th>}
                  <th style={{ textAlign: 'right' }}>Subtotal</th>
                  {isDraft && <th></th>}
                </tr>
              </thead>
              <tbody>
                {items.map(item => {
                  const costVal = parseFloat(item.cost);
                  const retailVal = parseFloat(item.retail_price || 0);
                  const margin = retailVal > 0 ? ((retailVal - costVal) / retailVal * 100) : 0;
                  return (
                  <tr key={item.id}>
                    <td data-label="Product" style={{ fontWeight: 500, fontSize: '0.8125rem' }}>{item.product_name}{item.description ? <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)' }}>{item.description}</div> : null}</td>
                    <td data-label="Vendor SKU" style={{ fontSize: '0.8125rem' }}>{item.vendor_sku || '—'}</td>
                    <td data-label="Qty">{isDraft ? (
                      <input type="number" min="1" defaultValue={item.qty}
                        onBlur={e => { const v = parseInt(e.target.value); if (v && v !== item.qty) updatePOItem(item.id, { qty: v }); }}
                        style={{ width: '60px', padding: '0.2rem 0.35rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '4px' }} />
                    ) : item.qty}</td>
                    <td data-label="Retail Price">{item.retail_price ? '$' + retailVal.toFixed(2) : '—'}</td>
                    <td data-label="Cost">{isDraft ? (
                      <input type="number" step="0.01" min="0" defaultValue={costVal.toFixed(2)}
                        onBlur={e => { const v = parseFloat(e.target.value); if (!isNaN(v) && v !== costVal) updatePOItem(item.id, { cost: v }); }}
                        style={{ width: '80px', padding: '0.2rem 0.35rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '4px' }} />
                    ) : '$' + costVal.toFixed(2)}</td>
                    <td data-label="Margin" style={{ color: margin <= 0 ? 'var(--red)' : 'inherit', fontWeight: margin <= 0 ? 600 : 400 }}>
                      {retailVal > 0 ? margin.toFixed(1) + '%' : '—'}
                    </td>
                    {isSentOrLater && (
                      <td data-label="Status">
                        <select value={item.status || 'pending'} onChange={e => updatePOItemStatus(item.id, e.target.value)}
                          style={{ fontSize: '0.75rem', padding: '0.2rem 0.35rem', border: '1px solid var(--stone-300)', borderRadius: '4px', background: 'white' }}>
                          {['pending', 'ordered', 'shipped', 'received', 'cancelled'].map(s => (
                            <option key={s} value={s}>{s.charAt(0).toUpperCase() + s.slice(1)}</option>
                          ))}
                        </select>
                      </td>
                    )}
                    <td data-label="Subtotal" style={{ textAlign: 'right', fontWeight: 500 }}>${parseFloat(item.subtotal).toFixed(2)}</td>
                    {isDraft && (
                      <td className="actions">
                        <button className="btn btn-danger btn-sm" onClick={() => deletePOItem(item.id)}>Remove</button>
                      </td>
                    )}
                  </tr>
                  );
                })}
                {items.length === 0 && <tr><td colSpan={isSentOrLater ? 8 : (isDraft ? 8 : 7)} style={{ textAlign: 'center', padding: '1.5rem', color: 'var(--stone-400)' }}>No items yet</td></tr>}
              </tbody>
            </table>
            </div>
            <div style={{ textAlign: 'right', marginTop: '0.75rem', fontWeight: 600, fontSize: '0.9rem' }}>
              PO Total: ${parseFloat(po.subtotal || 0).toFixed(2)}
            </div>

            {isSentOrLater && (
              <div style={{ marginTop: '0.75rem', display: 'flex', gap: '0.5rem', justifyContent: 'flex-end' }}>
                <button className="btn btn-secondary btn-sm" onClick={() => bulkUpdatePOItemStatus('received')}>Mark All Received</button>
              </div>
            )}
          </div>

          {/* Notes */}
          <div className="form-card">
            <h3>Notes</h3>
            <div style={{ fontSize: '0.8125rem', color: po.notes ? 'inherit' : 'var(--stone-400)' }}>
              {po.notes || 'No notes'}
            </div>
          </div>

          {/* Activity Log */}
          <div className="form-card">
            <h3>Activity Log</h3>
            {activity.length > 0 ? (
              <div style={{ fontSize: '0.8125rem' }}>
                {activity.map((a, i) => (
                  <div key={i} style={{ padding: '0.75rem 0 0.75rem 1.25rem', borderBottom: i < activity.length - 1 ? '1px solid var(--stone-100)' : 'none', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'relative', borderLeft: '2px solid var(--gold-light)' }}>
                    <div style={{ position: 'absolute', left: '-5px', top: '50%', transform: 'translateY(-50%)', width: '8px', height: '8px', borderRadius: '50%', background: 'var(--gold)', border: '2px solid white' }}></div>
                    <div>
                      <span style={{ fontWeight: 500 }}>{actionLabel(a.action)}</span>
                      {a.performer_name && <span style={{ color: 'var(--stone-500)' }}> by {a.performer_name}</span>}
                      {a.recipient_email && <span style={{ color: 'var(--stone-500)' }}> to {a.recipient_email}</span>}
                      {a.revision > 0 && <span style={{ color: 'var(--stone-400)', fontSize: '0.75rem' }}> (Rev. {a.revision})</span>}
                    </div>
                    <div style={{ color: 'var(--stone-400)', fontSize: '0.75rem', whiteSpace: 'nowrap', marginLeft: '1rem' }}>
                      {new Date(a.created_at).toLocaleString()}
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ color: 'var(--stone-400)', fontSize: '0.8125rem' }}>No activity yet</div>
            )}
          </div>

          {/* PDF Download */}
          <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
            <a href={'/api/rep/purchase-orders/' + editId + '/pdf'} target="_blank" className="btn btn-secondary">Download PDF</a>
          </div>
        </div>
      );
    }

    // ========== Render ==========
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
