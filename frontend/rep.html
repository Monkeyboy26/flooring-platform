      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(true);
      const [quotes, setQuotes] = useState([]);
      const [paymentRequests, setPaymentRequests] = useState([]);
      const [newNote, setNewNote] = useState('');
      const [addingNote, setAddingNote] = useState(false);
      const [timeline, setTimeline] = useState([]);
      const [timelineLoading, setTimelineLoading] = useState(true);
      const [timelineFilter, setTimelineFilter] = useState('all');

      // Parse the composite ID: retail_UUID, trade_UUID, guest_email
      const parseId = (compositeId) => {
        if (!compositeId) return { type: null, ref: null };
        const idx = compositeId.indexOf('_');
        if (idx === -1) return { type: null, ref: null };
        const type = compositeId.substring(0, idx);
        const ref = compositeId.substring(idx + 1);
        return { type, ref };
      };

      const { type, ref } = parseId(editId);

      useEffect(() => {
        if (!type || !ref) return;
        setLoading(true);
        setTimelineLoading(true);
        Promise.all([
          repFetch('/api/rep/customers/' + encodeURIComponent(ref) + '?type=' + type),
          repFetch('/api/rep/customers/' + encodeURIComponent(ref) + '/timeline?type=' + type)
        ]).then(([data, tlData]) => {
          setCustomer(data.customer);
          setOrders(data.orders || []);
          setNotes(data.notes || []);
          setQuotes(data.quotes || []);
          setPaymentRequests(data.payment_requests || []);
          setStats(data.stats || {});
          setTimeline(tlData.timeline || []);
          setLoading(false);
          setTimelineLoading(false);

        if (!newNote.trim()) return;

          method: 'POST',
          body: JSON.stringify({ customer_type: type, customer_ref: ref, note: newNote.trim() })
        })

                </div>
                <div style={{ marginBottom: '0.75rem' }}>
                  <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Phone</div>
                  <div>{customer.phone || '\u2014'}</div>
                </div>
              </div>
              <div>
                <div style={{ marginBottom: '0.75rem' }}>
                  <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Address</div>
                  <div>
                    {customer.address_line1 ? (
                      <>
                        {customer.address_line1}
                        {customer.address_line2 && <><br />{customer.address_line2}</>}
                        <br />
                        {[customer.city, customer.state, customer.zip].filter(Boolean).join(', ')}
                      </>
                    ) : '\u2014'}
                  </div>
                </div>
                <div style={{ marginBottom: '0.75rem' }}>
                  <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Customer Since</div>
                  <div>{customer.created_at ? new Date(customer.created_at).toLocaleDateString() : '\u2014'}</div>
                </div>
                {/* Trade-specific fields */}
                {customer.customer_type === 'trade' && (
                  <>
                    <div style={{ marginBottom: '0.75rem' }}>
                      <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Company</div>
                      <div>{customer.company_name || '\u2014'}</div>
                    </div>
                    <div style={{ marginBottom: '0.75rem' }}>
                      <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Tier / Status</div>
                      <div>
                        {(customer.tier_name || 'No tier') + ' \u2022 '}
                        <span className={'badge badge-' + (customer.status === 'approved' ? 'active' : customer.status === 'pending' ? 'pending' : 'draft')}>{customer.status || 'unknown'}</span>
                      </div>
                    </div>
                    <div style={{ marginBottom: '0.75rem' }}>
                      <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Subscription</div>
                      <div>{(customer.subscription_status || 'none') + (customer.subscription_expires_at ? ' (expires ' + new Date(customer.subscription_expires_at).toLocaleDateString() + ')' : '')}</div>
                    </div>
                    {customer.rep_name && (
                      <div style={{ marginBottom: '0.75rem' }}>
                        <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Assigned Rep</div>
                        <div>{customer.rep_name}</div>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>

          {/* Order History */}
          <div className="form-card" style={{ marginBottom: '1.5rem' }}>
            <h3 style={{ margin: '0 0 1rem', fontSize: '1rem', fontWeight: 600 }}>Order History ({orders.length})</h3>
            {orders.length === 0 ? (
              <div style={{ padding: '1rem', textAlign: 'center', color: 'var(--stone-400)' }}>No orders yet</div>
            ) : (
              <div className="table-scroll-wrapper"><table className="rep-table">
                <thead>
                  <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Paid</th>
                    <th>Balance</th>
                  </tr>
                </thead>
                <tbody>
                  {orders.map(o => (
                    <tr key={o.id} style={{ cursor: 'pointer' }} onClick={() => navigate('order-detail', o.id)}>
                      <td data-label="Order #" style={{ fontWeight: 500 }}>{o.order_number}</td>
                      <td data-label="Date" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{new Date(o.created_at).toLocaleDateString()}</td>
                      <td data-label="Status">{statusBadge(o.status)}</td>
                      <td data-label="Items">{o.item_count || '\u2014'}</td>
                      <td data-label="Total">${(parseFloat(o.total) || 0).toFixed(2)}</td>
                      <td data-label="Paid">${(parseFloat(o.amount_paid) || 0).toFixed(2)}</td>
                      <td data-label="Balance">
                        ${((parseFloat(o.total) || 0) - (parseFloat(o.amount_paid) || 0)).toFixed(2)}
                        {pendingPaymentOrderIds.has(o.id) && (
                          <span style={{ marginLeft: '0.5rem', fontSize: '0.625rem', padding: '0.125rem 0.375rem', background: '#fef3c7', color: '#92400e', borderRadius: '3px', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.03em' }}>
                            Payment Requested
                          </span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
            )}
          </div>

          {/* Activity Timeline */}
          <div className="form-card" style={{ marginBottom: '1.5rem' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.5rem' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                <h3 style={{ margin: 0, fontSize: '1rem', fontWeight: 600 }}>Activity Timeline</h3>
                {!timelineLoading && <span style={{ fontSize: '0.75rem', color: 'var(--stone-400)' }}>{filteredTimeline.length} event{filteredTimeline.length !== 1 ? 's' : ''}</span>}
              </div>
              {!timelineLoading && timeline.length > 0 && (
                <div style={{ display: 'flex', gap: '0.25rem', flexWrap: 'wrap' }}>
                  {Object.entries({ all: 'All', orders: 'Orders', quotes: 'Quotes', samples: 'Samples', visits: 'Visits', installs: 'Installs', notes: 'Notes' }).map(([key, label]) => (
                    <button key={key} onClick={() => setTimelineFilter(key)}
                      style={{
                        padding: '0.2rem 0.5rem', fontSize: '0.6875rem', fontWeight: 500, border: '1px solid ' + (timelineFilter === key ? 'var(--stone-800)' : 'var(--stone-200)'),
                        background: timelineFilter === key ? 'var(--stone-800)' : 'white', color: timelineFilter === key ? 'white' : 'var(--stone-600)',
                        borderRadius: '3px', cursor: 'pointer', transition: 'all 0.15s ease'
                      }}>{label}</button>
                  ))}
                </div>
              )}
            </div>
            {timelineLoading ? (
              <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--stone-400)' }}>Loading timeline...</div>
            ) : filteredTimeline.length === 0 ? (
              <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--stone-400)' }}>{timelineFilter === 'all' ? 'No activity found' : 'No ' + timelineFilter + ' events found'}</div>
            ) : (
              <div className="timeline">
                {filteredTimeline.map((evt, i) => {
                  const cfg = timelineConfig[evt.event_type] || { label: evt.event_type, dotColor: 'var(--stone-400)', badgeBg: 'var(--stone-100)', badgeText: 'var(--stone-600)', icon: '', clickable: false };
                  const isClickable = cfg.clickable;
                  return (
                    <div className="timeline-item" key={i}
                      style={{ cursor: isClickable ? 'pointer' : 'default' }}
                      onClick={() => isClickable && handleTimelineClick(evt)}>
                      <div className={'timeline-dot timeline-dot-' + evt.event_type}></div>
                      <div style={{ display: 'flex', gap: '0.625rem', alignItems: 'flex-start' }}>
                        <div style={{ width: 28, height: 28, borderRadius: 4, background: cfg.badgeBg, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={cfg.badgeText} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={cfg.icon}/></svg>
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', flexWrap: 'wrap' }}>
                            <span className={'timeline-type-badge timeline-type-' + evt.event_type}>{cfg.label}</span>
                            <span className="timeline-title">{evt.title}</span>
                            {isClickable && <span style={{ fontSize: '0.6875rem', color: 'var(--stone-400)', marginLeft: '0.25rem' }}>View {'\u2192'}</span>}
                          </div>
                          {evt.description && <div className="timeline-desc">{evt.description}</div>}
                          <div className="timeline-time">{timeAgo(evt.timestamp)} {'\u00B7'} {new Date(evt.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Notes */}
          <div className="form-card">
            <h3 style={{ margin: '0 0 1rem', fontSize: '1rem', fontWeight: 600 }}>Notes ({notes.length})</h3>
            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
              <textarea
                value={newNote} onChange={e => setNewNote(e.target.value)}
                placeholder="Add a note about this customer..."
                rows={2}
                style={{ flex: 1, padding: '0.5rem 0.75rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem', fontFamily: "'Inter', sans-serif", resize: 'vertical' }}
              />
              <button
                className="btn btn-primary btn-sm"
                onClick={addNote}
                disabled={addingNote || !newNote.trim()}
                style={{ alignSelf: 'flex-end' }}
              >{addingNote ? 'Adding...' : 'Add Note'}</button>
            </div>
            {notes.length === 0 ? (
              <div style={{ padding: '0.5rem', textAlign: 'center', color: 'var(--stone-400)', fontSize: '0.8125rem' }}>No notes yet</div>
            ) : (
              notes.map(n => (
                <div key={n.id} style={{ padding: '0.75rem', borderBottom: '1px solid var(--stone-100)', fontSize: '0.875rem' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.25rem' }}>
                    <span style={{ fontWeight: 500, fontSize: '0.8125rem' }}>{n.staff_name || 'Staff'}</span>
                    <span style={{ fontSize: '0.75rem', color: 'var(--stone-400)' }}>{new Date(n.created_at).toLocaleString()}</span>
                  </div>
                  <div style={{ color: 'var(--stone-600)', whiteSpace: 'pre-wrap' }}>{n.note}</div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // ========== Hash-based routing helpers ==========
    function parseHash() {
      const hash = window.location.hash.replace(/^#\/?/, '');
      if (!hash) return { view: 'dashboard', id: null };
      const parts = hash.split('/');
      return { view: parts[0] || 'dashboard', id: parts[1] || null };
    }

    function buildHash(view, id) {
      if (view === 'dashboard') return '';
      return id ? '#' + view + '/' + id : '#' + view;
    }

    // ========== RepLayout ==========
    function RepLayout({ onLogout }) {
      const initialRoute = parseHash();
      const [view, setView] = useState(initialRoute.view);
      const [editId, setEditId] = useState(initialRoute.id);
      const [unreadCount, setUnreadCount] = useState(0);
      const [showNotifDropdown, setShowNotifDropdown] = useState(false);
      const [notifList, setNotifList] = useState([]);
      const [notifLoading, setNotifLoading] = useState(false);
      const [showCost, setShowCost] = useState(true);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const repInfo = JSON.parse(sessionStorage.getItem('rep_info') || '{}');
      const notifRef = useRef(null);

      // Stripe Terminal state
      const terminalRef = useRef(null);
      const [terminalReady, setTerminalReady] = useState(typeof StripeTerminal !== 'undefined');
      const [terminalStatus, setTerminalStatus] = useState('disconnected'); // disconnected | connecting | connected
      const [terminalReader, setTerminalReader] = useState(null);

      const isLocalDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || /^192\.168\./.test(window.location.hostname) || /^10\./.test(window.location.hostname);

      const connectReader = async () => {
        if (typeof StripeTerminal === 'undefined') return;
        setTerminalStatus('connecting');
        try {
          // Create a fresh Terminal instance each time to get a fresh connection token
          const t = StripeTerminal.create({
            onFetchConnectionToken: async () => {
              const data = await repFetch('/api/rep/terminal/connection-token', { method: 'POST' });
              return data.secret;
            },
            onUnexpectedReaderDisconnect: () => {
              setTerminalStatus('disconnected');
              setTerminalReader(null);
              terminalRef.current = null;
            }
          });
          terminalRef.current = t;

          const discoverResult = await t.discoverReaders({ simulated: isLocalDev });
          if (discoverResult.error) { alert('Discovery error: ' + discoverResult.error.message); setTerminalStatus('disconnected'); return; }
          if (discoverResult.discoveredReaders.length === 0) { alert('No readers found. Make sure Tap to Pay is enabled on this device.'); setTerminalStatus('disconnected'); return; }
          const reader = discoverResult.discoveredReaders[0];
          const connectResult = await t.connectReader(reader);
          if (connectResult.error) { alert('Connect error: ' + connectResult.error.message); setTerminalStatus('disconnected'); return; }
          setTerminalReader(connectResult.reader);
          setTerminalStatus('connected');
        } catch (err) {
          alert('Terminal error: ' + err.message);
          setTerminalStatus('disconnected');
        }
      };

      const disconnectReader = async () => {
        if (!terminalRef.current) return;
        try { await terminalRef.current.disconnectReader(); } catch (e) {}
        terminalRef.current = null;
        setTerminalStatus('disconnected');
        setTerminalReader(null);
      };

      useEffect(() => {
        const mq = window.matchMedia('(max-width: 768px)');
        const handler = (e) => { if (!e.matches) setSidebarOpen(false); };
        mq.addEventListener('change', handler);
        // Replace current history entry so back from first navigation goes to dashboard
        history.replaceState({ view: initialRoute.view, id: initialRoute.id }, '');
        return () => mq.removeEventListener('change', handler);
      }, []);

      const navigate = (v, id) => {
        setView(v);
        setEditId(id || null);
        const hash = buildHash(v, id);
        if (window.location.hash !== (hash || '#')) {
          history.pushState({ view: v, id: id || null }, '', hash || window.location.pathname);
        }
        window.scrollTo(0, 0);
        setShowNotifDropdown(false);
        setSidebarOpen(false);
      };

      // Browser back/forward support
      useEffect(() => {
        const onPopState = () => {
          const route = parseHash();
          setView(route.view);
          setEditId(route.id);
          window.scrollTo(0, 0);
          setShowNotifDropdown(false);
          setSidebarOpen(false);
        };
        window.addEventListener('popstate', onPopState);
        return () => window.removeEventListener('popstate', onPopState);
      }, []);

      // Poll unread count every 45 seconds
      const pollNotifCount = useCallback(() => {
        repFetch('/api/rep/notifications/count')
          .then(d => setUnreadCount(d.unread_count || 0))
          .catch(() => {});
      }, []);

      useEffect(() => {
        pollNotifCount();
        const interval = setInterval(pollNotifCount, 45000);
        return () => clearInterval(interval);
      }, [pollNotifCount]);

      // Close dropdown on outside click
      useEffect(() => {
        const handler = (e) => {
          if (notifRef.current && !notifRef.current.contains(e.target)) {
            setShowNotifDropdown(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const openNotifDropdown = () => {
        if (showNotifDropdown) { setShowNotifDropdown(false); return; }
        setShowNotifDropdown(true);
        setNotifLoading(true);
        repFetch('/api/rep/notifications?limit=15')
          .then(d => { setNotifList(d.notifications || []); setUnreadCount(d.unread_count || 0); setNotifLoading(false); })
          .catch(() => setNotifLoading(false));
      };

      const markAllRead = () => {
        repFetch('/api/rep/notifications/read-all', { method: 'PUT' })
          .then(() => {
            setUnreadCount(0);
            setNotifList(prev => prev.map(n => ({ ...n, is_read: true })));
          })
          .catch(() => {});
      };

      const handleNotifClick = (n) => {
        if (!n.is_read) {
          repFetch('/api/rep/notifications/' + n.id + '/read', { method: 'PUT' }).catch(() => {});
          setNotifList(prev => prev.map(x => x.id === n.id ? { ...x, is_read: true } : x));
          setUnreadCount(prev => Math.max(0, prev - 1));
        }
        if (n.entity_type === 'order' && n.entity_id) {
          navigate('order-detail', n.entity_id);
        } else if (n.entity_type === 'quote' && n.entity_id) {
          navigate('quote-edit', n.entity_id);
        } else {
          setShowNotifDropdown(false);
        }
      };

      const navItems = [
        { key: 'dashboard', label: 'Dashboard', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4' },
        { key: 'tasks', label: 'Tasks', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4' },
        { key: 'catalog', label: 'Catalog', icon: 'M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10' },
        { key: 'orders', label: 'Orders', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01' },
        { key: 'purchase-orders', label: 'Purchase Orders', icon: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' },
        { key: 'quotes', label: 'Quotes', icon: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' },
        { key: 'estimates', label: 'Estimates', icon: 'M9 7h6m-6 4h6m-6 4h4M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2zm0 0l4 4m6-4l-4 4' },
        { key: 'customers', label: 'Customers', icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' },
        { key: 'commissions', label: 'Commissions', icon: 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
        { key: 'visits', label: 'Visits', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2' },
        { key: 'samples', label: 'Samples', icon: 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4' },
        { key: 'cash-drawer', label: 'Cash Drawer', icon: 'M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' },
      ];

      const activeBase = view === 'commissions' ? 'commissions' :
                          view === 'cash-drawer' ? 'cash-drawer' :
                          view === 'tasks' ? 'tasks' :
                          view === 'purchase-orders' || view === 'purchase-order-detail' ? 'purchase-orders' :
                          view === 'visits' || view === 'visit-create' || view === 'visit-detail' ? 'visits' :
                          view === 'samples' || view === 'sample-create' || view === 'sample-detail' ? 'samples' :
                          view.split('-')[0] === 'product' ? 'catalog' :
                          view === 'catalog' ? 'catalog' :
                          view.split('-')[0] === 'order' ? 'orders' :
                          view.split('-')[0] === 'quote' ? 'quotes' :
                          view.split('-')[0] === 'estimate' ? 'estimates' :
                          view.split('-')[0] === 'customer' ? 'customers' : view;

      return (
        <div className="rep-layout">
          <div className="mobile-topbar">
            <button className="hamburger-btn" onClick={() => setSidebarOpen(s => !s)}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                {sidebarOpen ? <path d="M6 18L18 6M6 6l12 12"/> : <path d="M3 12h18M3 6h18M3 18h18"/>}
              </svg>
            </button>
            <img src="/assets/logo/roma-square.png" alt="Roma" style={{ height: 32 }} />
            <div style={{ width: 24 }} />
          </div>
          <div className={'sidebar-backdrop' + (sidebarOpen ? ' visible' : '')} onClick={() => setSidebarOpen(false)} />
          <div className={'rep-sidebar' + (sidebarOpen ? ' open' : '')}>
            <div className="sidebar-logo"><img src="/assets/logo/roma-square.png" alt="Roma Flooring Designs" /></div>
            <div className="sidebar-subtitle">Sales Portal</div>
            <div className="sidebar-nav">
              {navItems.map(item => (
                <div
                  key={item.key}
                  className={'sidebar-item' + (activeBase === item.key ? ' active' : '')}
                  onClick={() => navigate(item.key)}
                >
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d={item.icon} />
                  </svg>
                  {item.label}
                </div>
              ))}
            </div>
            <div className="terminal-status">
              <span className={'terminal-dot ' + terminalStatus} />
              {terminalStatus === 'connected' ? (
                <span style={{ flex: 1 }}>Tap to Pay ready</span>
              ) : terminalStatus === 'connecting' ? (
                <span style={{ flex: 1 }}>Connecting...</span>
              ) : (
                <span style={{ flex: 1 }}>Terminal offline</span>
              )}
              {terminalStatus === 'disconnected' && terminalReady && (
                <button className="terminal-connect-btn" onClick={connectReader}>Connect</button>
              )}
              {terminalStatus === 'connected' && (
                <button className="terminal-connect-btn" onClick={disconnectReader}>Disconnect</button>
              )}
            </div>
            <div className="sidebar-logout">
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <div className="sidebar-rep-name">{repInfo.first_name} {repInfo.last_name}</div>
                <div className="notification-bell" ref={notifRef} onClick={openNotifDropdown}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">

          <div className="rep-content">

            {view === 'quote-edit' && <RepQuoteFormView navigate={navigate} editId={editId} terminalRef={terminalRef} terminalStatus={terminalStatus} connectReader={connectReader} />}

    // ========== ImageLightbox ==========
    function ImageLightbox({ images, startIndex, onClose }) {
      const [index, setIndex] = useState(startIndex || 0);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowRight') setIndex(i => Math.min(i + 1, images.length - 1));
          if (e.key === 'ArrowLeft') setIndex(i => Math.max(i - 1, 0));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [images.length, onClose]);

      if (!images || images.length === 0) return null;

      return ReactDOM.createPortal(
        <div className="lightbox-overlay" onClick={onClose}>
          <img src={images[index]} alt="" className="lightbox-img" onClick={e => e.stopPropagation()} />
          <button className="lightbox-close" onClick={onClose}>{'\u00D7'}</button>
          {index > 0 && <button className="lightbox-arrow prev" onClick={e => { e.stopPropagation(); setIndex(i => i - 1); }}>{'\u2039'}</button>}
          {index < images.length - 1 && <button className="lightbox-arrow next" onClick={e => { e.stopPropagation(); setIndex(i => i + 1); }}>{'\u203A'}</button>}
          <div className="lightbox-counter">{index + 1} / {images.length}</div>
        </div>,
        document.body
      );
    }

    // ========== ShareProductModal ==========
    function ShareProductModal({ product, media, onClose }) {
      const [email, setEmail] = useState('');
      const [message, setMessage] = useState('');
      const [sending, setSending] = useState(false);
      const [sent, setSent] = useState(false);

      const primaryImage = (media || []).find(m => m.asset_type === 'primary');
      const productName = product?.collection ? `${product.collection} ${product.name}` : product?.name || '';

      const handleSend = async () => {
        if (!email) return;
        setSending(true);
        try {
          await repFetch('/api/rep/share-product', {
            method: 'POST',
            body: JSON.stringify({ product_id: product.id, customer_email: email, message })
          });
          setSent(true);
          setTimeout(() => onClose(), 1500);
        } catch (err) {
          alert('Failed to send: ' + (err.message || 'Unknown error'));
        }
        setSending(false);
      };

      return ReactDOM.createPortal(
        <div className="share-modal-overlay" onClick={onClose}>
          <div className="share-modal" onClick={e => e.stopPropagation()}>
            <div className="share-modal-header">
              <h3>Share Product</h3>
              <button style={{ background: 'none', border: 'none', fontSize: '1.25rem', cursor: 'pointer', color: 'var(--stone-400)' }} onClick={onClose}>{'\u00D7'}</button>
            </div>
            <div className="share-modal-body">
              {sent ? (
                <div style={{ textAlign: 'center', padding: '2rem 0' }}>
                  <div style={{ fontSize: '2rem', marginBottom: '0.5rem' }}>{'\u2713'}</div>
                  <div style={{ fontSize: '0.9375rem', fontWeight: 500, color: 'var(--stone-800)' }}>Email sent!</div>
                  <div style={{ fontSize: '0.8125rem', color: 'var(--stone-500)', marginTop: '0.25rem' }}>Product shared with {email}</div>
                </div>
              ) : (
                <>
                  <div className="share-modal-preview">
                    {primaryImage && <img src={optimizeImg(primaryImage.url, 400)} alt="" loading="lazy" />}
                    <div>
                      <div style={{ fontSize: '0.8125rem', fontWeight: 600, color: 'var(--stone-800)' }}>{productName}</div>
                      {product?.vendor_name && <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)' }}>{product.vendor_name}</div>}
                    </div>
                  </div>
                  <div style={{ marginBottom: '1rem' }}>
                    <label style={{ display: 'block', fontSize: '0.8125rem', fontWeight: 500, marginBottom: '0.35rem', color: 'var(--stone-700)' }}>Customer Email *</label>
                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="customer@example.com"
                      style={{ width: '100%', padding: '0.5rem 0.75rem', border: '1px solid var(--stone-200)', borderRadius: '6px', fontSize: '0.875rem', boxSizing: 'border-box' }} />
                  </div>
                  <div>
                    <label style={{ display: 'block', fontSize: '0.8125rem', fontWeight: 500, marginBottom: '0.35rem', color: 'var(--stone-700)' }}>Message (optional)</label>
                    <textarea value={message} onChange={e => setMessage(e.target.value)} rows={3} placeholder="Add a personal note..."
                      style={{ width: '100%', padding: '0.5rem 0.75rem', border: '1px solid var(--stone-200)', borderRadius: '6px', fontSize: '0.875rem', resize: 'vertical', boxSizing: 'border-box' }} />
                  </div>
                </>
              )}
            </div>
            {!sent && (
              <div className="share-modal-footer">
                <button className="btn btn-secondary btn-sm" onClick={onClose}>Cancel</button>
                <button className="btn btn-primary btn-sm" onClick={handleSend} disabled={!email || sending}>
                  {sending ? 'Sending...' : 'Send Email'}
                </button>
              </div>
            )}
          </div>
        </div>,
        document.body
      );
    }

    // ========== RepCatalogView ==========
    function RepCatalogView({ navigate, showCost, setShowCost }) {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [category, setCategory] = useState('');
      const [vendor, setVendor] = useState('');
      const [collection, setCollection] = useState('');
      const [stockStatus, setStockStatus] = useState('');
      const [minPrice, setMinPrice] = useState('');
      const [maxPrice, setMaxPrice] = useState('');
      const [categories, setCategories] = useState([]);
      const [vendors, setVendors] = useState([]);
      const [collections, setCollections] = useState([]);
      const [filterableAttrs, setFilterableAttrs] = useState([]);
      const [attrFilters, setAttrFilters] = useState({});
      const [page, setPage] = useState(1);
      const [total, setTotal] = useState(0);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [expandedId, setExpandedId] = useState(null);
      const [expandedData, setExpandedData] = useState(null);
      const [expandedLoading, setExpandedLoading] = useState(false);
      const [viewMode, setViewMode] = useState('table');
      const [hoverPreview, setHoverPreview] = useState(null);
      const [lightbox, setLightbox] = useState(null);
      const [expandedMainImage, setExpandedMainImage] = useState(null);
      const [shareModal, setShareModal] = useState(null);
      const [sampleToast, setSampleToast] = useState(null);
      const [showFilters, setShowFilters] = useState(false);
      const hoverTimer = useRef(null);
      const limit = 30;

      useEffect(() => {
        fetch(API + '/api/categories').then(r => r.json()).then(d => setCategories(d.categories || [])).catch(() => {});
        repFetch('/api/rep/vendors').then(d => setVendors(d.vendors || [])).catch(() => {});
        repFetch('/api/rep/filterable-attributes').then(d => {
          setFilterableAttrs(d.attributes || []);
        }).catch(() => {});
      }, []);

      // Load collections — filtered when a vendor is selected
      useEffect(() => {
        const url = vendor
          ? API + '/api/collections?vendor=' + vendor
          : API + '/api/collections';
        fetch(url).then(r => r.json()).then(d => {
          setCollections(d.collections || []);
          if (vendor && collection) {
            const slugs = (d.collections || []).map(c => c.slug);
            if (!slugs.includes(collection)) setCollection('');
          }
        }).catch(() => {});
      }, [vendor]);

      const load = useCallback(() => {
        setLoading(true);
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (category) params.set('category', category);
        if (vendor) params.set('vendor', vendor);
        if (collection) params.set('collection', collection);
        if (stockStatus) params.set('stock_status', stockStatus);
        if (minPrice) params.set('min_price', minPrice);
        if (maxPrice) params.set('max_price', maxPrice);
        Object.entries(attrFilters).forEach(([slug, val]) => {
          if (val) params.set(slug, val);
        });
        params.set('page', page);
        params.set('limit', limit);
        repFetch('/api/rep/products?' + params.toString())
          .then(d => { setProducts(d.products || []); setTotal(d.total || 0); setLastUpdated(new Date()); setLoading(false); })
          .catch(() => setLoading(false));
      }, [search, category, vendor, collection, stockStatus, minPrice, maxPrice, attrFilters, page]);

      useEffect(load, [load]);

      // Auto-refresh every 2 minutes
      useEffect(() => {
        const interval = setInterval(load, 120000);
        return () => clearInterval(interval);
      }, [load]);

      // Refresh when tab regains focus
      useEffect(() => {
        const onFocus = () => load();
        window.addEventListener('focus', onFocus);
        return () => window.removeEventListener('focus', onFocus);
      }, [load]);

      const totalPages = Math.ceil(total / limit) || 1;

      const stockBadge = (s) => {
        if (s === 'in_stock') return <span className="badge badge-active">In Stock</span>;
        if (s === 'low_stock') return <span className="badge badge-pending">Low Stock</span>;
        if (s === 'out_of_stock') return <span className="badge badge-cancelled">Out of Stock</span>;
        return <span className="badge badge-draft">Unknown</span>;
      };

      const toggleExpand = (productId) => {
        if (expandedId === productId) {
          setExpandedId(null);
          setExpandedData(null);
          setExpandedMainImage(null);
          return;
        }
        setExpandedId(productId);
        setExpandedData(null);
        setExpandedMainImage(null);
        setExpandedLoading(true);
        repFetch('/api/rep/products/' + productId)
          .then(d => {
            setExpandedData(d);
            const primary = (d.media || []).find(m => m.asset_type === 'primary');
            setExpandedMainImage(primary ? primary.url : (d.media && d.media[0] ? d.media[0].url : null));
            setExpandedLoading(false);
          })
          .catch(() => setExpandedLoading(false));
      };

      const handleImgMouseEnter = (e, imgUrl) => {
        if (!imgUrl) return;
        hoverTimer.current = setTimeout(() => {
          const rect = e.target.getBoundingClientRect();
          setHoverPreview({ url: imgUrl, top: rect.top - 10, left: rect.right + 12 });
        }, 200);
      };
      const handleImgMouseLeave = () => {
        clearTimeout(hoverTimer.current);
        setHoverPreview(null);
      };

      const handleAddToQuote = (p) => {
        navigate('quote-create');
      };

      const handleRequestSample = (p) => {
        navigate('sample-create');
      };

      const handleShare = (p) => {
        // Load full product data if we have it from expanded, otherwise use list data
        if (expandedData && expandedData.product && expandedData.product.id === p.id) {
          setShareModal({ product: expandedData.product, media: expandedData.media });
        } else {
          // Fetch product details for share modal
          repFetch('/api/rep/products/' + p.id).then(d => {
            setShareModal({ product: d.product, media: d.media });
          }).catch(() => {
            setShareModal({ product: p, media: [] });
          });
        }
      };

      const colCount = showCost ? 17 : 15;

      const hasActiveFilters = category || vendor || collection || stockStatus || minPrice || maxPrice || Object.values(attrFilters).some(v => v);

      const activeFilterCount = [category, vendor, collection, stockStatus, minPrice, maxPrice, ...Object.values(attrFilters)].filter(v => v).length;

      const clearAllFilters = () => {
        setCategory(''); setVendor(''); setCollection(''); setStockStatus('');
        setMinPrice(''); setMaxPrice('');
        setAttrFilters({});
        setPage(1);
      };

      const activeFilterPills = [];
      if (category) { const cat = categories.find(c => c.slug === category); activeFilterPills.push({ label: cat ? cat.name : category, clear: () => { setCategory(''); setPage(1); } }); }
      if (vendor) { const v = vendors.find(x => String(x.id) === String(vendor)); activeFilterPills.push({ label: v ? v.name : 'Vendor ' + vendor, clear: () => { setVendor(''); setPage(1); } }); }
      if (collection) { const col = collections.find(c => c.slug === collection); activeFilterPills.push({ label: col ? col.name : collection, clear: () => { setCollection(''); setPage(1); } }); }
      if (stockStatus) { const labels = { in_stock: 'In Stock', low_stock: 'Low Stock', out_of_stock: 'Out of Stock' }; activeFilterPills.push({ label: labels[stockStatus] || stockStatus, clear: () => { setStockStatus(''); setPage(1); } }); }
      if (minPrice) activeFilterPills.push({ label: 'Min $' + minPrice, clear: () => { setMinPrice(''); setPage(1); } });
      if (maxPrice) activeFilterPills.push({ label: 'Max $' + maxPrice, clear: () => { setMaxPrice(''); setPage(1); } });
      Object.entries(attrFilters).forEach(([slug, val]) => {
        if (val) { const attr = filterableAttrs.find(a => a.slug === slug); activeFilterPills.push({ label: (attr ? attr.name + ': ' : '') + val, clear: () => { setAttrFilters(prev => ({ ...prev, [slug]: '' })); setPage(1); } }); }
      });

      // Action buttons for expanded rows and grid cards
      const ActionButtons = ({ product }) => (
        <div className="action-pills">
          <button className="action-pill primary" onClick={e => { e.stopPropagation(); handleAddToQuote(product); }}>{'\u270E'} Quote</button>
          <button className="action-pill" onClick={e => { e.stopPropagation(); handleRequestSample(product); }}>{'\u2709'} Sample</button>
          <button className="action-pill" onClick={e => { e.stopPropagation(); handleShare(product); }}>{'\u21AA'} Share</button>
        </div>
      );

      // --- Grid Card ---
      const GridCard = ({ p }) => (
        <div className="catalog-card" onClick={() => toggleExpand(p.id)}>
          {p.primary_image ? (
            <img src={optimizeImg(p.primary_image, 400)} alt="" className="catalog-card-img" loading="lazy" />
          ) : (
            <div className="catalog-card-img" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--stone-400)', fontSize: '0.8rem' }}>No Image</div>
          )}
          <div className="catalog-card-body">
            {p.collection && <div className="catalog-card-collection">{p.collection}</div>}
            <div className="catalog-card-name">{p.name}</div>
            <div className="catalog-card-vendor">{p.vendor_name}</div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '0.5rem' }}>
              <div className="catalog-card-price">
                {p.price ? '$' + parseFloat(p.price).toFixed(2) : '\u2014'}
                {p.price && <span>{p.sell_by === 'sqft' ? '/sqft' : p.sell_by === 'unit' ? '/ea' : ''}</span>}
              </div>
              {stockBadge(p.stock_status)}
            </div>
          </div>
          <div className="catalog-card-footer">
            <ActionButtons product={p} />
          </div>
        </div>
      );

      return (
        <div>
          <div className="content-header">
            <h1>Product Catalog</h1>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              {lastUpdated && <span style={{ fontSize: '0.75rem', color: 'var(--stone-400)' }}>Updated {lastUpdated.toLocaleTimeString()}</span>}
              <button className="btn btn-secondary btn-sm" onClick={load} disabled={loading} style={{ padding: '0.25rem 0.6rem', fontSize: '0.75rem' }}>
                {loading ? 'Refreshing...' : 'Refresh'}
              </button>
            </div>
          </div>
          {/* Main filter row */}
          <div className="catalog-filters">
            <input type="text" placeholder="Search products..." value={search}
              onChange={e => { setSearch(e.target.value); setPage(1); }}
              style={{ flex: 1, minWidth: '160px' }} className="filter-bar-input" />
            <select value={category} onChange={e => { setCategory(e.target.value); setPage(1); }}>
              <option value="">All Categories</option>
              {categories.map(c => <option key={c.id} value={c.slug}>{c.name}</option>)}
            </select>
            <select value={vendor} onChange={e => { setVendor(e.target.value); setPage(1); }}>
              <option value="">All Vendors</option>
              {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
            <select value={stockStatus} onChange={e => { setStockStatus(e.target.value); setPage(1); }}>
              <option value="">All Stock</option>
              <option value="in_stock">In Stock</option>
              <option value="low_stock">Low Stock</option>
              <option value="out_of_stock">Out of Stock</option>
            </select>
            <button className={'more-filters-btn' + (showFilters ? ' active' : '')}
              onClick={() => setShowFilters(f => !f)}>
              + More
            </button>
            <label className="cost-toggle" onClick={() => setShowCost(s => !s)}>
              <div className={'cost-toggle-track' + (showCost ? ' active' : '')}></div>
              Cost
            </label>
            <div className="view-toggle">
              <button className={viewMode === 'table' ? 'active' : ''} onClick={() => setViewMode('table')}>{'\u2630'}</button>
              <button className={viewMode === 'grid' ? 'active' : ''} onClick={() => setViewMode('grid')}>{'\u25A6'}</button>
            </div>
            <span className="filter-count">{total} products</span>
          </div>

          {/* Extra filters row */}
          {showFilters && (
            <div className="catalog-filters-more">
              <select value={collection} onChange={e => { setCollection(e.target.value); setPage(1); }}>
                <option value="">All Collections</option>
                {collections.map(col => <option key={col.slug} value={col.slug}>{col.name} ({col.product_count})</option>)}
              </select>
              <input type="number" placeholder="Min $" value={minPrice}
                onChange={e => { setMinPrice(e.target.value); setPage(1); }}
                style={{ width: '90px' }} />
              <input type="number" placeholder="Max $" value={maxPrice}
                onChange={e => { setMaxPrice(e.target.value); setPage(1); }}
                style={{ width: '90px' }} />
              {filterableAttrs.map(attr => (
                <select key={attr.slug} value={attrFilters[attr.slug] || ''} onChange={e => { setAttrFilters(prev => ({ ...prev, [attr.slug]: e.target.value })); setPage(1); }}>
                  <option value="">All {attr.name}</option>
                  {(attr.values || []).map(v => <option key={v} value={v}>{v}</option>)}
                </select>
              ))}
            </div>
          )}

          {/* Active filter pills */}
          {activeFilterPills.length > 0 && (
            <div className="catalog-active-filters">
              {activeFilterPills.map((pill, i) => (
                <span key={i} className="filter-pill">
                  {pill.label}
                  <button onClick={pill.clear}>{'\u00D7'}</button>
                </span>
              ))}
              <button className="btn btn-secondary btn-sm" style={{ padding: '0.15rem 0.45rem', fontSize: '0.6875rem' }}
                onClick={clearAllFilters}>Clear All</button>
            </div>
          )}

          {/* Hover preview popup */}
          {hoverPreview && (
            <img src={optimizeImg(hoverPreview.url, 400)} alt="" className="img-hover-preview"
              style={{ top: hoverPreview.top, left: hoverPreview.left }} />
          )}

          {loading ? <div className="loading">Loading products...</div> : viewMode === 'grid' ? (

    function RepProductDetailView({ navigate, editId, showCost, setShowCost }) {
      const [product, setProduct] = useState(null);
      const [skus, setSkus] = useState([]);
      const [media, setMedia] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedImage, setSelectedImage] = useState(null);

      const loadProduct = useCallback(() => {
        if (!editId) return;
        setLoading(true);
        repFetch('/api/rep/products/' + editId)
          .then(d => {
            setProduct(d.product);
            setSkus(d.skus || []);
            setMedia(d.media || []);
            const primary = (d.media || []).find(m => m.asset_type === 'primary');
            if (primary) setSelectedImage(primary.url);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [editId]);

      useEffect(loadProduct, [loadProduct]);

      // Refresh when tab regains focus
      useEffect(() => {
        const onFocus = () => loadProduct();
        window.addEventListener('focus', onFocus);
        return () => window.removeEventListener('focus', onFocus);
      }, [loadProduct]);

      if (loading) return <div className="loading">Loading product...</div>;
      if (!product) return <div className="loading">Product not found</div>;

      const stockBadge = (s) => {
        if (s === 'in_stock') return <span className="badge badge-active">In Stock</span>;
        if (s === 'low_stock') return <span className="badge badge-pending">Low Stock</span>;
        if (s === 'out_of_stock') return <span className="badge badge-cancelled">Out of Stock</span>;
        return <span className="badge badge-draft">Unknown</span>;

        <div>
          <div className="content-header">

                      <div className="product-media-thumbs">

                  <div style={{ width: '300px', height: '300px', background: 'var(--stone-100)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--stone-400)' }}>No images</div>

    function RepCreateOrderView({ navigate, terminalRef, terminalStatus, connectReader }) {

        payment_method: 'card'
      });
      const [cashDrawerOpen, setCashDrawerOpen] = useState(null); // null = loading, true/false
      const [items, setItems] = useState([]);
      const [showTapModal, setShowTapModal] = useState(false);
      const [showCardChoice, setShowCardChoice] = useState(false);
      const [showManualCard, setShowManualCard] = useState(false);
      const [showAchModal, setShowAchModal] = useState(false);
      const [skuSearch, setSkuSearch] = useState('');
      const [skuResults, setSkuResults] = useState([]);
      const [skuSearching, setSkuSearching] = useState(false);
      const skuSearchTimer = useRef(null);
      const [addBoxes, setAddBoxes] = useState(1);
      const [showCustom, setShowCustom] = useState(false);
      const [customItem, setCustomItem] = useState({ product_name: '', unit_price: '', num_boxes: 1, description: '', sell_by: 'sqft' });
      const [vendors, setVendors] = useState([]);
      const [customVendor, setCustomVendor] = useState('');
      const qtyLabel = (sellBy) => sellBy === 'unit' ? 'units' : sellBy === 'piece' ? 'pcs' : sellBy === 'sqyd' ? 'sqft' : 'boxes';
      const [promoCode, setPromoCode] = useState('');
      const [promoResult, setPromoResult] = useState(null);
      const [promoError, setPromoError] = useState('');
      const [promoLoading, setPromoLoading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [editingItemKey, setEditingItemKey] = useState(null);
      const [editField, setEditField] = useState(null); // 'price' | 'cost' | 'qty'
      const [editValue, setEditValue] = useState('');
      const [customerSearch, setCustomerSearch] = useState('');
      const [customerResults, setCustomerResults] = useState([]);
      const [customerSearching, setCustomerSearching] = useState(false);
      const [selectedCustomer, setSelectedCustomer] = useState(null);
      const [customerMatch, setCustomerMatch] = useState(null);
      const [customerMode, setCustomerMode] = useState('search'); // 'search' | 'new'
      const customerSearchTimer = useRef(null);
      const [emailError, setEmailError] = useState('');
      const [phoneError, setPhoneError] = useState('');

      const { addressInputRef, previousAddresses, showPrevAddresses, setShowPrevAddresses, selectPreviousAddress } = useAddressAutofill({
        fieldMap: { line1: 'shipping_line1', line2: 'shipping_line2', city: 'shipping_city', state: 'shipping_state', zip: 'shipping_zip' },
        setForm, selectedCustomer, isReadonly: false
      });

      useEffect(() => {
        repFetch('/api/rep/vendors').then(d => setVendors(d.vendors || [])).catch(() => {});
        repFetch('/api/rep/cash-drawer/current').then(d => setCashDrawerOpen(!!d.drawer)).catch(() => setCashDrawerOpen(false));
      }, []);

      const searchCustomers = (q) => {
        setCustomerSearch(q);
        if (customerSearchTimer.current) clearTimeout(customerSearchTimer.current);
        if (q.trim().length < 2) { setCustomerResults([]); setCustomerSearching(false); return; }
        setCustomerSearching(true);
        customerSearchTimer.current = setTimeout(async () => {
          try {
            const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(q.trim()));
            setCustomerResults(data.results || []);
          } catch (e) { setCustomerResults([]); }
          setCustomerSearching(false);
        }, 300);
      };

      const selectCustomer = (c) => {
        setSelectedCustomer(c);
        setForm(f => ({
          ...f,
          customer_name: c.name || '',
          customer_email: c.email || '',
          phone: c.phone || '',
          shipping_line1: c.address_line1 || f.shipping_line1,
          shipping_line2: c.address_line2 || f.shipping_line2,
          shipping_city: c.city || f.shipping_city,
          shipping_state: c.state || f.shipping_state,
          shipping_zip: c.zip || f.shipping_zip
        }));
        setCustomerSearch('');
        setCustomerResults([]);
        setCustomerMatch(null);
      };

      const clearCustomer = () => {
        setSelectedCustomer(null);
        setForm(f => ({ ...f, customer_name: '', customer_email: '', phone: '' }));
        setCustomerMatch(null);
        setEmailError('');
        setPhoneError('');
      };

      const checkCustomerMatch = async (field) => {
        if (selectedCustomer) return;
        const val = field === 'email' ? form.customer_email : form.phone;
        if (!val || val.trim().length < 3) { setCustomerMatch(null); return; }
        try {
          const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(val));
          if (data.results && data.results.length > 0) {
            setCustomerMatch(data.results[0]);
          } else {
            setCustomerMatch(null);
          }
        } catch (e) { setCustomerMatch(null); }
      };

      const searchSku = (q) => {
        setSkuSearch(q);
        if (skuSearchTimer.current) clearTimeout(skuSearchTimer.current);
        if (q.length < 2) { setSkuResults([]); setSkuSearching(false); return; }
        setSkuSearching(true);
        skuSearchTimer.current = setTimeout(async () => {
          try {
            const data = await repFetch('/api/rep/skus/search?q=' + encodeURIComponent(q));
            setSkuResults(data.results || []);
          } catch (e) {}
          setSkuSearching(false);
        }, 250);
      };

      const addSkuItem = (r) => {
        const numBoxes = parseInt(addBoxes) || 1;
        const unitPrice = parseFloat(r.retail_price || 0);
        const sqftPerBox = parseFloat(r.sqft_per_box || 0);
        setItems(prev => [...prev, {
          _key: Date.now(),
          sku_id: r.sku_id,
          collection: r.collection || '',
          product_name: r.product_name || '',
          color: r.color || '',
          variant_name: r.variant_name || '',
          vendor_id: r.vendor_id,
          vendor_name: r.vendor_name,
          vendor_sku: r.vendor_sku || r.internal_sku || '',
          unit_price: unitPrice,
          num_boxes: numBoxes,
          subtotal: unitPrice * numBoxes,
          sqft_per_box: sqftPerBox,
          sqft_needed: sqftPerBox ? sqftPerBox * numBoxes : null,
          is_sample: false,
          sell_by: r.sell_by || 'sqft',
          cost: parseFloat(r.cost || 0)
        }]);
        setSkuSearch('');
        setSkuResults([]);
        setAddBoxes(1);
      };

      const addCustom = () => {
        const numBoxes = parseInt(customItem.num_boxes) || 1;
        const unitPrice = parseFloat(customItem.unit_price);
        if (!customItem.product_name.trim() || isNaN(unitPrice)) return;
        const sellBy = customItem.sell_by || 'sqft';
        setItems(prev => [...prev, {
          _key: Date.now(),
          sku_id: null,
          collection: '',
          product_name: customItem.product_name.trim(),
          color: '',
          variant_name: '',
          vendor_name: '',
          vendor_sku: '',
          vendor_id: null,
          unit_price: unitPrice,
          num_boxes: numBoxes,
          subtotal: unitPrice * numBoxes,
          description: customItem.description || null,
          sell_by: sellBy,
          is_custom: true,
          cost: 0
        }]);
        setCustomItem({ product_name: '', unit_price: '', num_boxes: 1, description: '', sell_by: 'sqft' });
        setCustomVendor('');
        setShowCustom(false);
      };

      const removeItem = (key) => {
        setItems(prev => prev.filter(i => i._key !== key));
        setPromoResult(null);
        setPromoCode('');
      };

      const startEdit = (key, field, currentValue) => {
        setEditingItemKey(key);
        setEditField(field);
        setEditValue(String(currentValue));
      };

      const cancelEdit = () => {
        setEditingItemKey(null);
        setEditField(null);
        setEditValue('');
      };

      const saveEdit = () => {
        const val = parseFloat(editValue);
        if (isNaN(val) || val < 0) { cancelEdit(); return; }
        setItems(prev => prev.map(item => {
          if (item._key !== editingItemKey) return item;
          if (editField === 'price') {
            return { ...item, unit_price: val, subtotal: val * item.num_boxes };
          } else if (editField === 'cost') {
            return { ...item, cost: val };
          } else if (editField === 'qty') {
            const qty = Math.max(1, Math.round(val));
            return { ...item, num_boxes: qty, subtotal: item.unit_price * qty };
          }
          return item;
        }));
        setPromoResult(null);
        setPromoCode('');
        cancelEdit();
      };

      const subtotal = items.reduce((sum, i) => sum + i.subtotal, 0);
      const discount = promoResult ? promoResult.discount_amount : 0;
      const total = subtotal - discount;

      const applyPromo = async () => {
        if (!promoCode.trim()) return;
        setPromoLoading(true);
        setPromoError('');
        try {
          const promoItems = items.map(i => ({
            sku_id: i.sku_id,
            product_id: i.product_id || null,
            subtotal: i.subtotal,
            is_sample: false
          }));
          const data = await repFetch('/api/rep/promo-codes/validate', {
            method: 'POST',
            body: JSON.stringify({ code: promoCode, items: promoItems, customer_email: form.customer_email })
          });
          if (data.valid) {
            setPromoResult(data);
            setPromoError('');
          } else {
            setPromoError(data.error || 'Invalid promo code');
          }
        } catch (err) { setPromoError(err.message); }
        setPromoLoading(false);
      };

      const createOrderWithPI = async (stripePaymentIntentId, documentIds) => {
        setSaving(true);
        try {
          const orderItems = items.map(i => {
            if (i.sku_id) return { sku_id: i.sku_id, num_boxes: i.num_boxes };
            return { product_name: i.product_name, unit_price: i.unit_price, vendor_id: i.vendor_id || null, num_boxes: i.num_boxes, description: i.description };
          });
          const body = {
            customer_name: form.customer_name,
            customer_email: form.customer_email,
            phone: form.phone || undefined,
            delivery_method: form.delivery_method,
            payment_method: form.payment_method,
            items: orderItems,
            promo_code: promoResult ? promoResult.code : undefined,
            stripe_payment_intent_id: stripePaymentIntentId || undefined,
            document_ids: documentIds || undefined,
            check_number: form.payment_method === 'check' ? form.check_number : undefined
          };
          if (form.delivery_method === 'shipping') {
            body.shipping_address = {
              line1: form.shipping_line1,
              line2: form.shipping_line2 || undefined,
              city: form.shipping_city,
              state: form.shipping_state,
              zip: form.shipping_zip
            };
          }
          const data = await repFetch('/api/rep/orders', {
            method: 'POST',
            body: JSON.stringify(body)
          });
          if (data.order) {
            navigate('order-detail', data.order.id);
          }
        } catch (err) { alert(err.message); }
        setSaving(false);
      };

      const createOrder = async () => {
        if (!form.customer_name || !form.customer_email || items.length === 0) return;
        if (form.payment_method === 'card') {
          setShowCardChoice(true);
          return;
        }
        createOrderWithPI(null);
      };

      const canCreate = form.customer_name && form.customer_email && isValidEmail(form.customer_email) && items.length > 0 &&
        form.phone && isValidPhone(form.phone) && !customerMatch &&
        (form.delivery_method === 'pickup' || (form.shipping_line1 && form.shipping_city && form.shipping_state && form.shipping_zip)) &&
        (form.payment_method !== 'cash' || cashDrawerOpen) &&
        (form.payment_method !== 'check' || (form.check_number && form.check_number.trim()));

      return (
        <div>
          <div className="content-header">
            <h1>Create Order</h1>
            <button className="btn btn-secondary" onClick={() => navigate('orders')}>Back to Orders</button>
          </div>

          {/* Customer Info */}
          <div className="form-card">
            <h3>Customer Information</h3>

            {/* Search / New toggle */}
            <div className="mobile-stack" style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
              <button className={customerMode === 'search' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                onClick={() => { setCustomerMode('search'); setCustomerMatch(null); }}
                style={{ fontSize: '0.8rem', padding: '0.35rem 0.75rem' }}>
                Search Existing
              </button>
              <button className={customerMode === 'new' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                onClick={() => { setCustomerMode('new'); setCustomerResults([]); setCustomerSearch(''); }}
                style={{ fontSize: '0.8rem', padding: '0.35rem 0.75rem' }}>
                + New Customer
              </button>
            </div>

            {/* Search mode */}
            {customerMode === 'search' && !selectedCustomer && (
              <div style={{ position: 'relative', marginBottom: '1rem' }}>
                <input type="text" value={customerSearch} onChange={e => searchCustomers(e.target.value)}
                  placeholder="Search customers by name, email, or phone..."
                  style={{ width: '100%', boxSizing: 'border-box' }} />
                {customerSearching && !customerResults.length && (
                  <div style={{ fontSize: '0.75rem', color: '#888', marginTop: '0.25rem' }}>Searching...</div>
                )}
                {!customerSearching && customerSearch.trim().length >= 2 && customerResults.length === 0 && (
                  <div style={{ fontSize: '0.75rem', color: '#999', marginTop: '0.25rem' }}>No customers found</div>
                )}
                {customerResults.length > 0 && (
                  <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: '#fff', border: '1px solid #ddd',
                    borderRadius: '6px', boxShadow: '0 4px 12px rgba(0,0,0,0.15)', zIndex: 1000, maxHeight: '280px', overflowY: 'auto' }}>
                    {customerResults.map((c, i) => (
                      <div key={c.id || i} onMouseDown={e => { e.preventDefault(); selectCustomer(c); }}
                        style={{ padding: '0.6rem 0.75rem', cursor: 'pointer', borderBottom: '1px solid #f0f0f0',
                          display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}
                        onMouseEnter={e => e.currentTarget.style.background = '#f7f5f2'}
                        onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: '0.875rem', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {c.name}{c.company_name ? ` — ${c.company_name}` : ''}
                          </div>
                          <div style={{ fontSize: '0.75rem', color: '#666', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {c.email}{c.phone ? ` · ${c.phone}` : ''}
                          </div>
                        </div>
                        <span style={{ fontSize: '0.65rem',
                          background: c.type === 'trade' ? '#e8d5b7' : c.type === 'order' ? '#d5dde8' : '#d5e8d4',
                          color: c.type === 'trade' ? '#8b6914' : c.type === 'order' ? '#2d4a6a' : '#2d6a2e',
                          padding: '0.15rem 0.5rem', borderRadius: '9999px', fontWeight: 600, textTransform: 'uppercase',
                          marginLeft: '0.5rem', flexShrink: 0 }}>
                          {c.type === 'order' ? 'prev order' : c.type}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Selected customer indicator */}
            {selectedCustomer && (
              <div style={{ marginBottom: '0.75rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                <span style={{ fontSize: '0.8125rem', color: '#166534', background: '#dcfce7', padding: '0.2rem 0.6rem', borderRadius: '9999px', fontWeight: 500 }}>Existing Customer</span>
                {selectedCustomer.company_name && <span style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{selectedCustomer.company_name}</span>}
                <button onClick={clearCustomer}
                  style={{ marginLeft: 'auto', fontSize: '0.75rem', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--stone-400)', textDecoration: 'underline' }}>Clear</button>
              </div>
            )}

            {/* Duplicate customer error in new-customer mode */}
            {customerMode === 'new' && customerMatch && !selectedCustomer && (
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1rem',
                background: '#fef2f2', border: '1px solid #f5c6c6', borderRadius: '6px', padding: '0.5rem 0.75rem' }}>
                <span style={{ fontSize: '1rem', color: '#991b1b' }}>✕</span>
                <div style={{ flex: 1, fontSize: '0.825rem', color: '#991b1b' }}>
                  A customer with this email/phone already exists: <strong>{customerMatch.name}</strong> ({customerMatch.email})
                </div>
                <button className="btn btn-sm" onClick={() => { selectCustomer(customerMatch); setCustomerMode('search'); }}
                  style={{ fontSize: '0.75rem', padding: '0.25rem 0.6rem', background: '#991b1b', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer' }}>
                  Use this customer
                </button>
              </div>
            )}

            {/* Form fields — disabled when customer selected */}
            <div className="form-grid">
              <div className="form-group">
                <label>Customer Name *</label>
                <input type="text" value={form.customer_name}
                  onChange={e => setForm(f => ({ ...f, customer_name: e.target.value }))}
                  placeholder="Full name" />
              </div>
              <div className="form-group">
                <label>Email *</label>
                <input type="email" value={form.customer_email}
                  onChange={e => {
                    setForm(f => ({ ...f, customer_email: e.target.value }));
                    if (emailError) setEmailError('');
                  }}
                  onBlur={() => {
                    if (form.customer_email && !isValidEmail(form.customer_email)) setEmailError('Enter a valid email address');
                    else setEmailError('');
                    if (customerMode === 'new') checkCustomerMatch('email');
                  }}
                  placeholder="email@example.com"
                  style={emailError ? { borderColor: '#dc2626' } : {}} />
                {emailError && <div style={{ color: '#dc2626', fontSize: '0.75rem', marginTop: '0.25rem' }}>{emailError}</div>}
              </div>
              <div className="form-group">
                <label>Phone *</label>
                <input type="text" value={form.phone}
                  onChange={e => {
                    setForm(f => ({ ...f, phone: e.target.value }));
                    if (phoneError) setPhoneError('');
                  }}
                  onBlur={() => {
                    if (!form.phone || !isValidPhone(form.phone)) setPhoneError('Enter a valid 10-digit phone number');
                    else setPhoneError('');
                    if (customerMode === 'new') checkCustomerMatch('phone');
                  }}
                  placeholder="(555) 123-4567"
                  style={phoneError ? { borderColor: '#dc2626' } : {}} />
                {phoneError && <div style={{ color: '#dc2626', fontSize: '0.75rem', marginTop: '0.25rem' }}>{phoneError}</div>}
              </div>
            </div>
          </div>

          {/* Delivery Method */}
          <div className="form-card">
            <div className="mobile-stack" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <h3 style={{ margin: 0 }}>{form.delivery_method === 'pickup' ? 'Store Pickup' : 'Shipping Address'}</h3>
              <div style={{ display: 'flex', gap: '0.5rem' }}>
                <button className={form.delivery_method === 'shipping' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                  onClick={() => setForm(f => ({ ...f, delivery_method: 'shipping' }))}
                  style={{ fontSize: '0.75rem', padding: '0.3rem 0.75rem' }}>
                  Shipping
                </button>
                <button className={form.delivery_method === 'pickup' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                  onClick={() => setForm(f => ({ ...f, delivery_method: 'pickup' }))}
                  style={{ fontSize: '0.75rem', padding: '0.3rem 0.75rem' }}>
                  Store Pickup
                </button>
              </div>
            </div>
            {form.delivery_method === 'shipping' && (
              <div className="form-grid" style={{ marginTop: '1rem' }}>
                <div className="form-group full">
                  <label>Address Line 1 *</label>
                  <input ref={addressInputRef} type="text" placeholder="Start typing an address..." value={form.shipping_line1} onChange={e => setForm(f => ({ ...f, shipping_line1: e.target.value }))} />
                  {previousAddresses.length > 0 && (
                    <div>
                      <span className="prev-addr-toggle" onClick={() => setShowPrevAddresses(s => !s)}>
                        {showPrevAddresses ? 'Hide' : 'Use'} previous address ({previousAddresses.length})
                      </span>
                      {showPrevAddresses && (
                        <div className="prev-addr-list">
                          {previousAddresses.map((addr, i) => (
                            <div key={i} className="prev-addr-item" onClick={() => selectPreviousAddress(addr)}>
                              <div className="prev-addr-item-line1">{addr.line1}</div>
                              <div className="prev-addr-item-sub">{[addr.city, addr.state, addr.zip].filter(Boolean).join(', ')}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
                <div className="form-group full">
                  <label>Address Line 2</label>
                  <input type="text" value={form.shipping_line2} onChange={e => setForm(f => ({ ...f, shipping_line2: e.target.value }))} />
                </div>
                <div className="form-group">
                  <label>City *</label>
                  <input type="text" value={form.shipping_city} onChange={e => setForm(f => ({ ...f, shipping_city: e.target.value }))} />
                </div>
                <div className="resp-grid-2" style={{ gap: '1rem' }}>
                  <div className="form-group">
                    <label>State *</label>
                    <input type="text" value={form.shipping_state} onChange={e => setForm(f => ({ ...f, shipping_state: e.target.value }))} maxLength={2} />
                  </div>
                  <div className="form-group">
                    <label>ZIP *</label>
                    <input type="text" value={form.shipping_zip} onChange={e => setForm(f => ({ ...f, shipping_zip: e.target.value }))} maxLength={10} />
                  </div>
                </div>
              </div>
            )}
            {form.delivery_method === 'pickup' && (
              <div className="order-info-grid" style={{ marginTop: '0.75rem' }}>
                <div className="order-info-item" style={{ gridColumn: '1 / -1' }}>
                  <span>
                    <strong>Roma Flooring Designs</strong><br />
                    1440 S. State College Blvd., Suite 6M<br />
                    Anaheim, CA 92806
                  </span>
                </div>
              </div>
            )}
          </div>

          {/* Items */}
          <div className="form-card">
            <h3>Line Items</h3>
            <div style={{ marginBottom: '1rem' }}>
              <div className="mobile-stack" style={{ display: 'flex', gap: '0.75rem', marginBottom: '0.75rem' }}>
                <div style={{ flex: 2, minWidth: '0', position: 'relative' }}>
                  <input type="text" value={skuSearch} placeholder="Search SKU or product name..."
                    onChange={e => searchSku(e.target.value)}
                    style={{ width: '100%', padding: '0.75rem 1rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem', fontFamily: "'Inter', sans-serif" }} />
                  {skuSearching && skuResults.length === 0 && skuSearch.length >= 2 && (
                    <div className="search-results"><div className="search-loading-indicator">Searching...</div></div>
                  )}
                  {!skuSearching && skuResults.length === 0 && skuSearch.length >= 2 && (
                    <div className="search-results"><div className="search-no-results">No results found</div></div>
                  )}
                  {skuResults.length > 0 && (
                    <div className="search-results">
                      {skuResults.slice(0, 20).map((r, i) => (
                        <div key={i} className="search-result-item" onMouseDown={() => addSkuItem(r)}>
                          {r.primary_image
                            ? <img className="sku-thumb" src={optimizeImg(r.primary_image, 96)} alt="" loading="lazy" />
                            : <div className="sku-thumb-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
                          }
                          <div className="sku-info">
                            <div className="sku-name">
                              {r.collection || r.product_name}
                              {r.color ? ' \u2014 ' + r.color : ''}
                              {r.variant_name && r.variant_name !== r.color ? ' \u00b7 ' + r.variant_name : ''}
                            </div>
                            <div className="product-meta">
                              {r.vendor_name}{r.vendor_sku ? ' \u00b7 ' + r.vendor_sku : r.internal_sku ? ' \u00b7 ' + r.internal_sku : ''}
                              {r.retail_price ? ' \u00b7 $' + parseFloat(r.retail_price).toFixed(2) + (r.sell_by === 'unit' ? '/ea' : r.price_basis === 'per_sqyd' ? '/sqyd' : '/sqft') : ''}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ width: '80px' }}>
                  <input type="number" min="1" value={addBoxes} onChange={e => setAddBoxes(parseInt(e.target.value) || 1)}
                    placeholder="Qty" style={{ width: '100%', padding: '0.75rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                </div>
                <button className={'btn ' + (showCustom ? 'btn-secondary' : 'btn-primary')} onClick={() => setShowCustom(!showCustom)} style={{ whiteSpace: 'nowrap' }}>
                  {showCustom ? 'Cancel' : '+ Custom Item'}
                </button>
              </div>
              {showCustom && (
                <div style={{ background: 'var(--stone-50)', border: '1px solid var(--stone-200)', padding: '1.25rem', marginBottom: '0.75rem' }}>
                  <div style={{ fontSize: '0.75rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-600)', marginBottom: '0.75rem' }}>Add Custom Item</div>
                  <div className="resp-grid-2" style={{ gap: '0.75rem' }}>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label>Item Name *</label>
                      <input type="text" value={customItem.product_name} onChange={e => setCustomItem(c => ({ ...c, product_name: e.target.value }))} placeholder="e.g. Custom transition strip" />
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label>Description</label>
                      <input type="text" value={customItem.description} onChange={e => setCustomItem(c => ({ ...c, description: e.target.value }))} placeholder="Optional notes" />
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label>Sold By *</label>
                      <select value={customItem.sell_by || 'sqft'} onChange={e => setCustomItem(c => ({ ...c, sell_by: e.target.value }))}>
                        <option value="sqft">Per SqFt (boxes)</option>
                        <option value="unit">Per Unit (slabs/prefab)</option>
