<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="theme-color" content="#1c1917">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Roma Rep">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Sales Rep Portal - Roma Flooring Designs</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
  <script src="https://js.stripe.com/terminal/v1/"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --stone-50: #fafaf9;
      --stone-100: #f5f5f4;
      --stone-200: #e7e5e4;
      --stone-300: #d6d3d1;
      --stone-400: #a8a29e;
      --stone-500: #78716c;
      --stone-600: #57534e;
      --stone-700: #44403c;
      --stone-800: #292524;
      --stone-900: #1c1917;
      --gold: #c9a668;
      --gold-light: #d4b87a;
      --green: #16a34a;
      --green-light: #dcfce7;
      --red: #dc2626;
      --red-light: #fee2e2;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--stone-50);
      color: var(--stone-800);
    }

    /* Auth Gate */
    .auth-gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--stone-100) 0%, var(--stone-200) 100%);
    }
    .auth-box {
      background: white;
      padding: 3rem;
      width: 400px;
      max-width: 90vw;
      border: 1px solid var(--stone-200);
    }
    .auth-box h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }
    .auth-box p {
      color: var(--stone-600);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .auth-box input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--stone-200);
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      margin-bottom: 1rem;
    }
    .auth-box input:focus { outline: none; border-color: var(--gold); }
    .auth-error {
      color: var(--red);
      font-size: 0.8125rem;
      margin-bottom: 1rem;
    }

    /* Layout */
    .rep-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .rep-sidebar {
      background: var(--stone-900);
      color: white;
      padding: 2rem 0;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar-logo {
      padding: 0 1.5rem;
      margin-bottom: 0.25rem;
    }
    .sidebar-logo img {
      width: 100px;
      height: auto;
      display: block;
    }
    .sidebar-subtitle {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--stone-500);
      padding: 0 1.5rem;
      margin-bottom: 2.5rem;
    }
    .sidebar-nav { flex: 1; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      color: var(--stone-400);
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover {
      color: white;
      background: rgba(255,255,255,0.05);
    }
    .sidebar-item.active {
      color: white;
      background: rgba(255,255,255,0.08);
      border-left-color: var(--gold);
    }
    .sidebar-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-logout {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--stone-700);
    }
    .sidebar-rep-name {
      font-size: 0.75rem;
      color: var(--stone-400);
      padding: 0 1.5rem;
      margin-bottom: 0.5rem;
    }

    /* Content area */
    .rep-content {
      padding: 2rem 2.5rem;
      min-height: 100vh;
    }
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .content-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-family: 'Inter', sans-serif;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .btn-primary { background: var(--stone-900); color: white; }
    .btn-primary:hover { background: var(--gold); }
    .btn-secondary { background: white; color: var(--stone-800); border: 1px solid var(--stone-300); }
    .btn-secondary:hover { background: var(--stone-100); }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: var(--green); color: white; }
    .btn-success:hover { background: #15803d; }
    .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Stat cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .stat-card {
      background: white;
      border: 1px solid var(--stone-200);
      padding: 1.5rem;
    }
    .stat-card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--stone-500);
      margin-bottom: 0.5rem;
    }
    .stat-card-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 400;
      color: var(--stone-900);
    }

    /* Metrics Grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .metric-card {
      background: white;
      border: 1px solid var(--stone-200);
      padding: 1.5rem;
    }
    .metric-card-label {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--stone-500);
      margin-bottom: 0.5rem;
    }
    .metric-card-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      color: var(--stone-900);
    }
    .metric-card-sub {
      font-size: 0.75rem;
      color: var(--stone-400);
      margin-top: 0.25rem;
    }
    .metric-change-up { color: var(--green); font-weight: 500; }
    .metric-change-down { color: var(--red); font-weight: 500; }
    .top-products-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .top-products-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--stone-100);
      font-size: 0.8125rem;
    }
    .top-products-list li:last-child { border-bottom: none; }

    /* Commission badges */
    .badge-earned { background: var(--green-light); color: var(--green); }
    .badge-paid { background: #dbeafe; color: #2563eb; }
    .badge-forfeited { background: var(--red-light); color: var(--red); }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 2rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 0.5rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--stone-200);
    }
    .timeline-item {
      position: relative;
      padding-bottom: 1.25rem;
      padding-top: 0.5rem;
      padding-right: 0.5rem;
      border-radius: 4px;
      transition: background 0.15s ease, padding-left 0.15s ease;
    }
    .timeline-item:hover {
      background: var(--stone-50);
    }
    .timeline-dot {
      position: absolute;
      left: -1.625rem;
      top: 0.65rem;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--stone-400);
      border: 2px solid white;
      box-shadow: 0 0 0 1px var(--stone-200);
    }
    .timeline-dot-order_placed { background: #2563eb; }
    .timeline-dot-status_change { background: var(--stone-400); }
    .timeline-dot-payment { background: var(--green); }
    .timeline-dot-sample_request { background: #d97706; }
    .timeline-dot-standalone_sample { background: #d97706; }
    .timeline-dot-quote { background: #7c3aed; }
    .timeline-dot-note { background: var(--stone-500); }
    .timeline-dot-showroom_visit { background: #0d9488; }
    .timeline-dot-installation_inquiry { background: #ea580c; }
    .timeline-type-badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-radius: 2px;
      margin-right: 0.5rem;
    }
    .timeline-type-order_placed { background: #dbeafe; color: #1e40af; }
    .timeline-type-status_change { background: var(--stone-100); color: var(--stone-600); }
    .timeline-type-payment { background: var(--green-light); color: var(--green); }
    .timeline-type-sample_request { background: #fef3c7; color: #92400e; }
    .timeline-type-standalone_sample { background: #fef3c7; color: #92400e; }
    .timeline-type-quote { background: #ede9fe; color: #6d28d9; }
    .timeline-type-note { background: var(--stone-100); color: var(--stone-600); }
    .timeline-type-showroom_visit { background: #ccfbf1; color: #0f766e; }
    .timeline-type-installation_inquiry { background: #fff7ed; color: #c2410c; }

    /* Visit Product Cards */
    .visit-product-card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem;
      border: 1px solid var(--stone-200);
      background: white;
      margin-bottom: 0.5rem;
    }
    .visit-product-image {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border: 1px solid var(--stone-200);
      flex-shrink: 0;
    }
    .visit-product-info {
      flex: 1;
      min-width: 0;
    }
    .visit-product-info .vp-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--stone-800);
    }
    .visit-product-info .vp-collection {
      font-size: 0.8125rem;
      color: var(--stone-500);
    }
    .visit-product-info .vp-price {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--stone-800);
      margin-top: 0.25rem;
    }
    .visit-url-box {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--stone-50);
      border: 1px solid var(--stone-200);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8125rem;
      color: var(--stone-600);
      word-break: break-all;
    }
    .visit-url-box button {
      flex-shrink: 0;
    }
    .badge-opened { background: #fef3c7; color: #d97706; }
    .badge-carted { background: var(--green-light); color: var(--green); }

    .timeline-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--stone-800);
    }
    .timeline-desc {
      font-size: 0.8125rem;
      color: var(--stone-500);
      margin-top: 0.15rem;
    }
    .timeline-time {
      font-size: 0.75rem;
      color: var(--stone-400);
      margin-top: 0.15rem;
    }

    /* Tables */
    .rep-table {
      width: 100%;
      background: white;
      border: 1px solid var(--stone-200);
      border-collapse: collapse;
    }
    .rep-table th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--stone-500);
      border-bottom: 2px solid var(--stone-200);
      background: var(--stone-50);
    }
    .rep-table td {
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--stone-100);
      vertical-align: middle;
    }
    .rep-table tr:hover td { background: var(--stone-50); }
    .rep-table .actions { white-space: nowrap; }
    .rep-table .actions button { margin-right: 0.5rem; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-radius: 2px;
    }
    .badge-active, .badge-confirmed { background: var(--green-light); color: var(--green); }
    .badge-draft { background: var(--stone-100); color: var(--stone-500); }
    .badge-inactive { background: var(--red-light); color: var(--red); }
    .badge-pending { background: #fef3c7; color: #d97706; }
    .badge-shipped { background: #dbeafe; color: #2563eb; }
    .badge-delivered { background: var(--green-light); color: #15803d; }
    .badge-cancelled, .badge-declined, .badge-expired { background: var(--red-light); color: var(--red); }
    .badge-refunded { background: #ede9fe; color: #6d28d9; }
    .badge-sent { background: #dbeafe; color: #2563eb; }
    .badge-acknowledged { background: #fef3c7; color: #d97706; }
    .badge-fulfilled { background: var(--green-light); color: #15803d; }
    .badge-accepted { background: #fef3c7; color: #d97706; }
    .badge-converted { background: var(--green-light); color: var(--green); }
    .badge-requested { background: #fef3c7; color: #d97706; }

    /* Forms */
    .form-card {
      background: white;
      border: 1px solid var(--stone-200);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .form-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--stone-200);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--stone-600);
      margin-bottom: 0.4rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--stone-300);
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      background: white;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--gold);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .order-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .order-info-item label {
      display: block;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--stone-500);
      margin-bottom: 0.25rem;
    }
    .order-info-item span {
      font-size: 0.875rem;
      color: var(--stone-800);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .filter-bar input,
    .filter-bar select {
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--stone-300);
      background: white;
      color: var(--stone-800);
    }
    .filter-bar input:focus, .filter-bar select:focus {
      outline: none;
      border-color: var(--gold);
    }
    .filter-bar input[type="text"] { min-width: 220px; }
    .filter-bar .filter-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--stone-400);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--stone-400);
      font-size: 0.875rem;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: white;
      padding: 2rem;
      width: 480px;
      max-width: 90vw;
    }
    .modal-box h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 1rem;
    }
    .modal-box p {
      color: var(--stone-600);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }
    .modal-box.modal-wide {
      width: 720px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .email-preview-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--stone-50);
      border: 1px solid var(--stone-200);
      margin-bottom: 1rem;
      font-size: 0.8125rem;
      color: var(--stone-600);
    }
    .email-preview-meta strong {
      color: var(--stone-800);
    }
    .email-preview-frame {
      border: 1px solid var(--stone-200);
      background: #fafaf9;
      padding: 0;
      width: 100%;
      min-height: 400px;
    }

    /* Price history */
    .price-history {
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: var(--stone-50);
      border: 1px solid var(--stone-200);
      font-size: 0.75rem;
    }
    .price-history-entry {
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--stone-100);
      color: var(--stone-600);
    }
    .price-history-entry:last-child { border-bottom: none; }

    /* Notification bell */
    .notification-bell {
      position: relative;
      cursor: pointer;
      padding: 0.5rem;
      margin: 0 1rem;
      color: var(--stone-400);
      transition: color 0.15s;
    }
    .notification-bell:hover { color: white; }
    .notification-bell svg { width: 20px; height: 20px; }
    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: var(--red);
      color: white;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .notification-dropdown {
      position: absolute;
      bottom: 100%;
      left: 0;
      width: 360px;
      max-height: 480px;
      background: white;
      border: 1px solid var(--stone-200);
      box-shadow: 0 -8px 24px rgba(0,0,0,0.15);
      z-index: 100;
      display: flex;
      flex-direction: column;
      margin-bottom: 0.5rem;
    }
    .notification-dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--stone-200);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--stone-600);
    }
    .notification-dropdown-list {
      flex: 1;
      overflow-y: auto;
      max-height: 380px;
    }
    .notification-item {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--stone-100);
      cursor: pointer;
      transition: background 0.1s;
      font-size: 0.8125rem;
    }
    .notification-item:hover { background: var(--stone-50); }
    .notification-item.unread { background: #fffbeb; }
    .notification-item-title { font-weight: 500; color: var(--stone-800); }
    .notification-item-message { color: var(--stone-500); font-size: 0.75rem; margin-top: 0.2rem; }
    .notification-item-time { color: var(--stone-400); font-size: 0.6875rem; margin-top: 0.2rem; }

    /* Catalog grid */
    .cost-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--stone-600);
      cursor: pointer;
      user-select: none;
    }
    .cost-toggle-track {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--stone-300);
      position: relative;
      transition: background 0.2s;
    }
    .cost-toggle-track.active {
      background: var(--gold);
    }
    .cost-toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;

    /* Mobile Top Bar */

    /* Table Scroll Wrapper */

    /* Data Tables (cash drawer, payment history) */

    .data-table th { text-align: left; padding: 0.75rem; font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--stone-500); border-bottom: 2px solid var(--stone-200); background: var(--stone-50); }
    .data-table td { padding: 0.75rem; font-size: 0.875rem; border-bottom: 1px solid var(--stone-100); }

    /* Mobile utility classes (no-op at desktop) */
    .mobile-stack { }
    .mobile-full { }

    /* Responsive Grid Utilities */
    .resp-grid-2 { display: grid; grid-template-columns: 1fr 1fr; }
    .resp-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; }

    /* Tablet */

    /* Primary Mobile */
    @media (max-width: 768px) {
      .mobile-topbar { display: flex; }

      .rep-layout { grid-template-columns: 1fr; }

      /* Tables → stacked card layout */
      .rep-table { min-width: unset; }
      .rep-table thead { display: none; }
      .rep-table, .rep-table tbody, .rep-table tr, .rep-table td { display: block; width: 100%; }
      .rep-table tr { padding: 0.75rem; margin-bottom: 0.5rem; border: 1px solid var(--stone-200); background: white; border-radius: 6px; }
      .rep-table td { padding: 0.35rem 0.75rem; border: none; font-size: 0.8125rem; display: flex; justify-content: space-between; align-items: center; }
      .rep-table td::before { content: attr(data-label); font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--stone-500); margin-right: 1rem; flex-shrink: 0; }
      .rep-table td:empty { display: none; }
      .rep-table .actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
      .data-table thead { display: none; }
      .data-table, .data-table tbody, .data-table tr, .data-table td { display: block; width: 100%; }
      .data-table tr { padding: 0.75rem; margin-bottom: 0.5rem; border: 1px solid var(--stone-200); background: white; border-radius: 6px; }
      .data-table td { padding: 0.35rem 0.75rem; border: none; font-size: 0.8125rem; display: flex; justify-content: space-between; align-items: center; }

      /* Buttons — touch-friendly sizing */

    /* Mobile Portrait */
    @media (max-width: 480px) {
      .rep-content { padding: 0.75rem; }
      .content-header h1 { font-size: 1.125rem; }

      .rep-table td { font-size: 0.75rem; padding: 0.25rem 0.75rem; }

    /* aspect-ratio fallback for Safari <15 */
    @supports not (aspect-ratio: 1) {
      .product-media-main { height: 0; padding-bottom: 100%; position: relative; }
      .product-media-main img { position: absolute; top: 0; left: 0; }

    /* Google Places autocomplete dropdown */
    .pac-container {
      z-index: 10000;

      padding: 8px 12px;

    .pac-item:first-child { border-top: none; }
    .pac-item:hover, .pac-item-selected {
      background: var(--stone-50);
    }
    .pac-icon { display: none; }
    .pac-item-query { font-weight: 500; color: var(--stone-800); }

    /* Previous addresses dropdown */
    .prev-addr-toggle {
      display: inline-block;
      font-size: 0.8rem;
      color: var(--gold);
      cursor: pointer;
      margin-top: 4px;
      border-bottom: 1px solid var(--gold);

    }
    .prev-addr-toggle:hover { opacity: 0.8; }
    .prev-addr-list {
      margin-top: 6px;
      border: 1px solid var(--stone-200);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .prev-addr-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--stone-100);
      transition: background 0.15s;
    }
    .prev-addr-item:last-child { border-bottom: none; }
    .prev-addr-item:hover { background: var(--stone-50); }
    .prev-addr-item-line1 {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--stone-800);
    }
    .prev-addr-item-sub {
      font-size: 0.78rem;
      color: var(--stone-500);
      margin-top: 1px;
    }
    /* Terminal status */
    .terminal-status { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.25rem; font-size: 0.75rem; color: var(--stone-500); }
    .terminal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .terminal-dot.connected { background: var(--green); }
    .terminal-dot.disconnected { background: var(--stone-300); }
    .terminal-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .terminal-connect-btn { background: none; border: 1px solid var(--stone-300); color: var(--stone-600); padding: 0.2rem 0.5rem; font-size: 0.6875rem; cursor: pointer; border-radius: 4px; }
    .terminal-connect-btn:hover { background: var(--stone-100); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    /* Tap to Pay Modal */
    .tap-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    .tap-modal { background: white; border-radius: 12px; padding: 2rem; width: 360px; max-width: 90vw; text-align: center; }
    .tap-modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 0.5rem; }
    .tap-modal-amount { font-size: 2rem; font-weight: 600; color: var(--stone-800); margin: 1rem 0; }
    .tap-modal-status { font-size: 0.9375rem; color: var(--stone-600); margin: 1.5rem 0; min-height: 1.5rem; }
    .tap-modal-icon { width: 80px; height: 80px; margin: 1rem auto; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .tap-modal-icon.ready { background: #f0fdf4; color: var(--green); }
    .tap-modal-icon.processing { background: #fef3c7; color: #f59e0b; }
    .tap-modal-icon.success { background: #dcfce7; color: var(--green); }
    .tap-modal-icon.error { background: #fee2e2; color: var(--red); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useCallback, useRef } = React;

        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3001'
      : `${window.location.protocol}//${window.location.hostname}:3001`;

    // ========== Rep Fetch Helper ==========
    function repFetch(path, options = {}) {
      const token = sessionStorage.getItem('rep_token');
      return fetch(API + path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'X-Rep-Token': token || '',
          ...(options.headers || {})
        }
      }).then(r => {
        if (r.status === 401) {
          sessionStorage.removeItem('rep_token');
          sessionStorage.removeItem('rep_info');
          window.location.reload();
          throw new Error('Unauthorized');
        }
        const ct = r.headers.get('content-type') || '';
        if (!ct.includes('application/json')) {
          throw new Error('Server returned non-JSON (status ' + r.status + ')');
        }
        return r.json();
      });
    }

    // ========== Shared Utilities ==========
    const timeAgo = (dateStr) => {
      const now = new Date();
      const d = new Date(dateStr);
      const diffMs = now - d;
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      if (days < 7) return days + 'd ago';
      return d.toLocaleDateString();
    };

    const isValidEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
    const isValidPhone = (v) => v.replace(/\D/g, '').length === 10;

    // ========== Google Places Loader ==========
    let _placesPromise = null;
    function loadGooglePlaces(apiKey) {
      if (_placesPromise) return _placesPromise;
      if (window.google && window.google.maps && window.google.maps.places) {
        _placesPromise = Promise.resolve();
        return _placesPromise;
      }
      _placesPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(apiKey) + '&libraries=places';
        script.async = true;
        script.onload = resolve;
        script.onerror = () => { _placesPromise = null; reject(new Error('Failed to load Google Places')); };
        document.head.appendChild(script);
      });
      return _placesPromise;
    }

    // ========== useAddressAutofill Hook ==========
    function useAddressAutofill({ fieldMap, setForm, selectedCustomer, isReadonly }) {
      const addressInputRef = useRef(null);
      const autocompleteRef = useRef(null);
      const [placesReady, setPlacesReady] = useState(false);
      const [previousAddresses, setPreviousAddresses] = useState([]);
      const [showPrevAddresses, setShowPrevAddresses] = useState(false);

      // Load Google Places API
      useEffect(() => {
        if (isReadonly) return;
        let cancelled = false;
        repFetch('/api/rep/config/google-places-key')
          .then(data => {
            if (cancelled || !data.key) return Promise.resolve(false);
            return loadGooglePlaces(data.key).then(() => true);
          })
          .then(loaded => { if (!cancelled && loaded) setPlacesReady(true); })
          .catch(() => {});
        return () => { cancelled = true; };
      }, [isReadonly]);

      // Attach autocomplete to input
      useEffect(() => {
        if (!placesReady || !addressInputRef.current || autocompleteRef.current || isReadonly) return;
        if (!window.google || !window.google.maps || !window.google.maps.places) return;
        try {
          const ac = new google.maps.places.Autocomplete(addressInputRef.current, {
            types: ['address'],
            componentRestrictions: { country: 'us' },
            fields: ['address_components']
          });
          ac.addListener('place_changed', () => {
            const place = ac.getPlace();
            if (!place.address_components) return;
            let streetNumber = '', route = '', city = '', state = '', zip = '';
            for (const c of place.address_components) {
              const t = c.types[0];
              if (t === 'street_number') streetNumber = c.long_name;
              else if (t === 'route') route = c.long_name;
              else if (t === 'locality') city = c.long_name;
              else if (t === 'administrative_area_level_1') state = c.short_name;
              else if (t === 'postal_code') zip = c.long_name;
            }
            const line1 = (streetNumber + ' ' + route).trim();
            setForm(f => ({
              ...f,
              [fieldMap.line1]: line1,
              [fieldMap.city]: city,
              [fieldMap.state]: state,
              [fieldMap.zip]: zip
            }));
          });
          autocompleteRef.current = ac;
          // Hide Google's error watermark if API key has billing issues
          setTimeout(() => {
            const pac = document.querySelector('.pac-container');
            if (pac && pac.querySelector('.pac-logo')) return; // working fine
            // Remove broken autocomplete widget styling
            if (addressInputRef.current) {
              addressInputRef.current.style.backgroundImage = 'none';
            }
          }, 3000);
        } catch (e) {
          console.warn('Google Places autocomplete failed:', e);
        }
      }, [placesReady, isReadonly]);

      // Fetch previous addresses when customer changes
      useEffect(() => {
        setPreviousAddresses([]);
        setShowPrevAddresses(false);
        if (!selectedCustomer || !selectedCustomer.email) return;
        let cancelled = false;
        repFetch('/api/rep/customers/' + encodeURIComponent(selectedCustomer.email) + '/addresses')
          .then(data => {
            if (!cancelled) setPreviousAddresses(data.addresses || []);
          })
          .catch(() => {});
        return () => { cancelled = true; };
      }, [selectedCustomer && selectedCustomer.email]);

      const selectPreviousAddress = (addr) => {
        setForm(f => ({
          ...f,
          [fieldMap.line1]: addr.line1 || '',
          [fieldMap.line2]: addr.line2 || '',
          [fieldMap.city]: addr.city || '',
          [fieldMap.state]: addr.state || '',
          [fieldMap.zip]: addr.zip || ''
        }));
        setShowPrevAddresses(false);
      };

      return { addressInputRef, previousAddresses, showPrevAddresses, setShowPrevAddresses, selectPreviousAddress };
    }

    // ========== App ==========
    // ========== Tap to Pay Modal ==========
    function TapToPayModal({ amount, terminal, onSuccess, onCancel }) {
      const [tapStatus, setTapStatus] = useState('initializing'); // initializing | ready | processing | success | error
      const [tapError, setTapError] = useState('');
      const piRef = useRef(null);
      const cancelledRef = useRef(false);

      useEffect(() => {
        cancelledRef.current = false;
        let cancelled = false;
        const run = async () => {
          try {
            // 1. Create payment intent
            setTapStatus('initializing');
            const piData = await repFetch('/api/rep/terminal/create-payment-intent', {
              method: 'POST',
              body: JSON.stringify({ amount, order_description: 'In-store tap-to-pay' })
            });
            if (cancelled) return;
            if (!piData.client_secret) { setTapStatus('error'); setTapError(piData.error || 'Failed to create payment'); return; }
            piRef.current = piData.payment_intent_id;

            // 2. Collect payment method (NFC tap)
            setTapStatus('ready');
            const collectResult = await terminal.collectPaymentMethod(piData.client_secret);
            if (cancelled || cancelledRef.current) return;
            if (collectResult.error) { setTapStatus('error'); setTapError(collectResult.error.message); return; }

            // 3. Process payment
            setTapStatus('processing');
            const processResult = await terminal.processPayment(collectResult.paymentIntent);
            if (cancelled) return;
            if (processResult.error) { setTapStatus('error'); setTapError(processResult.error.message); return; }

            // 4. Success
            setTapStatus('success');
            setTimeout(() => {
              if (!cancelled) onSuccess(piData.payment_intent_id);
            }, 800);
          } catch (err) {
            if (!cancelled) { setTapStatus('error'); setTapError(err.message || 'Payment failed'); }
          }
        };
        run();
        return () => { cancelled = true; };
      }, []);

      const handleCancel = async () => {
        cancelledRef.current = true;
        if (tapStatus === 'ready') {
          try { await terminal.cancelCollectPaymentMethod(); } catch (e) {}
        }
        onCancel();
      };

      const handleRetry = () => {
        setTapStatus('initializing');
        setTapError('');
        cancelledRef.current = false;
        const run = async () => {
          try {
            const piData = await repFetch('/api/rep/terminal/create-payment-intent', {
              method: 'POST',
              body: JSON.stringify({ amount, order_description: 'In-store tap-to-pay' })
            });
            if (cancelledRef.current) return;
            if (!piData.client_secret) { setTapStatus('error'); setTapError(piData.error || 'Failed to create payment'); return; }
            piRef.current = piData.payment_intent_id;

            setTapStatus('ready');
            const collectResult = await terminal.collectPaymentMethod(piData.client_secret);
            if (cancelledRef.current) return;
            if (collectResult.error) { setTapStatus('error'); setTapError(collectResult.error.message); return; }

            setTapStatus('processing');
            const processResult = await terminal.processPayment(collectResult.paymentIntent);
            if (cancelledRef.current) return;
            if (processResult.error) { setTapStatus('error'); setTapError(processResult.error.message); return; }

            setTapStatus('success');
            setTimeout(() => {
              if (!cancelledRef.current) onSuccess(piRef.current);
            }, 800);
          } catch (err) {
            if (!cancelledRef.current) { setTapStatus('error'); setTapError(err.message || 'Payment failed'); }
          }
        };
        run();
      };

      const statusMessages = {
        initializing: 'Initializing...',
        ready: 'Ready \u2014 tap card or phone',
        processing: 'Processing...',
        success: 'Payment successful!',
        error: tapError || 'Payment failed'
      };

      const iconClass = tapStatus === 'ready' ? 'ready' : tapStatus === 'processing' ? 'processing' : tapStatus === 'success' ? 'success' : tapStatus === 'error' ? 'error' : 'processing';

      return (
        <div className="tap-modal-overlay">
          <div className="tap-modal">
            <h3>Tap to Pay</h3>
            <div className="tap-modal-amount">${parseFloat(amount).toFixed(2)}</div>
            <div className={'tap-modal-icon ' + iconClass}>
              {tapStatus === 'success' ? (
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              ) : tapStatus === 'error' ? (
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              ) : (
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                  <path d="M2 8.5c1.5-1 3.5-1.5 5-1 1 .3 1.8 1 2.5 1.8" opacity="0.6"/>
                  <path d="M2 5.5c2.5-1.5 5.5-2 8-1 1.5.6 2.8 1.7 3.8 3" opacity="0.4"/>
                </svg>
              )}
            </div>
            <div className="tap-modal-status" style={{ color: tapStatus === 'error' ? 'var(--red)' : tapStatus === 'success' ? 'var(--green)' : undefined }}>
              {statusMessages[tapStatus]}
            </div>
            <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'center', marginTop: '1rem' }}>
              {tapStatus === 'error' && (
                <button className="btn btn-primary btn-sm" onClick={handleRetry}>Retry</button>
              )}
              {tapStatus !== 'success' && (
                <button className="btn btn-secondary btn-sm" onClick={handleCancel}>Cancel</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [authed, setAuthed] = useState(false);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        const token = sessionStorage.getItem('rep_token');
        if (!token) { setChecking(false); return; }
        repFetch('/api/rep/me')
          .then(data => {
            if (data.rep) {
              sessionStorage.setItem('rep_info', JSON.stringify(data.rep));
              setAuthed(true);
            }
            setChecking(false);
          })
          .catch(() => {
            sessionStorage.removeItem('rep_token');
            sessionStorage.removeItem('rep_info');
            setChecking(false);
          });
      }, []);

      const handleLogin = (token, rep) => {
        sessionStorage.setItem('rep_token', token);
        sessionStorage.setItem('rep_info', JSON.stringify(rep));
        setAuthed(true);
      };

      const handleLogout = () => {
        repFetch('/api/rep/logout', { method: 'POST' }).catch(() => {});
        sessionStorage.removeItem('rep_token');
        sessionStorage.removeItem('rep_info');
        setAuthed(false);
      };

      if (checking) return <div className="loading">Loading...</div>;
      if (!authed) return <LoginView onLogin={handleLogin} />;
      return <RepLayout onLogout={handleLogout} />;
    }

    // ========== LoginView ==========
    function LoginView({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const resp = await fetch(API + '/api/rep/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || 'Login failed');
          onLogin(data.token, data.rep);
        } catch (err) {
          setError(err.message);
          setLoading(false);
        }
      };

      return (
        <div className="auth-gate">
          <form className="auth-box" onSubmit={handleSubmit}>
            <h1>Sales Portal</h1>
            <p>Sign in with your rep credentials</p>
            {error && <div className="auth-error">{error}</div>}
            <input type="email" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)} required />
            <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} required />
            <button className="btn btn-primary" style={{ width: '100%', padding: '0.875rem', marginTop: '0.5rem' }} disabled={loading}>
              {loading ? 'Signing in...' : 'Sign In'}
            </button>
          </form>
        </div>
      );
    }

      // Parse the composite ID: retail_UUID, trade_UUID, guest_email

        if (!compositeId) return { type: null, ref: null };
        const idx = compositeId.indexOf('_');
        if (idx === -1) return { type: null, ref: null };
        const type = compositeId.substring(0, idx);
        const ref = compositeId.substring(idx + 1);
        return { type, ref };
      };

      useEffect(() => {
        if (!type || !ref) return;
        setLoading(true);
        setTimelineLoading(true);

          repFetch('/api/rep/customers/' + encodeURIComponent(ref) + '/timeline?type=' + type)
        ]).then(([data, tlData]) => {
          setCustomer(data.customer);
          setOrders(data.orders || []);
          setNotes(data.notes || []);
          setQuotes(data.quotes || []);
          setPaymentRequests(data.payment_requests || []);

                        {customer.address_line2 && <><br />{customer.address_line2}</>}
                        <br />
                        {[customer.city, customer.state, customer.zip].filter(Boolean).join(', ')}
                      </>
                    ) : '\u2014'}
                  </div>
                </div>
                <div style={{ marginBottom: '0.75rem' }}>
                  <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Customer Since</div>
                  <div>{customer.created_at ? new Date(customer.created_at).toLocaleDateString() : '\u2014'}</div>
                </div>
                {/* Trade-specific fields */}
                {customer.customer_type === 'trade' && (
                  <>
                    <div style={{ marginBottom: '0.75rem' }}>
                      <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Company</div>
                      <div>{customer.company_name || '\u2014'}</div>
                    </div>
                    <div style={{ marginBottom: '0.75rem' }}>
                      <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Tier / Status</div>
                      <div>
                        {(customer.tier_name || 'No tier') + ' \u2022 '}
                        <span className={'badge badge-' + (customer.status === 'approved' ? 'active' : customer.status === 'pending' ? 'pending' : 'draft')}>{customer.status || 'unknown'}</span>
                      </div>
                    </div>
                    <div style={{ marginBottom: '0.75rem' }}>
                      <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Subscription</div>
                      <div>{(customer.subscription_status || 'none') + (customer.subscription_expires_at ? ' (expires ' + new Date(customer.subscription_expires_at).toLocaleDateString() + ')' : '')}</div>
                    </div>
                    {customer.rep_name && (
                      <div style={{ marginBottom: '0.75rem' }}>
                        <div style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)' }}>Assigned Rep</div>
                        <div>{customer.rep_name}</div>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>

          {/* Order History */}
          <div className="form-card" style={{ marginBottom: '1.5rem' }}>
            <h3 style={{ margin: '0 0 1rem', fontSize: '1rem', fontWeight: 600 }}>Order History ({orders.length})</h3>
            {orders.length === 0 ? (
              <div style={{ padding: '1rem', textAlign: 'center', color: 'var(--stone-400)' }}>No orders yet</div>
            ) : (
              <div className="table-scroll-wrapper"><table className="rep-table">
                <thead>
                  <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Paid</th>
                    <th>Balance</th>
                  </tr>
                </thead>
                <tbody>
                  {orders.map(o => (
                    <tr key={o.id} style={{ cursor: 'pointer' }} onClick={() => navigate('order-detail', o.id)}>
                      <td data-label="Order #" style={{ fontWeight: 500 }}>{o.order_number}</td>
                      <td data-label="Date" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{new Date(o.created_at).toLocaleDateString()}</td>
                      <td data-label="Status">{statusBadge(o.status)}</td>
                      <td data-label="Items">{o.item_count || '\u2014'}</td>
                      <td data-label="Total">${(parseFloat(o.total) || 0).toFixed(2)}</td>
                      <td data-label="Paid">${(parseFloat(o.amount_paid) || 0).toFixed(2)}</td>
                      <td data-label="Balance">
                        ${((parseFloat(o.total) || 0) - (parseFloat(o.amount_paid) || 0)).toFixed(2)}
                        {pendingPaymentOrderIds.has(o.id) && (
                          <span style={{ marginLeft: '0.5rem', fontSize: '0.625rem', padding: '0.125rem 0.375rem', background: '#fef3c7', color: '#92400e', borderRadius: '3px', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.03em' }}>
                            Payment Requested
                          </span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
            )}
          </div>

          {/* Activity Timeline */}
          <div className="form-card" style={{ marginBottom: '1.5rem' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.5rem' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                <h3 style={{ margin: 0, fontSize: '1rem', fontWeight: 600 }}>Activity Timeline</h3>
                {!timelineLoading && <span style={{ fontSize: '0.75rem', color: 'var(--stone-400)' }}>{filteredTimeline.length} event{filteredTimeline.length !== 1 ? 's' : ''}</span>}
              </div>
              {!timelineLoading && timeline.length > 0 && (
                <div style={{ display: 'flex', gap: '0.25rem', flexWrap: 'wrap' }}>
                  {Object.entries({ all: 'All', orders: 'Orders', quotes: 'Quotes', samples: 'Samples', visits: 'Visits', installs: 'Installs', notes: 'Notes' }).map(([key, label]) => (
                    <button key={key} onClick={() => setTimelineFilter(key)}
                      style={{
                        padding: '0.2rem 0.5rem', fontSize: '0.6875rem', fontWeight: 500, border: '1px solid ' + (timelineFilter === key ? 'var(--stone-800)' : 'var(--stone-200)'),
                        background: timelineFilter === key ? 'var(--stone-800)' : 'white', color: timelineFilter === key ? 'white' : 'var(--stone-600)',
                        borderRadius: '3px', cursor: 'pointer', transition: 'all 0.15s ease'
                      }}>{label}</button>
                  ))}
                </div>
              )}
            </div>
            {timelineLoading ? (
              <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--stone-400)' }}>Loading timeline...</div>
            ) : filteredTimeline.length === 0 ? (
              <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--stone-400)' }}>{timelineFilter === 'all' ? 'No activity found' : 'No ' + timelineFilter + ' events found'}</div>
            ) : (
              <div className="timeline">
                {filteredTimeline.map((evt, i) => {
                  const cfg = timelineConfig[evt.event_type] || { label: evt.event_type, dotColor: 'var(--stone-400)', badgeBg: 'var(--stone-100)', badgeText: 'var(--stone-600)', icon: '', clickable: false };
                  const isClickable = cfg.clickable;
                  return (
                    <div className="timeline-item" key={i}
                      style={{ cursor: isClickable ? 'pointer' : 'default' }}
                      onClick={() => isClickable && handleTimelineClick(evt)}>
                      <div className={'timeline-dot timeline-dot-' + evt.event_type}></div>
                      <div style={{ display: 'flex', gap: '0.625rem', alignItems: 'flex-start' }}>
                        <div style={{ width: 28, height: 28, borderRadius: 4, background: cfg.badgeBg, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={cfg.badgeText} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={cfg.icon}/></svg>
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', flexWrap: 'wrap' }}>
                            <span className={'timeline-type-badge timeline-type-' + evt.event_type}>{cfg.label}</span>
                            <span className="timeline-title">{evt.title}</span>
                            {isClickable && <span style={{ fontSize: '0.6875rem', color: 'var(--stone-400)', marginLeft: '0.25rem' }}>View {'\u2192'}</span>}
                          </div>
                          {evt.description && <div className="timeline-desc">{evt.description}</div>}
                          <div className="timeline-time">{timeAgo(evt.timestamp)} {'\u00B7'} {new Date(evt.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Notes */}
          <div className="form-card">
            <h3 style={{ margin: '0 0 1rem', fontSize: '1rem', fontWeight: 600 }}>Notes ({notes.length})</h3>
            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
              <textarea
                value={newNote} onChange={e => setNewNote(e.target.value)}
                placeholder="Add a note about this customer..."
                rows={2}
                style={{ flex: 1, padding: '0.5rem 0.75rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem', fontFamily: "'Inter', sans-serif", resize: 'vertical' }}
              />
              <button
                className="btn btn-primary btn-sm"
                onClick={addNote}
                disabled={addingNote || !newNote.trim()}
                style={{ alignSelf: 'flex-end' }}
              >{addingNote ? 'Adding...' : 'Add Note'}</button>
            </div>
            {notes.length === 0 ? (
              <div style={{ padding: '0.5rem', textAlign: 'center', color: 'var(--stone-400)', fontSize: '0.8125rem' }}>No notes yet</div>
            ) : (
              notes.map(n => (
                <div key={n.id} style={{ padding: '0.75rem', borderBottom: '1px solid var(--stone-100)', fontSize: '0.875rem' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.25rem' }}>
                    <span style={{ fontWeight: 500, fontSize: '0.8125rem' }}>{n.staff_name || 'Staff'}</span>
                    <span style={{ fontSize: '0.75rem', color: 'var(--stone-400)' }}>{new Date(n.created_at).toLocaleString()}</span>
                  </div>
                  <div style={{ color: 'var(--stone-600)', whiteSpace: 'pre-wrap' }}>{n.note}</div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // ========== RepLayout ==========
    function RepLayout({ onLogout }) {
      const [view, setView] = useState('dashboard');
      const [editId, setEditId] = useState(null);
      const [unreadCount, setUnreadCount] = useState(0);
      const [showNotifDropdown, setShowNotifDropdown] = useState(false);
      const [notifList, setNotifList] = useState([]);
      const [notifLoading, setNotifLoading] = useState(false);
      const [showCost, setShowCost] = useState(true);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const repInfo = JSON.parse(sessionStorage.getItem('rep_info') || '{}');
      const notifRef = useRef(null);

      // Stripe Terminal state
      const terminalRef = useRef(null);
      const [terminalReady, setTerminalReady] = useState(typeof StripeTerminal !== 'undefined');
      const [terminalStatus, setTerminalStatus] = useState('disconnected'); // disconnected | connecting | connected
      const [terminalReader, setTerminalReader] = useState(null);

      const isLocalDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || /^192\.168\./.test(window.location.hostname) || /^10\./.test(window.location.hostname);

      const connectReader = async () => {
        if (typeof StripeTerminal === 'undefined') return;
        setTerminalStatus('connecting');
        try {
          // Create a fresh Terminal instance each time to get a fresh connection token
          const t = StripeTerminal.create({
            onFetchConnectionToken: async () => {
              const data = await repFetch('/api/rep/terminal/connection-token', { method: 'POST' });
              return data.secret;
            },
            onUnexpectedReaderDisconnect: () => {
              setTerminalStatus('disconnected');
              setTerminalReader(null);
              terminalRef.current = null;
            }
          });
          terminalRef.current = t;

          const discoverResult = await t.discoverReaders({ simulated: isLocalDev });
          if (discoverResult.error) { alert('Discovery error: ' + discoverResult.error.message); setTerminalStatus('disconnected'); return; }
          if (discoverResult.discoveredReaders.length === 0) { alert('No readers found. Make sure Tap to Pay is enabled on this device.'); setTerminalStatus('disconnected'); return; }
          const reader = discoverResult.discoveredReaders[0];
          const connectResult = await t.connectReader(reader);
          if (connectResult.error) { alert('Connect error: ' + connectResult.error.message); setTerminalStatus('disconnected'); return; }
          setTerminalReader(connectResult.reader);
          setTerminalStatus('connected');
        } catch (err) {
          alert('Terminal error: ' + err.message);
          setTerminalStatus('disconnected');
        }
      };

      const disconnectReader = async () => {
        if (!terminalRef.current) return;
        try { await terminalRef.current.disconnectReader(); } catch (e) {}
        terminalRef.current = null;
        setTerminalStatus('disconnected');
        setTerminalReader(null);
      };

      useEffect(() => {
        const mq = window.matchMedia('(max-width: 768px)');
        const handler = (e) => { if (!e.matches) setSidebarOpen(false); };
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, []);

      const navigate = (v, id) => {
        setView(v);
        setEditId(id || null);
        window.scrollTo(0, 0);
        setShowNotifDropdown(false);
        setSidebarOpen(false);
      };

      // Poll unread count every 45 seconds
      const pollNotifCount = useCallback(() => {
        repFetch('/api/rep/notifications/count')
          .then(d => setUnreadCount(d.unread_count || 0))
          .catch(() => {});
      }, []);

      useEffect(() => {
        pollNotifCount();
        const interval = setInterval(pollNotifCount, 45000);
        return () => clearInterval(interval);
      }, [pollNotifCount]);

      // Close dropdown on outside click
      useEffect(() => {
        const handler = (e) => {
          if (notifRef.current && !notifRef.current.contains(e.target)) {
            setShowNotifDropdown(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const openNotifDropdown = () => {
        if (showNotifDropdown) { setShowNotifDropdown(false); return; }
        setShowNotifDropdown(true);
        setNotifLoading(true);
        repFetch('/api/rep/notifications?limit=15')
          .then(d => { setNotifList(d.notifications || []); setUnreadCount(d.unread_count || 0); setNotifLoading(false); })
          .catch(() => setNotifLoading(false));
      };

      const markAllRead = () => {
        repFetch('/api/rep/notifications/read-all', { method: 'PUT' })
          .then(() => {
            setUnreadCount(0);
            setNotifList(prev => prev.map(n => ({ ...n, is_read: true })));
          })
          .catch(() => {});
      };

      const handleNotifClick = (n) => {
        if (!n.is_read) {
          repFetch('/api/rep/notifications/' + n.id + '/read', { method: 'PUT' }).catch(() => {});
          setNotifList(prev => prev.map(x => x.id === n.id ? { ...x, is_read: true } : x));
          setUnreadCount(prev => Math.max(0, prev - 1));
        }
        if (n.entity_type === 'order' && n.entity_id) {
          navigate('order-detail', n.entity_id);
        } else if (n.entity_type === 'quote' && n.entity_id) {
          navigate('quote-edit', n.entity_id);
        } else {
          setShowNotifDropdown(false);
        }
      };

      const navItems = [
        { key: 'dashboard', label: 'Dashboard', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4' },
        { key: 'catalog', label: 'Catalog', icon: 'M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10' },
        { key: 'orders', label: 'Orders', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01' },
        { key: 'quotes', label: 'Quotes', icon: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' },
        { key: 'customers', label: 'Customers', icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' },
        { key: 'commissions', label: 'Commissions', icon: 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
        { key: 'visits', label: 'Visits', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2' },
        { key: 'samples', label: 'Samples', icon: 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4' },
        { key: 'cash-drawer', label: 'Cash Drawer', icon: 'M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' },
      ];

      const activeBase = view === 'commissions' ? 'commissions' :
                          view === 'cash-drawer' ? 'cash-drawer' :
                          view === 'visits' || view === 'visit-create' || view === 'visit-detail' ? 'visits' :
                          view === 'samples' || view === 'sample-create' || view === 'sample-detail' ? 'samples' :
                          view.split('-')[0] === 'product' ? 'catalog' :
                          view === 'catalog' ? 'catalog' :
                          view.split('-')[0] === 'order' ? 'orders' :
                          view.split('-')[0] === 'quote' ? 'quotes' :
                          view.split('-')[0] === 'customer' ? 'customers' : view;

      return (
        <div className="rep-layout">
          <div className="mobile-topbar">
            <button className="hamburger-btn" onClick={() => setSidebarOpen(s => !s)}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                {sidebarOpen ? <path d="M6 18L18 6M6 6l12 12"/> : <path d="M3 12h18M3 6h18M3 18h18"/>}
              </svg>
            </button>
            <img src="/assets/logo/roma-square.png" alt="Roma" style={{ height: 32 }} />
            <div style={{ width: 24 }} />
          </div>
          <div className={'sidebar-backdrop' + (sidebarOpen ? ' visible' : '')} onClick={() => setSidebarOpen(false)} />
          <div className={'rep-sidebar' + (sidebarOpen ? ' open' : '')}>
            <div className="sidebar-logo"><img src="/assets/logo/roma-square.png" alt="Roma Flooring Designs" /></div>
            <div className="sidebar-subtitle">Sales Portal</div>
            <div className="sidebar-nav">
              {navItems.map(item => (
                <div
                  key={item.key}
                  className={'sidebar-item' + (activeBase === item.key ? ' active' : '')}
                  onClick={() => navigate(item.key)}
                >
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d={item.icon} />
                  </svg>
                  {item.label}
                </div>
              ))}
            </div>
            <div className="terminal-status">
              <span className={'terminal-dot ' + terminalStatus} />
              {terminalStatus === 'connected' ? (
                <span style={{ flex: 1 }}>Tap to Pay ready</span>
              ) : terminalStatus === 'connecting' ? (
                <span style={{ flex: 1 }}>Connecting...</span>
              ) : (
                <span style={{ flex: 1 }}>Terminal offline</span>
              )}
              {terminalStatus === 'disconnected' && terminalReady && (
                <button className="terminal-connect-btn" onClick={connectReader}>Connect</button>
              )}
              {terminalStatus === 'connected' && (
                <button className="terminal-connect-btn" onClick={disconnectReader}>Disconnect</button>
              )}
            </div>
            <div className="sidebar-logout">
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <div className="sidebar-rep-name">{repInfo.first_name} {repInfo.last_name}</div>
                <div className="notification-bell" ref={notifRef} onClick={openNotifDropdown}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                  </svg>
                  {unreadCount > 0 && <span className="notification-badge">{unreadCount > 99 ? '99+' : unreadCount}</span>}
                  {showNotifDropdown && (
                    <div className="notification-dropdown" onClick={e => e.stopPropagation()}>
                      <div className="notification-dropdown-header">
                        <span>Notifications</span>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                          {unreadCount > 0 && (
                            <button className="btn btn-sm btn-secondary" style={{ padding: '0.2rem 0.5rem', fontSize: '0.65rem', textTransform: 'none', letterSpacing: 0 }}
                              onClick={markAllRead}>Mark all read</button>
                          )}
                          <button className="btn btn-sm btn-secondary" style={{ padding: '0.2rem 0.5rem', fontSize: '0.65rem', textTransform: 'none', letterSpacing: 0 }}
                            onClick={() => navigate('notifications')}>View All</button>
                        </div>
                      </div>
                      <div className="notification-dropdown-list">
                        {notifLoading ? (
                          <div style={{ padding: '1.5rem', textAlign: 'center', color: 'var(--stone-400)', fontSize: '0.8125rem' }}>Loading...</div>
                        ) : notifList.length === 0 ? (
                          <div style={{ padding: '1.5rem', textAlign: 'center', color: 'var(--stone-400)', fontSize: '0.8125rem' }}>No notifications</div>
                        ) : notifList.map(n => (
                          <div key={n.id} className={'notification-item' + (n.is_read ? '' : ' unread')} onClick={() => handleNotifClick(n)}>
                            <div className="notification-item-title">{n.title}</div>
                            {n.message && <div className="notification-item-message">{n.message}</div>}
                            <div className="notification-item-time">{timeAgo(n.created_at)}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
              <div className="sidebar-item" onClick={onLogout}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
              </div>
            </div>
          </div>
          <div className="rep-content">
            {view === 'dashboard' && <RepDashboardView navigate={navigate} />}
            {view === 'catalog' && <RepCatalogView navigate={navigate} showCost={showCost} setShowCost={setShowCost} />}
            {view === 'product-detail' && <RepProductDetailView navigate={navigate} editId={editId} showCost={showCost} setShowCost={setShowCost} />}

    // ========== RepCatalogView ==========
    function RepCatalogView({ navigate, showCost, setShowCost }) {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [category, setCategory] = useState('');
      const [categories, setCategories] = useState([]);
      const [page, setPage] = useState(1);
      const [total, setTotal] = useState(0);
      const limit = 30;

      useEffect(() => {
        fetch(API + '/api/categories').then(r => r.json()).then(d => setCategories(d.categories || [])).catch(() => {});
      }, []);

      const load = useCallback(() => {
        setLoading(true);
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (category) params.set('category', category);
        params.set('page', page);
        params.set('limit', limit);
        repFetch('/api/rep/products?' + params.toString())
          .then(d => { setProducts(d.products || []); setTotal(d.total || 0); setLoading(false); })
          .catch(() => setLoading(false));
      }, [search, category, page]);

      useEffect(load, [load]);

      const totalPages = Math.ceil(total / limit) || 1;

      const stockBadge = (s) => {
        if (s === 'in_stock') return <span className="badge badge-active">In Stock</span>;
        if (s === 'low_stock') return <span className="badge badge-pending">Low Stock</span>;
        if (s === 'out_of_stock') return <span className="badge badge-cancelled">Out of Stock</span>;
        return <span className="badge badge-draft">Unknown</span>;
      };

      return (
        <div>
          <div className="content-header">
            <h1>Product Catalog</h1>
            <span style={{ fontSize: '0.875rem', color: 'var(--stone-400)' }}>{total} products</span>
          </div>
          <div className="filter-bar">
            <input type="text" placeholder="Search products..." value={search}
              onChange={e => { setSearch(e.target.value); setPage(1); }} />
            <select value={category} onChange={e => { setCategory(e.target.value); setPage(1); }}>
              <option value="">All Categories</option>
              {categories.map(c => (
                <option key={c.id} value={c.slug}>{c.name}</option>
              ))}
            </select>
            <label className="cost-toggle" onClick={() => setShowCost(s => !s)}>
              <div className={'cost-toggle-track' + (showCost ? ' active' : '')}></div>
              Show Cost
            </label>
            <span className="filter-count">{products.length} shown</span>
          </div>
          {loading ? <div className="loading">Loading products...</div> : (
            <div className="table-scroll-wrapper"><table className="rep-table">
              <thead>
                <tr>
                  <th style={{ width: '60px' }}></th>
                  <th>Product</th>
                  <th>Collection</th>
                  <th>Vendor</th>
                  <th>Retail</th>
                  {showCost && <th>Cost</th>}
                  {showCost && <th>Margin%</th>}
                  <th>Stock</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {products.map(p => (
                  <tr key={p.id} style={{ cursor: 'pointer' }} onClick={() => navigate('product-detail', p.id)}>
                    <td data-label="">
                      {p.primary_image ? (
                        <img src={p.primary_image} alt="" className="catalog-image" />
                      ) : (
                        <div className="catalog-image" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--stone-400)', fontSize: '0.6rem' }}>No img</div>
                      )}
                    </td>
                    <td data-label="Product" style={{ fontWeight: 500 }}>{p.name}</td>
                    <td data-label="Collection" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{p.collection || '\u2014'}</td>
                    <td data-label="Vendor" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{p.vendor_name}</td>
                    <td data-label="Retail">{p.price ? '$' + parseFloat(p.price).toFixed(2) : '\u2014'}</td>
                    {showCost && <td data-label="Cost">{p.cost ? '$' + parseFloat(p.cost).toFixed(2) : '\u2014'}</td>}
                    {showCost && <td data-label="Margin%" style={{ color: p.margin_pct <= 0 ? 'var(--red)' : 'inherit', fontWeight: p.margin_pct <= 0 ? 600 : 400 }}>
                      {p.price ? p.margin_pct.toFixed(1) + '%' : '\u2014'}
                    </td>}
                    <td data-label="Stock">{stockBadge(p.stock_status)}</td>
                    <td data-label="" className="actions" onClick={e => e.stopPropagation()}>
                      <button className="btn btn-secondary btn-sm" onClick={() => navigate('product-detail', p.id)}>View</button>
                    </td>
                  </tr>
                ))}
                {products.length === 0 && (
                  <tr><td colSpan={showCost ? 9 : 7} style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem' }}>No products found</td></tr>
                )}
              </tbody>
            </table></div>
          )}
          {totalPages > 1 && (
            <div className="pagination">
              <button className="btn btn-secondary btn-sm" disabled={page <= 1} onClick={() => setPage(p => p - 1)}>Previous</button>
              <span>Page {page} of {totalPages}</span>
              <button className="btn btn-secondary btn-sm" disabled={page >= totalPages} onClick={() => setPage(p => p + 1)}>Next</button>
            </div>
          )}
        </div>
      );
    }
