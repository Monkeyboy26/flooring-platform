                                      style={{ fontSize: '0.7rem', padding: '0.15rem 0.4rem', background: 'var(--green)', color: 'white', border: 'none', cursor: 'pointer' }}>Save</button>
                                    <button onClick={() => { setEditingPOItem(null); setNewCost(''); }}
                                      style={{ fontSize: '0.7rem', padding: '0.15rem 0.4rem', border: '1px solid var(--stone-300)', background: 'white', cursor: 'pointer' }}>Cancel</button>
                                  </span>
                                ) : (
                                  <span>
                                    ${cost.toFixed(2)}{' '}
                                    <button onClick={() => { setEditingPOItem(item.id); setNewCost(cost.toFixed(2)); }}
                                      style={{ fontSize: '0.65rem', padding: '0.1rem 0.3rem', background: 'none', border: '1px solid var(--stone-300)', cursor: 'pointer', color: 'var(--stone-600)' }}>Edit</button>
                                  </span>
                                )
                              ) : (
                                <span>${cost.toFixed(2)}</span>
                              )}
                            </td>
                            <td data-label="Margin" style={{ color: margin <= 0 ? 'var(--red)' : 'inherit', fontWeight: margin <= 0 ? 600 : 400 }}>
                              {retail > 0 ? margin.toFixed(1) + '%' : '—'}
                            </td>
                            {po.status !== 'draft' && (
                              <td data-label="Status">
                                <select value={item.status || 'pending'} disabled={poUpdating}
                                  onChange={e => updatePOItemStatus(po.id, item.id, e.target.value)}
                                  style={{ fontSize: '0.75rem', padding: '0.2rem 0.35rem', border: '1px solid var(--stone-300)', borderRadius: '4px', background: 'white' }}>
                                  {['pending', 'ordered', 'shipped', 'received', 'cancelled'].map(s => (
                                    <option key={s} value={s}>{s.charAt(0).toUpperCase() + s.slice(1)}</option>
                                  ))}
                                </select>
                              </td>
                            )}
                            {po.status !== 'draft' && (
                              <td data-label="EDI Status">
                                {item.edi_line_status === 'accepted' && (
                                  <span style={{ fontSize: '0.7rem', padding: '0.1rem 0.4rem', borderRadius: '9999px', background: '#dcfce7', color: '#166534', fontWeight: 600 }}>Accepted</span>
                                )}
                                {item.edi_line_status === 'backordered' && (
                                  <span style={{ fontSize: '0.7rem', padding: '0.1rem 0.4rem', borderRadius: '9999px', background: '#fef9c3', color: '#854d0e', fontWeight: 600 }}>Backordered</span>
                                )}
                                {item.edi_line_status === 'rejected' && (
                                  <span style={{ fontSize: '0.7rem', padding: '0.1rem 0.4rem', borderRadius: '9999px', background: '#fef2f2', color: '#991b1b', fontWeight: 600 }}>Rejected</span>
                                )}
                              </td>
                            )}
                            {po.status !== 'draft' && (
                              <td data-label="Dye Lot" style={{ fontSize: '0.8125rem' }}>{item.dye_lot || '—'}</td>
                            )}
                            {po.status !== 'draft' && (
                              <td data-label="Qty Shipped" style={{ fontSize: '0.8125rem' }}>
                                {item.qty_shipped != null ? (
                                  <span>{item.qty_shipped} / {item.qty}</span>
                                ) : '—'}
                              </td>
                            )}
                            <td data-label="Subtotal" style={{ textAlign: 'right', fontWeight: 500 }}>${parseFloat(item.subtotal).toFixed(2)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table></div>
                  <div style={{ textAlign: 'right', marginTop: '0.75rem', fontWeight: 600, fontSize: '0.9rem' }}>
                    PO Total: ${parseFloat(po.subtotal).toFixed(2)}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Order Activity */}
          <div className="form-card">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
              <h3 style={{ margin: 0 }}>Order Activity</h3>
              <button className="btn btn-secondary" style={{ fontSize: '0.75rem', padding: '0.3rem 0.75rem' }}
                onClick={loadOrderActivity}>{orderActivity ? 'Refresh' : 'Load Activity'}</button>
            </div>
            {orderActivity === null ? (
              <p style={{ fontSize: '0.8125rem', color: 'var(--stone-400)' }}>Click "Load Activity" to view order history</p>
            ) : orderActivity.length === 0 ? (
              <p style={{ fontSize: '0.8125rem', color: 'var(--stone-400)' }}>No activity recorded yet</p>
            ) : (
              <div>
                {orderActivity.map(entry => (
                  <div key={entry.id} style={{ fontSize: '0.8125rem', padding: '0.5rem 0', borderBottom: '1px solid var(--stone-100)', display: 'flex', justifyContent: 'space-between', gap: '1rem' }}>
                    <div>
                      <strong>{orderActionLabel(entry.action)}</strong>
                      <span style={{ color: 'var(--stone-500)', marginLeft: '0.5rem' }}>{orderActivityDetail(entry)}</span>
                      {entry.performer_name && <span style={{ color: 'var(--stone-400)', marginLeft: '0.5rem' }}>— {entry.performer_name}</span>}
                    </div>
                    <span style={{ color: 'var(--stone-400)', whiteSpace: 'nowrap', fontSize: '0.75rem' }}>{new Date(entry.created_at).toLocaleString()}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Order Totals */}
          <div className="form-card">
            <h3>Order Totals</h3>
            <div style={{ maxWidth: '350px', marginLeft: 'auto' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', fontSize: '0.875rem' }}>
                <span>Subtotal</span>
                <span>${parseFloat(order.subtotal).toFixed(2)}</span>
              </div>
              {order.delivery_method === 'pickup' ? (
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', fontSize: '0.875rem' }}>
                  <span>Shipping (Store Pickup)</span>
                  <span style={{ color: '#16a34a', fontWeight: 500 }}>FREE</span>
                </div>
              ) : parseFloat(order.shipping || 0) > 0 ? (
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', fontSize: '0.875rem' }}>
                  <span>Shipping</span>
                  <span>${parseFloat(order.shipping).toFixed(2)}</span>
                </div>
              ) : null}
              {parseFloat(order.sample_shipping || 0) > 0 && (
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', fontSize: '0.875rem' }}>
                  <span>Sample Shipping</span>
                  <span>${parseFloat(order.sample_shipping).toFixed(2)}</span>
                </div>
              )}
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.75rem 0', fontSize: '1.1rem', fontWeight: 600, borderTop: '2px solid var(--stone-200)' }}>
                <span>Total</span>
                <span>${parseFloat(order.total).toFixed(2)}</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0.5rem 0', fontSize: '0.875rem', color: 'var(--stone-500)' }}>
                <span>Amount Paid</span>
                <span>${parseFloat(order.amount_paid || 0).toFixed(2)}</span>
              </div>
              {balanceInfo && balanceInfo.balance_status === 'paid' && (
                <div style={{ padding: '0.5rem 0.75rem', background: '#dcfce7', color: '#166534', fontSize: '0.8125rem', fontWeight: 500, textAlign: 'center', marginTop: '0.5rem' }}>
                  Paid in Full
                </div>
              )}
              {balanceInfo && balanceInfo.balance_status === 'credit' && (
                <div style={{ padding: '0.5rem 0.75rem', background: '#dbeafe', color: '#1e40af', fontSize: '0.8125rem', fontWeight: 500, textAlign: 'center', marginTop: '0.5rem' }}>
                  Credit Available: ${Math.abs(balanceInfo.balance).toFixed(2)}
                </div>
              )}
              {balanceInfo && balanceInfo.balance_status === 'balance_due' && (
                <div style={{ padding: '0.5rem 0.75rem', background: '#fef3c7', color: '#92400e', fontSize: '0.8125rem', fontWeight: 500, textAlign: 'center', marginTop: '0.5rem' }}>
                  Balance Due: ${balanceInfo.balance.toFixed(2)}
                </div>
              )}
              {balanceInfo && balanceInfo.balance_status === 'balance_due' && (
                <div style={{ display: 'flex', gap: '0.5rem', justifyContent: 'flex-end', marginTop: '0.75rem', flexWrap: 'wrap' }}>
                  <button className="btn btn-sm" style={{ background: 'var(--stone-800)', color: '#fff' }}
                    onClick={() => { if (!showCollectPayment && balanceInfo) setCollectAmount(balanceInfo.balance.toFixed(2)); setShowCollectPayment(!showCollectPayment); setCollectMethod(null); }}>
                    {showCollectPayment ? 'Cancel' : 'Collect Payment'}
                  </button>
                  <button className="btn btn-sm" style={{ background: '#fef3c7', color: '#92400e' }}
                    onClick={() => { setPaymentRequestMessage(''); setShowPaymentRequestModal(true); }}>
                    Send Payment Request
                  </button>
                </div>
              )}
              {showCollectPayment && balanceInfo && balanceInfo.balance_status === 'balance_due' && (
                <div style={{ marginTop: '0.75rem', padding: '1rem', background: 'var(--stone-50)', border: '1px solid var(--stone-200)', borderRadius: '8px' }}>
                  <div style={{ marginBottom: '0.75rem' }}>
                    <label style={{ fontSize: '0.8125rem', fontWeight: 600, display: 'block', marginBottom: '0.375rem' }}>Payment Amount</label>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                      <span style={{ fontSize: '1rem', fontWeight: 600, color: 'var(--stone-700)' }}>$</span>
                      <input type="number" min="0.01" max={balanceInfo.balance} step="0.01"
                        value={collectAmount}
                        onChange={e => setCollectAmount(e.target.value)}
                        style={{ flex: 1, padding: '0.5rem 0.75rem', border: '1px solid var(--stone-300)', borderRadius: '6px', fontSize: '0.9375rem', fontWeight: 600 }}
                      />
                      <span style={{ fontSize: '0.75rem', color: 'var(--stone-500)', whiteSpace: 'nowrap' }}>of ${balanceInfo.balance.toFixed(2)}</span>
                    </div>
                    {parseFloat(collectAmount) > 0 && parseFloat(collectAmount) < balanceInfo.balance && (
                      <div style={{ fontSize: '0.75rem', color: '#92400e', marginTop: '0.375rem' }}>
                        Remaining after: ${(balanceInfo.balance - parseFloat(collectAmount)).toFixed(2)}
                      </div>
                    )}
                    {(parseFloat(collectAmount) <= 0 || parseFloat(collectAmount) > balanceInfo.balance || isNaN(parseFloat(collectAmount))) && collectAmount !== '' && (
                      <div style={{ fontSize: '0.75rem', color: '#dc2626', marginTop: '0.375rem' }}>
                        Amount must be between $0.01 and ${balanceInfo.balance.toFixed(2)}
                      </div>
                    )}
                  </div>
                  <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.75rem' }}>
                    {['card', 'cash', 'check'].map(m => (
                      <button key={m} className="btn btn-sm"
                        style={{ background: collectMethod === m ? 'var(--stone-800)' : '#fff', color: collectMethod === m ? '#fff' : 'var(--stone-700)', border: '1px solid var(--stone-300)', flex: 1 }}
                        onClick={() => setCollectMethod(m)}>
                        {m === 'card' ? 'Card' : m === 'cash' ? 'Cash' : 'Check'}
                      </button>
                    ))}
                  </div>
                  {collectMethod === 'card' && (
                    <div style={{ fontSize: '0.8125rem', color: 'var(--stone-600)', marginBottom: '0.75rem' }}>
                      {terminalStatus === 'connected'
                        ? '✓ Tap to Pay terminal connected'
                        : terminalStatus === 'connecting'
                        ? 'Connecting to terminal...'
                        : 'Terminal offline — manual card entry available'}
                    </div>
                  )}
                  {collectMethod === 'cash' && collectCashDrawerOpen === false && (
                    <div style={{ padding: '0.5rem 0.75rem', background: '#fef3c7', border: '1px solid #f59e0b', borderRadius: '6px', fontSize: '0.8125rem', color: '#92400e', marginBottom: '0.75rem' }}>
                      No cash drawer open. Open one from the Cash Drawer tab first.
                    </div>
                  )}
                  {collectMethod === 'check' && (
                    <div style={{ marginBottom: '0.75rem' }}>
                      <label style={{ fontSize: '0.8125rem', fontWeight: 500, display: 'block', marginBottom: '0.25rem' }}>Check Number *</label>
                      <input type="text" value={collectCheckNumber} onChange={e => setCollectCheckNumber(e.target.value)}
                        placeholder="Enter check number" style={{ width: '100%', padding: '0.6rem 0.75rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                    </div>
                  )}
                  {collectMethod && (() => {
                    const amt = parseFloat(collectAmount);
                    const validAmt = !isNaN(amt) && amt > 0 && amt <= balanceInfo.balance;
                    const amtLabel = validAmt ? ' — $' + amt.toFixed(2) : '';
                    return (
                    <button className="btn" style={{ width: '100%', background: 'var(--stone-800)', color: '#fff' }}
                      disabled={collectSaving || !validAmt || (collectMethod === 'cash' && collectCashDrawerOpen === false) || (collectMethod === 'check' && !collectCheckNumber.trim())}
                      onClick={() => {
                        if (collectMethod === 'card') handleCollectCard();
                        else if (collectMethod === 'cash') collectPayment('cash', null);
                        else if (collectMethod === 'check') collectPayment('check', null);
                      }}>
                      {collectSaving ? 'Processing...' : collectMethod === 'card' ? 'Pay with Card' + amtLabel : collectMethod === 'cash' ? 'Record Cash Payment' + amtLabel : 'Record Check Payment' + amtLabel}
                    </button>
                    );
                  })()}
                </div>
              )}
            </div>
          </div>

          {payments.length > 0 && (
            <div className="form-card">
              <h3>Payment History</h3>
              <div className="table-scroll-wrapper"><table className="rep-table" style={{ fontSize: '0.8125rem' }}>
                <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th><th>By</th></tr></thead>
                <tbody>
                  {payments.map(p => (
                    <tr key={p.id}>
                      <td data-label="Date">{new Date(p.created_at).toLocaleDateString()}</td>
                      <td data-label="Type">
                        <span style={{ display: 'inline-block', padding: '2px 8px', fontSize: '0.6875rem', fontWeight: 600, background: p.payment_type === 'refund' ? '#fee2e2' : '#dcfce7', color: p.payment_type === 'refund' ? '#991b1b' : '#166534' }}>
                          {p.payment_type === 'charge' ? 'Charge' : p.payment_type === 'refund' ? 'Refund' : 'Additional'}
                        </span>
                      </td>
                      <td data-label="Amount" style={{ color: parseFloat(p.amount) < 0 ? '#dc2626' : '#16a34a', fontWeight: 500 }}>
                        {parseFloat(p.amount) < 0 ? '-' : '+'}${Math.abs(parseFloat(p.amount)).toFixed(2)}
                      </td>
                      <td data-label="Description">{p.description || '—'}</td>
                      <td data-label="By">{p.initiated_by_name || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
            </div>
          )}

          {paymentRequests.length > 0 && (
            <div className="form-card">
              <h3>Payment Requests</h3>
              <div className="table-scroll-wrapper"><table className="rep-table" style={{ fontSize: '0.8125rem' }}>
                <thead><tr><th>Date</th><th>Amount</th><th>Sent To</th><th>Status</th></tr></thead>
                <tbody>
                  {paymentRequests.map(pr => (
                    <tr key={pr.id}>
                      <td data-label="Date">{new Date(pr.created_at).toLocaleDateString()}</td>
                      <td data-label="Amount">${parseFloat(pr.amount).toFixed(2)}</td>
                      <td data-label="Sent To">{pr.sent_to_email}</td>
                      <td data-label="Status">
                        <span style={{ display: 'inline-block', padding: '2px 8px', fontSize: '0.6875rem', fontWeight: 600,
                          background: pr.status === 'paid' ? '#dcfce7' : pr.status === 'pending' ? '#dbeafe' : '#fee2e2',
                          color: pr.status === 'paid' ? '#166534' : pr.status === 'pending' ? '#1e40af' : '#991b1b' }}>
                          {pr.status}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
            </div>
          )}

          {showPaymentRequestModal && (
            <div className="modal-overlay" onClick={() => setShowPaymentRequestModal(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>Send Payment Request</h3>
              <p>Send a payment link for <strong>${balanceInfo ? balanceInfo.balance.toFixed(2) : '0.00'}</strong> to <strong>{order.customer_email}</strong>.</p>
              <div style={{ marginBottom: '1rem' }}>
                <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Message to Customer (optional)</label>
                <textarea value={paymentRequestMessage} onChange={e => setPaymentRequestMessage(e.target.value)}
                  placeholder="e.g. Additional items were added to your order..."
                  rows={3} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-200)', resize: 'vertical' }} />
              </div>
              <div className="modal-actions">
                <button className="btn btn-secondary" onClick={() => setShowPaymentRequestModal(false)} disabled={updating}>Cancel</button>
                <button className="btn" style={{ background: '#fef3c7', color: '#92400e' }} disabled={updating}
                  onClick={async () => {
                    setUpdating(true);
                    try {
                      await repFetch('/api/rep/orders/' + editId + '/payment-request', {
                        method: 'POST', body: JSON.stringify({ message: paymentRequestMessage || undefined })
                      });
                      setShowPaymentRequestModal(false);
                      alert('Payment request sent to ' + order.customer_email);
                      const refreshed = await repFetch('/api/rep/orders/' + editId);
                      setPaymentRequests(refreshed.payment_requests || []);
                    } catch (err) { alert(err.message); }
                    setUpdating(false);
                  }}>
                  {updating ? 'Sending...' : 'Send Payment Request'}
                </button>
                </div>
              </div>
            </div>
          )}

          {showSendInvoiceModal && (
            <div className="modal-overlay" onClick={() => !sendingInvoice && setShowSendInvoiceModal(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>Email Invoice</h3>
                <p style={{ fontSize: '0.875rem', color: 'var(--stone-600)', margin: '0 0 1rem' }}>
                  Send invoice for <strong>{order.order_number}</strong> to <strong>{order.customer_email}</strong>.
                  {balanceInfo && balanceInfo.balance > 0.01 && (
                    <span style={{ display: 'block', marginTop: '0.5rem', padding: '0.5rem 0.75rem', background: '#fefce8', border: '1px solid #fde68a', color: '#92400e', fontSize: '0.8125rem' }}>
                      Balance due of <strong>${balanceInfo.balance.toFixed(2)}</strong> — a payment link will be included.
                    </span>
                  )}
                </p>
                <div style={{ marginBottom: '1rem' }}>
                  <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Message to Customer (optional)</label>
                  <textarea value={invoiceMessage} onChange={e => setInvoiceMessage(e.target.value)}
                    placeholder="e.g. Here is the invoice for your recent order..."
                    rows={3} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-200)', fontSize: '0.8125rem', resize: 'vertical' }} />
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowSendInvoiceModal(false)} disabled={sendingInvoice}>Cancel</button>
                  <button className="btn btn-primary" disabled={sendingInvoice}
                    onClick={async () => {
                      setSendingInvoice(true);
                      try {
                        const data = await repFetch('/api/rep/orders/' + editId + '/send-invoice', {
                          method: 'POST', body: JSON.stringify({ message: invoiceMessage || undefined })
                        });
                        setShowSendInvoiceModal(false);
                        const msg = data.payment_requested
                          ? 'Invoice with payment request sent to ' + data.sent_to
                          : 'Invoice sent to ' + data.sent_to;
                        alert(msg);
                        // Refresh payment requests if payment was included
                        if (data.payment_requested) {
                          const refreshed = await repFetch('/api/rep/orders/' + editId);
                          setPaymentRequests(refreshed.payment_requests || []);
                          setBalanceInfo(refreshed.balance || null);
                        }
                      } catch (err) { alert('Failed to send: ' + err.message); }
                      setSendingInvoice(false);
                    }}>
                    {sendingInvoice ? 'Sending...' : (balanceInfo && balanceInfo.balance > 0.01 ? 'Send Invoice & Payment Request' : 'Send Invoice')}
                  </button>
                </div>
              </div>
            </div>
          )}

          {showCollectTapModal && balanceInfo && (
            <TapToPayModal
              amount={parseFloat(collectAmount)}
              terminal={terminalRef.current}
              onSuccess={(piId) => { setShowCollectTapModal(false); collectPayment('card', piId); }}
              onCancel={() => setShowCollectTapModal(false)}
            />
          )}
          {showCollectCardChoice && balanceInfo && (
            <CardMethodChoiceModal
              amount={parseFloat(collectAmount)}
              terminalConnected={terminalStatus === 'connected'}
              onTap={() => {
                setShowCollectCardChoice(false);
                if (terminalStatus !== 'connected') {
                  const confirmed = window.confirm('Terminal not connected. Connect now?');
                  if (confirmed) connectReader();
                  return;
                }
                setShowCollectTapModal(true);
              }}
              onManual={() => { setShowCollectCardChoice(false); setShowCollectManualCard(true); }}
              onCancel={() => setShowCollectCardChoice(false)}
            />
          )}
          {showCollectManualCard && balanceInfo && (
            <ManualCardEntryModal
              amount={parseFloat(collectAmount)}
              onSuccess={(piId) => { setShowCollectManualCard(false); collectPayment('card', piId); }}
              onCancel={() => setShowCollectManualCard(false)}
            />
          )}
          {docPreview && <DocumentPreviewModal url={docPreview.url} title={docPreview.title} onClose={() => setDocPreview(null)} />}
        </div>
      );
    }

    // ========== RepQuotesListView ==========
    function RepQuotesListView({ navigate }) {
      const [quotes, setQuotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [statusFilter, setStatusFilter] = useState('');

      const load = useCallback(() => {
        setLoading(true);
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (statusFilter) params.set('status', statusFilter);
        repFetch('/api/rep/quotes?' + params.toString())
          .then(data => { setQuotes(data.quotes || []); setLoading(false); })
          .catch(() => setLoading(false));
      }, [search, statusFilter]);

      useEffect(load, [load]);

      return (
        <div>
          <div className="content-header">
            <h1>Quotes</h1>
            <button className="btn btn-primary" onClick={() => navigate('quote-create')}>New Quote</button>
          </div>
          <div className="filter-bar">
            <input type="text" placeholder="Search name, email, quote#..." value={search} onChange={e => setSearch(e.target.value)} />
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              <option value="">All Statuses</option>
              <option value="draft">Draft</option>
              <option value="sent">Sent</option>
              <option value="accepted">Accepted</option>
              <option value="converted">Converted</option>
              <option value="expired">Expired</option>
              <option value="declined">Declined</option>
            </select>
            <span className="filter-count">{quotes.length} quote{quotes.length !== 1 ? 's' : ''}</span>
          </div>
          {loading ? <div className="loading">Loading quotes...</div> : (
            <div className="table-scroll-wrapper"><table className="rep-table">
              <thead>
                <tr>
                  <th>Quote #</th>
                  <th>Customer</th>
                  <th>Email</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {quotes.map(q => (
                  <tr key={q.id}>
                    <td data-label="Quote #" style={{ fontWeight: 500 }}>{q.quote_number}</td>
                    <td data-label="Customer">{q.customer_name}</td>
                    <td data-label="Email" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{q.customer_email}</td>
                    <td data-label="Items">{q.item_count}</td>
                    <td data-label="Total">${parseFloat(q.total).toFixed(2)}</td>
                    <td data-label="Status"><span className={'badge badge-' + q.status}>{q.status}</span></td>
                    <td data-label="Created" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{new Date(q.created_at).toLocaleDateString()}</td>
                    <td data-label="" className="actions">
                      <button className="btn btn-secondary btn-sm" onClick={() => navigate('quote-edit', q.id)}>
                        {q.status === 'draft' ? 'Edit' : 'View'}
                      </button>
                    </td>
                  </tr>
                ))}
                {quotes.length === 0 && (
                  <tr><td colSpan="8" style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem' }}>No quotes found</td></tr>
                )}
              </tbody>
            </table></div>
          )}
        </div>
      );
    }

    // ========== RepQuoteFormView ==========
    function RepQuoteFormView({ navigate, editId, terminalRef, terminalStatus, connectReader }) {
      const [quote, setQuote] = useState(null);
      const [quoteItems, setQuoteItems] = useState([]);
      const [loading, setLoading] = useState(!!editId);
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        customer_name: '', customer_email: '', phone: '',
        shipping_address_line1: '', shipping_address_line2: '',
        shipping_city: '', shipping_state: '', shipping_zip: '', notes: '',
        delivery_method: 'shipping'
      });

      // Customer search
      const [customerSearch, setCustomerSearch] = useState('');
      const [customerResults, setCustomerResults] = useState([]);
      const [customerSearching, setCustomerSearching] = useState(false);
      const [selectedCustomer, setSelectedCustomer] = useState(null);
      const [customerMatch, setCustomerMatch] = useState(null);
      const [customerMode, setCustomerMode] = useState('search');
      const customerSearchTimer = useRef(null);
      const [emailError, setEmailError] = useState('');
      const [phoneError, setPhoneError] = useState('');

      // Product search
      const [productSearch, setProductSearch] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [showResults, setShowResults] = useState(false);
      const searchTimeout = useRef(null);

      // Custom item form
      const [showCustomForm, setShowCustomForm] = useState(false);
      const [customItem, setCustomItem] = useState({ product_name: '', description: '', num_boxes: 1, unit_price: '', sqft_needed: '', sell_by: 'sqft' });

      // Convert modal
      const [showConvertModal, setShowConvertModal] = useState(false);
      const [convertMethod, setConvertMethod] = useState('card');
      const [convertCheckNumber, setConvertCheckNumber] = useState('');
      const [convertCashDrawerOpen, setConvertCashDrawerOpen] = useState(null);
      const [showConvertTapModal, setShowConvertTapModal] = useState(false);
      const [showConvertCardChoice, setShowConvertCardChoice] = useState(false);
      const [showConvertManualCard, setShowConvertManualCard] = useState(false);
      const [showConvertAchModal, setShowConvertAchModal] = useState(false);

      // Email preview modal
      const [showPreview, setShowPreview] = useState(false);
      const [previewHtml, setPreviewHtml] = useState('');
      const [previewMeta, setPreviewMeta] = useState(null);
      const [previewLoading, setPreviewLoading] = useState(false);
      const [sendFeedback, setSendFeedback] = useState(null);

      // Promo code
      const [promoCode, setPromoCode] = useState('');
      const [promoResult, setPromoResult] = useState(null);
      const [promoLoading, setPromoLoading] = useState(false);
      const [promoError, setPromoError] = useState('');

      // Address autofill (must be before early returns to satisfy React hooks rules)
      const quoteIsReadonly = quote && !['draft', 'sent'].includes(quote.status);
      const { addressInputRef: quoteAddrRef, previousAddresses: quotePrevAddrs, showPrevAddresses: showQuotePrevAddrs, setShowPrevAddresses: setShowQuotePrevAddrs, selectPreviousAddress: selectQuotePrevAddr } = useAddressAutofill({
        fieldMap: { line1: 'shipping_address_line1', line2: 'shipping_address_line2', city: 'shipping_city', state: 'shipping_state', zip: 'shipping_zip' },
        setForm, selectedCustomer, isReadonly: !!quoteIsReadonly
      });

      useEffect(() => {
        if (!editId) return;
        repFetch('/api/rep/quotes/' + editId)
          .then(data => {
            setQuote(data.quote);
            setQuoteItems(data.items || []);
            setForm({
              customer_name: data.quote.customer_name || '',
              customer_email: data.quote.customer_email || '',
              phone: data.quote.phone || '',
              shipping_address_line1: data.quote.shipping_address_line1 || '',
              shipping_address_line2: data.quote.shipping_address_line2 || '',
              shipping_city: data.quote.shipping_city || '',
              shipping_state: data.quote.shipping_state || '',
              shipping_zip: data.quote.shipping_zip || '',
              notes: data.quote.notes || '',
              delivery_method: data.quote.delivery_method || 'shipping'
            });
            if (data.quote.promo_code) {
              setPromoCode(data.quote.promo_code);
              setPromoResult({
                code: data.quote.promo_code,
                discount_amount: parseFloat(data.quote.discount_amount || 0)
              });
            }
            setCustomerMode('new');
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [editId]);

      useEffect(() => {
        repFetch('/api/rep/cash-drawer/current').then(d => setConvertCashDrawerOpen(!!d.drawer)).catch(() => setConvertCashDrawerOpen(false));
      }, []);

      const searchCustomers = (q) => {
        setCustomerSearch(q);
        if (customerSearchTimer.current) clearTimeout(customerSearchTimer.current);
        if (q.trim().length < 2) { setCustomerResults([]); setCustomerSearching(false); return; }
        setCustomerSearching(true);
        customerSearchTimer.current = setTimeout(async () => {
          try {
            const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(q.trim()));
            setCustomerResults(data.results || []);
          } catch (e) { setCustomerResults([]); }
          setCustomerSearching(false);
        }, 300);
      };

      const selectCustomer = (c) => {
        setSelectedCustomer(c);
        setForm(f => ({
          ...f,
          customer_name: c.name || '',
          customer_email: c.email || '',
          phone: c.phone || '',
          shipping_address_line1: c.address_line1 || f.shipping_address_line1,
          shipping_address_line2: c.address_line2 || f.shipping_address_line2,
          shipping_city: c.city || f.shipping_city,
          shipping_state: c.state || f.shipping_state,
          shipping_zip: c.zip || f.shipping_zip
        }));
        setCustomerSearch('');
        setCustomerResults([]);
        setCustomerMatch(null);
      };

      const clearCustomer = () => {
        setSelectedCustomer(null);
        setForm(f => ({ ...f, customer_name: '', customer_email: '', phone: '' }));
        setCustomerMatch(null);
        setEmailError('');
        setPhoneError('');
      };

      const checkCustomerMatch = async (field) => {
        if (selectedCustomer) return;
        const val = field === 'email' ? form.customer_email : form.phone;
        if (!val || val.trim().length < 3) { setCustomerMatch(null); return; }
        try {
          const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(val));
          if (data.results && data.results.length > 0) {
            setCustomerMatch(data.results[0]);
          } else {
            setCustomerMatch(null);
          }
        } catch (e) { setCustomerMatch(null); }
      };

      const handleProductSearch = (term) => {
        setProductSearch(term);
        if (searchTimeout.current) clearTimeout(searchTimeout.current);
        if (term.length < 2) { setSearchResults([]); setShowResults(false); return; }
        setShowResults(true);
        searchTimeout.current = setTimeout(async () => {
          try {
            const data = await repFetch('/api/rep/skus/search?q=' + encodeURIComponent(term));
            setSearchResults((data.results || []).map(r => ({
              sku_id: r.sku_id,
              product_name: r.product_name,
              collection: r.collection,
              variant_name: r.variant_name,
              color: r.color,
              vendor_name: r.vendor_name,
              vendor_sku: r.vendor_sku,
              internal_sku: r.internal_sku,
              price: r.retail_price,
              sqft_per_box: r.sqft_per_box,
              sell_by: r.sell_by || 'sqft',
              vendor_id: r.vendor_id,
              price_basis: r.price_basis || 'per_sqft',
              cut_price: r.cut_price,
              roll_price: r.roll_price,
              roll_width_ft: r.roll_width_ft,
              primary_image: r.primary_image || null
            })));
          } catch (e) { setSearchResults([]); }
          setShowResults(true);
        }, 300);
      };

      const addProductToQuote = async (sku) => {
        setShowResults(false);
        setProductSearch('');

        const isCarpet = sku.price_basis === 'per_sqyd';
        const price = parseFloat(isCarpet ? (sku.cut_price || sku.price || 0) : (sku.price || 0));
        const sqftPerBox = parseFloat(sku.sqft_per_box || 0);
        const sellBy = isCarpet ? 'sqyd' : (sku.sell_by || 'sqft');
        const descParts = [sku.color, sku.variant_name && sku.variant_name !== sku.color ? sku.variant_name : null].filter(Boolean).join(' · ');
        const productName = sku.collection
          ? (descParts ? sku.collection + ' — ' + descParts : sku.collection)
          : sku.product_name;

        // Carpet: default 1 sqyd worth, subtotal = price × (sqft / 9)
        const defaultSqft = isCarpet ? 9 : (sqftPerBox || 0);
        const subtotal = isCarpet ? price : (sellBy === 'unit' ? price : price * defaultSqft);

        const newItem = {
          sku_id: sku.sku_id,
          product_name: productName,
          collection: sku.collection || '',
          sqft_needed: defaultSqft,
          num_boxes: 1,
          unit_price: price.toFixed(2),
          subtotal: subtotal.toFixed(2),
          is_sample: false,
          sell_by: sellBy,
          _sqft_per_box: sqftPerBox
        };

        if (editId) {
          // Save directly via API
          const result = await repFetch('/api/rep/quotes/' + editId + '/items', {
            method: 'POST',
            body: JSON.stringify(newItem)
          });
          if (result.item) {
            result.item._sqft_per_box = sqftPerBox;
            setQuoteItems(prev => [...prev, result.item]);
            // Refresh quote for totals
            const qData = await repFetch('/api/rep/quotes/' + editId);
            setQuote(qData.quote);
          }
        } else {
          setQuoteItems(prev => [...prev, { ...newItem, _temp_id: Date.now() }]);
        }
      };

      const addCustomItemToQuote = async () => {
        if (!customItem.product_name || !customItem.unit_price) return;
        const price = parseFloat(customItem.unit_price) || 0;
        const qty = parseInt(customItem.num_boxes) || 1;
        const newItem = {
          product_id: null,
          sku_id: null,
          product_name: customItem.product_name,
          collection: '',
          description: customItem.description || '',
          sqft_needed: customItem.sqft_needed ? parseFloat(customItem.sqft_needed) : null,
          num_boxes: qty,
          unit_price: price.toFixed(2),
          subtotal: (price * qty).toFixed(2),
          sell_by: customItem.sell_by || 'sqft',
          is_sample: false,
          _is_custom: true
        };

        if (editId) {
          const result = await repFetch('/api/rep/quotes/' + editId + '/items', {
            method: 'POST',
            body: JSON.stringify(newItem)
          });
          if (result.item) {
            result.item._is_custom = true;
            setQuoteItems(prev => [...prev, result.item]);
            const qData = await repFetch('/api/rep/quotes/' + editId);
            setQuote(qData.quote);
          }
        } else {
          setQuoteItems(prev => [...prev, { ...newItem, _temp_id: Date.now() }]);
        }

        setCustomItem({ product_name: '', description: '', num_boxes: 1, unit_price: '', sqft_needed: '', sell_by: 'sqft' });
        setShowCustomForm(false);
      };

      const updateItemLocal = (index, field, value) => {
        setQuoteItems(prev => {
          const updated = [...prev];
          const item = { ...updated[index] };
          item[field] = value;

          // Recalculate subtotal
          if (field === 'num_boxes' || field === 'unit_price' || field === 'sqft_needed') {
            const price = field === 'unit_price' ? parseFloat(value) || 0 : parseFloat(item.unit_price) || 0;
            if (item.sell_by === 'sqyd') {
              // Carpet: sqft_needed is the qty, subtotal = price × (sqft / 9)
              const sqft = field === 'sqft_needed' ? parseFloat(value) || 0 : parseFloat(item.sqft_needed) || 0;
              item.sqft_needed = sqft;
              item.subtotal = (price * (sqft / 9)).toFixed(2);
            } else {
              const boxes = field === 'num_boxes' ? parseInt(value) || 0 : parseInt(item.num_boxes) || 0;
              item.subtotal = (price * boxes).toFixed(2);
              if (field === 'num_boxes' && item._sqft_per_box) {
                item.sqft_needed = (boxes * parseFloat(item._sqft_per_box)).toFixed(2);
              }
            }
          }
          updated[index] = item;
          return updated;
        });
      };

      const saveItemEdit = async (item, index) => {
        if (editId && item.id) {
          await repFetch('/api/rep/quotes/' + editId + '/items/' + item.id, {
            method: 'PUT',
            body: JSON.stringify({
              num_boxes: item.num_boxes,
              unit_price: item.unit_price,
              sqft_needed: item.sqft_needed,
              subtotal: item.subtotal,
              product_name: item.product_name,
              collection: item.collection,
              description: item.description,
              sell_by: item.sell_by
            })
          });
          const qData = await repFetch('/api/rep/quotes/' + editId);
          setQuote(qData.quote);
        }
      };

      const removeItem = async (item, index) => {
        if (editId && item.id) {
          await repFetch('/api/rep/quotes/' + editId + '/items/' + item.id, { method: 'DELETE' });
          const qData = await repFetch('/api/rep/quotes/' + editId);
          setQuote(qData.quote);
        }
        setQuoteItems(prev => prev.filter((_, i) => i !== index));
      };

      const applyRepPromo = () => {
        const code = promoCode.trim();
        if (!code) return;
        setPromoLoading(true);
        setPromoError('');
        const items = quoteItems.map(i => ({
          product_id: i.product_id,
          subtotal: i.subtotal,
          is_sample: i.is_sample || false
        }));
        repFetch('/api/rep/promo-codes/validate', {
          method: 'POST',
          body: JSON.stringify({ code, items, customer_email: form.customer_email })
        })
          .then(data => {
            if (data.valid) {
              setPromoResult(data);
              setPromoError('');
              setPromoCode(data.code);
            } else {
              setPromoResult(null);
              setPromoError(data.error || 'Invalid promo code');
            }
            setPromoLoading(false);
          })
          .catch(() => { setPromoError('Unable to validate'); setPromoLoading(false); });
      };

      const removeRepPromo = () => {
        setPromoResult(null);
        setPromoCode('');
        setPromoError('');
      };

      const saveQuote = async () => {
        setSaving(true);
        try {
          const promoPayload = promoResult ? promoResult.code : '';
          if (editId) {
            await repFetch('/api/rep/quotes/' + editId, {
              method: 'PUT',
              body: JSON.stringify({ ...form, promo_code: promoPayload })
            });
          } else {
            const itemsPayload = quoteItems.map(i => ({
              product_id: i.product_id,
              sku_id: i.sku_id,
              product_name: i.product_name,
              collection: i.collection,
              description: i.description,
              sqft_needed: i.sqft_needed,
              num_boxes: i.num_boxes,
              unit_price: i.unit_price,
              subtotal: i.subtotal,
              sell_by: i.sell_by,
              is_sample: i.is_sample
            }));
            const data = await repFetch('/api/rep/quotes', {
              method: 'POST',
              body: JSON.stringify({ ...form, items: itemsPayload, promo_code: promoPayload })
            });
            if (data.quote) {
              navigate('quote-edit', data.quote.id);
              return;
            }
          }
          // Reload
          if (editId) {
            const data = await repFetch('/api/rep/quotes/' + editId);
            setQuote(data.quote);
            setQuoteItems(data.items || []);
            if (data.quote.promo_code) {
              setPromoCode(data.quote.promo_code);
              setPromoResult({ code: data.quote.promo_code, discount_amount: parseFloat(data.quote.discount_amount || 0) });
            } else {
              setPromoResult(null);
              setPromoCode('');
            }
          }
        } catch (err) {}
        setSaving(false);
      };

      const openPreview = async () => {
        if (!editId) return;
        setPreviewLoading(true);
        setShowPreview(true);
        setPreviewHtml('');
        setPreviewMeta(null);
        try {
          const data = await repFetch('/api/rep/quotes/' + editId + '/preview');
          setPreviewHtml(data.html || '');
          setPreviewMeta({ to: data.to, subject: data.subject, reply_to: data.reply_to });
        } catch (err) {
          setPreviewHtml('<p style="padding:2rem;color:#dc2626;">Failed to load email preview.</p>');
        }
        setPreviewLoading(false);
      };

      const sendQuote = async () => {
        if (!editId) return;
        setShowPreview(false);
        setSaving(true);
        setSendFeedback(null);
        try {
          const result = await repFetch('/api/rep/quotes/' + editId + '/send', { method: 'POST' });
          const data = await repFetch('/api/rep/quotes/' + editId);
          setQuote(data.quote);
          setSendFeedback({ emailed: result.emailed, message: result.message });
          setTimeout(() => setSendFeedback(null), 6000);
        } catch (err) {}
        setSaving(false);
      };

      const convertQuoteWithPI = async (stripePaymentIntentId, documentIds) => {
        if (!editId) return;
        setSaving(true);
        try {
          const convertBody = { payment_method: convertMethod };
          if (stripePaymentIntentId) convertBody.stripe_payment_intent_id = stripePaymentIntentId;
          if (convertMethod === 'check' && convertCheckNumber) convertBody.check_number = convertCheckNumber;
          const data = await repFetch('/api/rep/quotes/' + editId + '/convert', {
            method: 'POST',
            body: JSON.stringify(convertBody)
          });
          if (data.order) {
            navigate('order-detail', data.order.id);
            return;
          }
        } catch (err) { alert(err.message); }
        setSaving(false);
        setShowConvertModal(false);
      };

      const convertQuote = async () => {
        if (!editId) return;
        if (convertMethod === 'cash' && !convertCashDrawerOpen) { alert('No cash drawer open'); return; }
        if (convertMethod === 'card') {
          setShowConvertModal(false);
          setShowConvertCardChoice(true);
          return;
        }
        convertQuoteWithPI(null);
      };

      if (loading) return <div className="loading">Loading quote...</div>;

      const isReadonly = quote && !['draft', 'sent'].includes(quote.status);
      const calcSubtotal = quoteItems.reduce((sum, i) => sum + parseFloat(i.subtotal || 0), 0);
      const qtyLabel = (sellBy) => sellBy === 'unit' ? 'units' : sellBy === 'piece' ? 'pcs' : sellBy === 'sqyd' ? 'sqft' : 'boxes';

      return (
        <div>
          <div className="content-header">
            <h1>{editId ? (quote ? 'Quote ' + quote.quote_number : 'Edit Quote') : 'New Quote'}</h1>
            <div style={{ display: 'flex', gap: '0.75rem' }}>
              {quote && quote.status === 'draft' && (
                <button className="btn btn-secondary" onClick={openPreview} disabled={saving}>Send to Customer</button>
              )}
              {quote && ['draft', 'sent', 'accepted'].includes(quote.status) && (
                <button className="btn btn-success" onClick={() => setShowConvertModal(true)} disabled={saving}>Convert to Order</button>
              )}
              <button className="btn btn-secondary" onClick={() => navigate('quotes')}>Back to Quotes</button>
            </div>
          </div>

          {quote && (
            <div style={{ marginBottom: '1.5rem' }}>
              <span className={'badge badge-' + quote.status} style={{ fontSize: '0.8125rem', padding: '0.35rem 0.85rem' }}>{quote.status}</span>
            </div>
          )}

          {/* Customer Info */}
          <div className="form-card">
            <h3>Customer Information</h3>

            {!isReadonly && (
              <div className="mobile-stack" style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
                <button className={customerMode === 'search' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                  onClick={() => { setCustomerMode('search'); setCustomerMatch(null); }}
                  style={{ fontSize: '0.8rem', padding: '0.35rem 0.75rem' }}>
                  Search Existing
                </button>
                <button className={customerMode === 'new' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                  onClick={() => { setCustomerMode('new'); setCustomerResults([]); setCustomerSearch(''); }}
                  style={{ fontSize: '0.8rem', padding: '0.35rem 0.75rem' }}>
                  + New Customer
                </button>
              </div>
            )}

            {!isReadonly && customerMode === 'search' && !selectedCustomer && (
              <div style={{ position: 'relative', marginBottom: '1rem' }}>
                <input type="text" value={customerSearch} onChange={e => searchCustomers(e.target.value)}
                  placeholder="Search customers by name, email, or phone..."
                  style={{ width: '100%', boxSizing: 'border-box' }} />
                {customerSearching && !customerResults.length && (
                  <div style={{ fontSize: '0.75rem', color: '#888', marginTop: '0.25rem' }}>Searching...</div>
                )}
                {!customerSearching && customerSearch.trim().length >= 2 && customerResults.length === 0 && (
                  <div style={{ fontSize: '0.75rem', color: '#999', marginTop: '0.25rem' }}>No customers found</div>
                )}
                {customerResults.length > 0 && (
                  <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: '#fff', border: '1px solid #ddd',
                    borderRadius: '6px', boxShadow: '0 4px 12px rgba(0,0,0,0.15)', zIndex: 1000, maxHeight: '280px', overflowY: 'auto' }}>
                    {customerResults.map((c, i) => (
                      <div key={c.id || i} onMouseDown={e => { e.preventDefault(); selectCustomer(c); }}
                        style={{ padding: '0.6rem 0.75rem', cursor: 'pointer', borderBottom: '1px solid #f0f0f0',
                          display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}
                        onMouseEnter={e => e.currentTarget.style.background = '#f7f5f2'}
                        onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: '0.875rem', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {c.name}{c.company_name ? ` — ${c.company_name}` : ''}
                          </div>
                          <div style={{ fontSize: '0.75rem', color: '#666', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {c.email}{c.phone ? ` · ${c.phone}` : ''}
                          </div>
                        </div>
                        <span style={{ fontSize: '0.65rem',
                          background: c.type === 'trade' ? '#e8d5b7' : c.type === 'order' ? '#d5dde8' : '#d5e8d4',
                          color: c.type === 'trade' ? '#8b6914' : c.type === 'order' ? '#2d4a6a' : '#2d6a2e',
                          padding: '0.15rem 0.5rem', borderRadius: '9999px', fontWeight: 600, textTransform: 'uppercase',
                          marginLeft: '0.5rem', flexShrink: 0 }}>
                          {c.type === 'order' ? 'prev order' : c.type}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {selectedCustomer && (
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1rem',
                background: '#f0f7f0', border: '1px solid #b8d4b8', borderRadius: '6px', padding: '0.5rem 0.75rem' }}>
                <span style={{ color: '#2d6a2e', fontSize: '1rem' }}>✓</span>
                <div style={{ flex: 1 }}>
                  <span style={{ fontWeight: 600, fontSize: '0.875rem' }}>{selectedCustomer.name}</span>
                  <span style={{ color: '#666', fontSize: '0.8rem', marginLeft: '0.5rem' }}>{selectedCustomer.email}</span>
                  {selectedCustomer.company_name && (

                      <button key={opt.value} type="button"
                        className={convertMethod === opt.value ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                        style={{ padding: '0.5rem 1rem', fontSize: '0.8125rem', flex: 1 }}
                        onClick={() => setConvertMethod(opt.value)}>
                        {opt.icon} {opt.label}
                      </button>
                    ))}
                  </div>
                  {convertMethod === 'check' && (
                    <div style={{ marginTop: '0.5rem' }}>
                      <label style={{ fontSize: '0.8125rem', fontWeight: 500, display: 'block', marginBottom: '0.25rem' }}>Check Number *</label>
                      <input type="text" value={convertCheckNumber || ''} onChange={e => setConvertCheckNumber(e.target.value)}
                        placeholder="Enter check number" style={{ width: '100%', padding: '0.6rem 0.75rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                    </div>
                  )}
                  {convertMethod === 'cash' && convertCashDrawerOpen === false && (
                    <div style={{ marginTop: '0.5rem', padding: '0.5rem 0.75rem', background: '#fef3c7', border: '1px solid #f59e0b', borderRadius: '6px', fontSize: '0.8125rem', color: '#92400e' }}>
                      No cash drawer open. Open one from the Cash Drawer tab first.
                    </div>
                  )}
                  {convertMethod === 'card' && (
                    <div style={{ marginTop: '0.5rem', padding: '0.5rem 0.75rem', background: '#eff6ff', border: '1px solid #93c5fd', borderRadius: '6px', fontSize: '0.8125rem', color: '#1e40af' }}>
                      Tap to pay or enter card details
                    </div>
                  )}
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowConvertModal(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={convertQuote}
                    disabled={saving || (convertMethod === 'cash' && !convertCashDrawerOpen) || (convertMethod === 'check' && !(convertCheckNumber || '').trim())}>
                    {saving ? 'Converting...' : convertMethod === 'card' ? 'Pay with Card' : 'Convert to Order'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {showConvertTapModal && (
            <TapToPayModal
              amount={parseFloat(quote.total || 0)}
              terminal={terminalRef.current}
              onSuccess={(piId) => { setShowConvertTapModal(false); convertQuoteWithPI(piId); }}
              onCancel={() => setShowConvertTapModal(false)}
            />
          )}

          {showConvertCardChoice && (
            <CardMethodChoiceModal
              amount={parseFloat(quote.total || 0)}
              terminalConnected={terminalStatus === 'connected'}
              onTap={() => {
                setShowConvertCardChoice(false);
                if (terminalStatus !== 'connected') {
                  const confirmed = window.confirm('Terminal not connected. Connect now?');
                  if (confirmed) connectReader();
                  return;
                }
                setShowConvertTapModal(true);
              }}
              onManual={() => { setShowConvertCardChoice(false); setShowConvertManualCard(true); }}
              onCancel={() => setShowConvertCardChoice(false)}
            />
          )}

          {showConvertManualCard && (
            <ManualCardEntryModal
              amount={parseFloat(quote.total || 0)}
              onSuccess={(piId) => { setShowConvertManualCard(false); convertQuoteWithPI(piId); }}
              onCancel={() => setShowConvertManualCard(false)}
            />
          )}

          {showConvertAchModal && (
            <AchPaymentModal
              amount={parseFloat(quote.total || 0)}
              customerName={quote.customer_name}
              customerEmail={quote.customer_email}
              onSuccess={(piId, docIds) => { setShowConvertAchModal(false); convertQuoteWithPI(piId, docIds); }}
              onCancel={() => setShowConvertAchModal(false)}
            />
          )}
        </div>
      );
    }

          .then(data => { setEstimates(data.estimates || []); setLoading(false); })

                  <th>Project</th>
                  <th>Items</th>
                  <th>Materials</th>

                    <td data-label="Items">{e.item_count}</td>
                    <td data-label="Materials">${parseFloat(e.materials_subtotal || 0).toFixed(2)}</td>
                    <td data-label="Labor">${parseFloat(e.labor_subtotal || 0).toFixed(2)}</td>
                    <td data-label="Total" style={{ fontWeight: 500 }}>${parseFloat(e.total || 0).toFixed(2)}</td>

                        {e.status === 'draft' ? 'Edit' : 'View'}

                {estimates.length === 0 && (
                  <tr><td colSpan="10" style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem' }}>No estimates found</td></tr>
                )}

    // ========== RepEstimateFormView ==========
    function RepEstimateFormView({ navigate, editId }) {
      const [estimate, setEstimate] = useState(null);
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(!!editId);
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        customer_name: '', customer_email: '', phone: '',
        project_name: '',
        project_address_line1: '', project_address_line2: '',
        project_city: '', project_state: '', project_zip: '',
        notes: '', internal_notes: ''
      });

      // Customer search
      const [customerSearch, setCustomerSearch] = useState('');
      const [customerResults, setCustomerResults] = useState([]);
      const [customerSearching, setCustomerSearching] = useState(false);
      const [selectedCustomer, setSelectedCustomer] = useState(null);
      const [customerMatch, setCustomerMatch] = useState(null);
      const [customerMode, setCustomerMode] = useState('search');
      const customerSearchTimer = useRef(null);

      // Product search
      const [productSearch, setProductSearch] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [showResults, setShowResults] = useState(false);
      const searchTimeout = useRef(null);

      // Labor form
      const [showLaborForm, setShowLaborForm] = useState(false);
      const [laborItem, setLaborItem] = useState({
        labor_category: 'installation', description: '', rate_type: 'per_sqft',
        rate_sqft: '', labor_sqft: '', unit_price: '', quantity: '1'
      });

      // Email preview
      const [showPreview, setShowPreview] = useState(false);
      const [previewHtml, setPreviewHtml] = useState('');
      const [previewMeta, setPreviewMeta] = useState(null);
      const [previewLoading, setPreviewLoading] = useState(false);
      const [sendFeedback, setSendFeedback] = useState(null);

      // Conversion modals
      const [showConvertQuoteModal, setShowConvertQuoteModal] = useState(false);
      const [showConvertOrderModal, setShowConvertOrderModal] = useState(false);
      const [convertMethod, setConvertMethod] = useState('cash');
      const [converting, setConverting] = useState(false);

      // Overage
      const [overageEnabled, setOverageEnabled] = useState(false);

      const isReadonly = estimate && !['draft', 'sent'].includes(estimate.status);

      // Address autofill
      const { addressInputRef: estAddrRef, previousAddresses: estPrevAddrs, showPrevAddresses: showEstPrevAddrs, setShowPrevAddresses: setShowEstPrevAddrs, selectPreviousAddress: selectEstPrevAddr } = useAddressAutofill({
        fieldMap: { line1: 'project_address_line1', line2: 'project_address_line2', city: 'project_city', state: 'project_state', zip: 'project_zip' },
        setForm, selectedCustomer, isReadonly: !!isReadonly
      });

      // Load existing estimate
      useEffect(() => {
        if (!editId) return;
        repFetch('/api/rep/estimates/' + editId)
          .then(data => {
            setEstimate(data.estimate);
            setItems(data.items || []);
            setForm({
              customer_name: data.estimate.customer_name || '',
              customer_email: data.estimate.customer_email || '',
              phone: data.estimate.phone || '',
              project_name: data.estimate.project_name || '',
              project_address_line1: data.estimate.project_address_line1 || '',
              project_address_line2: data.estimate.project_address_line2 || '',
              project_city: data.estimate.project_city || '',
              project_state: data.estimate.project_state || '',
              project_zip: data.estimate.project_zip || '',
              notes: data.estimate.notes || '',
              internal_notes: data.estimate.internal_notes || ''
            });
            setCustomerMode('new');
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [editId]);

      // Customer search
      const searchCustomers = (q) => {
        setCustomerSearch(q);
        if (customerSearchTimer.current) clearTimeout(customerSearchTimer.current);
        if (q.trim().length < 2) { setCustomerResults([]); setCustomerSearching(false); return; }
        setCustomerSearching(true);
        customerSearchTimer.current = setTimeout(async () => {
          try {
            const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(q.trim()));
            setCustomerResults(data.results || []);
          } catch (e) { setCustomerResults([]); }
          setCustomerSearching(false);
        }, 300);
      };

      const selectCustomer = (c) => {
        setSelectedCustomer(c);
        setForm(f => ({
          ...f,
          customer_name: c.name || '',
          customer_email: c.email || '',
          phone: c.phone || '',
          project_address_line1: c.address_line1 || f.project_address_line1,
          project_address_line2: c.address_line2 || f.project_address_line2,
          project_city: c.city || f.project_city,
          project_state: c.state || f.project_state,
          project_zip: c.zip || f.project_zip
        }));
        setCustomerSearch('');
        setCustomerResults([]);
        setCustomerMatch(null);
      };

      const clearCustomer = () => {
        setSelectedCustomer(null);
        setForm(f => ({ ...f, customer_name: '', customer_email: '', phone: '' }));
        setCustomerMatch(null);
      };

      const checkCustomerMatch = async (field) => {
        if (selectedCustomer) return;
        const val = field === 'email' ? form.customer_email : form.phone;
        if (!val || val.trim().length < 3) { setCustomerMatch(null); return; }
        try {
          const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(val));
          if (data.results && data.results.length > 0) setCustomerMatch(data.results[0]);
          else setCustomerMatch(null);
        } catch (e) { setCustomerMatch(null); }
      };

      // Save or create estimate
      const saveEstimate = async () => {
        if (!form.customer_name || !form.customer_email) return alert('Customer name and email are required.');
        setSaving(true);
        try {
          if (editId && estimate) {
            const data = await repFetch('/api/rep/estimates/' + editId, {
              method: 'PUT', body: JSON.stringify(form)
            });
            setEstimate(data.estimate);
          } else {
            const data = await repFetch('/api/rep/estimates', {
              method: 'POST', body: JSON.stringify(form)
            });
            setEstimate(data.estimate);
            setItems(data.items || []);
            navigate('estimate-edit', data.estimate.id);
          }
        } catch (err) {
          alert('Save failed: ' + err.message);
        }
        setSaving(false);
      };

      // Product search (SKU-level)
      const handleProductSearch = (term) => {
        setProductSearch(term);
        if (searchTimeout.current) clearTimeout(searchTimeout.current);
        if (term.length < 2) { setSearchResults([]); setShowResults(false); return; }
        setShowResults(true);
        searchTimeout.current = setTimeout(async () => {
          try {
            const data = await repFetch('/api/rep/skus/search?q=' + encodeURIComponent(term));
            setSearchResults((data.results || []).map(r => ({
              sku_id: r.sku_id,
              product_name: r.product_name,
              collection: r.collection,
              variant_name: r.variant_name,
              color: r.color,
              vendor_name: r.vendor_name,
              vendor_sku: r.vendor_sku,
              internal_sku: r.internal_sku,
              price: r.retail_price,
              sqft_per_box: r.sqft_per_box,
              sell_by: r.sell_by || 'sqft',
              vendor_id: r.vendor_id,
              price_basis: r.price_basis || 'per_sqft',
              cut_price: r.cut_price,
              roll_price: r.roll_price,
              roll_width_ft: r.roll_width_ft,
              primary_image: r.primary_image || null
            })));
          } catch (e) { setSearchResults([]); }
          setShowResults(true);
        }, 300);
      };

      const addProductToEstimate = async (sku) => {
        setShowResults(false);
        setProductSearch('');
        const isCarpet = sku.price_basis === 'per_sqyd';
        const price = parseFloat(isCarpet ? (sku.cut_price || sku.price || 0) : (sku.price || 0));
        const sqftPerBox = parseFloat(sku.sqft_per_box || 0);
        const sellBy = isCarpet ? 'sqyd' : (sku.sell_by || 'sqft');
        const descParts = [sku.color, sku.variant_name && sku.variant_name !== sku.color ? sku.variant_name : null].filter(Boolean).join(' · ');
        const productName = sku.collection
          ? (descParts ? sku.collection + ' — ' + descParts : sku.collection)
          : sku.product_name;
        const numBoxes = 1;
        const sqftNeeded = isCarpet ? 9 : (sqftPerBox || 0);
        const ovFactor = overageEnabled ? 1.10 : 1;
        const sub = isCarpet
          ? parseFloat((price * (sqftNeeded / 9) * ovFactor).toFixed(2))
          : sellBy === 'sqft' ? parseFloat((sqftNeeded * ovFactor * price).toFixed(2)) : parseFloat((numBoxes * price).toFixed(2));

        const newItem = {
          item_type: 'material',
          sku_id: sku.sku_id,
          product_name: productName,
          collection: sku.collection || '',
          sqft_needed: sqftNeeded,
          num_boxes: numBoxes,
          unit_price: price.toFixed(2),
          subtotal: sub.toFixed(2),
          sell_by: sellBy,
          _sqft_per_box: sqftPerBox
        };

        if (estimate) {
          const result = await repFetch('/api/rep/estimates/' + estimate.id + '/items', {
            method: 'POST', body: JSON.stringify(newItem)
          });
          if (result.item) {
            result.item._sqft_per_box = sqftPerBox;
            setItems(prev => [...prev, result.item]);
            if (result.estimate) setEstimate(result.estimate);
          }
        }
      };

      // Update material item
      // Local edits for material item inputs — prevents API from overwriting while typing
      const [localEdits, setLocalEdits] = useState({});

      const onMaterialChange = (item, field, value) => {
        setLocalEdits(prev => ({ ...prev, [item.id]: { ...(prev[item.id] || {}), [field]: value } }));
      };

      const getMaterialValue = (item, field) => {
        const local = localEdits[item.id];
        if (local && local[field] !== undefined) return local[field];
        return item[field];
      };

      const commitMaterialItem = async (item) => {
        const local = localEdits[item.id];
        if (!local || !estimate) return;

        const isUnit = item.sell_by === 'unit' || item.sell_by === 'piece';
        const isCarpet = item.sell_by === 'sqyd';
        const sqftPerBox = item._sqft_per_box || parseFloat(item.sqft_needed || 0) / Math.max(item.num_boxes || 1, 1);
        const merged = { ...item, ...local };
        const price = parseFloat(merged.unit_price || 0);
        const ovFactor = overageEnabled ? 1.10 : 1;
        const sqft = parseFloat(merged.sqft_needed || 0);
        const boxes = parseInt(merged.num_boxes || 1);

        if (isUnit) {
          // Unit items: qty × price, no sqft calc
          merged.subtotal = (boxes * price).toFixed(2);
          merged.sqft_needed = null;
        } else if (isCarpet) {
          // Carpet: price is per sqyd, user enters sqft, subtotal = price × (sqft / 9)
          merged.subtotal = (price * (sqft / 9) * ovFactor).toFixed(2);
          merged.num_boxes = 1;
        } else if (local.sqft_needed !== undefined) {
          if (sqftPerBox > 0) merged.num_boxes = Math.ceil((sqft * ovFactor) / sqftPerBox);
          merged.subtotal = (sqft * ovFactor * price).toFixed(2);
        } else if (local.num_boxes !== undefined) {
          if (sqftPerBox > 0) merged.sqft_needed = (boxes * sqftPerBox).toFixed(0);
          const newSqft = parseFloat(merged.sqft_needed || 0);
          merged.subtotal = newSqft > 0 ? (newSqft * ovFactor * price).toFixed(2) : (boxes * price).toFixed(2);
        } else {
          merged.subtotal = sqft > 0 ? (sqft * ovFactor * price).toFixed(2) : (boxes * price).toFixed(2);
        }

        const result = await repFetch('/api/rep/estimates/' + estimate.id + '/items/' + item.id, {
          method: 'PUT', body: JSON.stringify({
            sqft_needed: merged.sqft_needed, num_boxes: merged.num_boxes,
            unit_price: merged.unit_price, subtotal: merged.subtotal
          })
        });
        if (result.item) {
          result.item._sqft_per_box = sqftPerBox;
          setItems(prev => prev.map(i => i.id === item.id ? result.item : i));
          if (result.estimate) setEstimate(result.estimate);
        }
        setLocalEdits(prev => { const n = { ...prev }; delete n[item.id]; return n; });
      };

      // Delete item
      const deleteItem = async (itemId) => {
        if (!estimate) return;
        const result = await repFetch('/api/rep/estimates/' + estimate.id + '/items/' + itemId, { method: 'DELETE' });
        setItems(prev => prev.filter(i => i.id !== itemId));
        if (result.estimate) setEstimate(result.estimate);
      };

      // Add labor item
      const addLaborItem = async () => {
        if (!estimate) return;
        const li = laborItem;
        let unitPrice, qty, sub;
        if (li.rate_type === 'per_sqft') {
          unitPrice = parseFloat(li.rate_sqft || 0);
          qty = parseFloat(li.labor_sqft || 0);
          sub = parseFloat((unitPrice * qty).toFixed(2));
        } else {
          unitPrice = parseFloat(li.unit_price || 0);
          qty = parseFloat(li.quantity || 1);
          sub = parseFloat((unitPrice * qty).toFixed(2));
        }
        if (sub <= 0) return alert('Labor subtotal must be greater than zero.');

        const newItem = {
          item_type: 'labor',
          labor_category: li.labor_category,
          description: li.description,
          rate_type: li.rate_type,
          rate_sqft: li.rate_type === 'per_sqft' ? unitPrice : null,
          labor_sqft: li.rate_type === 'per_sqft' ? qty : null,
          unit_price: unitPrice.toFixed(2),
          quantity: qty,
          subtotal: sub.toFixed(2)
        };

        const result = await repFetch('/api/rep/estimates/' + estimate.id + '/items', {
          method: 'POST', body: JSON.stringify(newItem)
        });
        if (result.item) {
          setItems(prev => [...prev, result.item]);
          if (result.estimate) setEstimate(result.estimate);
        }
        setLaborItem({ labor_category: 'installation', description: '', rate_type: 'per_sqft', rate_sqft: '', labor_sqft: '', unit_price: '', quantity: '1' });
        setShowLaborForm(false);
      };

      // Send estimate
      const sendEstimate = async () => {
        if (!estimate) return;
        setSendFeedback(null);
        const result = await repFetch('/api/rep/estimates/' + estimate.id + '/send', { method: 'POST' });
        setEstimate(prev => ({ ...prev, status: 'sent' }));
        setSendFeedback(result.emailed ? 'Estimate emailed to ' + estimate.customer_email : 'Estimate marked as sent');
        setShowPreview(false);
      };

      // Preview
      const loadPreview = async () => {
        if (!estimate) return;
        setPreviewLoading(true);
        try {
          const data = await repFetch('/api/rep/estimates/' + estimate.id + '/preview');
          setPreviewHtml(data.html);
          setPreviewMeta(data);
          setShowPreview(true);
        } catch (e) {}
        setPreviewLoading(false);
      };

      // Convert to quote
      const convertToQuote = async () => {
        if (!estimate) return;
        setConverting(true);
        try {
          const data = await repFetch('/api/rep/estimates/' + estimate.id + '/convert-to-quote', { method: 'POST' });
          if (data.quote) navigate('quote-edit', data.quote.id);
        } catch (err) {
          alert('Conversion failed: ' + err.message);
        }
        setConverting(false);
      };

      // Convert to order
      const convertToOrder = async () => {
        if (!estimate) return;
        setConverting(true);
        try {
          const data = await repFetch('/api/rep/estimates/' + estimate.id + '/convert-to-order', {
            method: 'POST', body: JSON.stringify({ payment_method: convertMethod })
          });
          if (data.order) navigate('order-detail', data.order.id);
        } catch (err) {
          alert('Conversion failed: ' + err.message);
        }
        setConverting(false);
      };

      // Delete estimate
      const deleteEstimate = async () => {
        if (!estimate || estimate.status !== 'draft') return;
        if (!confirm('Delete this draft estimate?')) return;
        await repFetch('/api/rep/estimates/' + estimate.id, { method: 'DELETE' });
        navigate('estimates');
      };

      const materialItems = items.filter(i => i.item_type === 'material');
      const laborItems = items.filter(i => i.item_type === 'labor');

      const laborCategoryLabels = {
        installation: 'Installation', tearout: 'Tearout', underlayment: 'Underlayment',
        transitions: 'Transitions', baseboards: 'Baseboards', floor_leveling: 'Floor Leveling',
        moisture_barrier: 'Moisture Barrier', furniture_moving: 'Furniture Moving', other: 'Other'
      };

      if (loading) return <div className="loading">Loading estimate...</div>;

      return (
        <div>
          <div className="content-header">
            <h1>{estimate ? estimate.estimate_number : 'New Estimate'}</h1>
            <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
              {estimate && estimate.status === 'draft' && (
                <button className="btn btn-secondary btn-sm" onClick={deleteEstimate} style={{ color: 'var(--red)' }}>Delete</button>
              )}
              {estimate && (
                <a className="btn btn-secondary btn-sm" href={API + '/api/rep/estimates/' + estimate.id + '/pdf?preview=true&token=' + sessionStorage.getItem('rep_token')} target="_blank" rel="noopener noreferrer">Preview PDF</a>
              )}
              {estimate && !isReadonly && (
                <button className="btn btn-secondary btn-sm" onClick={loadPreview} disabled={previewLoading}>
                  {previewLoading ? 'Loading...' : 'Send Estimate'}
                </button>
              )}
