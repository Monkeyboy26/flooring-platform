                </div>
              )}
              {balanceInfo && balanceInfo.balance_status === 'balance_due' && (
                <div style={{ padding: '0.5rem 0.75rem', background: '#fef3c7', color: '#92400e', fontSize: '0.8125rem', fontWeight: 500, textAlign: 'center', marginTop: '0.5rem' }}>
                  Balance Due: ${balanceInfo.balance.toFixed(2)}
                </div>
              )}
              {balanceInfo && balanceInfo.balance_status === 'balance_due' && (
                <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '0.75rem' }}>
                  <button className="btn btn-sm" style={{ background: '#fef3c7', color: '#92400e' }}
                    onClick={() => { setPaymentRequestMessage(''); setShowPaymentRequestModal(true); }}>
                    Send Payment Request (${balanceInfo.balance.toFixed(2)})
                  </button>
                </div>
              )}
            </div>
          </div>

          {payments.length > 0 && (
            <div className="form-card">
              <h3>Payment History</h3>
              <div className="table-scroll-wrapper"><table className="rep-table" style={{ fontSize: '0.8125rem' }}>
                <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th><th>By</th></tr></thead>
                <tbody>
                  {payments.map(p => (
                    <tr key={p.id}>
                      <td data-label="Date">{new Date(p.created_at).toLocaleDateString()}</td>
                      <td data-label="Type">
                        <span style={{ display: 'inline-block', padding: '2px 8px', fontSize: '0.6875rem', fontWeight: 600, background: p.payment_type === 'refund' ? '#fee2e2' : '#dcfce7', color: p.payment_type === 'refund' ? '#991b1b' : '#166534' }}>
                          {p.payment_type === 'charge' ? 'Charge' : p.payment_type === 'refund' ? 'Refund' : 'Additional'}
                        </span>
                      </td>
                      <td data-label="Amount" style={{ color: parseFloat(p.amount) < 0 ? '#dc2626' : '#16a34a', fontWeight: 500 }}>
                        {parseFloat(p.amount) < 0 ? '-' : '+'}${Math.abs(parseFloat(p.amount)).toFixed(2)}
                      </td>
                      <td data-label="Description">{p.description || '—'}</td>
                      <td data-label="By">{p.initiated_by_name || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
            </div>
          )}

          {paymentRequests.length > 0 && (
            <div className="form-card">
              <h3>Payment Requests</h3>
              <div className="table-scroll-wrapper"><table className="rep-table" style={{ fontSize: '0.8125rem' }}>
                <thead><tr><th>Date</th><th>Amount</th><th>Sent To</th><th>Status</th></tr></thead>
                <tbody>
                  {paymentRequests.map(pr => (
                    <tr key={pr.id}>
                      <td data-label="Date">{new Date(pr.created_at).toLocaleDateString()}</td>
                      <td data-label="Amount">${parseFloat(pr.amount).toFixed(2)}</td>
                      <td data-label="Sent To">{pr.sent_to_email}</td>
                      <td data-label="Status">
                        <span style={{ display: 'inline-block', padding: '2px 8px', fontSize: '0.6875rem', fontWeight: 600,
                          background: pr.status === 'paid' ? '#dcfce7' : pr.status === 'pending' ? '#dbeafe' : '#fee2e2',
                          color: pr.status === 'paid' ? '#166534' : pr.status === 'pending' ? '#1e40af' : '#991b1b' }}>
                          {pr.status}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
            </div>
          )}

          {showPaymentRequestModal && (
            <div className="modal-overlay" onClick={() => setShowPaymentRequestModal(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>Send Payment Request</h3>
              <p>Send a payment link for <strong>${balanceInfo ? balanceInfo.balance.toFixed(2) : '0.00'}</strong> to <strong>{order.customer_email}</strong>.</p>
              <div style={{ marginBottom: '1rem' }}>
                <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Message to Customer (optional)</label>
                <textarea value={paymentRequestMessage} onChange={e => setPaymentRequestMessage(e.target.value)}
                  placeholder="e.g. Additional items were added to your order..."
                  rows={3} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-200)', resize: 'vertical' }} />
              </div>
              <div className="modal-actions">
                <button className="btn btn-secondary" onClick={() => setShowPaymentRequestModal(false)} disabled={updating}>Cancel</button>
                <button className="btn" style={{ background: '#fef3c7', color: '#92400e' }} disabled={updating}
                  onClick={async () => {
                    setUpdating(true);
                    try {
                      await repFetch('/api/rep/orders/' + editId + '/payment-request', {
                        method: 'POST', body: JSON.stringify({ message: paymentRequestMessage || undefined })
                      });
                      setShowPaymentRequestModal(false);
                      alert('Payment request sent to ' + order.customer_email);
                      const refreshed = await repFetch('/api/rep/orders/' + editId);
                      setPaymentRequests(refreshed.payment_requests || []);
                    } catch (err) { alert(err.message); }
                    setUpdating(false);
                  }}>
                  {updating ? 'Sending...' : 'Send Payment Request'}
                </button>
                </div>
              </div>
            </div>
          )}

          {showSendInvoiceModal && (
            <div className="modal-overlay" onClick={() => !sendingInvoice && setShowSendInvoiceModal(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>Email Invoice</h3>
                <p style={{ fontSize: '0.875rem', color: 'var(--stone-600)', margin: '0 0 1rem' }}>
                  Send invoice for <strong>{order.order_number}</strong> to <strong>{order.customer_email}</strong>.
                  {balanceInfo && balanceInfo.balance > 0.01 && (
                    <span style={{ display: 'block', marginTop: '0.5rem', padding: '0.5rem 0.75rem', background: '#fefce8', border: '1px solid #fde68a', color: '#92400e', fontSize: '0.8125rem' }}>
                      Balance due of <strong>${balanceInfo.balance.toFixed(2)}</strong> — a payment link will be included.
                    </span>
                  )}
                </p>
                <div style={{ marginBottom: '1rem' }}>
                  <label style={{ display: 'block', fontSize: '0.75rem', fontWeight: 500, marginBottom: '0.25rem' }}>Message to Customer (optional)</label>
                  <textarea value={invoiceMessage} onChange={e => setInvoiceMessage(e.target.value)}
                    placeholder="e.g. Here is the invoice for your recent order..."
                    rows={3} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-200)', fontSize: '0.8125rem', resize: 'vertical' }} />
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowSendInvoiceModal(false)} disabled={sendingInvoice}>Cancel</button>
                  <button className="btn btn-primary" disabled={sendingInvoice}
                    onClick={async () => {
                      setSendingInvoice(true);
                      try {
                        const data = await repFetch('/api/rep/orders/' + editId + '/send-invoice', {
                          method: 'POST', body: JSON.stringify({ message: invoiceMessage || undefined })
                        });
                        setShowSendInvoiceModal(false);
                        const msg = data.payment_requested
                          ? 'Invoice with payment request sent to ' + data.sent_to
                          : 'Invoice sent to ' + data.sent_to;
                        alert(msg);
                        // Refresh payment requests if payment was included
                        if (data.payment_requested) {
                          const refreshed = await repFetch('/api/rep/orders/' + editId);
                          setPaymentRequests(refreshed.payment_requests || []);
                          setBalanceInfo(refreshed.balance || null);
                        }
                      } catch (err) { alert('Failed to send: ' + err.message); }
                      setSendingInvoice(false);
                    }}>
                    {sendingInvoice ? 'Sending...' : (balanceInfo && balanceInfo.balance > 0.01 ? 'Send Invoice & Payment Request' : 'Send Invoice')}
                  </button>
                </div>
              </div>
            </div>
          )}

          {docPreview && <DocumentPreviewModal url={docPreview.url} title={docPreview.title} onClose={() => setDocPreview(null)} />}
        </div>
      );
    }

    // ========== RepQuotesListView ==========
    function RepQuotesListView({ navigate }) {
      const [quotes, setQuotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [statusFilter, setStatusFilter] = useState('');

      const load = useCallback(() => {
        setLoading(true);
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (statusFilter) params.set('status', statusFilter);
        repFetch('/api/rep/quotes?' + params.toString())
          .then(data => { setQuotes(data.quotes || []); setLoading(false); })
          .catch(() => setLoading(false));
      }, [search, statusFilter]);

      useEffect(load, [load]);

      return (
        <div>
          <div className="content-header">
            <h1>Quotes</h1>
            <button className="btn btn-primary" onClick={() => navigate('quote-create')}>New Quote</button>
          </div>
          <div className="filter-bar">
            <input type="text" placeholder="Search name, email, quote#..." value={search} onChange={e => setSearch(e.target.value)} />
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              <option value="">All Statuses</option>
              <option value="draft">Draft</option>
              <option value="sent">Sent</option>
              <option value="accepted">Accepted</option>
              <option value="converted">Converted</option>
              <option value="expired">Expired</option>
              <option value="declined">Declined</option>
            </select>
            <span className="filter-count">{quotes.length} quote{quotes.length !== 1 ? 's' : ''}</span>
          </div>
          {loading ? <div className="loading">Loading quotes...</div> : (
            <div className="table-scroll-wrapper"><table className="rep-table">
              <thead>
                <tr>
                  <th>Quote #</th>
                  <th>Customer</th>
                  <th>Email</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {quotes.map(q => (
                  <tr key={q.id}>
                    <td data-label="Quote #" style={{ fontWeight: 500 }}>{q.quote_number}</td>
                    <td data-label="Customer">{q.customer_name}</td>
                    <td data-label="Email" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{q.customer_email}</td>
                    <td data-label="Items">{q.item_count}</td>
                    <td data-label="Total">${parseFloat(q.total).toFixed(2)}</td>
                    <td data-label="Status"><span className={'badge badge-' + q.status}>{q.status}</span></td>
                    <td data-label="Created" style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{new Date(q.created_at).toLocaleDateString()}</td>
                    <td data-label="" className="actions">
                      <button className="btn btn-secondary btn-sm" onClick={() => navigate('quote-edit', q.id)}>
                        {q.status === 'draft' ? 'Edit' : 'View'}
                      </button>
                    </td>
                  </tr>
                ))}
                {quotes.length === 0 && (
                  <tr><td colSpan="8" style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem' }}>No quotes found</td></tr>
                )}
              </tbody>
            </table></div>
          )}
        </div>
      );
    }

    // ========== RepQuoteFormView ==========
    function RepQuoteFormView({ navigate, editId, terminalRef, terminalStatus, connectReader }) {
      const [quote, setQuote] = useState(null);
      const [quoteItems, setQuoteItems] = useState([]);
      const [loading, setLoading] = useState(!!editId);
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        customer_name: '', customer_email: '', phone: '',
        shipping_address_line1: '', shipping_address_line2: '',
        shipping_city: '', shipping_state: '', shipping_zip: '', notes: '',
        delivery_method: 'shipping'
      });

      // Customer search
      const [customerSearch, setCustomerSearch] = useState('');
      const [customerResults, setCustomerResults] = useState([]);
      const [customerSearching, setCustomerSearching] = useState(false);
      const [selectedCustomer, setSelectedCustomer] = useState(null);
      const [customerMatch, setCustomerMatch] = useState(null);
      const [customerMode, setCustomerMode] = useState('search');
      const customerSearchTimer = useRef(null);
      const [emailError, setEmailError] = useState('');
      const [phoneError, setPhoneError] = useState('');

      // Product search
      const [productSearch, setProductSearch] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [showResults, setShowResults] = useState(false);
      const searchTimeout = useRef(null);

      // Custom item form
      const [showCustomForm, setShowCustomForm] = useState(false);
      const [customItem, setCustomItem] = useState({ product_name: '', description: '', num_boxes: 1, unit_price: '', sqft_needed: '', sell_by: 'sqft' });

      // Convert modal
      const [showConvertModal, setShowConvertModal] = useState(false);
      const [convertMethod, setConvertMethod] = useState('card');
      const [convertCheckNumber, setConvertCheckNumber] = useState('');
      const [convertCashDrawerOpen, setConvertCashDrawerOpen] = useState(null);
      const [showConvertTapModal, setShowConvertTapModal] = useState(false);

      // Email preview modal
      const [showPreview, setShowPreview] = useState(false);
      const [previewHtml, setPreviewHtml] = useState('');
      const [previewMeta, setPreviewMeta] = useState(null);
      const [previewLoading, setPreviewLoading] = useState(false);
      const [sendFeedback, setSendFeedback] = useState(null);

      // Promo code
      const [promoCode, setPromoCode] = useState('');
      const [promoResult, setPromoResult] = useState(null);
      const [promoLoading, setPromoLoading] = useState(false);
      const [promoError, setPromoError] = useState('');

      // Address autofill (must be before early returns to satisfy React hooks rules)
      const quoteIsReadonly = quote && !['draft', 'sent'].includes(quote.status);
      const { addressInputRef: quoteAddrRef, previousAddresses: quotePrevAddrs, showPrevAddresses: showQuotePrevAddrs, setShowPrevAddresses: setShowQuotePrevAddrs, selectPreviousAddress: selectQuotePrevAddr } = useAddressAutofill({
        fieldMap: { line1: 'shipping_address_line1', line2: 'shipping_address_line2', city: 'shipping_city', state: 'shipping_state', zip: 'shipping_zip' },
        setForm, selectedCustomer, isReadonly: !!quoteIsReadonly
      });

      useEffect(() => {
        if (!editId) return;
        repFetch('/api/rep/quotes/' + editId)
          .then(data => {
            setQuote(data.quote);
            setQuoteItems(data.items || []);
            setForm({
              customer_name: data.quote.customer_name || '',
              customer_email: data.quote.customer_email || '',
              phone: data.quote.phone || '',
              shipping_address_line1: data.quote.shipping_address_line1 || '',
              shipping_address_line2: data.quote.shipping_address_line2 || '',
              shipping_city: data.quote.shipping_city || '',
              shipping_state: data.quote.shipping_state || '',
              shipping_zip: data.quote.shipping_zip || '',
              notes: data.quote.notes || '',
              delivery_method: data.quote.delivery_method || 'shipping'
            });
            if (data.quote.promo_code) {
              setPromoCode(data.quote.promo_code);
              setPromoResult({
                code: data.quote.promo_code,
                discount_amount: parseFloat(data.quote.discount_amount || 0)
              });
            }
            setCustomerMode('new');
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [editId]);

      useEffect(() => {
        repFetch('/api/rep/cash-drawer/current').then(d => setConvertCashDrawerOpen(!!d.drawer)).catch(() => setConvertCashDrawerOpen(false));
      }, []);

      const searchCustomers = (q) => {
        setCustomerSearch(q);
        if (customerSearchTimer.current) clearTimeout(customerSearchTimer.current);
        if (q.trim().length < 2) { setCustomerResults([]); setCustomerSearching(false); return; }
        setCustomerSearching(true);
        customerSearchTimer.current = setTimeout(async () => {
          try {
            const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(q.trim()));
            setCustomerResults(data.results || []);
          } catch (e) { setCustomerResults([]); }
          setCustomerSearching(false);
        }, 300);
      };

      const selectCustomer = (c) => {
        setSelectedCustomer(c);
        setForm(f => ({
          ...f,
          customer_name: c.name || '',
          customer_email: c.email || '',
          phone: c.phone || '',
          shipping_address_line1: c.address_line1 || f.shipping_address_line1,
          shipping_address_line2: c.address_line2 || f.shipping_address_line2,
          shipping_city: c.city || f.shipping_city,
          shipping_state: c.state || f.shipping_state,
          shipping_zip: c.zip || f.shipping_zip
        }));
        setCustomerSearch('');
        setCustomerResults([]);
        setCustomerMatch(null);
      };

      const clearCustomer = () => {
        setSelectedCustomer(null);
        setForm(f => ({ ...f, customer_name: '', customer_email: '', phone: '' }));
        setCustomerMatch(null);
        setEmailError('');
        setPhoneError('');
      };

      const checkCustomerMatch = async (field) => {
        if (selectedCustomer) return;
        const val = field === 'email' ? form.customer_email : form.phone;
        if (!val || val.trim().length < 3) { setCustomerMatch(null); return; }
        try {
          const data = await repFetch('/api/rep/customers/search?q=' + encodeURIComponent(val));
          if (data.results && data.results.length > 0) {
            setCustomerMatch(data.results[0]);
          } else {
            setCustomerMatch(null);
          }
        } catch (e) { setCustomerMatch(null); }
      };

      const handleProductSearch = (term) => {
        setProductSearch(term);
        if (searchTimeout.current) clearTimeout(searchTimeout.current);
        if (term.length < 2) { setSearchResults([]); setShowResults(false); return; }
        searchTimeout.current = setTimeout(() => {
          fetch(API + '/api/products?search=' + encodeURIComponent(term))
            .then(r => r.json())
            .then(data => {
              setSearchResults(data.products || []);
              setShowResults(true);
            })
            .catch(() => {});
        }, 300);
      };

      const addProductToQuote = async (product) => {
        setShowResults(false);
        setProductSearch('');

        // Fetch product details to get SKU + pricing
        const data = await fetch(API + '/api/products/' + product.id).then(r => r.json());
        const sku = data.skus && data.skus[0];
        const price = sku ? parseFloat(sku.retail_price || 0) : parseFloat(product.price || 0);
        const sqftPerBox = sku ? parseFloat(sku.sqft_per_box || 0) : 0;
        const sellBy = sku ? (sku.sell_by || 'sqft') : 'sqft';

        const newItem = {
          product_id: product.id,
          sku_id: sku ? sku.id : null,
          product_name: product.name,
          collection: product.collection || '',
          sqft_needed: sqftPerBox || 0,
          num_boxes: 1,
          unit_price: price.toFixed(2),
          subtotal: price.toFixed(2),
          is_sample: false,
          sell_by: sellBy,
          _sqft_per_box: sqftPerBox
        };

        if (editId) {
          // Save directly via API
          const result = await repFetch('/api/rep/quotes/' + editId + '/items', {
            method: 'POST',
            body: JSON.stringify(newItem)
          });
          if (result.item) {
            result.item._sqft_per_box = sqftPerBox;
            setQuoteItems(prev => [...prev, result.item]);
            // Refresh quote for totals
            const qData = await repFetch('/api/rep/quotes/' + editId);
            setQuote(qData.quote);
          }
        } else {
          setQuoteItems(prev => [...prev, { ...newItem, _temp_id: Date.now() }]);
        }
      };

      const addCustomItemToQuote = async () => {
        if (!customItem.product_name || !customItem.unit_price) return;
        const price = parseFloat(customItem.unit_price) || 0;
        const qty = parseInt(customItem.num_boxes) || 1;
        const newItem = {
          product_id: null,
          sku_id: null,
          product_name: customItem.product_name,
          collection: '',
          description: customItem.description || '',
          sqft_needed: customItem.sqft_needed ? parseFloat(customItem.sqft_needed) : null,
          num_boxes: qty,
          unit_price: price.toFixed(2),
          subtotal: (price * qty).toFixed(2),
          sell_by: customItem.sell_by || 'sqft',
          is_sample: false,
          _is_custom: true
        };

        if (editId) {
          const result = await repFetch('/api/rep/quotes/' + editId + '/items', {
            method: 'POST',
            body: JSON.stringify(newItem)
          });
          if (result.item) {
            result.item._is_custom = true;
            setQuoteItems(prev => [...prev, result.item]);
            const qData = await repFetch('/api/rep/quotes/' + editId);
            setQuote(qData.quote);
          }
        } else {
          setQuoteItems(prev => [...prev, { ...newItem, _temp_id: Date.now() }]);
        }

        setCustomItem({ product_name: '', description: '', num_boxes: 1, unit_price: '', sqft_needed: '', sell_by: 'sqft' });
        setShowCustomForm(false);
      };

      const updateItemLocal = (index, field, value) => {
        setQuoteItems(prev => {
          const updated = [...prev];
          const item = { ...updated[index] };
          item[field] = value;

          // Recalculate subtotal
          if (field === 'num_boxes' || field === 'unit_price') {
            const boxes = field === 'num_boxes' ? parseInt(value) || 0 : parseInt(item.num_boxes) || 0;
            const price = field === 'unit_price' ? parseFloat(value) || 0 : parseFloat(item.unit_price) || 0;
            item.subtotal = (price * boxes).toFixed(2);
            if (field === 'num_boxes' && item._sqft_per_box) {
              item.sqft_needed = (boxes * parseFloat(item._sqft_per_box)).toFixed(2);
            }
          }
          updated[index] = item;
          return updated;
        });
      };

      const saveItemEdit = async (item, index) => {
        if (editId && item.id) {
          await repFetch('/api/rep/quotes/' + editId + '/items/' + item.id, {
            method: 'PUT',
            body: JSON.stringify({
              num_boxes: item.num_boxes,
              unit_price: item.unit_price,
              sqft_needed: item.sqft_needed,
              subtotal: item.subtotal,
              product_name: item.product_name,
              collection: item.collection,
              description: item.description,
              sell_by: item.sell_by
            })
          });
          const qData = await repFetch('/api/rep/quotes/' + editId);
          setQuote(qData.quote);
        }
      };

      const removeItem = async (item, index) => {
        if (editId && item.id) {
          await repFetch('/api/rep/quotes/' + editId + '/items/' + item.id, { method: 'DELETE' });
          const qData = await repFetch('/api/rep/quotes/' + editId);
          setQuote(qData.quote);
        }
        setQuoteItems(prev => prev.filter((_, i) => i !== index));
      };

      const applyRepPromo = () => {
        const code = promoCode.trim();
        if (!code) return;
        setPromoLoading(true);
        setPromoError('');
        const items = quoteItems.map(i => ({
          product_id: i.product_id,
          subtotal: i.subtotal,
          is_sample: i.is_sample || false
        }));
        repFetch('/api/rep/promo-codes/validate', {
          method: 'POST',
          body: JSON.stringify({ code, items, customer_email: form.customer_email })
        })
          .then(data => {
            if (data.valid) {
              setPromoResult(data);
              setPromoError('');
              setPromoCode(data.code);
            } else {
              setPromoResult(null);
              setPromoError(data.error || 'Invalid promo code');
            }
            setPromoLoading(false);
          })
          .catch(() => { setPromoError('Unable to validate'); setPromoLoading(false); });
      };

      const removeRepPromo = () => {
        setPromoResult(null);
        setPromoCode('');
        setPromoError('');
      };

      const saveQuote = async () => {
        setSaving(true);
        try {
          const promoPayload = promoResult ? promoResult.code : '';
          if (editId) {
            await repFetch('/api/rep/quotes/' + editId, {
              method: 'PUT',
              body: JSON.stringify({ ...form, promo_code: promoPayload })
            });
          } else {
            const itemsPayload = quoteItems.map(i => ({
              product_id: i.product_id,
              sku_id: i.sku_id,
              product_name: i.product_name,
              collection: i.collection,
              description: i.description,
              sqft_needed: i.sqft_needed,
              num_boxes: i.num_boxes,
              unit_price: i.unit_price,
              subtotal: i.subtotal,
              sell_by: i.sell_by,
              is_sample: i.is_sample
            }));
            const data = await repFetch('/api/rep/quotes', {
              method: 'POST',
              body: JSON.stringify({ ...form, items: itemsPayload, promo_code: promoPayload })
            });
            if (data.quote) {
              navigate('quote-edit', data.quote.id);
              return;
            }
          }
          // Reload
          if (editId) {
            const data = await repFetch('/api/rep/quotes/' + editId);
            setQuote(data.quote);
            setQuoteItems(data.items || []);
            if (data.quote.promo_code) {
              setPromoCode(data.quote.promo_code);
              setPromoResult({ code: data.quote.promo_code, discount_amount: parseFloat(data.quote.discount_amount || 0) });
            } else {
              setPromoResult(null);
              setPromoCode('');
            }
          }
        } catch (err) {}
        setSaving(false);
      };

      const openPreview = async () => {
        if (!editId) return;
        setPreviewLoading(true);
        setShowPreview(true);
        setPreviewHtml('');
        setPreviewMeta(null);
        try {
          const data = await repFetch('/api/rep/quotes/' + editId + '/preview');
          setPreviewHtml(data.html || '');
          setPreviewMeta({ to: data.to, subject: data.subject, reply_to: data.reply_to });
        } catch (err) {
          setPreviewHtml('<p style="padding:2rem;color:#dc2626;">Failed to load email preview.</p>');
        }
        setPreviewLoading(false);
      };

      const sendQuote = async () => {
        if (!editId) return;
        setShowPreview(false);
        setSaving(true);
        setSendFeedback(null);
        try {
          const result = await repFetch('/api/rep/quotes/' + editId + '/send', { method: 'POST' });
          const data = await repFetch('/api/rep/quotes/' + editId);
          setQuote(data.quote);
          setSendFeedback({ emailed: result.emailed, message: result.message });
          setTimeout(() => setSendFeedback(null), 6000);
        } catch (err) {}
        setSaving(false);
      };

      const convertQuoteWithPI = async (stripePaymentIntentId) => {
        if (!editId) return;
        setSaving(true);
        try {
          const convertBody = { payment_method: convertMethod };
          if (convertMethod === 'check') convertBody.check_number = convertCheckNumber;
          if (stripePaymentIntentId) convertBody.stripe_payment_intent_id = stripePaymentIntentId;
          const data = await repFetch('/api/rep/quotes/' + editId + '/convert', {
            method: 'POST',
            body: JSON.stringify(convertBody)
          });
          if (data.order) {
            navigate('order-detail', data.order.id);
            return;
          }
        } catch (err) { alert(err.message); }
        setSaving(false);
        setShowConvertModal(false);
      };

      const convertQuote = async () => {
        if (!editId) return;
        if (convertMethod === 'check' && !convertCheckNumber.trim()) { alert('Check number is required'); return; }
        if (convertMethod === 'cash' && !convertCashDrawerOpen) { alert('No cash drawer open'); return; }
        if (convertMethod === 'card') {
          if (terminalStatus !== 'connected') {
            if (terminalStatus === 'disconnected') {
              const confirmed = window.confirm('Terminal not connected. Connect now?');
              if (confirmed) connectReader();
            } else {
              alert('Stripe Terminal is not connected. Please connect the reader first.');
            }
            return;
          }
          setShowConvertModal(false);
          setShowConvertTapModal(true);
          return;
        }
        convertQuoteWithPI(null);
      };

      if (loading) return <div className="loading">Loading quote...</div>;

      const isReadonly = quote && !['draft', 'sent'].includes(quote.status);
      const calcSubtotal = quoteItems.reduce((sum, i) => sum + parseFloat(i.subtotal || 0), 0);
      const qtyLabel = (sellBy) => sellBy === 'unit' ? 'units' : sellBy === 'piece' ? 'pcs' : 'boxes';

      return (
        <div>
          <div className="content-header">
            <h1>{editId ? (quote ? 'Quote ' + quote.quote_number : 'Edit Quote') : 'New Quote'}</h1>
            <div style={{ display: 'flex', gap: '0.75rem' }}>
              {quote && quote.status === 'draft' && (
                <button className="btn btn-secondary" onClick={openPreview} disabled={saving}>Send to Customer</button>
              )}
              {quote && ['draft', 'sent', 'accepted'].includes(quote.status) && (
                <button className="btn btn-success" onClick={() => setShowConvertModal(true)} disabled={saving}>Convert to Order</button>
              )}
              <button className="btn btn-secondary" onClick={() => navigate('quotes')}>Back to Quotes</button>
            </div>
          </div>

          {quote && (
            <div style={{ marginBottom: '1.5rem' }}>
              <span className={'badge badge-' + quote.status} style={{ fontSize: '0.8125rem', padding: '0.35rem 0.85rem' }}>{quote.status}</span>
            </div>
          )}

          {/* Customer Info */}
          <div className="form-card">
            <h3>Customer Information</h3>

            {!isReadonly && (
              <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
                <button className={customerMode === 'search' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                  onClick={() => { setCustomerMode('search'); setCustomerMatch(null); }}
                  style={{ fontSize: '0.8rem', padding: '0.35rem 0.75rem' }}>
                  Search Existing
                </button>
                <button className={customerMode === 'new' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'}
                  onClick={() => { setCustomerMode('new'); setCustomerResults([]); setCustomerSearch(''); }}
                  style={{ fontSize: '0.8rem', padding: '0.35rem 0.75rem' }}>
                  + New Customer
                </button>
              </div>
            )}

            {!isReadonly && customerMode === 'search' && !selectedCustomer && (
              <div style={{ position: 'relative', marginBottom: '1rem' }}>
                <input type="text" value={customerSearch} onChange={e => searchCustomers(e.target.value)}
                  placeholder="Search customers by name, email, or phone..."
                  style={{ width: '100%', boxSizing: 'border-box' }} />
                {customerSearching && !customerResults.length && (
                  <div style={{ fontSize: '0.75rem', color: '#888', marginTop: '0.25rem' }}>Searching...</div>
                )}
                {!customerSearching && customerSearch.trim().length >= 2 && customerResults.length === 0 && (
                  <div style={{ fontSize: '0.75rem', color: '#999', marginTop: '0.25rem' }}>No customers found</div>
                )}
                {customerResults.length > 0 && (
                  <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: '#fff', border: '1px solid #ddd',
                    borderRadius: '6px', boxShadow: '0 4px 12px rgba(0,0,0,0.15)', zIndex: 1000, maxHeight: '280px', overflowY: 'auto' }}>
                    {customerResults.map((c, i) => (
                      <div key={c.id || i} onMouseDown={e => { e.preventDefault(); selectCustomer(c); }}
                        style={{ padding: '0.6rem 0.75rem', cursor: 'pointer', borderBottom: '1px solid #f0f0f0',
                          display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}
                        onMouseEnter={e => e.currentTarget.style.background = '#f7f5f2'}
                        onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: '0.875rem', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {c.name}{c.company_name ? ` — ${c.company_name}` : ''}
                          </div>
                          <div style={{ fontSize: '0.75rem', color: '#666', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {c.email}{c.phone ? ` · ${c.phone}` : ''}
                          </div>
                        </div>
                        <span style={{ fontSize: '0.65rem',
                          background: c.type === 'trade' ? '#e8d5b7' : c.type === 'order' ? '#d5dde8' : '#d5e8d4',
                          color: c.type === 'trade' ? '#8b6914' : c.type === 'order' ? '#2d4a6a' : '#2d6a2e',
                          padding: '0.15rem 0.5rem', borderRadius: '9999px', fontWeight: 600, textTransform: 'uppercase',
                          marginLeft: '0.5rem', flexShrink: 0 }}>
                          {c.type === 'order' ? 'prev order' : c.type}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {selectedCustomer && (
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1rem',
                background: '#f0f7f0', border: '1px solid #b8d4b8', borderRadius: '6px', padding: '0.5rem 0.75rem' }}>
                <span style={{ color: '#2d6a2e', fontSize: '1rem' }}>✓</span>

                  onBlur={() => {
                    if (form.customer_email && !isValidEmail(form.customer_email)) setEmailError('Enter a valid email address');

                <input type="text" value={form.phone}

                    if (phoneError) setPhoneError('');
                  }}

                  onBlur={() => {
                    if (form.phone && !isValidPhone(form.phone)) setPhoneError('Enter a valid 10-digit phone number');
                    else setPhoneError('');
                    if (customerMode === 'new') checkCustomerMatch('phone');
                  }}
                  style={phoneError ? { borderColor: '#dc2626' } : {}} />
                {phoneError && <div style={{ color: '#dc2626', fontSize: '0.75rem', marginTop: '0.25rem' }}>{phoneError}</div>}

                  <option value="pickup">Store Pickup</option>

              </div>

                              <div className="prev-addr-item-sub">{[addr.city, addr.state, addr.zip].filter(Boolean).join(', ')}</div>
                            </div>

                        </div>
                      )}
                    </div>

                <div className="form-group full">
                  <label>Address Line 2</label>
                  <input type="text" value={form.shipping_address_line2} onChange={e => setForm(f => ({ ...f, shipping_address_line2: e.target.value }))} disabled={isReadonly} />
                </div>
                <div className="form-group">
                  <label>City</label>
                  <input type="text" value={form.shipping_city} onChange={e => setForm(f => ({ ...f, shipping_city: e.target.value }))} disabled={isReadonly} />

                  <label>ZIP Code</label>
                  <input type="text" value={form.shipping_zip} onChange={e => setForm(f => ({ ...f, shipping_zip: e.target.value }))} disabled={isReadonly} />

                      <div className="search-results">

                              {p.vendor_name} {p.collection && ' \u2022 ' + p.collection}

                            <span style={{ fontSize: '0.7rem', color: 'var(--stone-400)' }}>{qtyLabel(item.sell_by)}</span>
                          </span>

                          <span>{item.num_boxes} <span style={{ fontSize: '0.7rem', color: 'var(--stone-400)' }}>{qtyLabel(item.sell_by)}</span></span>

                          <input
                            type="number"
                            step="0.01"

                            onBlur={() => saveItemEdit(item, idx)}
                            style={{ width: '90px', padding: '0.3rem 0.5rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)' }}

                      )}
                    </tr>

                  </div>

                <span>Total</span>
                <span>${((quote ? parseFloat(quote.total) : calcSubtotal) - (promoResult && !quote ? promoResult.discount_amount : 0)).toFixed(2)}</span>

            {isReadonly ? (

                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                  <span style={{ background: '#dcfce7', color: '#166534', padding: '0.25rem 0.6rem', borderRadius: '4px', fontSize: '0.8rem', fontWeight: 600 }}>{promoResult.code}</span>
                  <span style={{ color: '#16a34a', fontSize: '0.875rem' }}>-${promoResult.discount_amount.toFixed(2)}</span>
                </div>

                <span style={{ color: 'var(--stone-400)', fontSize: '0.875rem' }}>No promo code applied</span>

              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                <span style={{ background: '#dcfce7', color: '#166534', padding: '0.25rem 0.6rem', borderRadius: '4px', fontSize: '0.8rem', fontWeight: 600 }}>{promoResult.code}</span>

                  )}
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowConvertModal(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={convertQuote}
                    disabled={saving || (convertMethod === 'check' && !convertCheckNumber.trim()) || (convertMethod === 'cash' && !convertCashDrawerOpen)}>
                    {saving ? 'Converting...' : convertMethod === 'card' ? 'Tap to Pay' : 'Convert to Order'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {showConvertTapModal && (
            <TapToPayModal
              amount={parseFloat(quote.total || 0)}
              terminal={terminalRef.current}
              onSuccess={(piId) => { setShowConvertTapModal(false); convertQuoteWithPI(piId); }}
              onCancel={() => setShowConvertTapModal(false)}
            />
          )}
        </div>
      );
    }

    // ========== RepCashDrawerView ==========
    function RepCashDrawerView({ navigate }) {
      const [drawer, setDrawer] = useState(null);
      const [transactions, setTransactions] = useState([]);
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);
      const [openingBalance, setOpeningBalance] = useState('200.00');
      const [opening, setOpening] = useState(false);

      // Close drawer modal
      const [showCloseModal, setShowCloseModal] = useState(false);
      const [actualBalance, setActualBalance] = useState('');
      const [closeNotes, setCloseNotes] = useState('');
      const [closing, setClosing] = useState(false);
      const [closeResult, setCloseResult] = useState(null);

      // Cash in/out modal
      const [showTxnModal, setShowTxnModal] = useState(null); // 'cash_in' | 'cash_out' | null
      const [txnAmount, setTxnAmount] = useState('');
      const [txnDescription, setTxnDescription] = useState('');
      const [txnSaving, setTxnSaving] = useState(false);

      const load = async () => {
        try {
          const [currentData, historyData] = await Promise.all([
            repFetch('/api/rep/cash-drawer/current'),
            repFetch('/api/rep/cash-drawer/history')
          ]);
          setDrawer(currentData.drawer);
          setTransactions(currentData.transactions || []);
          setHistory(historyData.drawers || []);
        } catch (err) {}
        setLoading(false);
      };

      useEffect(() => { load(); }, []);

      const openDrawer = async () => {
        const bal = parseFloat(openingBalance);
        if (isNaN(bal) || bal < 0) return;
        setOpening(true);
        try {
          const data = await repFetch('/api/rep/cash-drawer/open', {
            method: 'POST',
            body: JSON.stringify({ opening_balance: bal })
          });
          setDrawer(data.drawer);
          setTransactions([]);
        } catch (err) { alert(err.message); }
        setOpening(false);
      };

      const closeDrawer = async () => {
        const actual = parseFloat(actualBalance);
        if (isNaN(actual) || actual < 0) return;
        setClosing(true);
        try {
          const data = await repFetch('/api/rep/cash-drawer/close', {
            method: 'POST',
            body: JSON.stringify({ actual_balance: actual, notes: closeNotes || undefined })
          });
          setCloseResult(data.drawer);
          setDrawer(null);
          setTransactions([]);
          // Refresh history
          const historyData = await repFetch('/api/rep/cash-drawer/history');
          setHistory(historyData.drawers || []);
        } catch (err) { alert(err.message); }
        setClosing(false);
      };

      const recordTxn = async () => {
        const amt = parseFloat(txnAmount);
        if (isNaN(amt) || amt <= 0 || !showTxnModal) return;
        setTxnSaving(true);
        try {
          const data = await repFetch('/api/rep/cash-drawer/transaction', {
            method: 'POST',
            body: JSON.stringify({ type: showTxnModal, amount: amt, description: txnDescription || undefined })
          });
          setDrawer(data.drawer);
          setTransactions(prev => [...prev, data.transaction]);
          setShowTxnModal(null);
          setTxnAmount('');
          setTxnDescription('');
        } catch (err) { alert(err.message); }
        setTxnSaving(false);
      };

      if (loading) return <div className="loading">Loading...</div>;

      const fmtTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      };
      const fmtDate = (ts) => {
        if (!ts) return '';
        return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      };
      const fmtMoney = (v) => '$' + parseFloat(v || 0).toFixed(2);

      // Summary computations for open drawer
      const cashSales = transactions.filter(t => t.type === 'sale').reduce((s, t) => s + parseFloat(t.amount), 0);
      const cashRefunds = transactions.filter(t => t.type === 'refund').reduce((s, t) => s + parseFloat(t.amount), 0);
      const cashIn = transactions.filter(t => t.type === 'cash_in').reduce((s, t) => s + parseFloat(t.amount), 0);
      const cashOut = transactions.filter(t => t.type === 'cash_out').reduce((s, t) => s + parseFloat(t.amount), 0);

      return (
        <div>
          <div className="content-header">
            <h1>Cash Drawer</h1>
            {drawer && <span style={{ fontSize: '0.875rem', color: 'var(--stone-500)' }}>Opened {fmtTime(drawer.opened_at)}</span>}
          </div>

          {/* Close result banner */}
          {closeResult && (
            <div style={{ padding: '1rem 1.25rem', marginBottom: '1.5rem', borderRadius: '8px',
              background: parseFloat(closeResult.over_short) === 0 ? '#dcfce7' : parseFloat(closeResult.over_short) > 0 ? '#dbeafe' : '#fef3c7',
              border: '1px solid ' + (parseFloat(closeResult.over_short) === 0 ? '#86efac' : parseFloat(closeResult.over_short) > 0 ? '#93c5fd' : '#fcd34d') }}>
              <div style={{ fontWeight: 600, marginBottom: '0.25rem' }}>Drawer Closed</div>
              <div style={{ fontSize: '0.875rem' }}>
                Expected: {fmtMoney(closeResult.expected_balance)} | Actual: {fmtMoney(closeResult.actual_balance)} |{' '}
                {parseFloat(closeResult.over_short) === 0 ? 'Exact' :
                  parseFloat(closeResult.over_short) > 0 ? '+' + fmtMoney(closeResult.over_short) + ' over' :
                  fmtMoney(Math.abs(parseFloat(closeResult.over_short))) + ' short'}
              </div>
              <button className="btn btn-secondary btn-sm" style={{ marginTop: '0.5rem' }} onClick={() => setCloseResult(null)}>Dismiss</button>
            </div>
          )}

          {!drawer ? (
            /* ===== Drawer Closed State ===== */
            <div>
              <div className="form-card">
                <h3>Open Cash Drawer</h3>
                <p style={{ color: 'var(--stone-500)', fontSize: '0.875rem', marginBottom: '1rem' }}>No cash drawer is currently open.</p>
                <div className="form-group" style={{ maxWidth: '240px' }}>
                  <label>Opening Balance</label>
                  <div style={{ position: 'relative' }}>
                    <span style={{ position: 'absolute', left: '0.75rem', top: '50%', transform: 'translateY(-50%)', color: 'var(--stone-400)' }}>$</span>
                    <input type="number" min="0" step="0.01" value={openingBalance}
                      onChange={e => setOpeningBalance(e.target.value)}
                      style={{ width: '100%', padding: '0.75rem 1rem 0.75rem 1.5rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                  </div>
                </div>
                <button className="btn btn-primary" onClick={openDrawer} disabled={opening}>
                  {opening ? 'Opening...' : 'Open Cash Drawer'}
                </button>
              </div>

              {/* History */}
              {history.length > 0 && (
                <div className="form-card" style={{ marginTop: '1.5rem' }}>
                  <h3>Recent History</h3>
                  <div className="table-scroll-wrapper"><table className="data-table">
                    <thead>
                      <tr>
                        <th>Date</th>
                        <th>Opening</th>
                        <th>Expected</th>
                        <th>Actual</th>
                        <th>Over/Short</th>
                      </tr>
                    </thead>
                    <tbody>
                      {history.map(h => {
                        const os = parseFloat(h.over_short || 0);
                        return (
                          <tr key={h.id}>
                            <td data-label="Date">{fmtDate(h.closed_at)}</td>
                            <td data-label="Opening">{fmtMoney(h.opening_balance)}</td>
                            <td data-label="Expected">{fmtMoney(h.expected_balance)}</td>
                            <td data-label="Actual">{fmtMoney(h.actual_balance)}</td>
                            <td data-label="Over/Short" style={{ color: os === 0 ? 'var(--stone-500)' : os > 0 ? '#2563eb' : '#dc2626', fontWeight: 500 }}>
                              {os === 0 ? 'Exact' : (os > 0 ? '+' : '-') + '$' + Math.abs(os).toFixed(2)}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table></div>
                </div>
              )}
            </div>
          ) : (
            /* ===== Drawer Open State ===== */
            <div>
              <div className="form-card">
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1rem', marginBottom: '1.5rem' }}>
                  <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Opening Balance</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600 }}>{fmtMoney(drawer.opening_balance)}</div>
                  </div>
                  {cashSales > 0 && <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Cash Sales</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: '#16a34a' }}>+{fmtMoney(cashSales)}</div>
                  </div>}
                  {cashRefunds > 0 && <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Refunds</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: '#dc2626' }}>-{fmtMoney(cashRefunds)}</div>
                  </div>}
                  {cashIn > 0 && <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Cash In</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: '#16a34a' }}>+{fmtMoney(cashIn)}</div>
                  </div>}
                  {cashOut > 0 && <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Cash Out</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: '#dc2626' }}>-{fmtMoney(cashOut)}</div>
                  </div>}
                  <div>
                    <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: 'var(--stone-400)', marginBottom: '0.25rem' }}>Expected Balance</div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 700 }}>{fmtMoney(drawer.expected_balance)}</div>
                  </div>
                </div>

                <div style={{ display: 'flex', gap: '0.75rem', flexWrap: 'wrap' }}>
                  <button className="btn btn-secondary" onClick={() => { setShowTxnModal('cash_in'); setTxnAmount(''); setTxnDescription(''); }}>+ Cash In</button>
                  <button className="btn btn-secondary" onClick={() => { setShowTxnModal('cash_out'); setTxnAmount(''); setTxnDescription(''); }}>- Cash Out</button>
                  <button className="btn btn-primary" style={{ marginLeft: 'auto' }}
                    onClick={() => { setShowCloseModal(true); setActualBalance(''); setCloseNotes(''); }}>Close Drawer</button>
                </div>
              </div>

              {/* Transactions */}
              {transactions.length > 0 && (
                <div className="form-card" style={{ marginTop: '1.5rem' }}>
                  <h3>Today's Transactions</h3>
                  <div className="table-scroll-wrapper"><table className="data-table">
                    <thead>
                      <tr>
                        <th>Time</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th style={{ textAlign: 'right' }}>Amount</th>
                      </tr>
                    </thead>
                    <tbody>
                      {transactions.map(t => {
                        const isCredit = ['sale', 'cash_in'].includes(t.type);
                        const typeLabels = { sale: 'Sale', refund: 'Refund', cash_in: 'Cash In', cash_out: 'Cash Out' };
                        return (
                          <tr key={t.id}>
                            <td data-label="Time">{fmtTime(t.created_at)}</td>
                            <td data-label="Type"><span className={'badge badge-' + (isCredit ? 'confirmed' : 'cancelled')} style={{ fontSize: '0.75rem' }}>{typeLabels[t.type] || t.type}</span></td>
                            <td data-label="Description" style={{ fontSize: '0.8125rem', color: 'var(--stone-600)' }}>{t.description || '\u2014'}</td>
                            <td data-label="Amount" style={{ textAlign: 'right', fontWeight: 500, color: isCredit ? '#16a34a' : '#dc2626' }}>
                              {isCredit ? '+' : '-'}{fmtMoney(t.amount)}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table></div>
                </div>
              )}
            </div>
          )}

          {/* Cash In/Out Modal */}
          {showTxnModal && (
            <div className="modal-overlay" onClick={() => setShowTxnModal(null)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>{showTxnModal === 'cash_in' ? 'Cash In' : 'Cash Out'}</h3>
                <div className="form-group">
                  <label>Amount</label>
                  <div style={{ position: 'relative' }}>
                    <span style={{ position: 'absolute', left: '0.75rem', top: '50%', transform: 'translateY(-50%)', color: 'var(--stone-400)' }}>$</span>
                    <input type="number" min="0.01" step="0.01" value={txnAmount} onChange={e => setTxnAmount(e.target.value)}
                      placeholder="0.00" autoFocus
                      style={{ width: '100%', padding: '0.75rem 1rem 0.75rem 1.5rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                  </div>
                </div>
                <div className="form-group">
                  <label>Reason</label>
                  <input type="text" value={txnDescription} onChange={e => setTxnDescription(e.target.value)}
                    placeholder={showTxnModal === 'cash_in' ? 'e.g. Change added' : 'e.g. Bank deposit'}
                    style={{ width: '100%', padding: '0.75rem 1rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowTxnModal(null)}>Cancel</button>
                  <button className="btn btn-primary" onClick={recordTxn} disabled={txnSaving || !txnAmount || parseFloat(txnAmount) <= 0}>
                    {txnSaving ? 'Recording...' : 'Record'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Close Drawer Modal */}
          {showCloseModal && (
            <div className="modal-overlay" onClick={() => setShowCloseModal(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <h3>Close Cash Drawer</h3>
                <div style={{ marginBottom: '1rem', padding: '0.75rem', background: 'var(--stone-50)', borderRadius: '6px' }}>
                  <span style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>Expected Balance:</span>
                  <span style={{ fontSize: '1.1rem', fontWeight: 600, marginLeft: '0.5rem' }}>{fmtMoney(drawer.expected_balance)}</span>
                </div>
                <div className="form-group">
                  <label>Actual Count</label>
                  <div style={{ position: 'relative' }}>
                    <span style={{ position: 'absolute', left: '0.75rem', top: '50%', transform: 'translateY(-50%)', color: 'var(--stone-400)' }}>$</span>
                    <input type="number" min="0" step="0.01" value={actualBalance} onChange={e => setActualBalance(e.target.value)}
                      placeholder="0.00" autoFocus
                      style={{ width: '100%', padding: '0.75rem 1rem 0.75rem 1.5rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                  </div>
                </div>
                <div className="form-group">
                  <label>Notes (optional)</label>
                  <input type="text" value={closeNotes} onChange={e => setCloseNotes(e.target.value)}
                    placeholder="Any notes about the count"
                    style={{ width: '100%', padding: '0.75rem 1rem', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }} />
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowCloseModal(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={() => { closeDrawer(); setShowCloseModal(false); }}
                    disabled={closing || !actualBalance || parseFloat(actualBalance) < 0}>
                    {closing ? 'Closing...' : 'Close & Reconcile'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== Render ==========
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
