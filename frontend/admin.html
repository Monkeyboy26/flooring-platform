                <div style={{ fontSize: '1.5rem', fontWeight: 600, color: '#3b82f6' }}>{fmtMoney(summary.total_earned)}</div>
              </div>
              <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1rem', borderRadius: '8px' }}>
                <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)', marginBottom: '0.25rem' }}>Paid This Month</div>
                <div style={{ fontSize: '1.5rem', fontWeight: 600, color: '#10b981' }}>{fmtMoney(summary.paid_this_month)}</div>
              </div>
              <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1rem', borderRadius: '8px' }}>
                <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)', marginBottom: '0.25rem' }}>Avg Rate</div>
                <div style={{ fontSize: '1.5rem', fontWeight: 600 }}>{fmtPct(summary.avg_rate)}</div>
              </div>
            </div>
          )}

          {/* Filters */}
          <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
            <select className="form-input" style={{ maxWidth: 150 }} value={filter.status} onChange={e => { setFilter({...filter, status: e.target.value}); setPage(1); }}>
              <option value="">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="earned">Earned</option>
              <option value="paid">Paid</option>
              <option value="forfeited">Forfeited</option>
            </select>
            <select className="form-input" style={{ maxWidth: 180 }} value={filter.rep_id} onChange={e => { setFilter({...filter, rep_id: e.target.value}); setPage(1); }}>
              <option value="">All Reps</option>
              {reps.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
            <input type="date" className="form-input" style={{ maxWidth: 140 }} value={filter.from} onChange={e => setFilter({...filter, from: e.target.value})} placeholder="From" />
            <input type="date" className="form-input" style={{ maxWidth: 140 }} value={filter.to} onChange={e => setFilter({...filter, to: e.target.value})} placeholder="To" />
            {selected.length > 0 && (
              <button className="btn btn-primary btn-sm" onClick={handleBatchPay}>Pay Selected ({selected.length})</button>
            )}
          </div>

          {/* Commission Config */}
          {config && (
            <div style={{ background: 'var(--stone-50)', border: '1px solid var(--stone-200)', padding: '0.75rem 1rem', borderRadius: '6px', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '1rem', fontSize: '0.8125rem' }}>
              <span style={{ fontWeight: 600 }}>Commission Config:</span>
              {editingConfig ? (
                <React.Fragment>
                  <label style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>Rate: <input type="number" step="0.01" className="form-input" style={{ width: 80 }} value={configForm.rate} onChange={e => setConfigForm({...configForm, rate: e.target.value})} /></label>
                  <label style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>Cost Ratio: <input type="number" step="0.01" className="form-input" style={{ width: 80 }} value={configForm.default_cost_ratio} onChange={e => setConfigForm({...configForm, default_cost_ratio: e.target.value})} /></label>
                  <button className="btn btn-primary btn-sm" onClick={handleSaveConfig} disabled={saving}>Save</button>
                  <button className="btn btn-secondary btn-sm" onClick={() => setEditingConfig(false)}>Cancel</button>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <span>Rate: {fmtPct(config.rate)}</span>
                  <span>Default Cost Ratio: {fmtPct(config.default_cost_ratio)}</span>
                  <button className="btn btn-secondary btn-sm" onClick={() => setEditingConfig(true)} style={{ marginLeft: 'auto' }}>Edit</button>
                </React.Fragment>
              )}
            </div>
          )}

          {/* Commission Table */}
          {loading ? <p>Loading...</p> : (
            <div style={{ overflowX: 'auto' }}>
              <table className="data-table">
                <thead>
                  <tr>
                    <th><input type="checkbox" checked={selected.length > 0 && selected.length === commissions.filter(c => ['earned','pending'].includes(c.status)).length} onChange={toggleAll} /></th>
                    <th>Order #</th>
                    <th>Rep</th>
                    <th>Order Total</th>
                    <th>Vendor Cost</th>
                    <th>Margin</th>
                    <th>Rate</th>
                    <th>Commission</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {commissions.map(c => (
                    <tr key={c.id}>
                      <td>
                        {['earned', 'pending'].includes(c.status) && (
                          <input type="checkbox" checked={selected.includes(c.id)} onChange={() => toggleSelect(c.id)} />
                        )}
                      </td>
                      <td style={{ fontWeight: 500 }}>{c.order_number}</td>
                      <td>{c.rep_name}</td>
                      <td>{fmtMoney(c.order_total)}</td>
                      <td>{fmtMoney(c.vendor_cost)}</td>
                      <td>{fmtMoney(c.margin)}</td>
                      <td>
                        {editingId === c.id ? (
                          <input type="number" step="0.01" className="form-input" style={{ width: 70 }} value={editForm.commission_rate} onChange={e => setEditForm({...editForm, commission_rate: e.target.value})} />
                        ) : fmtPct(c.commission_rate)}
                      </td>
                      <td>
                        {editingId === c.id ? (
                          <input type="number" step="0.01" className="form-input" style={{ width: 90 }} value={editForm.commission_amount} onChange={e => setEditForm({...editForm, commission_amount: e.target.value})} />
                        ) : fmtMoney(c.commission_amount)}
                      </td>
                      <td>{statusBadge(c.status)}</td>
                      <td style={{ fontSize: '0.8125rem' }}>{fmtDate(c.created_at)}</td>
                      <td>
                        <div style={{ display: 'flex', gap: '0.25rem' }}>
                          {editingId === c.id ? (
                            <React.Fragment>
                              <button className="btn btn-primary btn-sm" onClick={handleSaveEdit} disabled={saving} style={{ fontSize: '0.6875rem' }}>Save</button>
                              <button className="btn btn-secondary btn-sm" onClick={() => setEditingId(null)} style={{ fontSize: '0.6875rem' }}>Cancel</button>
                            </React.Fragment>
                          ) : (
                            <React.Fragment>
                              {c.status === 'pending' && <button className="btn btn-secondary btn-sm" onClick={() => handleApprove(c.id)} style={{ fontSize: '0.6875rem' }}>Approve</button>}
                              {(c.status === 'earned' || c.status === 'pending') && <button className="btn btn-primary btn-sm" onClick={() => handlePay(c.id)} style={{ fontSize: '0.6875rem' }}>Pay</button>}
                              {c.status !== 'paid' && <button className="btn btn-secondary btn-sm" onClick={() => handleEdit(c)} style={{ fontSize: '0.6875rem' }}>Edit</button>}
                            </React.Fragment>
                          )}
                        </div>
                      </td>
                    </tr>
                  ))}
                  {commissions.length === 0 && <tr><td colSpan="11" style={{ textAlign: 'center', padding: '2rem', color: 'var(--stone-400)' }}>No commissions found</td></tr>}
                </tbody>
              </table>
            </div>
          )}

          {/* Pagination */}
          {totalPages > 1 && (
            <div style={{ display: 'flex', justifyContent: 'center', gap: '0.5rem', marginTop: '1rem' }}>
              <button className="btn btn-secondary btn-sm" disabled={page <= 1} onClick={() => setPage(page - 1)}>Previous</button>
              <span style={{ padding: '0.25rem 0.5rem', fontSize: '0.8125rem' }}>Page {page} of {totalPages}</span>
              <button className="btn btn-secondary btn-sm" disabled={page >= totalPages} onClick={() => setPage(page + 1)}>Next</button>
            </div>
          )}
        </div>
      );
    }

    // ========== Expenses Sub-Tab ==========
    function ExpensesSubTab() {
      const [expenses, setExpenses] = useState([]);
      const [categories, setCategories] = useState([]);
      const [total, setTotal] = useState(0);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState({ category_id: '', from: '', to: '', search: '' });
      const [showModal, setShowModal] = useState(false);
      const [editingExpense, setEditingExpense] = useState(null);
      const [summary, setSummary] = useState(null);
      const [form, setForm] = useState({ expense_date: new Date().toISOString().split('T')[0], category_id: '', vendor_name: '', description: '', amount: '', payment_method: '', reference_number: '', is_recurring: false, notes: '' });
      const [saving, setSaving] = useState(false);
      const [receiptFile, setReceiptFile] = useState(null);

      const loadCategories = () => adminFetch('/api/admin/accounting/expense-categories').then(d => setCategories(d.categories || [])).catch(() => {});
      const loadExpenses = () => {
        setLoading(true);
        const params = new URLSearchParams();
        if (filter.category_id) params.set('category_id', filter.category_id);
        if (filter.from) params.set('from', filter.from);
        if (filter.to) params.set('to', filter.to);
        if (filter.search) params.set('search', filter.search);
        adminFetch('/api/admin/accounting/expenses?' + params.toString())
          .then(d => { setExpenses(d.expenses || []); setTotal(d.total || 0); setLoading(false); })
          .catch(() => setLoading(false));
      };
      const loadSummary = () => {
        const params = new URLSearchParams();
        if (filter.from) params.set('from', filter.from);
        if (filter.to) params.set('to', filter.to);
        adminFetch('/api/admin/accounting/expenses/summary?' + params.toString())
          .then(d => setSummary(d)).catch(() => {});
      };

      useEffect(() => { loadCategories(); }, []);
      useEffect(() => { loadExpenses(); loadSummary(); }, [filter.category_id, filter.from, filter.to]);

      const openCreate = () => {
        setEditingExpense(null);
        setReceiptFile(null);
        setForm({ expense_date: new Date().toISOString().split('T')[0], category_id: '', vendor_name: '', description: '', amount: '', payment_method: '', reference_number: '', is_recurring: false, notes: '' });
        setShowModal(true);
      };
      const openEdit = (exp) => {
        setEditingExpense(exp);
        setReceiptFile(null);
        setForm({ expense_date: exp.expense_date ? exp.expense_date.split('T')[0] : '', category_id: exp.category_id, vendor_name: exp.vendor_name || '', description: exp.description || '', amount: exp.amount, payment_method: exp.payment_method || '', reference_number: exp.reference_number || '', is_recurring: exp.is_recurring || false, notes: exp.notes || '' });
        setShowModal(true);
      };
      const handleSave = async () => {
        if (!form.category_id || !form.amount) { alert('Category and amount are required'); return; }
        setSaving(true);
        try {
          let expenseId;
          if (editingExpense) {
            await adminFetch('/api/admin/accounting/expenses/' + editingExpense.id, { method: 'PUT', body: JSON.stringify(form) });
            expenseId = editingExpense.id;
          } else {
            const d = await adminFetch('/api/admin/accounting/expenses', { method: 'POST', body: JSON.stringify(form) });
            expenseId = d.expense?.id;
          }
          if (receiptFile && expenseId) {
            const fd = new FormData();
            fd.append('file', receiptFile);
            await fetch(API + '/api/admin/accounting/expenses/' + expenseId + '/receipt', {
              method: 'POST',
              headers: getAuthHeaders(),
              body: fd
            }).then(r => r.json());
          }
          setShowModal(false);
          setReceiptFile(null);
          loadExpenses();
          loadSummary();
        } catch (err) { alert(err.message); }
        setSaving(false);
      };
      const handleDelete = async (id) => {
        if (!confirm('Delete this expense?')) return;
        try { await adminFetch('/api/admin/accounting/expenses/' + id, { method: 'DELETE' }); loadExpenses(); loadSummary(); } catch (err) { alert(err.message); }
      };
      const viewReceipt = async (id) => {
        try {
          const d = await adminFetch('/api/admin/accounting/expenses/' + id + '/receipt-url');
          if (d.url) window.open(d.url, '_blank');
          else alert('No receipt found');
        } catch (err) { alert(err.message); }
      };

      const fmtMoney = v => '$' + parseFloat(v || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      const topCategory = summary ? (summary.categories || []).find(c => parseFloat(c.total) > 0) : null;
      const thisMonthTotal = expenses.reduce((s, e) => {
        const d = new Date(e.expense_date);
        const now = new Date();
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear() ? s + parseFloat(e.amount) : s;
      }, 0);

      return (
        <div>
          <div className="analytics-grid" style={{ marginBottom: '1.5rem' }}>
            <div className="stat-card"><div className="stat-card-label">This Month</div><div className="stat-card-value">{fmtMoney(thisMonthTotal)}</div></div>
            <div className="stat-card"><div className="stat-card-label">Year Total</div><div className="stat-card-value">{fmtMoney(summary ? summary.grand_total : 0)}</div></div>
            <div className="stat-card"><div className="stat-card-label">Top Category</div><div className="stat-card-value" style={{ fontSize: '1.25rem' }}>{topCategory ? topCategory.category_name : '—'}</div></div>
            <div className="stat-card"><div className="stat-card-label">Total Entries</div><div className="stat-card-value">{total}</div></div>
          </div>

          <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
            <select className="form-input" style={{ maxWidth: 200 }} value={filter.category_id} onChange={e => setFilter(f => ({ ...f, category_id: e.target.value }))}>
              <option value="">All Categories</option>
              {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <input type="date" className="form-input" style={{ maxWidth: 150 }} value={filter.from} onChange={e => setFilter(f => ({ ...f, from: e.target.value }))} />
            <input type="date" className="form-input" style={{ maxWidth: 150 }} value={filter.to} onChange={e => setFilter(f => ({ ...f, to: e.target.value }))} />
            <input type="text" className="form-input" style={{ maxWidth: 200 }} placeholder="Search vendor/description..." value={filter.search} onChange={e => setFilter(f => ({ ...f, search: e.target.value }))} onKeyDown={e => e.key === 'Enter' && loadExpenses()} />
            <button className="btn btn-secondary btn-sm" onClick={loadExpenses}>Search</button>
            <div style={{ flex: 1 }}></div>
            <button className="btn btn-primary btn-sm" onClick={openCreate}>+ Add Expense</button>
          </div>

          <div className="table-scroll-wrapper">
            <table className="admin-table">
              <thead><tr><th>Date</th><th>Category</th><th>Vendor</th><th>Description</th><th style={{ textAlign: 'right' }}>Amount</th><th>Method</th><th>Actions</th></tr></thead>
              <tbody>
                {loading && <tr><td colSpan="7" style={{ textAlign: 'center', color: 'var(--stone-400)' }}>Loading...</td></tr>}
                {!loading && !expenses.length && <tr><td colSpan="7" style={{ textAlign: 'center', color: 'var(--stone-400)' }}>No expenses found</td></tr>}
                {expenses.map(e => (
                  <tr key={e.id}>
                    <td style={{ whiteSpace: 'nowrap', fontSize: '0.8125rem' }}>{e.expense_date ? new Date(e.expense_date).toLocaleDateString() : '—'}</td>
                    <td><span className="badge badge-active" style={{ fontSize: '0.625rem' }}>{e.category_name || '—'}</span></td>
                    <td style={{ fontSize: '0.8125rem' }}>{e.vendor_name || '—'}</td>
                    <td style={{ fontSize: '0.8125rem', maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{e.description || '—'}</td>
                    <td style={{ textAlign: 'right', fontWeight: 500 }}>{fmtMoney(e.amount)}</td>
                    <td style={{ fontSize: '0.8125rem' }}>{e.payment_method || '—'}</td>
                    <td>
                      {e.receipt_url && <button className="btn btn-secondary btn-sm" style={{ marginRight: '0.25rem' }} onClick={() => viewReceipt(e.id)} title="View Receipt">Receipt</button>}
                      <button className="btn btn-secondary btn-sm" style={{ marginRight: '0.25rem' }} onClick={() => openEdit(e)}>Edit</button>
                      <button className="btn btn-sm" style={{ background: 'var(--red-light)', color: 'var(--red)', border: 'none' }} onClick={() => handleDelete(e.id)}>Del</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {showModal && (
            <div className="modal-overlay" onClick={() => setShowModal(false)}>
              <div className="modal-box" style={{ maxWidth: 500 }} onClick={e => e.stopPropagation()}>
                <h3>{editingExpense ? 'Edit Expense' : 'Add Expense'}</h3>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem', marginBottom: '1rem' }}>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label>Date</label>
                    <input type="date" value={form.expense_date} onChange={e => setForm(f => ({ ...f, expense_date: e.target.value }))} />
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label>Category *</label>
                    <select value={form.category_id} onChange={e => setForm(f => ({ ...f, category_id: e.target.value }))}>
                      <option value="">Select...</option>
                      {['cogs', 'operating', 'overhead'].map(type => (
                        <optgroup key={type} label={type.toUpperCase()}>
                          {categories.filter(c => c.expense_type === type && c.is_active).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </optgroup>
                      ))}
                    </select>
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label>Vendor Name</label>
                    <input value={form.vendor_name} onChange={e => setForm(f => ({ ...f, vendor_name: e.target.value }))} placeholder="e.g. Home Depot" />
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label>Amount *</label>
                    <input type="number" step="0.01" min="0" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label>Payment Method</label>
                    <select value={form.payment_method} onChange={e => setForm(f => ({ ...f, payment_method: e.target.value }))}>
                      <option value="">Select...</option>
                      <option value="card">Card</option>
                      <option value="check">Check</option>
                      <option value="cash">Cash</option>
                      <option value="ach">ACH</option>
                      <option value="wire">Wire</option>
                    </select>
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}>
                    <label>Reference #</label>
                    <input value={form.reference_number} onChange={e => setForm(f => ({ ...f, reference_number: e.target.value }))} />
                  </div>
                  <div className="form-group full" style={{ gridColumn: '1/-1', marginBottom: 0 }}>
                    <label>Description</label>
                    <input value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} />
                  </div>
                  <div className="form-group full" style={{ gridColumn: '1/-1', marginBottom: 0 }}>
                    <label>Notes</label>
                    <textarea rows="2" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} />
                  </div>
                  <div className="form-group full" style={{ gridColumn: '1/-1', marginBottom: 0 }}>
                    <label>Receipt</label>
                    <input type="file" accept=".pdf,.jpg,.jpeg,.png" onChange={e => setReceiptFile(e.target.files[0] || null)} />
                    {editingExpense?.receipt_url && !receiptFile && <span style={{ fontSize: '0.75rem', color: 'var(--stone-500)' }}>Current receipt attached</span>}
                  </div>
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving ? 'Saving...' : 'Save'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== Invoices Sub-Tab ==========
    function InvoicesSubTab() {
      const [invoices, setInvoices] = useState([]);
      const [total, setTotal] = useState(0);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState({ status: '', search: '', from: '', to: '' });
      const [detailId, setDetailId] = useState(null);
      const [detail, setDetail] = useState(null);
      const [detailItems, setDetailItems] = useState([]);
      const [detailPayments, setDetailPayments] = useState([]);
      const [showCreate, setShowCreate] = useState(false);
      const [showPayment, setShowPayment] = useState(false);
      const [payForm, setPayForm] = useState({ amount: '', payment_method: 'check', reference_number: '', payment_date: new Date().toISOString().split('T')[0], notes: '' });
      const [createForm, setCreateForm] = useState({ customer_email: '', customer_name: '', payment_terms: 'due_on_receipt', notes: '', items: [{ description: '', qty: 1, unit_price: '' }] });
      const [saving, setSaving] = useState(false);
      const [dashStats, setDashStats] = useState(null);

      const fmtMoney = v => '$' + parseFloat(v || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      const fmtDate = d => d ? new Date(d).toLocaleDateString() : '—';

      const loadInvoices = () => {
        setLoading(true);
        const params = new URLSearchParams();
        if (filter.status) params.set('status', filter.status);
        if (filter.search) params.set('search', filter.search);
        if (filter.from) params.set('from', filter.from);
        if (filter.to) params.set('to', filter.to);
        adminFetch('/api/admin/accounting/invoices?' + params.toString())
          .then(d => { setInvoices(d.invoices || []); setTotal(d.total || 0); setLoading(false); })
          .catch(() => setLoading(false));
      };
      const loadStats = () => {
        adminFetch('/api/admin/accounting/reports/dashboard').then(d => setDashStats(d)).catch(() => {});
      };
      const loadDetail = (id) => {
        setDetailId(id);
        adminFetch('/api/admin/accounting/invoices/' + id)
          .then(d => { setDetail(d.invoice); setDetailItems(d.items || []); setDetailPayments(d.payments || []); })
          .catch(err => alert(err.message));
      };

      useEffect(() => { loadInvoices(); loadStats(); }, []);

      const handleCreate = async () => {
        if (!createForm.customer_name || !createForm.items.some(it => it.description && it.unit_price)) { alert('Customer name and at least one item required'); return; }
        setSaving(true);
        try {
          const payload = { ...createForm, items: createForm.items.filter(it => it.description && it.unit_price) };
          await adminFetch('/api/admin/accounting/invoices', { method: 'POST', body: JSON.stringify(payload) });
          setShowCreate(false);
          loadInvoices();
        } catch (err) { alert(err.message); }
        setSaving(false);
      };

      const handleRecordPayment = async () => {
        if (!payForm.amount || parseFloat(payForm.amount) <= 0) { alert('Enter a valid amount'); return; }
        setSaving(true);
        try {
          await adminFetch('/api/admin/accounting/invoices/' + detailId + '/payments', { method: 'POST', body: JSON.stringify(payForm) });
          loadDetail(detailId);
          setShowPayment(false);
          setPayForm({ amount: '', payment_method: 'check', reference_number: '', payment_date: new Date().toISOString().split('T')[0], notes: '' });
          loadStats();
        } catch (err) { alert(err.message); }
        setSaving(false);
      };

      const handleSend = async (id) => {
        try { await adminFetch('/api/admin/accounting/invoices/' + id + '/send', { method: 'POST' }); alert('Invoice sent'); loadInvoices(); if (detailId === id) loadDetail(id); } catch (err) { alert(err.message); }
      };
      const handleSendReminder = async (id) => {
        if (!confirm('Send a payment reminder email for this invoice?')) return;
        try { await adminFetch('/api/admin/accounting/invoices/' + id + '/send-reminder', { method: 'POST' }); alert('Reminder sent'); } catch (err) { alert(err.message); }
      };
      const handleSendAllReminders = async () => {
        if (!confirm('Send payment reminders to ALL overdue invoices?')) return;
        try {
          const d = await adminFetch('/api/admin/accounting/invoices/send-reminders', { method: 'POST' });
          alert('Sent ' + d.reminders_sent + ' reminder(s) out of ' + d.total_overdue + ' overdue invoice(s)');
        } catch (err) { alert(err.message); }
      };
      const handleVoid = async (id) => {
        if (!confirm('Void this invoice?')) return;
        try { await adminFetch('/api/admin/accounting/invoices/' + id + '/void', { method: 'POST' }); loadInvoices(); if (detailId === id) loadDetail(id); loadStats(); } catch (err) { alert(err.message); }
      };

      const addItem = () => setCreateForm(f => ({ ...f, items: [...f.items, { description: '', qty: 1, unit_price: '' }] }));
      const updateItem = (idx, field, val) => setCreateForm(f => ({ ...f, items: f.items.map((it, i) => i === idx ? { ...it, [field]: val } : it) }));
      const removeItem = (idx) => setCreateForm(f => ({ ...f, items: f.items.filter((_, i) => i !== idx) }));

      // Detail view
      if (detailId && detail) {
        return (
          <div>
            <button className="btn btn-secondary btn-sm" onClick={() => { setDetailId(null); setDetail(null); }} style={{ marginBottom: '1rem' }}>
              &larr; Back to Invoices
            </button>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.5rem' }}>
              <div>
                <h2 style={{ margin: 0, fontFamily: "'Cormorant Garamond', serif", fontWeight: 400 }}>{detail.invoice_number}</h2>
                <p style={{ margin: '0.25rem 0', fontSize: '0.8125rem', color: 'var(--stone-500)' }}>
                  {detail.customer_name} &middot; {detail.customer_email}
                  {detail.order_number && <span> &middot; Order {detail.order_number}</span>}
                </p>
              </div>
              <span className={'badge badge-' + detail.status}>{detail.status}</span>
            </div>

            <div className="analytics-grid" style={{ marginBottom: '1.5rem' }}>
              <div className="stat-card"><div className="stat-card-label">Total</div><div className="stat-card-value">{fmtMoney(detail.total)}</div></div>
              <div className="stat-card"><div className="stat-card-label">Paid</div><div className="stat-card-value">{fmtMoney(detail.amount_paid)}</div></div>
              <div className="stat-card"><div className="stat-card-label">Balance</div><div className="stat-card-value" style={{ color: parseFloat(detail.balance) > 0 ? '#dc2626' : '#16a34a' }}>{fmtMoney(detail.balance)}</div></div>
              <div className="stat-card"><div className="stat-card-label">Due Date</div><div className="stat-card-value" style={{ fontSize: '1.25rem' }}>{fmtDate(detail.due_date)}</div></div>
            </div>

            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1.5rem', flexWrap: 'wrap' }}>
              {detail.status !== 'void' && detail.status !== 'paid' && <button className="btn btn-primary btn-sm" onClick={() => handleSend(detailId)}>Send Invoice</button>}
              {(detail.status === 'overdue' || detail.status === 'partial') && <button className="btn btn-sm" style={{ background: '#fef3c7', color: '#d97706', border: 'none' }} onClick={() => handleSendReminder(detailId)}>Send Reminder</button>}
              {detail.status !== 'void' && detail.status !== 'paid' && <button className="btn btn-sm" style={{ background: '#dcfce7', color: '#166534', border: 'none' }} onClick={() => { setPayForm(f => ({ ...f, amount: parseFloat(detail.balance).toFixed(2) })); setShowPayment(true); }}>Record Payment</button>}
              <a className="btn btn-secondary btn-sm" href={API + '/api/admin/accounting/invoices/' + detailId + '/pdf?preview=true&token=' + encodeURIComponent(sessionStorage.getItem('staff_token'))} target="_blank" rel="noopener">Download PDF</a>
              {detail.status !== 'void' && <button className="btn btn-sm" style={{ background: 'var(--red-light)', color: 'var(--red)', border: 'none' }} onClick={() => handleVoid(detailId)}>Void</button>}
            </div>

            <h3 style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>Line Items</h3>
            <table className="admin-table" style={{ marginBottom: '1.5rem' }}>
              <thead><tr><th>Description</th><th style={{ textAlign: 'center' }}>Qty</th><th style={{ textAlign: 'right' }}>Unit Price</th><th style={{ textAlign: 'right' }}>Amount</th></tr></thead>
              <tbody>
                {detailItems.map(it => (
                  <tr key={it.id}><td>{it.description}</td><td style={{ textAlign: 'center' }}>{parseFloat(it.qty)}</td><td style={{ textAlign: 'right' }}>{fmtMoney(it.unit_price)}</td><td style={{ textAlign: 'right' }}>{fmtMoney(it.subtotal)}</td></tr>
                ))}
              </tbody>
            </table>

            {detailPayments.length > 0 && (
              <div>
                <h3 style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>Payment History</h3>
                <table className="admin-table" style={{ marginBottom: '1.5rem' }}>
                  <thead><tr><th>Date</th><th>Method</th><th>Reference</th><th style={{ textAlign: 'right' }}>Amount</th><th>Recorded By</th></tr></thead>
                  <tbody>
                    {detailPayments.map(p => (
                      <tr key={p.id}><td>{fmtDate(p.payment_date)}</td><td>{p.payment_method}</td><td>{p.reference_number || '—'}</td><td style={{ textAlign: 'right' }}>{fmtMoney(p.amount)}</td><td style={{ fontSize: '0.8125rem' }}>{p.recorded_by_name || '—'}</td></tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {detail.notes && <div style={{ background: 'var(--stone-50)', border: '1px solid var(--stone-200)', padding: '1rem', marginBottom: '1rem' }}>
              <h3 style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>Notes</h3>
              <p style={{ fontSize: '0.875rem', margin: 0 }}>{detail.notes}</p>
            </div>}

            {showPayment && (
              <div className="modal-overlay" onClick={() => setShowPayment(false)}>
                <div className="modal-box" style={{ maxWidth: 420 }} onClick={e => e.stopPropagation()}>
                  <h3>Record Payment</h3>
                  <div style={{ display: 'grid', gap: '0.75rem', marginBottom: '1rem' }}>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Amount ($)</label><input type="number" step="0.01" min="0.01" value={payForm.amount} onChange={e => setPayForm(f => ({ ...f, amount: e.target.value }))} /></div>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Payment Method</label><select value={payForm.payment_method} onChange={e => setPayForm(f => ({ ...f, payment_method: e.target.value }))}><option value="check">Check</option><option value="ach">ACH</option><option value="wire">Wire</option><option value="cash">Cash</option><option value="stripe">Stripe</option></select></div>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Reference #</label><input value={payForm.reference_number} onChange={e => setPayForm(f => ({ ...f, reference_number: e.target.value }))} /></div>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Date</label><input type="date" value={payForm.payment_date} onChange={e => setPayForm(f => ({ ...f, payment_date: e.target.value }))} /></div>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Notes</label><input value={payForm.notes} onChange={e => setPayForm(f => ({ ...f, notes: e.target.value }))} /></div>
                  </div>
                  <div className="modal-actions">
                    <button className="btn btn-secondary" onClick={() => setShowPayment(false)}>Cancel</button>
                    <button className="btn btn-primary" onClick={handleRecordPayment} disabled={saving}>{saving ? 'Saving...' : 'Record Payment'}</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // List view
      const statusTabs = ['', 'draft', 'sent', 'partial', 'overdue', 'paid', 'void'];
      return (
        <div>
          <div className="analytics-grid" style={{ marginBottom: '1.5rem' }}>
            <div className="stat-card"><div className="stat-card-label">Outstanding</div><div className="stat-card-value">{fmtMoney(dashStats ? dashStats.ar.outstanding : 0)}</div></div>
            <div className="stat-card"><div className="stat-card-label">Overdue</div><div className="stat-card-value" style={{ color: dashStats && dashStats.ar.overdue_count > 0 ? '#dc2626' : undefined }}>{dashStats ? dashStats.ar.overdue_count : 0}</div></div>
            <div className="stat-card"><div className="stat-card-label">Paid This Month</div><div className="stat-card-value">{fmtMoney(dashStats ? dashStats.ar.paid_this_month : 0)}</div></div>
            <div className="stat-card"><div className="stat-card-label">Total Invoices</div><div className="stat-card-value">{total}</div></div>
          </div>

          <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
            {statusTabs.map(s => (
              <button key={s} className={filter.status === s ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'} onClick={() => { setFilter(f => ({ ...f, status: s })); setTimeout(loadInvoices, 50); }}>
                {s || 'All'}
              </button>
            ))}
            <input type="text" className="form-input" style={{ maxWidth: 200 }} placeholder="Search..." value={filter.search} onChange={e => setFilter(f => ({ ...f, search: e.target.value }))} onKeyDown={e => e.key === 'Enter' && loadInvoices()} />
            <button className="btn btn-secondary btn-sm" onClick={loadInvoices}>Search</button>
            <div style={{ flex: 1 }}></div>
            <button className="btn btn-sm" style={{ background: '#fef3c7', color: '#d97706', border: 'none' }} onClick={handleSendAllReminders}>Send All Reminders</button>
            <button className="btn btn-primary btn-sm" onClick={() => { setCreateForm({ customer_email: '', customer_name: '', payment_terms: 'due_on_receipt', notes: '', items: [{ description: '', qty: 1, unit_price: '' }] }); setShowCreate(true); }}>+ New Invoice</button>
          </div>

          <div className="table-scroll-wrapper">
            <table className="admin-table">
              <thead><tr><th>Invoice #</th><th>Customer</th><th>Issue Date</th><th>Due Date</th><th style={{ textAlign: 'right' }}>Total</th><th style={{ textAlign: 'right' }}>Balance</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {loading && <tr><td colSpan="8" style={{ textAlign: 'center', color: 'var(--stone-400)' }}>Loading...</td></tr>}
                {!loading && !invoices.length && <tr><td colSpan="8" style={{ textAlign: 'center', color: 'var(--stone-400)' }}>No invoices found</td></tr>}
                {invoices.map(inv => (
                  <tr key={inv.id}>
                    <td style={{ fontWeight: 500 }}>{inv.invoice_number}</td>
                    <td style={{ fontSize: '0.8125rem' }}>{inv.customer_name}<br/><span style={{ color: 'var(--stone-400)' }}>{inv.customer_email}</span></td>
                    <td style={{ fontSize: '0.8125rem', whiteSpace: 'nowrap' }}>{fmtDate(inv.issue_date)}</td>
                    <td style={{ fontSize: '0.8125rem', whiteSpace: 'nowrap' }}>{fmtDate(inv.due_date)}</td>
                    <td style={{ textAlign: 'right', fontWeight: 500 }}>{fmtMoney(inv.total)}</td>
                    <td style={{ textAlign: 'right', fontWeight: 500, color: parseFloat(inv.balance) > 0 ? '#dc2626' : '#16a34a' }}>{fmtMoney(inv.balance)}</td>
                    <td><span className={'badge badge-' + inv.status}>{inv.status}</span></td>
                    <td>
                      <button className="btn btn-secondary btn-sm" onClick={() => loadDetail(inv.id)}>View</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {showCreate && (
            <div className="modal-overlay" onClick={() => setShowCreate(false)}>
              <div className="modal-box" style={{ maxWidth: 600 }} onClick={e => e.stopPropagation()}>
                <h3>New Invoice</h3>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem', marginBottom: '1rem' }}>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Customer Name *</label><input value={createForm.customer_name} onChange={e => setCreateForm(f => ({ ...f, customer_name: e.target.value }))} /></div>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Customer Email</label><input value={createForm.customer_email} onChange={e => setCreateForm(f => ({ ...f, customer_email: e.target.value }))} /></div>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Payment Terms</label>
                    <select value={createForm.payment_terms} onChange={e => setCreateForm(f => ({ ...f, payment_terms: e.target.value }))}>
                      <option value="due_on_receipt">Due on Receipt</option><option value="net_15">Net 15</option><option value="net_30">Net 30</option><option value="net_60">Net 60</option>
                    </select>
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Notes</label><input value={createForm.notes} onChange={e => setCreateForm(f => ({ ...f, notes: e.target.value }))} /></div>
                </div>
                <h4 style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>Line Items</h4>
                {createForm.items.map((it, idx) => (
                  <div key={idx} style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.5rem', alignItems: 'flex-end' }}>
                    <div style={{ flex: 3 }}><input placeholder="Description" value={it.description} onChange={e => updateItem(idx, 'description', e.target.value)} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-300)', fontSize: '0.8125rem' }} /></div>
                    <div style={{ flex: 1 }}><input type="number" min="1" placeholder="Qty" value={it.qty} onChange={e => updateItem(idx, 'qty', e.target.value)} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-300)', fontSize: '0.8125rem' }} /></div>
                    <div style={{ flex: 1 }}><input type="number" step="0.01" placeholder="Price" value={it.unit_price} onChange={e => updateItem(idx, 'unit_price', e.target.value)} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-300)', fontSize: '0.8125rem' }} /></div>
                    <div style={{ flex: 1, textAlign: 'right', fontSize: '0.8125rem', fontWeight: 500, padding: '0.5rem 0' }}>{it.qty && it.unit_price ? fmtMoney(parseFloat(it.qty) * parseFloat(it.unit_price)) : '—'}</div>
                    {createForm.items.length > 1 && <button onClick={() => removeItem(idx)} style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', fontSize: '1rem' }}>&times;</button>}
                  </div>
                ))}
                <button className="btn btn-secondary btn-sm" onClick={addItem} style={{ marginBottom: '1rem' }}>+ Add Line</button>
                <div style={{ textAlign: 'right', fontWeight: 600, marginBottom: '1rem' }}>
                  Total: {fmtMoney(createForm.items.reduce((s, it) => s + (parseFloat(it.qty || 0) * parseFloat(it.unit_price || 0)), 0))}
                </div>
                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowCreate(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={handleCreate} disabled={saving}>{saving ? 'Saving...' : 'Save Draft'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== Bills Sub-Tab ==========
    function BillsSubTab() {
      const [bills, setBills] = useState([]);
      const [total, setTotal] = useState(0);
      const [loading, setLoading] = useState(true);
      const [vendors, setVendors] = useState([]);
      const [filter, setFilter] = useState({ status: '', vendor_id: '', from: '', to: '' });
      const [detailId, setDetailId] = useState(null);
      const [detail, setDetail] = useState(null);
      const [detailItems, setDetailItems] = useState([]);
      const [detailPayments, setDetailPayments] = useState([]);
      const [showCreate, setShowCreate] = useState(false);
      const [showPayment, setShowPayment] = useState(false);
      const [payForm, setPayForm] = useState({ amount: '', payment_method: 'check', reference_number: '', payment_date: new Date().toISOString().split('T')[0], notes: '' });
      const [createForm, setCreateForm] = useState({ bill_number: '', vendor_id: '', bill_date: new Date().toISOString().split('T')[0], due_date: '', payment_terms: 'net_30', notes: '', items: [{ description: '', qty: 1, unit_price: '' }] });
      const [saving, setSaving] = useState(false);
      const [dashStats, setDashStats] = useState(null);

      const fmtMoney = v => '$' + parseFloat(v || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      const fmtDate = d => d ? new Date(d).toLocaleDateString() : '—';

      const loadBills = () => {
        setLoading(true);
        const params = new URLSearchParams();
        if (filter.status) params.set('status', filter.status);
        if (filter.vendor_id) params.set('vendor_id', filter.vendor_id);
        if (filter.from) params.set('from', filter.from);
        if (filter.to) params.set('to', filter.to);
        adminFetch('/api/admin/accounting/bills?' + params.toString())
          .then(d => { setBills(d.bills || []); setTotal(d.total || 0); setLoading(false); })
          .catch(() => setLoading(false));
      };
      const loadVendors = () => adminFetch('/api/admin/vendors').then(d => setVendors(d.vendors || d || [])).catch(() => {});
      const loadStats = () => adminFetch('/api/admin/accounting/reports/dashboard').then(d => setDashStats(d)).catch(() => {});
      const loadDetail = (id) => {
        setDetailId(id);
        adminFetch('/api/admin/accounting/bills/' + id)
          .then(d => { setDetail(d.bill); setDetailItems(d.items || []); setDetailPayments(d.payments || []); })
          .catch(err => alert(err.message));
      };

      useEffect(() => { loadBills(); loadVendors(); loadStats(); }, []);

      const handleCreate = async () => {
        if (!createForm.vendor_id || !createForm.items.some(it => it.description && it.unit_price)) { alert('Vendor and at least one item required'); return; }
        setSaving(true);
        try {
          const payload = { ...createForm, items: createForm.items.filter(it => it.description && it.unit_price) };
          await adminFetch('/api/admin/accounting/bills', { method: 'POST', body: JSON.stringify(payload) });
          setShowCreate(false);
          loadBills();
        } catch (err) { alert(err.message); }
        setSaving(false);
      };

      const handleRecordPayment = async () => {
        if (!payForm.amount || parseFloat(payForm.amount) <= 0) { alert('Enter a valid amount'); return; }
        setSaving(true);
        try {
          await adminFetch('/api/admin/accounting/bills/' + detailId + '/payments', { method: 'POST', body: JSON.stringify(payForm) });
          loadDetail(detailId);
          setShowPayment(false);
          setPayForm({ amount: '', payment_method: 'check', reference_number: '', payment_date: new Date().toISOString().split('T')[0], notes: '' });
          loadStats();
        } catch (err) { alert(err.message); }
        setSaving(false);
      };

      const handleApprove = async (id) => {
        try { await adminFetch('/api/admin/accounting/bills/' + id + '/status', { method: 'PUT', body: JSON.stringify({ status: 'approved' }) }); loadBills(); if (detailId === id) loadDetail(id); } catch (err) { alert(err.message); }
      };
      const handleVoid = async (id) => {
        if (!confirm('Void this bill?')) return;
        try { await adminFetch('/api/admin/accounting/bills/' + id + '/status', { method: 'PUT', body: JSON.stringify({ status: 'void' }) }); loadBills(); if (detailId === id) loadDetail(id); loadStats(); } catch (err) { alert(err.message); }
      };

      const addItem = () => setCreateForm(f => ({ ...f, items: [...f.items, { description: '', qty: 1, unit_price: '' }] }));
      const updateItem = (idx, field, val) => setCreateForm(f => ({ ...f, items: f.items.map((it, i) => i === idx ? { ...it, [field]: val } : it) }));
      const removeItem = (idx) => setCreateForm(f => ({ ...f, items: f.items.filter((_, i) => i !== idx) }));

      // Detail view
      if (detailId && detail) {
        return (
          <div>
            <button className="btn btn-secondary btn-sm" onClick={() => { setDetailId(null); setDetail(null); }} style={{ marginBottom: '1rem' }}>&larr; Back to Bills</button>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.5rem' }}>
              <div>
                <h2 style={{ margin: 0, fontFamily: "'Cormorant Garamond', serif", fontWeight: 400 }}>{detail.internal_bill_number}</h2>
                <p style={{ margin: '0.25rem 0', fontSize: '0.8125rem', color: 'var(--stone-500)' }}>
                  {detail.vendor_name}{detail.bill_number && <span> &middot; Vendor Ref: {detail.bill_number}</span>}
                  {detail.po_number && <span> &middot; PO {detail.po_number}</span>}
                </p>
              </div>
              <span className={'badge badge-' + detail.status}>{detail.status}</span>
            </div>

            <div className="analytics-grid" style={{ marginBottom: '1.5rem' }}>
              <div className="stat-card"><div className="stat-card-label">Total</div><div className="stat-card-value">{fmtMoney(detail.total)}</div></div>
              <div className="stat-card"><div className="stat-card-label">Paid</div><div className="stat-card-value">{fmtMoney(detail.amount_paid)}</div></div>
              <div className="stat-card"><div className="stat-card-label">Balance</div><div className="stat-card-value" style={{ color: parseFloat(detail.balance) > 0 ? '#dc2626' : '#16a34a' }}>{fmtMoney(detail.balance)}</div></div>
              <div className="stat-card"><div className="stat-card-label">Due Date</div><div className="stat-card-value" style={{ fontSize: '1.25rem' }}>{fmtDate(detail.due_date)}</div></div>
            </div>

            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1.5rem', flexWrap: 'wrap' }}>
              {['draft', 'received'].includes(detail.status) && <button className="btn btn-primary btn-sm" onClick={() => handleApprove(detailId)}>Approve</button>}
              {detail.status !== 'void' && detail.status !== 'paid' && <button className="btn btn-sm" style={{ background: '#dcfce7', color: '#166534', border: 'none' }} onClick={() => { setPayForm(f => ({ ...f, amount: parseFloat(detail.balance).toFixed(2) })); setShowPayment(true); }}>Record Payment</button>}
              {detail.status !== 'void' && <button className="btn btn-sm" style={{ background: 'var(--red-light)', color: 'var(--red)', border: 'none' }} onClick={() => handleVoid(detailId)}>Void</button>}
            </div>

            <h3 style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>Line Items</h3>
            <table className="admin-table" style={{ marginBottom: '1.5rem' }}>
              <thead><tr><th>Description</th><th style={{ textAlign: 'center' }}>Qty</th><th style={{ textAlign: 'right' }}>Unit Price</th><th style={{ textAlign: 'right' }}>Amount</th></tr></thead>
              <tbody>
                {detailItems.map(it => (
                  <tr key={it.id}><td>{it.description}</td><td style={{ textAlign: 'center' }}>{parseFloat(it.qty)}</td><td style={{ textAlign: 'right' }}>{fmtMoney(it.unit_price)}</td><td style={{ textAlign: 'right' }}>{fmtMoney(it.subtotal)}</td></tr>
                ))}
              </tbody>
            </table>

            {detailPayments.length > 0 && (
              <div>
                <h3 style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>Payment History</h3>
                <table className="admin-table" style={{ marginBottom: '1.5rem' }}>
                  <thead><tr><th>Date</th><th>Method</th><th>Reference</th><th style={{ textAlign: 'right' }}>Amount</th><th>Recorded By</th></tr></thead>
                  <tbody>
                    {detailPayments.map(p => (
                      <tr key={p.id}><td>{fmtDate(p.payment_date)}</td><td>{p.payment_method}</td><td>{p.reference_number || '—'}</td><td style={{ textAlign: 'right' }}>{fmtMoney(p.amount)}</td><td style={{ fontSize: '0.8125rem' }}>{p.recorded_by_name || '—'}</td></tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {showPayment && (
              <div className="modal-overlay" onClick={() => setShowPayment(false)}>
                <div className="modal-box" style={{ maxWidth: 420 }} onClick={e => e.stopPropagation()}>
                  <h3>Record Payment</h3>
                  <div style={{ display: 'grid', gap: '0.75rem', marginBottom: '1rem' }}>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Amount ($)</label><input type="number" step="0.01" min="0.01" value={payForm.amount} onChange={e => setPayForm(f => ({ ...f, amount: e.target.value }))} /></div>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Payment Method</label><select value={payForm.payment_method} onChange={e => setPayForm(f => ({ ...f, payment_method: e.target.value }))}><option value="check">Check</option><option value="ach">ACH</option><option value="wire">Wire</option></select></div>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Reference #</label><input value={payForm.reference_number} onChange={e => setPayForm(f => ({ ...f, reference_number: e.target.value }))} /></div>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Date</label><input type="date" value={payForm.payment_date} onChange={e => setPayForm(f => ({ ...f, payment_date: e.target.value }))} /></div>
                    <div className="form-group" style={{ marginBottom: 0 }}><label>Notes</label><input value={payForm.notes} onChange={e => setPayForm(f => ({ ...f, notes: e.target.value }))} /></div>
                  </div>
                  <div className="modal-actions"><button className="btn btn-secondary" onClick={() => setShowPayment(false)}>Cancel</button><button className="btn btn-primary" onClick={handleRecordPayment} disabled={saving}>{saving ? 'Saving...' : 'Record Payment'}</button></div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // List view
      const statusTabs = ['', 'draft', 'received', 'approved', 'partial', 'paid', 'void'];
      return (
        <div>
          <div className="analytics-grid" style={{ marginBottom: '1.5rem' }}>
            <div className="stat-card"><div className="stat-card-label">Outstanding</div><div className="stat-card-value">{fmtMoney(dashStats ? dashStats.ap.outstanding : 0)}</div></div>
            <div className="stat-card"><div className="stat-card-label">Pending Approval</div><div className="stat-card-value">{dashStats ? dashStats.ap.pending_approval : 0}</div></div>
            <div className="stat-card"><div className="stat-card-label">Paid This Month</div><div className="stat-card-value">{fmtMoney(dashStats ? dashStats.ap.paid_this_month : 0)}</div></div>
            <div className="stat-card"><div className="stat-card-label">Total Bills</div><div className="stat-card-value">{total}</div></div>
          </div>

          <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
            {statusTabs.map(s => (
              <button key={s} className={filter.status === s ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'} onClick={() => { setFilter(f => ({ ...f, status: s })); setTimeout(loadBills, 50); }}>
                {s || 'All'}
              </button>
            ))}
            <select className="form-input" style={{ maxWidth: 180 }} value={filter.vendor_id} onChange={e => { setFilter(f => ({ ...f, vendor_id: e.target.value })); setTimeout(loadBills, 50); }}>
              <option value="">All Vendors</option>
              {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
            <div style={{ flex: 1 }}></div>
            <button className="btn btn-primary btn-sm" onClick={() => { setCreateForm({ bill_number: '', vendor_id: '', bill_date: new Date().toISOString().split('T')[0], due_date: '', payment_terms: 'net_30', notes: '', items: [{ description: '', qty: 1, unit_price: '' }] }); setShowCreate(true); }}>+ New Bill</button>
          </div>

          <div className="table-scroll-wrapper">
            <table className="admin-table">
              <thead><tr><th>Bill #</th><th>Vendor</th><th>PO #</th><th>Bill Date</th><th>Due Date</th><th style={{ textAlign: 'right' }}>Total</th><th style={{ textAlign: 'right' }}>Balance</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {loading && <tr><td colSpan="9" style={{ textAlign: 'center', color: 'var(--stone-400)' }}>Loading...</td></tr>}
                {!loading && !bills.length && <tr><td colSpan="9" style={{ textAlign: 'center', color: 'var(--stone-400)' }}>No bills found</td></tr>}
                {bills.map(b => (
                  <tr key={b.id}>
                    <td style={{ fontWeight: 500 }}>{b.internal_bill_number}</td>
                    <td style={{ fontSize: '0.8125rem' }}>{b.vendor_name}</td>
                    <td style={{ fontSize: '0.8125rem' }}>{b.po_number || '—'}</td>
                    <td style={{ fontSize: '0.8125rem', whiteSpace: 'nowrap' }}>{fmtDate(b.bill_date)}</td>
                    <td style={{ fontSize: '0.8125rem', whiteSpace: 'nowrap' }}>{fmtDate(b.due_date)}</td>
                    <td style={{ textAlign: 'right', fontWeight: 500 }}>{fmtMoney(b.total)}</td>
                    <td style={{ textAlign: 'right', fontWeight: 500, color: parseFloat(b.balance) > 0 ? '#dc2626' : '#16a34a' }}>{fmtMoney(b.balance)}</td>
                    <td><span className={'badge badge-' + b.status}>{b.status}</span></td>
                    <td><button className="btn btn-secondary btn-sm" onClick={() => loadDetail(b.id)}>View</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {showCreate && (
            <div className="modal-overlay" onClick={() => setShowCreate(false)}>
              <div className="modal-box" style={{ maxWidth: 600 }} onClick={e => e.stopPropagation()}>
                <h3>New Bill</h3>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem', marginBottom: '1rem' }}>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Vendor *</label>
                    <select value={createForm.vendor_id} onChange={e => setCreateForm(f => ({ ...f, vendor_id: e.target.value }))}>
                      <option value="">Select vendor...</option>
                      {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Vendor Bill #</label><input value={createForm.bill_number} onChange={e => setCreateForm(f => ({ ...f, bill_number: e.target.value }))} /></div>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Bill Date</label><input type="date" value={createForm.bill_date} onChange={e => setCreateForm(f => ({ ...f, bill_date: e.target.value }))} /></div>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Due Date</label><input type="date" value={createForm.due_date} onChange={e => setCreateForm(f => ({ ...f, due_date: e.target.value }))} /></div>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Payment Terms</label>
                    <select value={createForm.payment_terms} onChange={e => setCreateForm(f => ({ ...f, payment_terms: e.target.value }))}>
                      <option value="net_15">Net 15</option><option value="net_30">Net 30</option><option value="net_60">Net 60</option><option value="due_on_receipt">Due on Receipt</option>
                    </select>
                  </div>
                  <div className="form-group" style={{ marginBottom: 0 }}><label>Notes</label><input value={createForm.notes} onChange={e => setCreateForm(f => ({ ...f, notes: e.target.value }))} /></div>
                </div>
                <h4 style={{ fontSize: '0.6875rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>Line Items</h4>
                {createForm.items.map((it, idx) => (
                  <div key={idx} style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.5rem', alignItems: 'flex-end' }}>
                    <div style={{ flex: 3 }}><input placeholder="Description" value={it.description} onChange={e => updateItem(idx, 'description', e.target.value)} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-300)', fontSize: '0.8125rem' }} /></div>
                    <div style={{ flex: 1 }}><input type="number" min="1" placeholder="Qty" value={it.qty} onChange={e => updateItem(idx, 'qty', e.target.value)} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-300)', fontSize: '0.8125rem' }} /></div>
                    <div style={{ flex: 1 }}><input type="number" step="0.01" placeholder="Cost" value={it.unit_price} onChange={e => updateItem(idx, 'unit_price', e.target.value)} style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-300)', fontSize: '0.8125rem' }} /></div>
                    <div style={{ flex: 1, textAlign: 'right', fontSize: '0.8125rem', fontWeight: 500, padding: '0.5rem 0' }}>{it.qty && it.unit_price ? fmtMoney(parseFloat(it.qty) * parseFloat(it.unit_price)) : '—'}</div>
                    {createForm.items.length > 1 && <button onClick={() => removeItem(idx)} style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', fontSize: '1rem' }}>&times;</button>}
                  </div>
                ))}
                <button className="btn btn-secondary btn-sm" onClick={addItem} style={{ marginBottom: '1rem' }}>+ Add Line</button>
                <div style={{ textAlign: 'right', fontWeight: 600, marginBottom: '1rem' }}>
                  Total: {fmtMoney(createForm.items.reduce((s, it) => s + (parseFloat(it.qty || 0) * parseFloat(it.unit_price || 0)), 0))}
                </div>
                <div className="modal-actions"><button className="btn btn-secondary" onClick={() => setShowCreate(false)}>Cancel</button><button className="btn btn-primary" onClick={handleCreate} disabled={saving}>{saving ? 'Saving...' : 'Save Bill'}</button></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== Reports Sub-Tab ==========
    function ReportsSubTab() {
      const [period, setPeriod] = useState('monthly');
      const [pnl, setPnl] = useState(null);
      const [loading, setLoading] = useState(true);
      const [arAging, setArAging] = useState(null);
      const [apAging, setApAging] = useState(null);
      const [dashboard, setDashboard] = useState(null);
      const [customFrom, setCustomFrom] = useState('');
      const [customTo, setCustomTo] = useState('');
      const [taxData, setTaxData] = useState(null);
      const [taxLoading, setTaxLoading] = useState(false);
      const [taxFrom, setTaxFrom] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0]);
      const [taxTo, setTaxTo] = useState(new Date().toISOString().split('T')[0]);

      const revenueChartRef = React.useRef(null);
      const revenueChartInstance = React.useRef(null);
      const expenseChartRef = React.useRef(null);
      const expenseChartInstance = React.useRef(null);
      const marginChartRef = React.useRef(null);
      const marginChartInstance = React.useRef(null);
      const taxChartRef = React.useRef(null);
      const taxChartInstance = React.useRef(null);

      const fmtMoney = v => '$' + parseFloat(v || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

      const loadPnl = () => {
        setLoading(true);
        const params = new URLSearchParams({ period });
        if (period === 'custom' && customFrom && customTo) { params.set('from', customFrom); params.set('to', customTo); }
        adminFetch('/api/admin/accounting/reports/pnl?' + params.toString())
          .then(d => { setPnl(d); setLoading(false); })
          .catch(() => setLoading(false));
      };
      const loadAging = () => {
        adminFetch('/api/admin/accounting/ar/aging').then(d => setArAging(d)).catch(() => {});
        adminFetch('/api/admin/accounting/ap/aging').then(d => setApAging(d)).catch(() => {});
      };
      const loadDashboard = () => {
        adminFetch('/api/admin/accounting/reports/dashboard').then(d => setDashboard(d)).catch(() => {});
      };
      const loadTax = () => {
        setTaxLoading(true);
        const params = new URLSearchParams();
        if (taxFrom) params.set('from', taxFrom);
        if (taxTo) params.set('to', taxTo);
        adminFetch('/api/admin/accounting/reports/tax?' + params.toString())
          .then(d => { setTaxData(d); setTaxLoading(false); })
          .catch(() => setTaxLoading(false));
      };

      useEffect(() => { loadPnl(); loadAging(); loadDashboard(); loadTax(); }, [period]);

      // Revenue vs COGS chart
      useEffect(() => {
        if (!dashboard || !dashboard.revenue_vs_cogs || !dashboard.revenue_vs_cogs.length) return;
        const timer = setTimeout(() => {
          if (!revenueChartRef.current) return;
          if (revenueChartInstance.current) revenueChartInstance.current.destroy();
          const data = dashboard.revenue_vs_cogs;
          const ctx = revenueChartRef.current.getContext('2d');
          revenueChartInstance.current = new Chart(ctx, {
            type: 'line',
            data: {
              labels: data.map(d => d.month),
              datasets: [
                { label: 'Revenue', data: data.map(d => d.revenue), borderColor: '#b8960c', backgroundColor: 'rgba(184, 150, 12, 0.08)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#b8960c' },
                { label: 'COGS', data: data.map(d => d.cogs), borderColor: '#dc2626', backgroundColor: 'rgba(220, 38, 38, 0.08)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#dc2626' }
              ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 16 } } }, scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + (v / 1000).toFixed(0) + 'k' } } } }
          });
        }, 50);
        return () => { clearTimeout(timer); if (revenueChartInstance.current) revenueChartInstance.current.destroy(); };
      }, [dashboard]);

      // Expense breakdown doughnut
      useEffect(() => {
        if (!pnl) return;
        const cats = [...(pnl.operating_expenses.categories || []), ...(pnl.overhead.categories || [])].filter(c => c.total > 0);
        if (!cats.length) return;
        const timer = setTimeout(() => {
          if (!expenseChartRef.current) return;
          if (expenseChartInstance.current) expenseChartInstance.current.destroy();
          const colors = ['#b8960c', '#6b8f71', '#dc2626', '#2563eb', '#9333ea', '#0d9488', '#d97706', '#a8a29e', '#ec4899', '#84cc16', '#06b6d4', '#f97316', '#8b5cf6', '#78716c'];
          const ctx = expenseChartRef.current.getContext('2d');
          expenseChartInstance.current = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: cats.map(c => c.name),
              datasets: [{ data: cats.map(c => c.total), backgroundColor: cats.map((_, i) => colors[i % colors.length]) }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12, font: { size: 11 } } } } }
          });
        }, 50);
        return () => { clearTimeout(timer); if (expenseChartInstance.current) expenseChartInstance.current.destroy(); };
      }, [pnl]);

      // Margin trend line
      useEffect(() => {
        if (!dashboard || !dashboard.revenue_vs_cogs || !dashboard.revenue_vs_cogs.length) return;
        const timer = setTimeout(() => {
          if (!marginChartRef.current) return;
          if (marginChartInstance.current) marginChartInstance.current.destroy();
          const data = dashboard.revenue_vs_cogs;
          const ctx = marginChartRef.current.getContext('2d');
          marginChartInstance.current = new Chart(ctx, {
            type: 'line',
            data: {
              labels: data.map(d => d.month),
              datasets: [{
                label: 'Gross Margin %',
                data: data.map(d => d.revenue > 0 ? (((d.revenue - d.cogs) / d.revenue) * 100).toFixed(1) : 0),
                borderColor: '#6b8f71', backgroundColor: 'rgba(107, 143, 113, 0.08)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#6b8f71'
              }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } } }
          });
        }, 50);
        return () => { clearTimeout(timer); if (marginChartInstance.current) marginChartInstance.current.destroy(); };
      }, [dashboard]);

      // Tax monthly bar chart
      useEffect(() => {
        if (!taxData || !taxData.monthly_totals || !taxData.monthly_totals.length) return;
        const timer = setTimeout(() => {
          if (!taxChartRef.current) return;
          if (taxChartInstance.current) taxChartInstance.current.destroy();
          const data = taxData.monthly_totals;
          const ctx = taxChartRef.current.getContext('2d');
          taxChartInstance.current = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: data.map(d => d.month),
              datasets: [{ label: 'Tax Collected', data: data.map(d => d.tax_collected), backgroundColor: 'rgba(184, 150, 12, 0.6)', borderColor: '#b8960c', borderWidth: 1 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v.toFixed(0) } } } }
          });
        }, 50);
        return () => { clearTimeout(timer); if (taxChartInstance.current) taxChartInstance.current.destroy(); };
      }, [taxData]);

      const renderAgingBar = (aging) => {
        if (!aging) return null;
        const buckets = [
          { label: 'Current', value: parseFloat(aging.current), color: '#6b8f71' },
          { label: '1-30', value: parseFloat(aging.days_1_30), color: '#b8960c' },
          { label: '31-60', value: parseFloat(aging.days_31_60), color: '#d97706' },
          { label: '61-90', value: parseFloat(aging.days_61_90), color: '#dc2626' },
          { label: '90+', value: parseFloat(aging.days_90_plus), color: '#7f1d1d' }
        ];
        const total = parseFloat(aging.total_outstanding) || 1;
        return (
          <div>
            <div className="aging-bar">
              {buckets.filter(b => b.value > 0).map(b => (
                <div key={b.label} className="aging-segment" style={{ width: Math.max(b.value / total * 100, 5) + '%', background: b.color }}>{b.label}</div>
              ))}
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: 'var(--stone-500)' }}>
              {buckets.map(b => <span key={b.label}>{b.label}: {fmtMoney(b.value)}</span>)}
            </div>
          </div>
        );
      };

      const handleExport = () => {
        const params = new URLSearchParams({ period });
        if (period === 'custom' && customFrom && customTo) { params.set('from', customFrom); params.set('to', customTo); }
        window.open(API + '/api/admin/accounting/reports/pnl/csv?' + params.toString(), '_blank');
      };

      return (
        <div>
          <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1.5rem', flexWrap: 'wrap', alignItems: 'center' }}>
            {['monthly', 'quarterly', 'yearly'].map(p => (
              <button key={p} className={period === p ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'} onClick={() => setPeriod(p)}>
                {p === 'monthly' ? 'This Month' : p === 'quarterly' ? 'This Quarter' : 'YTD'}
              </button>
            ))}
            <button className={period === 'custom' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'} onClick={() => setPeriod('custom')}>Custom</button>
            {period === 'custom' && (
              <React.Fragment>
                <input type="date" className="form-input" style={{ maxWidth: 140 }} value={customFrom} onChange={e => setCustomFrom(e.target.value)} />
                <input type="date" className="form-input" style={{ maxWidth: 140 }} value={customTo} onChange={e => setCustomTo(e.target.value)} />
                <button className="btn btn-secondary btn-sm" onClick={loadPnl}>Apply</button>
              </React.Fragment>
            )}
            <div style={{ flex: 1 }}></div>
            <button className="btn btn-secondary btn-sm" onClick={handleExport}>Export CSV</button>
          </div>

          {loading && <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--stone-400)' }}>Loading...</div>}

          {!loading && pnl && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
              {/* P&L Statement */}
              <div className="pnl-statement" style={{ gridColumn: '1 / -1' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                  <h2 style={{ margin: 0, fontFamily: "'Cormorant Garamond', serif", fontWeight: 400 }}>Profit & Loss Statement</h2>
                  <span style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{pnl.period.from} to {pnl.period.to}</span>
                </div>

                <div className="pnl-section">
                  <div className="pnl-section-title">Revenue</div>
                  <div className="pnl-line total"><span>Total Revenue ({pnl.revenue.order_count} orders)</span><span>{fmtMoney(pnl.revenue.total)}</span></div>
                </div>

                <div className="pnl-section">
                  <div className="pnl-section-title">Cost of Goods Sold</div>
                  <div className="pnl-line indent"><span>Purchase Order Costs</span><span>{fmtMoney(pnl.cogs.po_cost)}</span></div>
                  <div className="pnl-line indent"><span>COGS Expenses</span><span>{fmtMoney(pnl.cogs.expenses)}</span></div>
                  <div className="pnl-line total"><span>Total COGS</span><span>{fmtMoney(pnl.cogs.total)}</span></div>
                </div>

                <div className="pnl-section">
                  <div className="pnl-line grand-total"><span>Gross Profit<span className="pnl-pct">({pnl.gross_margin_pct}%)</span></span><span>{fmtMoney(pnl.gross_profit)}</span></div>
                </div>

                <div className="pnl-section">
                  <div className="pnl-section-title">Operating Expenses</div>
                  {pnl.operating_expenses.categories.map(c => (
                    <div key={c.name} className="pnl-line indent"><span>{c.name}</span><span>{fmtMoney(c.total)}</span></div>
                  ))}
                  <div className="pnl-line total"><span>Total Operating</span><span>{fmtMoney(pnl.operating_expenses.total)}</span></div>
                </div>

                <div className="pnl-section">
                  <div className="pnl-section-title">Overhead</div>
                  {pnl.overhead.categories.map(c => (
                    <div key={c.name} className="pnl-line indent"><span>{c.name}</span><span>{fmtMoney(c.total)}</span></div>
                  ))}
                  <div className="pnl-line total"><span>Total Overhead</span><span>{fmtMoney(pnl.overhead.total)}</span></div>
                </div>

                <div className="pnl-section">
                  <div className="pnl-line grand-total" style={{ color: pnl.net_income >= 0 ? '#16a34a' : '#dc2626' }}>
                    <span>Net Income<span className="pnl-pct">({pnl.net_margin_pct}%)</span></span><span>{fmtMoney(pnl.net_income)}</span>
                  </div>
                </div>
              </div>

              {/* DSO / DPO KPI Cards */}
              {dashboard && (
                <React.Fragment>
                  <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem', borderRadius: '8px' }}>
                    <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)', marginBottom: '0.25rem' }}>Days Sales Outstanding (DSO)</div>
                    <div style={{ fontSize: '2rem', fontWeight: 600, color: dashboard.dso > 45 ? '#dc2626' : dashboard.dso > 30 ? '#d97706' : '#16a34a' }}>{dashboard.dso}</div>
                    <div style={{ fontSize: '0.6875rem', color: 'var(--stone-400)', marginTop: '0.25rem' }}>Avg days to collect payment</div>
                  </div>
                  <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem', borderRadius: '8px' }}>
                    <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)', marginBottom: '0.25rem' }}>Days Payable Outstanding (DPO)</div>
                    <div style={{ fontSize: '2rem', fontWeight: 600, color: '#3b82f6' }}>{dashboard.dpo}</div>
                    <div style={{ fontSize: '0.6875rem', color: 'var(--stone-400)', marginTop: '0.25rem' }}>Avg days to pay vendors</div>
                  </div>
                </React.Fragment>
              )}

              {/* Revenue vs COGS Chart */}
              <div className="chart-container">
                <h3>Revenue vs COGS</h3>
                <div style={{ height: '300px' }}><canvas ref={revenueChartRef}></canvas></div>
              </div>

              {/* Expense Breakdown */}
              <div className="chart-container">
                <h3>Expense Breakdown</h3>
                <div style={{ height: '300px' }}><canvas ref={expenseChartRef}></canvas></div>
              </div>

              {/* Margin Trend */}
              <div className="chart-container">
                <h3>Gross Margin Trend</h3>
                <div style={{ height: '250px' }}><canvas ref={marginChartRef}></canvas></div>
              </div>

              {/* AR Aging */}
              <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.5rem' }}>
                <h3 style={{ margin: '0 0 1rem', fontSize: '0.875rem' }}>Accounts Receivable Aging</h3>
                {renderAgingBar(arAging)}
                <div style={{ textAlign: 'right', marginTop: '0.75rem', fontWeight: 600 }}>Total: {fmtMoney(arAging ? arAging.total_outstanding : 0)}</div>
              </div>

              {/* AP Aging */}
              <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.5rem', gridColumn: '1 / -1' }}>
                <h3 style={{ margin: '0 0 1rem', fontSize: '0.875rem' }}>Accounts Payable Aging</h3>
