                  <div className="stat-card-value">{analytics.summary.orders}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-card-label">Avg Order Value</div>
                  <div className="stat-card-value">{fmtMoney(analytics.summary.avg_order_value)}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-card-label">Margin</div>
                  <div className="stat-card-value">{analytics.summary.margin_pct}%</div>
                </div>
                {analytics.outstanding_ar && (
                  <div className="stat-card" style={{ cursor: 'pointer' }} onClick={() => navigate('accounting')}>
                    <div className="stat-card-label">Outstanding AR
                      {analytics.outstanding_ar.overdue_count > 0 && (
                        <span style={{ marginLeft: '0.5rem', background: '#dc2626', color: '#fff', fontSize: '0.625rem', padding: '0.1rem 0.4rem', borderRadius: '9px', fontWeight: 600 }}>
                          {analytics.outstanding_ar.overdue_count} overdue
                        </span>
                      )}
                    </div>
                    <div className="stat-card-value">{fmtMoney(analytics.outstanding_ar.balance)}</div>
                  </div>
                )}
                {analytics.pending_commissions && (
                  <div className="stat-card" style={{ cursor: 'pointer' }} onClick={() => navigate('accounting')}>
                    <div className="stat-card-label">Pending Commissions</div>
                    <div className="stat-card-value">{fmtMoney(analytics.pending_commissions.total)}</div>
                    <div style={{ fontSize: '0.7rem', color: 'var(--stone-400)', marginTop: '0.25rem' }}>{analytics.pending_commissions.count} unpaid</div>
                  </div>
                )}
              </div>

              {/* Revenue over time chart */}
              <div className="chart-container">
                <h3>Revenue Over Time</h3>
                {(analytics.revenue_over_time || []).length === 0 && (
                  <div style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '3rem' }}>No data for this period</div>
                )}
                <div style={{ height: '300px', display: (analytics.revenue_over_time || []).length > 0 ? 'block' : 'none' }}>
                  <canvas ref={revenueChartRef}></canvas>
                </div>
              </div>

              {/* Two column: Top Products + Order Status */}
              <div className="analytics-two-col">
                <div className="chart-container" style={{ marginBottom: 0 }}>
                  <h3>Top Products</h3>
                  {(analytics.top_products || []).length === 0 ? (
                    <div style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem' }}>No data for this period</div>
                  ) : (
                    <div className="table-scroll-wrapper">
                    <table className="admin-table">
                      <thead>
                        <tr>
                          <th>#</th>
                          <th>Product</th>
                          <th>Revenue</th>
                          <th>Units</th>
                        </tr>
                      </thead>
                      <tbody>
                        {analytics.top_products.map((p, i) => (
                          <tr key={p.product_id || i}>
                            <td>{i + 1}</td>
                            <td>{p.name || 'Unknown'}</td>
                            <td>{fmtMoney(p.revenue)}</td>
                            <td>{p.units_sold}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    </div>
                  )}
                </div>
                <div className="chart-container" style={{ marginBottom: 0 }}>
                  <h3>Order Status</h3>
                  {(analytics.order_status || []).length === 0 && (
                    <div style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem' }}>No data for this period</div>
                  )}
                  <div style={{ height: '280px', display: (analytics.order_status || []).length > 0 ? 'block' : 'none' }}>
                    <canvas ref={statusChartRef}></canvas>
                  </div>
                </div>
              </div>

              {/* Vendor performance table */}
              {(analytics.vendor_performance || []).length > 0 && (
                <div className="chart-container">
                  <h3>Vendor Performance</h3>
                  <div className="table-scroll-wrapper">
                  <table className="admin-table">
                    <thead>
                      <tr>
                        <th>Vendor</th>
                        <th>Revenue</th>
                        <th>Cost</th>
                        <th>Margin %</th>
                        <th>Margin</th>
                      </tr>
                    </thead>
                    <tbody>
                      {analytics.vendor_performance.map(v => (
                        <tr key={v.vendor_id}>
                          <td>{v.name}</td>
                          <td>{fmtMoney(v.revenue)}</td>
                          <td>{fmtMoney(v.cost)}</td>
                          <td>{v.margin_pct}%</td>
                          <td>
                            <span className="vendor-margin-bar">
                              <span className="vendor-margin-bar-fill" style={{ width: Math.min(v.margin_pct, 100) + '%' }}></span>
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  </div>
                </div>
              )}
            </React.Fragment>
          ) : (
            <div style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '3rem' }}>Failed to load analytics</div>
          )}

          {/* Existing inventory count cards */}
          <div className="stat-grid" style={{ marginTop: '1rem' }}>
            {[
              { label: 'Orders', value: stats.counts.orders },
              { label: 'Products', value: stats.counts.products },
              { label: 'Vendors', value: stats.counts.vendors },
              { label: 'Categories', value: stats.counts.categories },
              { label: 'SKUs', value: stats.counts.skus },
            ].map(c => (
              <div key={c.label} className="stat-card">
                <div className="stat-card-label">{c.label}</div>
                <div className="stat-card-value">{c.value}</div>
              </div>
            ))}
          </div>

          {/* Recent Orders */}
          <div className="form-card">
            <h3>Recent Orders</h3>
            <div className="table-scroll-wrapper">
            <table className="admin-table">
              <thead>
                <tr>
                  <th>Order #</th>
                  <th>Customer</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                {(stats.recent_orders || []).map(o => (
                  <tr key={o.id}>
                    <td><a style={{ cursor: 'pointer', color: 'var(--stone-800)', textDecoration: 'underline' }} onClick={() => navigate('order-detail', o.id)}>{o.order_number}</a></td>
                    <td>{o.customer_name}</td>
                    <td>${parseFloat(o.total).toFixed(2)}</td>
                    <td><span className={'badge badge-' + o.status}>{o.status}</span></td>
                    <td style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{new Date(o.created_at).toLocaleDateString()}</td>
                  </tr>
                ))}
                {(stats.recent_orders || []).length === 0 && (
                  <tr><td colSpan="5" style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem' }}>No orders yet</td></tr>
                )}
              </tbody>
            </table>
            </div>
          </div>

          {/* Recent Products */}
          <div className="form-card">
            <h3>Recent Products</h3>
            <div className="table-scroll-wrapper">
            <table className="admin-table">
              <thead>
                <tr>
                  <th>Vendor</th>
                  <th>Name</th>
                  <th>Status</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody>
                {(stats.recent_products || []).map(p => (
                  <tr key={p.id}>
                    <td>{p.vendor_name || '—'}</td>
                    <td><a style={{ cursor: 'pointer', color: 'var(--stone-800)', textDecoration: 'underline' }} onClick={() => navigate('product-edit', p.id)}>{p.name}</a></td>
                    <td><span className={'badge badge-' + (p.status || 'draft')}>{p.status || 'draft'}</span></td>
                    <td style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{new Date(p.created_at).toLocaleDateString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            </div>
          </div>
        </div>
      );
    }

    // ========== ProductsListView ==========
    const PAGE_SIZE = 50;

    function ProductsListView({ navigate, onReady }) {
      const [products, setProducts] = useState([]);
      const [total, setTotal] = useState(0);
      const [loading, setLoading] = useState(true);
      const [loadingMore, setLoadingMore] = useState(false);
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [selected, setSelected] = useState(new Set());
      const [categories, setCategories] = useState([]);
      const [bulkCategory, setBulkCategory] = useState('');
      const [searchTerm, setSearchTerm] = useState('');
      const [filterVendor, setFilterVendor] = useState('');
      const [filterCategory, setFilterCategory] = useState('');
      const [filterStatus, setFilterStatus] = useState('');
      const [filterQuality, setFilterQuality] = useState('');
      const [filterMissing, setFilterMissing] = useState('');
      const [vendors, setVendors] = useState([]);
      const [sortCol, setSortCol] = useState('vendor');
      const [sortDir, setSortDir] = useState('asc');

      const clearSelection = () => { setSelected(new Set()); setBulkCategory(''); };

      const searchTimerRef = useRef(null);

      const buildQuery = (offset = 0) => {
        const params = new URLSearchParams();
        params.set('limit', PAGE_SIZE);
        params.set('offset', offset);
        if (searchTerm) params.set('search', searchTerm);
        if (filterVendor) params.set('vendor_id', filterVendor);
        if (filterCategory) params.set('category_id', filterCategory);
        if (filterStatus) params.set('status', filterStatus);
        if (filterQuality) params.set('quality', filterQuality);
        if (filterMissing) params.set('missing', filterMissing);
        params.set('sort', sortCol);
        params.set('sort_dir', sortDir);
        return params.toString();
      };

      const loadFresh = () => {
        setLoading(true);
        clearSelection();
        adminFetch(`/api/admin/products?${buildQuery(0)}`)
          .then(data => {
            setProducts(data.products || []);
            setTotal(data.total || 0);
            setLoading(false);
            if (onReady) requestAnimationFrame(onReady);
          })
          .catch(() => setLoading(false));
      };

      const loadMore = () => {
        setLoadingMore(true);
        adminFetch(`/api/admin/products?${buildQuery(products.length)}`)
          .then(data => {
            setProducts(prev => [...prev, ...(data.products || [])]);
            setTotal(data.total || 0);
            setLoadingMore(false);
          })
          .catch(() => setLoadingMore(false));
      };

      useEffect(() => {
        loadFresh();
        adminFetch('/api/admin/categories').then(d => setCategories(d.flat || [])).catch(() => {});
        adminFetch('/api/admin/vendors').then(d => setVendors(d.vendors || [])).catch(() => {});
      }, []);

      // Reload when filters or sort change
      useEffect(() => {
        if (loading) return; // skip initial mount
        loadFresh();
      }, [filterVendor, filterCategory, filterStatus, filterQuality, filterMissing, sortCol, sortDir]);

      // Debounced search
      useEffect(() => {
        if (loading) return;
        if (searchTimerRef.current) clearTimeout(searchTimerRef.current);
        searchTimerRef.current = setTimeout(() => loadFresh(), 300);
        return () => clearTimeout(searchTimerRef.current);
      }, [searchTerm]);

      const handleDelete = () => {
        if (!deleteTarget) return;
        adminFetch('/api/admin/products/' + deleteTarget.id, { method: 'DELETE' })
          .then(() => { setDeleteTarget(null); loadFresh(); })
          .catch(() => {});
      };

      const toggleSelect = (id) => {
        setSelected(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      };

      const toggleSort = (col) => {
        if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortCol(col); setSortDir('asc'); }
      };

      const SortHeader = ({ col, children }) => (
        <th className={'sortable' + (sortCol === col ? ' sorted' : '')} onClick={() => toggleSort(col)}>
          {children}<span className="sort-arrow">{sortCol === col ? (sortDir === 'asc' ? ' \u25B2' : ' \u25BC') : ' \u25B2'}</span>
        </th>
      );

      const allSelected = selected.size === products.length && products.length > 0;
      const toggleAll = () => {
        if (allSelected) setSelected(new Set());
        else setSelected(new Set(products.map(p => p.id)));
      };

      const bulkSetStatus = (status) => {
        const ids = Array.from(selected);
        adminFetch('/api/admin/products/bulk/status', {
          method: 'PATCH',
          body: JSON.stringify({ ids, status })
        }).then(() => loadFresh()).catch(() => {});
      };

      const bulkSetCategory = () => {
        const ids = Array.from(selected);
        adminFetch('/api/admin/products/bulk/category', {
          method: 'PATCH',
          body: JSON.stringify({ ids, category_id: bulkCategory || null })
        }).then(() => loadFresh()).catch(() => {});
      };

      const bulkDelete = () => {
        const ids = Array.from(selected);
        if (!window.confirm(`Delete ${ids.length} product(s)? This will also delete all associated SKUs, packaging, and pricing data.`)) return;
        adminFetch('/api/admin/products/bulk', {
          method: 'DELETE',
          body: JSON.stringify({ ids })
        }).then(() => loadFresh()).catch(() => {});
      };

      // Bulk tag management
      const [bulkTagModalOpen, setBulkTagModalOpen] = useState(false);
      const [bulkAllTags, setBulkAllTags] = useState([]);
      const [bulkTagGrouped, setBulkTagGrouped] = useState({});
      const [bulkAddTagIds, setBulkAddTagIds] = useState([]);
      const [bulkRemoveTagIds, setBulkRemoveTagIds] = useState([]);
      const [bulkTagSaving, setBulkTagSaving] = useState(false);

      const openBulkTagModal = () => {
        setBulkAddTagIds([]);
        setBulkRemoveTagIds([]);
        if (bulkAllTags.length === 0) {
          adminFetch('/api/admin/tags').then(d => { setBulkAllTags(d.tags || []); setBulkTagGrouped(d.grouped || {}); }).catch(() => {});
        }
        setBulkTagModalOpen(true);
      };

      const toggleBulkAddTag = (tagId) => {
        setBulkRemoveTagIds(prev => prev.filter(id => id !== tagId));
        setBulkAddTagIds(prev => prev.includes(tagId) ? prev.filter(id => id !== tagId) : [...prev, tagId]);
      };

      const toggleBulkRemoveTag = (tagId) => {
        setBulkAddTagIds(prev => prev.filter(id => id !== tagId));
        setBulkRemoveTagIds(prev => prev.includes(tagId) ? prev.filter(id => id !== tagId) : [...prev, tagId]);
      };

      const applyBulkTags = () => {
        if (bulkAddTagIds.length === 0 && bulkRemoveTagIds.length === 0) return;
        setBulkTagSaving(true);
        adminFetch('/api/admin/products/bulk/tags', {
          method: 'PATCH',
          body: JSON.stringify({ product_ids: Array.from(selected), add_tag_ids: bulkAddTagIds, remove_tag_ids: bulkRemoveTagIds })
        }).then(() => { setBulkTagModalOpen(false); setBulkTagSaving(false); })
          .catch(() => setBulkTagSaving(false));
      };

      const hasMore = products.length < total;

      if (loading) return <div className="loading">Loading products...</div>;

      return (
        <div>
          <div className="content-header">
            <h1>Products</h1>
            <div style={{ display: 'flex', gap: '0.5rem' }}>
              <button className="btn btn-secondary" onClick={() => navigate('bulk-import')}>Import</button>
              <button className="btn btn-primary" onClick={() => navigate('product-create')}>+ Add Product</button>
            </div>
          </div>

          <div className="filter-bar">
            <input type="text" placeholder="Search products..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
            <select value={filterVendor} onChange={e => setFilterVendor(e.target.value)}>
              <option value="">All Vendors</option>
              {vendors.filter(v => v.active_product_count > 0).map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
            <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)}>
              <option value="">All Categories</option>
              {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="draft">Draft</option>
              <option value="discontinued">Discontinued</option>
            </select>
            <select value={filterQuality} onChange={e => setFilterQuality(e.target.value)}>
              <option value="">All Quality</option>
              <option value="good">Good (80+)</option>
              <option value="fair">Fair (50-79)</option>
              <option value="poor">Poor (&lt;50)</option>
            </select>
            <select value={filterMissing} onChange={e => setFilterMissing(e.target.value)}>
              <option value="">All Data</option>
              <option value="no_image">Missing Image</option>
              <option value="no_price">Missing Price</option>
              <option value="no_color">Missing Color</option>
              <option value="no_category">Missing Category</option>
              <option value="no_description">Missing Description</option>
            </select>
            <span className="filter-count">Showing {products.length} of {total} products</span>
          </div>

          {selected.size > 0 && (
            <div className="bulk-toolbar">
              <span className="bulk-count">{selected.size} selected</span>
              <button className="btn btn-secondary btn-sm" onClick={() => bulkSetStatus('active')}>Set Active</button>
              <button className="btn btn-secondary btn-sm" onClick={() => bulkSetStatus('draft')}>Set Draft</button>
              <button className="btn btn-secondary btn-sm" style={{ color: 'var(--red)' }} onClick={() => bulkSetStatus('discontinued')}>Set Discontinued</button>
              <select value={bulkCategory} onChange={e => setBulkCategory(e.target.value)}>
                <option value="">— Choose Category —</option>
                {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <button className="btn btn-secondary btn-sm" onClick={bulkSetCategory}>Apply</button>
              <button className="btn btn-secondary btn-sm" onClick={openBulkTagModal}>Tags</button>
              <button className="btn btn-danger btn-sm" onClick={bulkDelete}>Delete</button>
            </div>
          )}

          {/* Bulk Tag Modal */}
          {bulkTagModalOpen && (
            <div className="modal-overlay" onClick={() => setBulkTagModalOpen(false)}>
              <div className="modal" style={{ maxWidth: '540px' }} onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  <h2>Manage Tags ({selected.size} products)</h2>
                  <button className="modal-close" onClick={() => setBulkTagModalOpen(false)}>&times;</button>
                </div>
                <div className="modal-body" style={{ maxHeight: '60vh', overflowY: 'auto' }}>
                  <p style={{ fontSize: '0.8125rem', color: 'var(--stone-500)', marginBottom: '1rem' }}>
                    Click once to <strong>add</strong> (green). Click again to <strong>remove</strong> (red). Click again to reset.
                  </p>
                  {Object.entries(bulkTagGrouped).map(([cat, tags]) => (
                    <div key={cat} style={{ marginBottom: '1rem' }}>
                      <div style={{ fontSize: '0.75rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>
                        {cat.charAt(0).toUpperCase() + cat.slice(1)}
                      </div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.375rem' }}>
                        {tags.map(tag => {
                          const isAdd = bulkAddTagIds.includes(tag.id);
                          const isRemove = bulkRemoveTagIds.includes(tag.id);
                          return (
                            <button key={tag.id}
                              onClick={() => {
                                if (isAdd) { setBulkAddTagIds(p => p.filter(i => i !== tag.id)); setBulkRemoveTagIds(p => [...p, tag.id]); }
                                else if (isRemove) { setBulkRemoveTagIds(p => p.filter(i => i !== tag.id)); }
                                else { toggleBulkAddTag(tag.id); }
                              }}
                              style={{
                                padding: '0.375rem 0.75rem',
                                border: '1px solid ' + (isAdd ? '#22c55e' : isRemove ? '#ef4444' : 'var(--stone-200)'),
                                background: isAdd ? '#dcfce7' : isRemove ? '#fef2f2' : 'white',
                                color: isAdd ? '#166534' : isRemove ? '#991b1b' : 'var(--stone-600)',
                                fontSize: '0.75rem', cursor: 'pointer', borderRadius: '100px', fontFamily: 'var(--font-body)', transition: 'all 0.15s'
                              }}>
                              {isAdd ? '+ ' : isRemove ? '- ' : ''}{tag.name}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="modal-footer" style={{ display: 'flex', justifyContent: 'flex-end', gap: '0.75rem', padding: '1rem 1.5rem', borderTop: '1px solid var(--stone-200)' }}>
                  <button className="btn btn-secondary" onClick={() => setBulkTagModalOpen(false)}>Cancel</button>
                  <button className="btn btn-primary" onClick={applyBulkTags} disabled={bulkTagSaving || (bulkAddTagIds.length === 0 && bulkRemoveTagIds.length === 0)}>
                    {bulkTagSaving ? 'Applying...' : `Apply (${bulkAddTagIds.length} add, ${bulkRemoveTagIds.length} remove)`}
                  </button>
                </div>
              </div>
            </div>
          )}

          <div className="table-scroll-wrapper">
          <table className="admin-table">
            <thead>
              <tr>
                <th style={{ width: '40px' }}><input type="checkbox" checked={allSelected} onChange={toggleAll} /></th>
                <SortHeader col="vendor">Vendor</SortHeader>
                <SortHeader col="name">Name</SortHeader>
                <SortHeader col="category">Category</SortHeader>
                <SortHeader col="price">Price</SortHeader>
                <SortHeader col="skus">SKUs</SortHeader>
                <SortHeader col="quality">Quality</SortHeader>
                <SortHeader col="status">Status</SortHeader>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {products.map(p => {
                const qs = p.quality_score;
                const qClass = qs >= 80 ? 'quality-good' : qs >= 50 ? 'quality-fair' : qs != null ? 'quality-poor' : 'quality-na';
                const flags = p.quality_flags || {};
                const missingItems = [];
                if (flags.has_image === 0) missingItems.push('No image');
                if (flags.has_retail === 0) missingItems.push('No price');
                if (flags.has_cost === 0) missingItems.push('No cost');
                if (flags.has_color === 0) missingItems.push('No color');
                if (flags.has_description === 0) missingItems.push('No desc');
                if (!p.category_name) missingItems.push('No category');
                return (
                <tr key={p.id}>
                  <td><input type="checkbox" checked={selected.has(p.id)} onChange={() => toggleSelect(p.id)} /></td>
                  <td>{p.vendor_name || '—'}</td>
                  <td style={{ fontWeight: 500, display: 'flex', alignItems: 'center', gap: '0.625rem' }}>
                    {p.primary_image ? (
                      <img src={optimizeImg(p.primary_image, 100)} alt="" style={{ width: '36px', height: '36px', objectFit: 'cover', borderRadius: '4px', flexShrink: 0 }} loading="lazy" />
                    ) : (
                      <span style={{ width: '36px', height: '36px', borderRadius: '4px', background: 'var(--stone-100)', display: 'inline-block', flexShrink: 0 }} />
                    )}
                    {p.name}
                  </td>
                  <td>{p.category_name || '—'}</td>
                  <td>{p.price ? '$' + parseFloat(p.price).toFixed(2) : '—'}</td>
                  <td>{p.sku_count}</td>
                  <td>
                    <span className={'quality-badge ' + qClass}>{qs != null ? qs : '—'}</span>
                    {missingItems.length > 0 && (
                      <div className="missing-flags">
                        {missingItems.map(m => <span key={m} className="missing-flag">{m}</span>)}
                      </div>
                    )}
                  </td>
                  <td><span className={'badge badge-' + (p.status || 'draft')}>{p.status || 'draft'}</span></td>
                  <td className="actions">
                    <button className="btn btn-secondary btn-sm" onClick={() => navigate('product-edit', p.id)}>Edit</button>
                    <button className="btn btn-danger btn-sm" onClick={() => setDeleteTarget(p)}>Delete</button>
                  </td>
                </tr>
                );
              })}
              {products.length === 0 && (
                <tr><td colSpan="9" style={{ textAlign: 'center', color: 'var(--stone-400)', padding: '2rem' }}>No products found</td></tr>
              )}
            </tbody>
          </table>
          </div>

          {hasMore && (
            <div style={{ textAlign: 'center', padding: '1.5rem 0' }}>
              <button
                className="btn btn-secondary"
                onClick={loadMore}
                disabled={loadingMore}
                style={{ minWidth: '200px' }}
              >
                {loadingMore ? 'Loading...' : `Load More (${total - products.length} remaining)`}
              </button>
            </div>
          )}

          {deleteTarget && (
            <DeleteConfirmModal
              title="Delete Product"
              message={`Are you sure you want to delete "${deleteTarget.name}"? This will also delete all associated SKUs, packaging, and pricing data.`}
              onConfirm={handleDelete}
              onCancel={() => setDeleteTarget(null)}
            />
          )}
        </div>
      );
    }

    // ========== CollapsibleSection ==========
    function CollapsibleSection({ title, defaultOpen = true, headerRight, children }) {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div className={'form-card' + (open ? '' : ' collapsed')}>
          <div className="form-card-header" onClick={() => setOpen(o => !o)}>
            <h3>{title}</h3>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              {headerRight}
              <span className={'toggle-icon' + (open ? '' : ' collapsed')}>&#9660;</span>
            </div>
          </div>
          {open && <div className="form-card-body">{children}</div>}
        </div>
      );
    }

    // ========== ProductFormView ==========
    function ProductFormView({ navigate, editId }) {
      const [form, setForm] = useState({ name: '', collection: '', vendor_id: '', category_id: '', status: 'draft', description_short: '', description_long: '' });
      const [skus, setSkus] = useState([]);
      const [media, setMedia] = useState([]);
      const [vendors, setVendors] = useState([]);
      const [categories, setCategories] = useState([]);
      const [loading, setLoading] = useState(!!editId);
      const [saving, setSaving] = useState(false);
      const [allTags, setAllTags] = useState([]);
      const [tagGrouped, setTagGrouped] = useState({});
      const [productTagIds, setProductTagIds] = useState([]);
      const [tagSaving, setTagSaving] = useState(false);

      useEffect(() => {
        adminFetch('/api/admin/vendors').then(d => setVendors(d.vendors || [])).catch(() => {});
        adminFetch('/api/admin/categories').then(d => setCategories(d.flat || [])).catch(() => {});
        adminFetch('/api/admin/tags').then(d => { setAllTags(d.tags || []); setTagGrouped(d.grouped || {}); }).catch(() => {});

        if (editId) {
          adminFetch('/api/admin/products/' + editId)
            .then(data => {
              const p = data.product;
              setForm({
                name: p.name || '',
                collection: p.collection || '',
                vendor_id: p.vendor_id || '',
                category_id: p.category_id || '',
                status: p.status || 'draft',
                description_short: p.description_short || '',
                description_long: p.description_long || ''
              });
              setSkus((data.skus || []).map(s => ({ ...s, _existing: true })));
              setMedia(data.media || []);
              setLoading(false);
            })
            .catch(() => setLoading(false));
          adminFetch('/api/admin/products/' + editId + '/tags')
            .then(d => setProductTagIds(d.tag_ids || []))
            .catch(() => {});
        }
      }, [editId]);

      const toggleTag = (tagId) => {
        setProductTagIds(prev => prev.includes(tagId) ? prev.filter(id => id !== tagId) : [...prev, tagId]);
      };

      const saveTags = async () => {
        if (!editId) return;
        setTagSaving(true);
        try {
          await adminFetch('/api/admin/products/' + editId + '/tags', {
            method: 'PUT',
            body: JSON.stringify({ tag_ids: productTagIds })
          });
        } catch (e) { alert('Failed to save tags'); }
        setTagSaving(false);
      };

      const updateForm = (field, value) => setForm(prev => ({ ...prev, [field]: value }));

      const addSku = () => {
        setSkus(prev => [...prev, {
          _new: true, _key: Date.now(),
          vendor_sku: '', internal_sku: '', variant_name: '', sell_by: 'sqft',
          sqft_per_box: '', pieces_per_box: '', weight_per_box_lbs: '', freight_class: '70',
          boxes_per_pallet: '', sqft_per_pallet: '', weight_per_pallet_lbs: '',
          cost: '', retail_price: '', price_basis: 'per_sqft',
          cut_price: '', roll_price: '', cut_cost: '', roll_cost: '', roll_min_sqft: '', roll_width_ft: ''
        }]);
      };

      const updateSku = (index, field, value) => {
        setSkus(prev => prev.map((s, i) => i === index ? { ...s, [field]: value } : s));
      };

      const removeSku = (index) => {
        const sku = skus[index];
        if (sku._existing && sku.id) {
          adminFetch('/api/admin/skus/' + sku.id, { method: 'DELETE' }).catch(() => {});
        }
        setSkus(prev => prev.filter((_, i) => i !== index));
      };

      const handleSave = async () => {
        if (!form.name.trim()) { alert('Product name is required'); return; }
        setSaving(true);

        try {
          let productId = editId;

          if (editId) {
            const data = await adminFetch('/api/admin/products/' + editId, {
              method: 'PUT',
              body: JSON.stringify(form)
            });
            productId = data.product.id;
          } else {
            const data = await adminFetch('/api/admin/products', {
              method: 'POST',
              body: JSON.stringify(form)
            });
            productId = data.product.id;
          }

          // Save SKUs
          for (const sku of skus) {
            const skuData = {
              vendor_sku: sku.vendor_sku,
              internal_sku: sku.internal_sku,
              variant_name: sku.variant_name,
              sell_by: sku.sell_by || 'sqft',
              sqft_per_box: sku.sqft_per_box ? parseFloat(sku.sqft_per_box) : null,
              pieces_per_box: sku.pieces_per_box ? parseInt(sku.pieces_per_box) : null,
              weight_per_box_lbs: sku.weight_per_box_lbs ? parseFloat(sku.weight_per_box_lbs) : null,
              freight_class: sku.freight_class ? parseInt(sku.freight_class) : 70,
              boxes_per_pallet: sku.boxes_per_pallet ? parseInt(sku.boxes_per_pallet) : null,
              sqft_per_pallet: sku.sqft_per_pallet ? parseFloat(sku.sqft_per_pallet) : null,
              weight_per_pallet_lbs: sku.weight_per_pallet_lbs ? parseFloat(sku.weight_per_pallet_lbs) : null,
              cost: sku.cost ? parseFloat(sku.cost) : null,
              retail_price: sku.retail_price ? parseFloat(sku.retail_price) : null,
              price_basis: sku.price_basis || 'per_sqft',
              cut_price: sku.cut_price ? parseFloat(sku.cut_price) : null,
              roll_price: sku.roll_price ? parseFloat(sku.roll_price) : null,
              cut_cost: sku.cut_cost ? parseFloat(sku.cut_cost) : null,
              roll_cost: sku.roll_cost ? parseFloat(sku.roll_cost) : null,
              roll_min_sqft: sku.roll_min_sqft ? parseFloat(sku.roll_min_sqft) : null,
              roll_width_ft: sku.roll_width_ft ? parseFloat(sku.roll_width_ft) : null,
              roll_length_ft: sku.roll_length_ft ? parseFloat(sku.roll_length_ft) : null
            };

            if (sku._existing && sku.id) {
              await adminFetch('/api/admin/skus/' + sku.id, {
                method: 'PUT',
                body: JSON.stringify(skuData)
              });
            } else if (sku._new && sku.vendor_sku && sku.internal_sku) {
              await adminFetch('/api/admin/products/' + productId + '/skus', {
                method: 'POST',
                body: JSON.stringify(skuData)
              });
            }
          }

          navigate('products');
        } catch (err) {
          alert('Save failed: ' + err.message);
        } finally {
          setSaving(false);
        }
      };

      if (loading) return <div className="loading">Loading product...</div>;

      return (
        <div>
          <div className="content-header">
            <h1>{editId ? 'Edit Product' : 'New Product'}</h1>
            <div style={{ display: 'flex', gap: '0.75rem' }}>
              <button className="btn btn-secondary" onClick={() => navigate('products')}>Cancel</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
                {saving ? 'Saving...' : 'Save Product'}
              </button>
            </div>
          </div>

          <CollapsibleSection title="Product Details" defaultOpen={true}>
            <div className="form-grid">
              <div className="form-group">
                <label>Product Name *</label>
                <input value={form.name} onChange={e => updateForm('name', e.target.value)} placeholder="e.g. Calacatta Gold Marble" />
              </div>
              <div className="form-group">
                <label>Collection</label>
                <input value={form.collection} onChange={e => updateForm('collection', e.target.value)} placeholder="e.g. Natural Stone Collection" />
              </div>
              <div className="form-group">
                <label>Vendor</label>
                <select value={form.vendor_id} onChange={e => updateForm('vendor_id', e.target.value)}>
                  <option value="">Select vendor...</option>
                  {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Category</label>
                <select value={form.category_id} onChange={e => updateForm('category_id', e.target.value)}>
                  <option value="">Select category...</option>
                  {categories.map(c => (
                    <option key={c.id} value={c.id}>{c.parent_id ? '  -- ' : ''}{c.name}</option>
                  ))}
                </select>
              </div>
              <div className="form-group">
                <label>Status</label>
                <select value={form.status} onChange={e => updateForm('status', e.target.value)}>
                  <option value="draft">Draft</option>
                  <option value="active">Active</option>
                  <option value="discontinued">Discontinued</option>
                </select>
              </div>
              <div className="form-group full">
                <label>Short Description</label>
                <input value={form.description_short} onChange={e => updateForm('description_short', e.target.value)} placeholder="Brief product description" />
              </div>
              <div className="form-group full">
                <label>Long Description</label>
                <textarea value={form.description_long} onChange={e => updateForm('description_long', e.target.value)} placeholder="Detailed product description" />
              </div>
            </div>
          </CollapsibleSection>

          {editId && (
            <CollapsibleSection title={`Media (${media.length})`} defaultOpen={true}>
              <ProductMediaManager productId={editId} media={media} setMedia={setMedia} />
            </CollapsibleSection>
          )}

          {editId && allTags.length > 0 && (
            <CollapsibleSection title={`Tags (${productTagIds.length})`} defaultOpen={false}
              headerRight={<button className="btn btn-primary btn-sm" onClick={e => { e.stopPropagation(); saveTags(); }} disabled={tagSaving}>{tagSaving ? 'Saving...' : 'Save Tags'}</button>}>
              {Object.entries(tagGrouped).map(([cat, tags]) => (
                <div key={cat} style={{ marginBottom: '1rem' }}>
                  <div style={{ fontSize: '0.75rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--stone-500)', marginBottom: '0.5rem' }}>
                    {cat.charAt(0).toUpperCase() + cat.slice(1)}
                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.375rem' }}>
                    {tags.map(tag => {
                      const active = productTagIds.includes(tag.id);
                      return (
                        <button key={tag.id} onClick={() => toggleTag(tag.id)}
                          style={{
                            padding: '0.375rem 0.75rem', border: '1px solid ' + (active ? 'var(--stone-800)' : 'var(--stone-200)'),
                            background: active ? 'var(--stone-800)' : 'white', color: active ? 'white' : 'var(--stone-600)',
                            fontSize: '0.75rem', cursor: 'pointer', borderRadius: '100px', fontFamily: 'var(--font-body)', transition: 'all 0.15s'
                          }}>
                          {tag.name}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </CollapsibleSection>
          )}

          <CollapsibleSection title="SKUs" defaultOpen={true} headerRight={<button className="btn btn-secondary btn-sm" onClick={e => { e.stopPropagation(); addSku(); }}>+ Add SKU</button>}>
            {skus.length === 0 && (
              <div style={{ textAlign: 'center', padding: '2rem', color: 'var(--stone-400)', fontSize: '0.875rem' }}>
                No SKUs yet. Click "Add SKU" to create one.
              </div>
            )}
            {skus.map((sku, i) => (
              <SkuCard key={sku.id || sku._key} sku={sku} index={i} updateSku={updateSku} removeSku={removeSku} />
            ))}
          </CollapsibleSection>
        </div>
      );
    }

    // ========== SkuCard ==========
    function SkuCard({ sku, index, updateSku, removeSku }) {
      const { useState } = React;
      const u = (field, value) => updateSku(index, field, value);
      const [attrsOpen, setAttrsOpen] = useState(false);
      const [attrEdits, setAttrEdits] = useState(null);
      const [attrSaving, setAttrSaving] = useState(false);

      const attrs = sku.attributes || [];

      const startEditAttrs = () => {
        const edits = {};
        for (const a of attrs) edits[a.slug] = a.value;
        setAttrEdits(edits);
        setAttrsOpen(true);
      };

      const saveAttrs = async () => {
        if (!sku.id || !attrEdits) return;
        setAttrSaving(true);
        try {
          const payload = Object.entries(attrEdits).map(([slug, value]) => ({ slug, value }));
          const data = await adminFetch('/api/admin/skus/' + sku.id + '/attributes', {
            method: 'PUT',
            body: JSON.stringify({ attributes: payload })
          });
          if (data.attributes) {
            updateSku(index, 'attributes', data.attributes);
          }
          setAttrEdits(null);
        } catch (err) {
          alert('Failed to save attributes: ' + err.message);
        } finally {
          setAttrSaving(false);
        }
      };

      return (
        <div className="sku-card">
          <div className="sku-card-header">
            <h4>SKU #{index + 1}{sku.variant_name ? ': ' + sku.variant_name : ''}</h4>
            <button className="btn btn-danger btn-sm" onClick={() => removeSku(index)}>Remove</button>
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label>Vendor SKU *</label>
              <input value={sku.vendor_sku} onChange={e => u('vendor_sku', e.target.value)} placeholder="MSI-CALG-1212-POL" />
            </div>
            <div className="form-group">
              <label>Internal SKU *</label>
              <input value={sku.internal_sku} onChange={e => u('internal_sku', e.target.value)} placeholder="CAL-GOLD-12X12-P" />
            </div>
            <div className="form-group">
              <label>Variant Name</label>
              <input value={sku.variant_name || ''} onChange={e => u('variant_name', e.target.value)} placeholder="12x12 Polished" />
            </div>
            <div className="form-group">
              <label>Sell By</label>
              <select value={sku.sell_by || 'sqft'} onChange={e => u('sell_by', e.target.value)}>
                <option value="sqft">Per SqFt</option>
                <option value="sqyd">Per SqYd</option>
                <option value="box">Per Box</option>
                <option value="unit">Per Unit</option>
              </select>
            </div>
            <div className="form-group">
              <label>SqFt Per Box</label>
              <input type="number" step="0.01" value={sku.sqft_per_box || ''} onChange={e => u('sqft_per_box', e.target.value)} />
            </div>
            <div className="form-group">
              <label>Pieces Per Box</label>
              <input type="number" value={sku.pieces_per_box || ''} onChange={e => u('pieces_per_box', e.target.value)} />
            </div>
            <div className="form-group">
              <label>Weight Per Box (lbs)</label>
              <input type="number" step="0.01" value={sku.weight_per_box_lbs || ''} onChange={e => u('weight_per_box_lbs', e.target.value)} />
            </div>
            <div className="form-group">
              <label>Roll Width (ft)</label>
              <input type="number" step="0.01" value={sku.roll_width_ft || ''} onChange={e => u('roll_width_ft', e.target.value)} />
            </div>
            <div className="form-group">
              <label>Roll Length (ft)</label>
              <input type="number" step="0.01" value={sku.roll_length_ft || ''} onChange={e => u('roll_length_ft', e.target.value)} />
            </div>
            <div className="form-group">
              <label>Freight Class</label>
              <select value={sku.freight_class || '70'} onChange={e => u('freight_class', e.target.value)}>
                <option value="50">50</option>
                <option value="55">55 — Broadloom Carpet</option>
                <option value="60">60 — Hardwood</option>
                <option value="65">65 — Carpet Tile</option>
                <option value="70">70 — Tile / Stone</option>
                <option value="77.5">77.5</option>
                <option value="85">85</option>
                <option value="92.5">92.5</option>
                <option value="100">100</option>
              </select>
            </div>
            <div className="form-group">
              <label>Boxes Per Pallet</label>
              <input type="number" value={sku.boxes_per_pallet || ''} onChange={e => u('boxes_per_pallet', e.target.value)} />
            </div>
            <div className="form-group">
              <label>SqFt Per Pallet</label>
              <input type="number" step="0.01" value={sku.sqft_per_pallet || ''} onChange={e => u('sqft_per_pallet', e.target.value)} />
            </div>
            <div className="form-group">
              <label>Weight Per Pallet (lbs)</label>
              <input type="number" step="0.01" value={sku.weight_per_pallet_lbs || ''} onChange={e => u('weight_per_pallet_lbs', e.target.value)} />
            </div>
            <div className="form-group">
              <label>Cost</label>
              <input type="number" step="0.01" value={sku.cost || ''} onChange={e => u('cost', e.target.value)} placeholder="0.00" />
            </div>
            <div className="form-group">
              <label>Retail Price</label>
              <input type="number" step="0.01" value={sku.retail_price || ''} onChange={e => u('retail_price', e.target.value)} placeholder="0.00" />
            </div>
            <div className="form-group">
              <label>Price Basis</label>
              <select value={sku.price_basis || 'per_sqft'} onChange={e => u('price_basis', e.target.value)}>
                <option value="per_sqft">Per SqFt</option>
                <option value="per_sqyd">Per SqYd</option>
                <option value="per_unit">Per Unit</option>
              </select>
            </div>
          </div>

          {/* Carpet Pricing Fields — shown when cut_price has a value or can be toggled */}
          {(sku.cut_price || sku.roll_price) ? (
            <div style={{ borderTop: '1px solid var(--stone-200)', paddingTop: '0.75rem', marginTop: '0.5rem' }}>
              <div style={{ fontSize: '0.8125rem', fontWeight: '600', color: 'var(--stone-600)', marginBottom: '0.5rem' }}>Carpet Pricing (Cut / Roll)</div>
              <div className="form-grid">
                <div className="form-group">
                  <label>Cut Price (retail /sqft)</label>
                  <input type="number" step="0.01" value={sku.cut_price || ''} onChange={e => u('cut_price', e.target.value)} placeholder="0.00" />
                </div>
                <div className="form-group">
                  <label>Roll Price (retail /sqft)</label>
                  <input type="number" step="0.01" value={sku.roll_price || ''} onChange={e => u('roll_price', e.target.value)} placeholder="0.00" />
                </div>
                <div className="form-group">
                  <label>Cut Cost (dealer /sqft)</label>
                  <input type="number" step="0.01" value={sku.cut_cost || ''} onChange={e => u('cut_cost', e.target.value)} placeholder="0.00" />
                </div>
                <div className="form-group">
                  <label>Roll Cost (dealer /sqft)</label>
                  <input type="number" step="0.01" value={sku.roll_cost || ''} onChange={e => u('roll_cost', e.target.value)} placeholder="0.00" />
                </div>
                <div className="form-group">
                  <label>Roll Minimum (sqft)</label>
                  <input type="number" step="1" value={sku.roll_min_sqft || ''} onChange={e => u('roll_min_sqft', e.target.value)} placeholder="e.g. 600" />
                </div>
                <div className="form-group">
                  <label>Roll Width (ft)</label>
                  <input type="number" step="0.5" value={sku.roll_width_ft || ''} onChange={e => u('roll_width_ft', e.target.value)} placeholder="e.g. 12" />
                </div>
              </div>
            </div>
          ) : (
            <div style={{ marginTop: '0.5rem' }}>
              <button className="btn btn-secondary btn-sm" style={{ fontSize: '0.75rem' }}
                onClick={() => { u('cut_price', '0'); u('roll_price', '0'); }}>
                + Add Carpet Pricing
              </button>
            </div>
          )}

          {/* Attributes Section */}
          {sku._existing && attrs.length > 0 && (
            <div style={{ marginTop: '1rem', borderTop: '1px solid var(--stone-200)', paddingTop: '0.75rem' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem', cursor: 'pointer' }}
                onClick={() => attrEdits ? null : setAttrsOpen(!attrsOpen)}>
                <span style={{ fontSize: '0.8125rem', fontWeight: '600', color: 'var(--stone-600)' }}>
                  Attributes ({attrs.length})
                </span>
                {!attrEdits && (
                  <button className="btn btn-secondary btn-sm" onClick={e => { e.stopPropagation(); startEditAttrs(); }} style={{ fontSize: '0.75rem', padding: '2px 8px' }}>Edit</button>
                )}
              </div>
              {(attrsOpen || attrEdits) && (
                <div className="form-grid" style={{ gap: '0.5rem' }}>
                  {attrEdits ? (
                    <>
                      {Object.entries(attrEdits).map(([slug, value]) => {
                        const label = (attrs.find(a => a.slug === slug) || {}).name || slug;
                        return (
                          <div className="form-group" key={slug}>
                            <label style={{ fontSize: '0.75rem' }}>{label}</label>
                            <input value={value} onChange={e => setAttrEdits(prev => ({ ...prev, [slug]: e.target.value }))} style={{ fontSize: '0.8125rem' }} />
                          </div>
                        );
                      })}
                      <div style={{ gridColumn: '1 / -1', display: 'flex', gap: '0.5rem', justifyContent: 'flex-end' }}>
                        <button className="btn btn-secondary btn-sm" onClick={() => setAttrEdits(null)} disabled={attrSaving}>Cancel</button>
                        <button className="btn btn-primary btn-sm" onClick={saveAttrs} disabled={attrSaving}>
                          {attrSaving ? 'Saving...' : 'Save Attributes'}
                        </button>
                      </div>
                    </>
                  ) : (
                    attrs.map(a => (
                      <div className="form-group" key={a.slug}>
                        <label style={{ fontSize: '0.75rem' }}>{a.name}</label>
                        <div style={{ fontSize: '0.8125rem', padding: '0.375rem 0', color: 'var(--stone-700)' }}>{a.value}</div>
                      </div>
                    ))
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ========== ProductMediaManager ==========
    function ProductMediaManager({ productId, media, setMedia }) {
      const { useState, useRef, useCallback } = React;
      const [uploading, setUploading] = useState(false);
      const [urlInput, setUrlInput] = useState('');
      const [addAssetType, setAddAssetType] = useState('alternate');
      const [dragActive, setDragActive] = useState(false);
      const [draggedId, setDraggedId] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);
      const fileInputRef = useRef(null);

      const API = '';
      const assetTypes = ['primary', 'alternate', 'lifestyle', 'detail', 'spec_pdf', 'swatch'];

      const handleFiles = async (files) => {
        setUploading(true);
        for (const file of files) {
          try {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('asset_type', addAssetType);
            const resp = await fetch(API + '/api/admin/products/' + productId + '/media/upload', {
              method: 'POST',
              headers: getAuthHeaders(),
              body: fd
            });
            if (resp.ok) {
              const data = await resp.json();
              if (data.media) setMedia(prev => [...prev, data.media]);
            }
          } catch (_) {}
        }
        setUploading(false);
      };

      const handleUrlSubmit = async () => {
        if (!urlInput.trim()) return;
        try {
          const data = await adminFetch('/api/admin/products/' + productId + '/media/url', {
            method: 'POST',
            body: JSON.stringify({ url: urlInput.trim(), asset_type: addAssetType })
          });
          if (data.media) {
            setMedia(prev => [...prev, data.media]);
            setUrlInput('');
          }
        } catch (_) {}
      };

      const handleDelete = async (mediaId) => {
        try {
          await adminFetch('/api/admin/media/' + mediaId, { method: 'DELETE' });
          setMedia(prev => prev.filter(m => m.id !== mediaId));
          setDeleteTarget(null);
        } catch (_) {}
      };

      const handleTypeChange = async (mediaId, newType) => {
        try {
          const data = await adminFetch('/api/admin/media/' + mediaId, {
            method: 'PUT',
            body: JSON.stringify({ asset_type: newType })
          });
          if (data.media) {
            setMedia(prev => prev.map(m => m.id === mediaId ? data.media : m));
          }
        } catch (_) {}
      };

      const handleDragStart = (e, id) => {
        setDraggedId(id);
        e.dataTransfer.effectAllowed = 'move';
      };

      const handleDragOver = (e, targetId) => {
        e.preventDefault();
        if (!draggedId || draggedId === targetId) return;
        setMedia(prev => {
          const items = [...prev];
          const fromIdx = items.findIndex(m => m.id === draggedId);
          const toIdx = items.findIndex(m => m.id === targetId);
          if (fromIdx < 0 || toIdx < 0) return prev;
          const [moved] = items.splice(fromIdx, 1);
          items.splice(toIdx, 0, moved);
          return items;
        });
      };

      const handleDrop = async (e) => {
        e.preventDefault();
        setDraggedId(null);
        const order = media.map((m, i) => ({ id: m.id, sort_order: i }));
        try {
          const data = await adminFetch('/api/admin/products/' + productId + '/media/reorder', {
            method: 'PATCH',
            body: JSON.stringify({ order })
          });
          if (data.media) setMedia(data.media);
        } catch (_) {}
      };

      const onZoneDragOver = (e) => { e.preventDefault(); setDragActive(true); };
      const onZoneDragLeave = () => setDragActive(false);
      const onZoneDrop = (e) => {
        e.preventDefault();
        setDragActive(false);
        if (e.dataTransfer.files.length) handleFiles(Array.from(e.dataTransfer.files));
      };

      const isPdf = (url) => url && url.toLowerCase().endsWith('.pdf');

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
          {media.length > 0 ? (
            <div className="media-grid">
              {media.map(m => (
                <div
                  key={m.id}
                  className={'media-card' + (draggedId === m.id ? ' dragging' : '')}
                  draggable
                  onDragStart={e => handleDragStart(e, m.id)}
                  onDragOver={e => handleDragOver(e, m.id)}
                  onDrop={handleDrop}
                  onDragEnd={() => setDraggedId(null)}
                >
                  {isPdf(m.url) ? (
                    <div style={{ width: '100%', height: 160, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--stone-100)', color: 'var(--stone-400)', fontSize: '0.75rem' }}>PDF</div>
                  ) : (
                    <img src={optimizeImg(m.url, 400)} alt={m.asset_type} loading="lazy" />
                  )}
                  <div className="media-card-info">
                    <select
                      value={m.asset_type}
                      onChange={e => handleTypeChange(m.id, e.target.value)}
                      style={{ width: '100%', fontSize: '0.7rem', padding: '0.2rem', marginBottom: '0.375rem', border: '1px solid var(--stone-200)', borderRadius: '4px' }}
                    >
                      {assetTypes.map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                    <div className="media-card-actions">
                      <button onClick={() => window.open(m.url, '_blank')}>View</button>
                      <button className="delete-btn" onClick={() => setDeleteTarget(m)}>Delete</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ textAlign: 'center', padding: '1.5rem', color: 'var(--stone-400)', fontSize: '0.875rem' }}>
              No media yet. Upload files or paste URLs below.
            </div>
          )}

          <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center', flexWrap: 'wrap' }}>
            <label style={{ fontSize: '0.8rem', color: 'var(--stone-600)' }}>Type for new uploads:</label>
            <select
              value={addAssetType}
              onChange={e => setAddAssetType(e.target.value)}
              style={{ fontSize: '0.8rem', padding: '0.3rem 0.5rem', border: '1px solid var(--stone-200)', borderRadius: '6px' }}
            >
              {assetTypes.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>

          <div
            className={'media-upload-zone' + (dragActive ? ' drag-active' : '')}
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            onDragOver={onZoneDragOver}
            onDragLeave={onZoneDragLeave}
            onDrop={onZoneDrop}
          >
            {uploading ? 'Uploading...' : 'Drop images here or click to browse'}
            <input
              ref={fileInputRef}
              type="file"
              multiple
              accept=".jpg,.jpeg,.png,.webp,.pdf"
              style={{ display: 'none' }}
              onChange={e => { if (e.target.files.length) handleFiles(Array.from(e.target.files)); e.target.value = ''; }}
            />
          </div>

          <div className="media-url-form">
            <input
              value={urlInput}
              onChange={e => setUrlInput(e.target.value)}
              placeholder="Paste external image URL..."
              onKeyDown={e => { if (e.key === 'Enter') handleUrlSubmit(); }}
            />
            <button className="btn btn-secondary btn-sm" onClick={handleUrlSubmit}>Add URL</button>
          </div>

          {deleteTarget && (
            <DeleteConfirmModal
              title="Delete Media"
              message={`Delete this ${deleteTarget.asset_type} image? This cannot be undone.`}
              onConfirm={() => handleDelete(deleteTarget.id)}
              onCancel={() => setDeleteTarget(null)}
            />
          )}
        </div>
      );
    }

    // ========== BulkImportView ==========
    function BulkImportView({ navigate }) {
      const [step, setStep] = useState(1);
      const [importFields, setImportFields] = useState([]);
      const [vendors, setVendors] = useState([]);
      const [categories, setCategories] = useState([]);
      const [importVendor, setImportVendor] = useState('');
      const [importCategory, setImportCategory] = useState('');
      const [importSession, setImportSession] = useState(null);
      const [mapping, setMapping] = useState({});
      const [importDefaults, setImportDefaults] = useState({ sell_by: 'sqft', price_basis: 'per_sqft', status: 'draft' });
      const [validationResult, setValidationResult] = useState(null);
      const [importResult, setImportResult] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [validating, setValidating] = useState(false);
      const [executing, setExecuting] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        adminFetch('/api/admin/import/fields').then(d => setImportFields(d.fields || [])).catch(() => {});
        adminFetch('/api/admin/vendors').then(d => setVendors(d.vendors || [])).catch(() => {});
        adminFetch('/api/admin/categories').then(d => setCategories(d.categories || d || [])).catch(() => {});
      }, []);

      // Fuzzy auto-map headers to PIM fields
      const autoMap = (headers) => {
        const m = {};
        const aliases = {
          'sku': 'vendor_sku', 'vendor sku': 'vendor_sku', 'item #': 'vendor_sku', 'item number': 'vendor_sku', 'item no': 'vendor_sku', 'model': 'vendor_sku',
          'name': 'name', 'product name': 'name', 'product': 'name', 'title': 'name', 'description': 'name',
          'collection': 'collection', 'series': 'collection', 'line': 'collection',
          'category': 'category',
          'color': 'color', 'colour': 'color',
          'material': 'material', 'type': 'material',
          'finish': 'finish', 'surface': 'finish',
          'size': 'size', 'dimension': 'size', 'dimensions': 'size',
          'thickness': 'thickness',
          'cost': 'cost', 'dealer cost': 'cost', 'dealer price': 'cost', 'wholesale': 'cost', 'net price': 'cost',
          'price': 'retail_price', 'retail': 'retail_price', 'retail price': 'retail_price', 'msrp': 'retail_price', 'list price': 'retail_price', 'srp': 'retail_price',
          'sqft per box': 'sqft_per_box', 'sf/box': 'sqft_per_box', 'sqft/box': 'sqft_per_box', 'sq ft per box': 'sqft_per_box', 'coverage': 'sqft_per_box', 'sqft/ctn': 'sqft_per_box', 'sf/ctn': 'sqft_per_box',
          'pieces per box': 'pieces_per_box', 'pcs/box': 'pieces_per_box', 'pcs per box': 'pieces_per_box', 'pcs/ctn': 'pieces_per_box',
          'weight': 'weight_per_box_lbs', 'weight per box': 'weight_per_box_lbs', 'lbs/box': 'weight_per_box_lbs', 'lbs/ctn': 'weight_per_box_lbs',
          'variant': 'variant_name', 'variant name': 'variant_name',
          'short description': 'description_short', 'long description': 'description_long',
          'freight class': 'freight_class'
        };
        headers.forEach((h, idx) => {
          const key = String(h).toLowerCase().trim();
          if (aliases[key]) m[idx] = aliases[key];
        });
        return m;
      };

      const handleUpload = async (file) => {
        if (!importVendor) { setError('Please select a vendor'); return; }
        setUploading(true);
        setError('');
        try {
          const fd = new FormData();
          fd.append('file', file);
          const res = await fetch(API + '/api/admin/import/upload', {
            method: 'POST',
            headers: getAuthHeaders(),
            body: fd
          });
          const d = await res.json();
          if (d.error) { setError(d.error); setUploading(false); return; }
          setImportSession(d);
          const autoMapping = autoMap(d.headers);
          setMapping(autoMapping);
          setStep(2);
        } catch (err) { setError(err.message); }
        setUploading(false);
      };

      const handleValidate = async () => {
        setValidating(true);
        setError('');
        try {
          const d = await adminFetch('/api/admin/import/validate', {
            method: 'POST',
            body: JSON.stringify({
              import_session_id: importSession.import_session_id,
              vendor_id: importVendor,
              category_id: importCategory || null,
              mapping,
              defaults: importDefaults
            })
          });
          if (d.error) { setError(d.error); setValidating(false); return; }
          setValidationResult(d);
          setStep(3);
        } catch (err) { setError(err.message); }
        setValidating(false);
      };

      const handleExecute = async () => {
        setExecuting(true);
        setError('');
        try {
          const d = await adminFetch('/api/admin/import/execute', {
            method: 'POST',
            body: JSON.stringify({
              import_session_id: importSession.import_session_id,
              vendor_id: importVendor,
              category_id: importCategory || null,
              mapping,
              defaults: importDefaults
            })
          });
          if (d.error) { setError(d.error); setExecuting(false); return; }
          setImportResult(d.results);
          setStep(4);
        } catch (err) { setError(err.message); }
        setExecuting(false);
      };

      const stepLabels = ['Upload', 'Map Columns', 'Validate', 'Import'];

      return (
        <div>
          <div className="content-header">
            <h1>Bulk Product Import</h1>
            <button className="btn btn-secondary" onClick={() => navigate('products')}>Back to Products</button>
          </div>

          {/* Stepper */}
          <div style={{ display: 'flex', gap: '0.25rem', marginBottom: '1.5rem' }}>
            {stepLabels.map((label, i) => (
              <div key={i} style={{ flex: 1, textAlign: 'center', padding: '0.625rem 0', fontSize: '0.8125rem', fontWeight: step === i + 1 ? 600 : 400, color: step > i + 1 ? '#16a34a' : step === i + 1 ? 'var(--stone-800)' : 'var(--stone-400)', borderBottom: '2px solid ' + (step > i + 1 ? '#16a34a' : step === i + 1 ? 'var(--stone-800)' : 'var(--stone-200)') }}>
                {i + 1}. {label}
              </div>
            ))}
          </div>

          {error && <div style={{ background: '#fef2f2', color: '#dc2626', padding: '0.75rem 1rem', marginBottom: '1rem', fontSize: '0.875rem', border: '1px solid #fecaca' }}>{error}</div>}

          {/* Step 1: Upload */}
          {step === 1 && (
            <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '2rem', maxWidth: 600 }}>
              <h3 style={{ marginTop: 0, fontFamily: "'Cormorant Garamond', serif", fontWeight: 400 }}>Upload Spreadsheet</h3>
              <div style={{ display: 'grid', gap: '1rem', marginBottom: '1.5rem' }}>
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label>Vendor *</label>
                  <select value={importVendor} onChange={e => setImportVendor(e.target.value)}>
                    <option value="">Select vendor...</option>
                    {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                  </select>
                </div>
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label>Default Category</label>
                  <select value={importCategory} onChange={e => setImportCategory(e.target.value)}>
                    <option value="">None (use per-row if mapped)</option>
                    {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label>File (.xlsx, .xls, .csv) *</label>
                  <input type="file" accept=".xlsx,.xls,.csv" onChange={e => { if (e.target.files[0]) handleUpload(e.target.files[0]); }} disabled={uploading} />
                </div>
              </div>
              {uploading && <div style={{ color: 'var(--stone-500)', fontSize: '0.875rem' }}>Uploading and parsing file...</div>}
            </div>
          )}

          {/* Step 2: Map Columns */}
          {step === 2 && importSession && (
            <div>
              <div style={{ background: 'var(--stone-50)', border: '1px solid var(--stone-200)', padding: '1rem', marginBottom: '1rem', fontSize: '0.8125rem' }}>
                <strong>{importSession.file_name}</strong> — {importSession.total_rows} row(s), {importSession.headers.length} column(s) (Sheet: {importSession.sheet_name})
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '0.75rem', marginBottom: '1.5rem' }}>
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label>Default Sell By</label>
                  <select value={importDefaults.sell_by} onChange={e => setImportDefaults(d => ({ ...d, sell_by: e.target.value }))}>
                    <option value="sqft">Per Sq Ft</option>
                    <option value="unit">Per Unit</option>
                  </select>
                </div>
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label>Default Price Basis</label>
                  <select value={importDefaults.price_basis} onChange={e => setImportDefaults(d => ({ ...d, price_basis: e.target.value }))}>
                    <option value="per_sqft">Per Sq Ft</option>
                    <option value="per_unit">Per Unit</option>
                    <option value="per_box">Per Box</option>
                  </select>
                </div>
                <div className="form-group" style={{ marginBottom: 0 }}>
                  <label>Import Status</label>
                  <select value={importDefaults.status} onChange={e => setImportDefaults(d => ({ ...d, status: e.target.value }))}>
                    <option value="draft">Draft</option>
                    <option value="active">Active</option>
                  </select>
                </div>
              </div>

              <h3 style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.75rem' }}>Column Mapping</h3>
              <div className="table-scroll-wrapper">
                <table className="admin-table" style={{ marginBottom: '1rem' }}>
                  <thead><tr><th style={{ width: '40%' }}>Spreadsheet Column</th><th>Maps To</th><th style={{ width: '30%' }}>Sample Data</th></tr></thead>
                  <tbody>
                    {importSession.headers.map((header, idx) => (
                      <tr key={idx}>
                        <td style={{ fontWeight: 500 }}>{header || <span style={{ color: 'var(--stone-400)' }}>(empty)</span>}</td>
                        <td>
                          <select value={mapping[idx] || ''} onChange={e => setMapping(m => ({ ...m, [idx]: e.target.value }))} style={{ width: '100%', padding: '0.375rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)' }}>
                            <option value="">-- Skip --</option>
                            {Object.entries(importFields.reduce((groups, f) => { const g = f.group || 'Other'; if (!groups[g]) groups[g] = []; groups[g].push(f); return groups; }, {})).map(([group, fields]) => (
                              group && <optgroup key={group} label={group}>
                                {fields.filter(f => f.value).map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
                              </optgroup>
                            ))}
                          </select>
                        </td>
                        <td style={{ fontSize: '0.75rem', color: 'var(--stone-500)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {importSession.preview_rows[0] ? String(importSession.preview_rows[0][idx] ?? '') : '—'}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {/* Preview table */}
              <h3 style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--stone-500)', marginBottom: '0.75rem' }}>Preview (first {importSession.preview_rows.length} rows)</h3>
              <div className="table-scroll-wrapper" style={{ marginBottom: '1.5rem' }}>
                <table className="admin-table" style={{ fontSize: '0.75rem' }}>
                  <thead><tr>{importSession.headers.map((h, i) => <th key={i} style={{ whiteSpace: 'nowrap' }}>{h}</th>)}</tr></thead>
                  <tbody>
                    {importSession.preview_rows.map((row, ri) => (
                      <tr key={ri}>{importSession.headers.map((_, ci) => <td key={ci} style={{ maxWidth: 150, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{row[ci] != null ? String(row[ci]) : ''}</td>)}</tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={{ display: 'flex', gap: '0.5rem' }}>
                <button className="btn btn-secondary" onClick={() => { setStep(1); setImportSession(null); setMapping({}); }}>Back</button>
                <button className="btn btn-primary" onClick={handleValidate} disabled={validating || !Object.values(mapping).some(v => v)}>{validating ? 'Validating...' : 'Validate'}</button>
              </div>
            </div>
          )}

          {/* Step 3: Validate */}
          {step === 3 && validationResult && (
            <div>
              <div className="analytics-grid" style={{ marginBottom: '1.5rem' }}>
                <div className="stat-card"><div className="stat-card-label">Total Rows</div><div className="stat-card-value">{validationResult.total_rows}</div></div>
                <div className="stat-card"><div className="stat-card-label">Valid</div><div className="stat-card-value" style={{ color: '#16a34a' }}>{validationResult.valid_count}</div></div>
                <div className="stat-card"><div className="stat-card-label">Errors</div><div className="stat-card-value" style={{ color: validationResult.error_count > 0 ? '#dc2626' : undefined }}>{validationResult.error_count}</div></div>
              </div>

              {validationResult.rows.length > 0 && (
                <div className="table-scroll-wrapper" style={{ maxHeight: 400, overflow: 'auto', marginBottom: '1.5rem' }}>
                  <table className="admin-table" style={{ fontSize: '0.8125rem' }}>
                    <thead><tr><th>Row</th><th>Status</th><th>SKU</th><th>Name</th><th>Errors</th></tr></thead>
                    <tbody>
                      {validationResult.rows.map(r => (
                        <tr key={r.row_number} style={{ background: r.status === 'error' ? '#fef2f2' : undefined }}>
                          <td>{r.row_number}</td>
                          <td><span className={'badge badge-' + (r.status === 'valid' ? 'active' : 'error')} style={r.status === 'error' ? { background: '#fecaca', color: '#dc2626' } : {}}>{r.status}</span></td>
                          <td style={{ fontSize: '0.75rem' }}>{r.data?._internal_sku || r.data?.vendor_sku || '—'}</td>
                          <td style={{ fontSize: '0.75rem', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.data?.name || '—'}</td>
                          <td style={{ fontSize: '0.75rem', color: '#dc2626' }}>{r.errors?.join('; ') || ''}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              <div style={{ display: 'flex', gap: '0.5rem' }}>
                <button className="btn btn-secondary" onClick={() => setStep(2)}>Back to Mapping</button>
                <button className="btn btn-primary" onClick={handleExecute} disabled={executing || validationResult.valid_count === 0}>
                  {executing ? 'Importing...' : 'Import ' + validationResult.valid_count + ' Valid Row(s)'}
                </button>
              </div>
              {validationResult.error_count > 0 && validationResult.valid_count > 0 && (
                <p style={{ fontSize: '0.75rem', color: 'var(--stone-500)', marginTop: '0.5rem' }}>{validationResult.error_count} error row(s) will be skipped.</p>
              )}
            </div>
          )}

          {/* Step 4: Results */}
          {step === 4 && importResult && (
            <div>
              <div className="analytics-grid" style={{ marginBottom: '1.5rem' }}>
                <div className="stat-card"><div className="stat-card-label">Imported</div><div className="stat-card-value" style={{ color: '#16a34a' }}>{importResult.imported}</div></div>
                <div className="stat-card"><div className="stat-card-label">Skipped</div><div className="stat-card-value">{importResult.skipped}</div></div>
                <div className="stat-card"><div className="stat-card-label">Errors</div><div className="stat-card-value" style={{ color: importResult.errors?.length > 0 ? '#dc2626' : undefined }}>{importResult.errors?.length || 0}</div></div>
              </div>

              {importResult.errors?.length > 0 && (
                <div style={{ background: '#fef2f2', border: '1px solid #fecaca', padding: '1rem', marginBottom: '1.5rem', maxHeight: 200, overflow: 'auto' }}>
                  <h4 style={{ fontSize: '0.75rem', textTransform: 'uppercase', color: '#dc2626', marginTop: 0, marginBottom: '0.5rem' }}>Error Details</h4>
                  {importResult.errors.map((e, i) => (
                    <div key={i} style={{ fontSize: '0.8125rem', marginBottom: '0.25rem' }}>Row {e.row}: {e.error}</div>
                  ))}
                </div>
              )}

              <button className="btn btn-primary" onClick={() => navigate('products')}>Done — Back to Products</button>
            </div>
          )}
        </div>
      );
    }

    // ========== VendorsListView ==========

        setLoading(true);
        adminFetch('/api/admin/vendors')

          .catch(() => setLoading(false));
      };
