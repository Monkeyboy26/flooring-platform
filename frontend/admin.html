                {renderAgingBar(apAging)}
                <div style={{ textAlign: 'right', marginTop: '0.75rem', fontWeight: 600 }}>Total: {fmtMoney(apAging ? apAging.total_outstanding : 0)}</div>
              </div>

              {/* Tax Report Section */}
              <div style={{ gridColumn: '1 / -1', background: 'white', border: '1px solid var(--stone-200)', padding: '1.5rem' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.5rem' }}>
                  <h3 style={{ margin: 0, fontSize: '0.875rem' }}>Tax Report</h3>
                  <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                    <input type="date" className="form-input" style={{ maxWidth: 140 }} value={taxFrom} onChange={e => setTaxFrom(e.target.value)} />
                    <input type="date" className="form-input" style={{ maxWidth: 140 }} value={taxTo} onChange={e => setTaxTo(e.target.value)} />
                    <button className="btn btn-secondary btn-sm" onClick={loadTax}>Generate</button>
                    <button className="btn btn-secondary btn-sm" onClick={() => {
                      const params = new URLSearchParams();
                      if (taxFrom) params.set('from', taxFrom);
                      if (taxTo) params.set('to', taxTo);
                      window.open(API + '/api/admin/accounting/reports/tax/csv?' + params.toString(), '_blank');
                    }}>Export CSV</button>
                  </div>
                </div>

                {taxLoading && <div style={{ textAlign: 'center', padding: '1rem', color: 'var(--stone-400)' }}>Loading...</div>}

                {taxData && !taxLoading && (
                  <div>
                    {/* Total Tax Card */}
                    <div style={{ background: 'var(--stone-50)', border: '1px solid var(--stone-200)', padding: '1rem', borderRadius: '8px', marginBottom: '1rem', display: 'inline-block' }}>
                      <div style={{ fontSize: '0.75rem', color: 'var(--stone-500)' }}>Total Tax Collected</div>
                      <div style={{ fontSize: '1.5rem', fontWeight: 600 }}>{fmtMoney(taxData.total_tax)}</div>
                      <div style={{ fontSize: '0.6875rem', color: 'var(--stone-400)' }}>{taxData.period.from} to {taxData.period.to}</div>
                    </div>

                    {/* Tax by Jurisdiction Table */}
                    {taxData.by_jurisdiction && taxData.by_jurisdiction.length > 0 && (
                      <div style={{ overflowX: 'auto', marginBottom: '1rem' }}>
                        <table className="data-table">
                          <thead>
                            <tr>
                              <th>Zip Code</th>
                              <th>City</th>
                              <th>State</th>
                              <th># Orders</th>
                              <th>Taxable Amount</th>
                              <th>Tax Collected</th>
                            </tr>
                          </thead>
                          <tbody>
                            {taxData.by_jurisdiction.map((r, i) => (
                              <tr key={i}>
                                <td>{r.zip || '—'}</td>
                                <td>{r.city || '—'}</td>
                                <td>{r.state || '—'}</td>
                                <td>{r.order_count}</td>
                                <td>{fmtMoney(r.taxable_amount)}</td>
                                <td style={{ fontWeight: 600 }}>{fmtMoney(r.tax_collected)}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {/* Monthly Tax Trend Chart */}
                    {taxData.monthly_totals && taxData.monthly_totals.length > 0 && (
                      <div>
                        <h4 style={{ fontSize: '0.8125rem', margin: '0 0 0.5rem', fontWeight: 500 }}>Monthly Tax Trend</h4>
                        <div style={{ height: '200px' }}><canvas ref={taxChartRef}></canvas></div>
                      </div>
                    )}

                    {taxData.by_jurisdiction && taxData.by_jurisdiction.length === 0 && (
                      <div style={{ textAlign: 'center', padding: '1rem', color: 'var(--stone-400)' }}>No tax data for this period</div>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==================== Site Analytics View ====================
    function SiteAnalyticsView() {
      const [tab, setTab] = useState('overview');
      const [period, setPeriod] = useState('7d');
      const [loading, setLoading] = useState(true);
      const [data, setData] = useState(null);
      const [funnelData, setFunnelData] = useState(null);
      const [productsData, setProductsData] = useState(null);
      const [searchData, setSearchData] = useState(null);
      const [realtimeData, setRealtimeData] = useState(null);
      const chartRef = useRef(null);
      const deviceChartRef = useRef(null);
      const funnelChartRef = useRef(null);
      const searchChartRef = useRef(null);
      const chartInstances = useRef({});

      const token = sessionStorage.getItem('staff_token');
      const headers = { 'X-Staff-Token': token };

      const fetchOverview = useCallback(() => {
        setLoading(true);
        fetch(API + '/api/admin/site-analytics?period=' + period, { headers })
          .then(r => r.json())
          .then(d => { setData(d); setLoading(false); })
          .catch(() => setLoading(false));
      }, [period]);

      const fetchFunnel = useCallback(() => {
        fetch(API + '/api/admin/site-analytics/funnel?period=' + period, { headers })
          .then(r => r.json())
          .then(d => setFunnelData(d))
          .catch(console.error);
      }, [period]);

      const fetchProducts = useCallback(() => {
        fetch(API + '/api/admin/site-analytics/products?period=' + period, { headers })
          .then(r => r.json())
          .then(d => setProductsData(d))
          .catch(console.error);
      }, [period]);

      const fetchSearches = useCallback(() => {
        fetch(API + '/api/admin/site-analytics/searches?period=' + period, { headers })
          .then(r => r.json())
          .then(d => setSearchData(d))
          .catch(console.error);
      }, [period]);

      const fetchRealtime = useCallback(() => {
        fetch(API + '/api/admin/site-analytics/realtime', { headers })
          .then(r => r.json())
          .then(d => setRealtimeData(d))
          .catch(console.error);
      }, []);

      useEffect(() => {
        if (tab === 'overview') fetchOverview();
        if (tab === 'funnel') fetchFunnel();
        if (tab === 'products') fetchProducts();
        if (tab === 'search') fetchSearches();
        if (tab === 'realtime') fetchRealtime();
      }, [tab, period]);

      // Real-time auto-refresh
      useEffect(() => {
        if (tab !== 'realtime') return;
        const iv = setInterval(fetchRealtime, 30000);
        return () => clearInterval(iv);
      }, [tab]);

      // Traffic chart
      useEffect(() => {
        if (tab !== 'overview' || !data?.daily || !chartRef.current) return;
        if (chartInstances.current.traffic) chartInstances.current.traffic.destroy();
        chartInstances.current.traffic = new Chart(chartRef.current, {
          type: 'line',
          data: {
            labels: data.daily.map(d => d.stat_date.slice(5)),
            datasets: [
              { label: 'Sessions', data: data.daily.map(d => d.total_sessions), borderColor: '#1c1917', backgroundColor: 'rgba(28,25,23,0.1)', fill: true, tension: 0.3 },
              { label: 'Visitors', data: data.daily.map(d => d.unique_visitors), borderColor: '#c8a97e', backgroundColor: 'transparent', borderDash: [5,5], tension: 0.3 }
            ]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true } } }
        });
      }, [data, tab]);

      // Device chart
      useEffect(() => {
        if (tab !== 'overview' || !data?.devices || !deviceChartRef.current) return;
        if (chartInstances.current.device) chartInstances.current.device.destroy();
        const colors = { desktop: '#1c1917', mobile: '#c8a97e', tablet: '#78716c' };
        chartInstances.current.device = new Chart(deviceChartRef.current, {
          type: 'doughnut',
          data: {
            labels: data.devices.map(d => d.device_type),
            datasets: [{ data: data.devices.map(d => d.count), backgroundColor: data.devices.map(d => colors[d.device_type] || '#a8a29e') }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
      }, [data, tab]);

      // Funnel chart
      useEffect(() => {
        if (tab !== 'funnel' || !funnelData?.steps || !funnelChartRef.current) return;
        if (chartInstances.current.funnel) chartInstances.current.funnel.destroy();
        const steps = funnelData.steps;
        chartInstances.current.funnel = new Chart(funnelChartRef.current, {
          type: 'bar',
          data: {
            labels: steps.map(s => s.step),
            datasets: [{ label: 'Unique Sessions', data: steps.map(s => s.count), backgroundColor: ['#1c1917','#44403c','#78716c','#a8a29e','#c8a97e'] }]
          },
          options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }
        });
      }, [funnelData, tab]);

      // Search chart
      useEffect(() => {
        if (tab !== 'search' || !searchData?.top_terms || !searchChartRef.current) return;
        if (chartInstances.current.search) chartInstances.current.search.destroy();
        const terms = searchData.top_terms.slice(0, 10);
        chartInstances.current.search = new Chart(searchChartRef.current, {
          type: 'bar',
          data: {
            labels: terms.map(t => t.term),
            datasets: [{ label: 'Searches', data: terms.map(t => t.count), backgroundColor: '#1c1917' }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
      }, [searchData, tab]);

      // Cleanup charts on unmount
      useEffect(() => {
        return () => { Object.values(chartInstances.current).forEach(c => c && c.destroy()); };
      }, []);

      const fmtNum = n => Number(n || 0).toLocaleString();
      const fmtMoney = n => '$' + parseFloat(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      const fmtPct = n => parseFloat(n || 0).toFixed(1) + '%';
      const fmtDuration = secs => { const m = Math.floor(secs / 60); return m > 0 ? m + 'm ' + (secs % 60) + 's' : secs + 's'; };

      const tabs = [
        { key: 'overview', label: 'Overview' },
        { key: 'funnel', label: 'Funnel' },
        { key: 'products', label: 'Products' },
        { key: 'search', label: 'Search' },
        { key: 'realtime', label: 'Real-Time' }
      ];

      const statCard = (label, value, color) => (
        <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem', textAlign: 'center' }}>
          <div style={{ fontSize: '1.5rem', fontWeight: 600, color: color || 'var(--stone-800)', fontFamily: "'Cormorant Garamond',Georgia,serif" }}>{value}</div>
          <div style={{ fontSize: '0.7rem', color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em', marginTop: '0.25rem' }}>{label}</div>
        </div>
      );

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem', flexWrap: 'wrap', gap: '0.75rem' }}>
            <h2 style={{ margin: 0, fontFamily: "'Cormorant Garamond',Georgia,serif", fontWeight: 400, fontSize: '1.5rem' }}>Site Analytics</h2>
            {tab !== 'realtime' && (
              <div style={{ display: 'flex', gap: '0.25rem' }}>
                {['7d','30d','90d'].map(p => (
                  <button key={p} onClick={() => setPeriod(p)}
                    style={{ padding: '0.375rem 0.75rem', fontSize: '0.75rem', border: '1px solid var(--stone-300)',
                      background: period === p ? 'var(--stone-800)' : 'white', color: period === p ? 'white' : 'var(--stone-600)',
                      cursor: 'pointer' }}>
                    {p === '7d' ? '7 Days' : p === '30d' ? '30 Days' : '90 Days'}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div style={{ display: 'flex', gap: '0', borderBottom: '1px solid var(--stone-200)', marginBottom: '1.5rem' }}>
            {tabs.map(t => (
              <button key={t.key} onClick={() => setTab(t.key)}
                style={{ padding: '0.625rem 1rem', fontSize: '0.8rem', fontWeight: tab === t.key ? 600 : 400,
                  color: tab === t.key ? 'var(--stone-800)' : 'var(--stone-500)',
                  background: 'none', borderTop: 'none', borderLeft: 'none', borderRight: 'none',
                  borderBottom: tab === t.key ? '2px solid var(--stone-800)' : '2px solid transparent',
                  cursor: 'pointer' }}>
                {t.label}
              </button>
            ))}
          </div>

          {/* Overview Tab */}
          {tab === 'overview' && (
            loading ? <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--stone-400)' }}>Loading...</div> :
            data ? (
              <div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))', gap: '0.75rem', marginBottom: '1.5rem' }}>
                  {statCard('Sessions', fmtNum(data.totals?.sessions))}
                  {statCard('Visitors', fmtNum(data.totals?.visitors))}
                  {statCard('Page Views', fmtNum(data.totals?.page_views))}
                  {statCard('Orders', fmtNum(data.totals?.orders_completed), '#16a34a')}
                  {statCard('Revenue', fmtMoney(data.totals?.revenue), '#16a34a')}
                  {statCard('Avg Duration', fmtDuration(data.totals?.avg_duration || 0))}
                  {statCard('Bounce Rate', fmtPct(data.totals?.bounce_rate), parseFloat(data.totals?.bounce_rate || 0) > 60 ? '#b91c1c' : undefined)}
                  {statCard('Cart Abandon', fmtPct(data.totals?.cart_abandonment_rate), parseFloat(data.totals?.cart_abandonment_rate || 0) > 70 ? '#b91c1c' : undefined)}
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '1rem', marginBottom: '1.5rem' }}>
                  <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem' }}>
                    <h3 style={{ margin: '0 0 0.75rem', fontSize: '0.875rem' }}>Traffic Over Time</h3>
                    <div style={{ height: 250 }}><canvas ref={chartRef}></canvas></div>
                  </div>
                  <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem' }}>
                    <h3 style={{ margin: '0 0 0.75rem', fontSize: '0.875rem' }}>Device Breakdown</h3>
                    <div style={{ height: 250 }}><canvas ref={deviceChartRef}></canvas></div>
                  </div>
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                  <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem' }}>
                    <h3 style={{ margin: '0 0 0.75rem', fontSize: '0.875rem' }}>Top Referrers</h3>
                    <table style={{ width: '100%', fontSize: '0.8rem', borderCollapse: 'collapse' }}>
                      <thead><tr><th style={{ textAlign: 'left', padding: '0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Source</th><th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Count</th></tr></thead>
                      <tbody>{(data.referrers || []).map((r, i) => (
                        <tr key={i}><td style={{ padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-100)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.referrer}</td><td style={{ padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-100)', textAlign: 'right' }}>{fmtNum(r.count)}</td></tr>
                      ))}</tbody>
                    </table>
                  </div>
                  <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem' }}>
                    <h3 style={{ margin: '0 0 0.75rem', fontSize: '0.875rem' }}>Top Pages</h3>
                    <table style={{ width: '100%', fontSize: '0.8rem', borderCollapse: 'collapse' }}>
                      <thead><tr><th style={{ textAlign: 'left', padding: '0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Page</th><th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Views</th></tr></thead>
                      <tbody>{(data.top_pages || []).map((p, i) => (
                        <tr key={i}><td style={{ padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-100)' }}>{p.page_path}</td><td style={{ padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-100)', textAlign: 'right' }}>{fmtNum(p.views)}</td></tr>
                      ))}</tbody>
                    </table>
                  </div>
                </div>
              </div>
            ) : null
          )}

          {/* Funnel Tab */}
          {tab === 'funnel' && (
            !funnelData ? <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--stone-400)' }}>Loading...</div> : (
              <div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '0.5rem', marginBottom: '1.5rem' }}>
                  {funnelData.steps.map((s, i) => (
                    <div key={i} style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1rem', textAlign: 'center' }}>
                      <div style={{ fontSize: '1.25rem', fontWeight: 600, fontFamily: "'Cormorant Garamond',Georgia,serif" }}>{fmtNum(s.count)}</div>
                      <div style={{ fontSize: '0.7rem', color: 'var(--stone-500)', textTransform: 'uppercase', marginTop: '0.25rem' }}>{s.step}</div>
                      {s.dropoff != null && (
                        <div style={{ fontSize: '0.7rem', color: s.dropoff > 70 ? '#b91c1c' : s.dropoff > 40 ? '#c8a97e' : '#16a34a', marginTop: '0.375rem', fontWeight: 500 }}>
                          {s.dropoff > 0 ? '-' + fmtPct(s.dropoff) + ' dropoff' : 'No dropoff'}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem' }}>
                  <h3 style={{ margin: '0 0 0.75rem', fontSize: '0.875rem' }}>Conversion Funnel</h3>
                  <div style={{ height: 300 }}><canvas ref={funnelChartRef}></canvas></div>
                </div>
              </div>
            )
          )}

          {/* Products Tab */}
          {tab === 'products' && (
            !productsData ? <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--stone-400)' }}>Loading...</div> : (
              <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem' }}>
                <h3 style={{ margin: '0 0 0.5rem', fontSize: '0.875rem' }}>Product Performance</h3>
                <p style={{ margin: '0 0 1rem', fontSize: '0.75rem', color: 'var(--stone-500)' }}>Sorted by opportunity score (high views, low conversion). These are products customers view but don't purchase.</p>
                <table style={{ width: '100%', fontSize: '0.8rem', borderCollapse: 'collapse' }}>
                  <thead><tr>
                    <th style={{ textAlign: 'left', padding: '0.5rem', borderBottom: '2px solid var(--stone-800)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Product</th>
                    <th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '2px solid var(--stone-800)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Views</th>
                    <th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '2px solid var(--stone-800)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Sessions</th>
                    <th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '2px solid var(--stone-800)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Carts</th>
                    <th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '2px solid var(--stone-800)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Orders</th>
                    <th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '2px solid var(--stone-800)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Opportunity</th>
                  </tr></thead>
                  <tbody>{(productsData.products || []).map((p, i) => (
                    <tr key={i}>
                      <td style={{ padding: '0.5rem', borderBottom: '1px solid var(--stone-100)', maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.product_name || p.sku_id}</td>
                      <td style={{ padding: '0.5rem', borderBottom: '1px solid var(--stone-100)', textAlign: 'right' }}>{fmtNum(p.view_count)}</td>
                      <td style={{ padding: '0.5rem', borderBottom: '1px solid var(--stone-100)', textAlign: 'right' }}>{fmtNum(p.unique_sessions)}</td>
                      <td style={{ padding: '0.5rem', borderBottom: '1px solid var(--stone-100)', textAlign: 'right' }}>{fmtNum(p.cart_count)}</td>
                      <td style={{ padding: '0.5rem', borderBottom: '1px solid var(--stone-100)', textAlign: 'right' }}>{fmtNum(p.order_count)}</td>
                      <td style={{ padding: '0.5rem', borderBottom: '1px solid var(--stone-100)', textAlign: 'right' }}>
                        <span style={{ display: 'inline-block', padding: '0.125rem 0.5rem', fontSize: '0.7rem', fontWeight: 500,
                          background: parseFloat(p.opportunity_score) > 80 ? '#fef2f2' : parseFloat(p.opportunity_score) > 50 ? '#fefce8' : '#f0fdf4',

                    <h3 style={{ margin: '0 0 0.75rem', fontSize: '0.875rem' }}>All Search Terms</h3>
                    <table style={{ width: '100%', fontSize: '0.8rem', borderCollapse: 'collapse' }}>
                      <thead><tr><th style={{ textAlign: 'left', padding: '0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Term</th><th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Count</th></tr></thead>

                    <p style={{ margin: '0 0 0.75rem', fontSize: '0.7rem', color: 'var(--stone-500)' }}>Searches that returned no products. Consider adding these products or creating redirects.</p>
                    <table style={{ width: '100%', fontSize: '0.8rem', borderCollapse: 'collapse' }}>
                      <thead><tr><th style={{ textAlign: 'left', padding: '0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Term</th><th style={{ textAlign: 'right', padding: '0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.7rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Count</th></tr></thead>
                      <tbody>{(searchData.zero_results || []).length === 0
                        ? <tr><td colSpan="2" style={{ padding: '1rem', textAlign: 'center', color: 'var(--stone-400)', fontSize: '0.8rem' }}>No zero-result searches found</td></tr>
                        : (searchData.zero_results || []).map((t, i) => (
                        <tr key={i}><td style={{ padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-100)', color: '#b91c1c' }}>{t.term}</td><td style={{ padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-100)', textAlign: 'right' }}>{fmtNum(t.count)}</td></tr>
                      ))}</tbody>
                    </table>
                  </div>
                </div>
              </div>

          {/* Real-Time Tab */}
          {tab === 'realtime' && (
            !realtimeData ? <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--stone-400)' }}>Loading...</div> : (
              <div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 2fr', gap: '1rem' }}>
                  <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '2rem', textAlign: 'center' }}>
                    <div style={{ fontSize: '3rem', fontWeight: 600, fontFamily: "'Cormorant Garamond',Georgia,serif", color: 'var(--stone-800)' }}>{fmtNum(realtimeData.active_sessions)}</div>
                    <div style={{ fontSize: '0.8rem', color: 'var(--stone-500)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Active Sessions (30m)</div>
                    <div style={{ fontSize: '0.7rem', color: 'var(--stone-400)', marginTop: '0.5rem' }}>Auto-refreshes every 30s</div>
                  </div>
                  <div style={{ background: 'white', border: '1px solid var(--stone-200)', padding: '1.25rem', maxHeight: 500, overflowY: 'auto' }}>
                    <h3 style={{ margin: '0 0 0.75rem', fontSize: '0.875rem' }}>Live Event Stream</h3>
                    <table style={{ width: '100%', fontSize: '0.75rem', borderCollapse: 'collapse' }}>
                      <thead><tr>
                        <th style={{ textAlign: 'left', padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.65rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Time</th>
                        <th style={{ textAlign: 'left', padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.65rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Event</th>
                        <th style={{ textAlign: 'left', padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.65rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Page</th>
                        <th style={{ textAlign: 'left', padding: '0.375rem 0.5rem', borderBottom: '1px solid var(--stone-200)', fontSize: '0.65rem', textTransform: 'uppercase', color: 'var(--stone-500)' }}>Details</th>
                      </tr></thead>
                      <tbody>{(realtimeData.recent_events || []).map((e, i) => {
                        const props = e.properties || {};
                        let detail = '';
                        if (props.query) detail = 'q: ' + props.query;
                        else if (props.product_name) detail = props.product_name;
                        else if (props.sku_id) detail = 'SKU: ' + props.sku_id.slice(0, 8);
                        else if (props.category) detail = props.category;
                        else if (props.collection) detail = props.collection;
                        const eventColors = { page_view: '#57534e', product_view: '#1d4ed8', add_to_cart: '#16a34a', order_completed: '#c8a97e', search: '#7c3aed', checkout_started: '#ea580c' };
                        return (
                          <tr key={i}>
                            <td style={{ padding: '0.25rem 0.5rem', borderBottom: '1px solid var(--stone-50)', color: 'var(--stone-400)', whiteSpace: 'nowrap' }}>{new Date(e.created_at).toLocaleTimeString()}</td>
                            <td style={{ padding: '0.25rem 0.5rem', borderBottom: '1px solid var(--stone-50)' }}>
                              <span style={{ display: 'inline-block', padding: '0.125rem 0.375rem', fontSize: '0.65rem', fontWeight: 500, color: eventColors[e.event_type] || 'var(--stone-600)', background: 'var(--stone-100)' }}>{e.event_type}</span>
                            </td>
                            <td style={{ padding: '0.25rem 0.5rem', borderBottom: '1px solid var(--stone-50)', color: 'var(--stone-600)', maxWidth: 150, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{e.page_path}</td>
                            <td style={{ padding: '0.25rem 0.5rem', borderBottom: '1px solid var(--stone-50)', color: 'var(--stone-500)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{detail}</td>
                          </tr>
                        );
                      })}</tbody>
                    </table>
                  </div>
                </div>
              </div>
            )
          )}

      );
    }

    // ========== PurchaseOrdersListView ==========
    function PurchaseOrdersListView({ navigate, staffRole }) {
      const [pos, setPOs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [statusGroup, setStatusGroup] = useState('open');
      const [vendorFilter, setVendorFilter] = useState('');
      const [search, setSearch] = useState('');
      const [vendors, setVendors] = useState([]);
      const [showCreate, setShowCreate] = useState(false);
      const [newVendorId, setNewVendorId] = useState('');
      const [newNotes, setNewNotes] = useState('');
      const [creating, setCreating] = useState(false);

      const load = () => {
        setLoading(true);
        const params = new URLSearchParams();
        if (vendorFilter) params.set('vendor_id', vendorFilter);
        if (search) params.set('search', search);
        adminFetch('/api/admin/purchase-orders?' + params.toString())
          .then(data => { setPOs(data.purchase_orders || []); setLoading(false); })
          .catch(() => setLoading(false));
      };
      useEffect(load, [vendorFilter]);

      useEffect(() => {
        adminFetch('/api/admin/vendors').then(data => setVendors(data.vendors || [])).catch(() => {});
      }, []);

      const handleSearch = () => load();

      const createPO = async () => {
        if (!newVendorId) return;
        setCreating(true);
        try {
          const data = await adminFetch('/api/admin/purchase-orders', {
            method: 'POST', body: JSON.stringify({ vendor_id: newVendorId, notes: newNotes || null })
          });
          if (data.error) throw new Error(data.error);
          setShowCreate(false); setNewVendorId(''); setNewNotes('');
          navigate('purchase-order-detail', data.purchase_order.id);
        } catch (err) { alert(err.message); }
        setCreating(false);
      };

      const statusBadge = (s) => {
        const cls = { draft: 'badge-draft', sent: 'badge-sent', acknowledged: 'badge-acknowledged', fulfilled: 'badge-fulfilled', cancelled: 'badge-cancelled' };
        return <span className={'badge ' + (cls[s] || 'badge-draft')}>{s}</span>;
      };

      if (loading) return <div className="loading">Loading purchase orders...</div>;

      const openStatuses = ['draft', 'sent', 'acknowledged'];
      const closedStatuses = ['fulfilled', 'cancelled'];

      const filtered = pos.filter(o => {
        const inGroup = statusGroup === 'open' ? openStatuses.includes(o.status) : closedStatuses.includes(o.status);
        return inGroup;
      });

      return (
        <div>
          <div className="content-header">
            <h1>Purchase Orders</h1>
            {['admin', 'manager'].includes(staffRole) && (
              <button className="btn btn-primary" onClick={() => setShowCreate(true)}>+ New Purchase Order</button>
            )}
          </div>
          <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem', alignItems: 'center', flexWrap: 'wrap' }}>
            <button className={statusGroup === 'open' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'} onClick={() => setStatusGroup('open')}>Open</button>
            <button className={statusGroup === 'closed' ? 'btn btn-primary btn-sm' : 'btn btn-secondary btn-sm'} onClick={() => setStatusGroup('closed')}>Closed</button>
            <select value={vendorFilter} onChange={e => setVendorFilter(e.target.value)}
              style={{ marginLeft: '0.5rem', padding: '0.4rem 0.6rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '6px' }}>
              <option value="">All Vendors</option>
              {vendors.filter(v => v.active_product_count > 0).map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </select>
            <input type="text" placeholder="Search PO#, vendor, order#..." value={search}
              onChange={e => setSearch(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSearch()}
              style={{ marginLeft: '0.5rem', padding: '0.4rem 0.6rem', fontSize: '0.8125rem', border: '1px solid var(--stone-300)', borderRadius: '6px', width: '220px' }} />
            <span style={{ marginLeft: 'auto', fontSize: '0.8125rem', color: 'var(--stone-400)' }}>{filtered.length} PO{filtered.length !== 1 ? 's' : ''}</span>
          </div>
          <div className="table-scroll-wrapper">
          <table className="admin-table">
            <thead>
              <tr>
                <th>PO #</th>
                <th>Vendor</th>
                <th>Order #</th>
                <th>Items</th>
                <th>Subtotal</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(po => (
                <tr key={po.id}>
                  <td style={{ fontWeight: 500 }}>{po.po_number}</td>
                  <td>{po.vendor_name}</td>
                  <td>{po.order_number ? <span style={{ color: 'var(--gold)', cursor: 'pointer' }} onClick={() => navigate('order-detail', po.order_id)}>{po.order_number}</span> : <span style={{ color: 'var(--stone-400)', fontStyle: 'italic' }}>Standalone</span>}</td>
                  <td>{po.item_count}</td>
                  <td>${parseFloat(po.subtotal || 0).toFixed(2)}</td>
                  <td>{statusBadge(po.status)}</td>
                  <td style={{ fontSize: '0.8125rem', color: 'var(--stone-500)' }}>{new Date(po.created_at).toLocaleDateString()}</td>
                  <td className="actions">
                    <button className="btn btn-secondary btn-sm" onClick={() => navigate('purchase-order-detail', po.id)}>View</button>
                  </td>
                </tr>
              ))}
              {filtered.length === 0 && <tr><td colSpan="8" style={{ textAlign: 'center', padding: '2rem', color: 'var(--stone-400)' }}>No {statusGroup} purchase orders found</td></tr>}
            </tbody>
          </table>
          </div>

          {/* Create PO Modal */}
          {showCreate && (
            <div className="modal-backdrop" onClick={() => setShowCreate(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: '480px' }}>
                <div className="modal-header"><h2>New Purchase Order</h2></div>
                <div className="modal-body">
                  <div className="form-group">
                    <label>Vendor *</label>
                    <select value={newVendorId} onChange={e => setNewVendorId(e.target.value)}
                      style={{ width: '100%', padding: '0.5rem', border: '1px solid var(--stone-300)', borderRadius: '6px' }}>
                      <option value="">Select vendor...</option>
                      {vendors.filter(v => v.active_product_count > 0).map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Notes</label>
                    <textarea value={newNotes} onChange={e => setNewNotes(e.target.value)} placeholder="Optional notes..."
                      style={{ width: '100%', minHeight: '80px', padding: '0.5rem', border: '1px solid var(--stone-300)', borderRadius: '6px', fontFamily: 'Inter, sans-serif', resize: 'vertical' }} />
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="btn btn-secondary" onClick={() => setShowCreate(false)}>Cancel</button>
                  <button className="btn btn-primary" disabled={!newVendorId || creating} onClick={createPO}>
                    {creating ? 'Creating...' : 'Create PO'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== PurchaseOrderDetailView ==========
    function PurchaseOrderDetailView({ navigate, editId, staffRole }) {
      const [po, setPO] = useState(null);
      const [items, setItems] = useState([]);
      const [activity, setActivity] = useState([]);
      const [loading, setLoading] = useState(true);
      const [poUpdating, setPoUpdating] = useState(false);
      const [addingItem, setAddingItem] = useState(false);
      const [addItemMode, setAddItemMode] = useState('sku');
      const [addItemSku, setAddItemSku] = useState('');
      const [skuSearchResults, setSkuSearchResults] = useState([]);
      const [skuSearching, setSkuSearching] = useState(false);
      const [skuSearchError, setSkuSearchError] = useState(null);
      const skuSearchTimer = useRef(null);
      const skuSearchCounter = useRef(0);
      const [newPOItem, setNewPOItem] = useState({ product_name: '', vendor_sku: '', qty: 1, cost: '', sell_by: 'sqft' });

      const load = async () => {
        setLoading(true);
        try {
          const data = await adminFetch('/api/admin/purchase-orders/' + editId + '/detail');
          setPO(data.purchase_order);
          setItems(data.purchase_order.items || []);
          setActivity(data.activity || []);
        } catch (err) { console.error(err); }
        setLoading(false);
      };
      useEffect(() => { load(); }, [editId]);

      const isDraft = po && po.status === 'draft';
      const isSentOrLater = po && ['sent', 'acknowledged', 'fulfilled'].includes(po.status);
      const canManage = ['admin', 'manager'].includes(staffRole);

      const updatePOStatus = async (newStatus) => {
        const labels = { sent: 'Mark as Sent', acknowledged: 'Mark as Acknowledged', fulfilled: 'Mark as Fulfilled', cancelled: 'Cancel', draft: 'Revert to Draft' };
        if (!confirm((labels[newStatus] || newStatus) + ' this PO?')) return;
        setPoUpdating(true);
        try {
          await adminFetch('/api/admin/purchase-orders/' + editId + '/status', {
            method: 'PUT', body: JSON.stringify({ status: newStatus })
          });
          load();
        } catch (err) { alert(err.message); }
        setPoUpdating(false);
      };

      const updatePONotes = async (notes) => {
        try {
          await adminFetch('/api/admin/purchase-orders/' + editId, {
            method: 'PUT', body: JSON.stringify({ notes })
          });
        } catch (err) { alert(err.message); }
      };

      const updatePOItem = async (itemId, updates) => {
        try {
          await adminFetch('/api/admin/purchase-orders/' + editId + '/items/' + itemId, {
            method: 'PUT', body: JSON.stringify(updates)
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const addPOItem = async (itemData) => {
        try {
          await adminFetch('/api/admin/purchase-orders/' + editId + '/items', {
            method: 'POST', body: JSON.stringify(itemData)
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const deletePOItem = async (itemId) => {
        if (!confirm('Delete this line item?')) return;
        try {
          await adminFetch('/api/admin/purchase-orders/' + editId + '/items/' + itemId, {
            method: 'DELETE'
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const sendPOToVendor = async () => {
        const ediEnabled = po.edi_config && JSON.parse(po.edi_config).enabled;
        const method = ediEnabled ? 'EDI' : 'email';
        if (!confirm('Send this PO to the vendor via ' + method + '?')) return;
        setPoUpdating(true);
        try {
          const result = await adminFetch('/api/admin/purchase-orders/' + editId + '/send', { method: 'POST' });
          if (result.sent_via === 'edi') {
            alert('PO sent via EDI successfully (' + (result.edi?.docs_sent || 1) + ' document(s))');
          } else if (result.email_sent === false) {
            alert('PO status updated but email could not be sent. Check server SMTP configuration.');
          }
          load();
        } catch (err) { alert(err.message); }
        setPoUpdating(false);
      };

      const updatePOItemStatus = async (itemId, status) => {
        try {
          await adminFetch('/api/admin/purchase-orders/' + editId + '/items/' + itemId + '/status', {
            method: 'PUT', body: JSON.stringify({ status })
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const bulkUpdatePOItemStatus = async (status) => {
        if (!confirm('Set all non-terminal items to ' + status + '?')) return;
        try {
          await adminFetch('/api/admin/purchase-orders/' + editId + '/items/bulk-status', {
            method: 'PUT', body: JSON.stringify({ status })
          });
          load();
        } catch (err) { alert(err.message); }
      };

      const handleSkuSearch = (q) => {
        setAddItemSku(q);
        setSkuSearchError(null);
        if (skuSearchTimer.current) clearTimeout(skuSearchTimer.current);
        if (q.length >= 2) {
          setSkuSearching(true);
          const thisSearch = ++skuSearchCounter.current;
          skuSearchTimer.current = setTimeout(async () => {
            try {
              const data = await adminFetch('/api/admin/skus/search?q=' + encodeURIComponent(q));
              if (thisSearch !== skuSearchCounter.current) return;
              setSkuSearchResults((data.results || []).map(r => ({
                sku_id: r.sku_id, product_name: r.product_name || r.collection || '', variant_name: r.variant_name || '',
                color: r.color || '', vendor_sku: r.vendor_sku || '', internal_sku: r.internal_sku || '',
                vendor_name: r.vendor_name || '', sell_by: r.sell_by || 'sqft', cost: r.vendor_cost || 0,
                retail_price: r.retail_price || 0, price_basis: r.price_basis || 'per_sqft',
                sqft_per_box: r.sqft_per_box || 1,
                primary_image: r.primary_image || null
              })));
            } catch (err) {
              if (thisSearch !== skuSearchCounter.current) return;
              console.error('[SKU Search] Error:', err.message || err);
              setSkuSearchError(err.message || 'Search failed');
            }
            if (thisSearch === skuSearchCounter.current) setSkuSearching(false);
          }, 250);
        } else { setSkuSearchResults([]); setSkuSearching(false); setSkuSearchError(null); }
      };

      const selectSkuResult = async (r) => {
        const isPerSqft = r.price_basis === 'per_sqft' || r.price_basis === 'sqft';
        const sqftPerBox = parseFloat(r.sqft_per_box || 1);
        const rawCost = parseFloat(r.cost || 0);
        const rawRetail = parseFloat(r.retail_price || 0);
        const itemCost = isPerSqft ? rawCost * sqftPerBox : rawCost;
        const itemRetail = isPerSqft ? rawRetail * sqftPerBox : rawRetail;
        await addPOItem({
          sku_id: r.sku_id, product_name: r.product_name + (r.color ? ' — ' + r.color : ''),
          vendor_sku: r.vendor_sku || r.internal_sku, qty: 1,
          cost: itemCost.toFixed(2), retail_price: itemRetail > 0 ? itemRetail.toFixed(2) : null,
          sell_by: r.sell_by
        });
        setAddItemSku(''); setSkuSearchResults([]); setAddingItem(false);
      };

      const actionLabel = (action) => {
        const labels = { sent: 'Sent', resent: 'Resent', revised_and_sent: 'Revised & Sent', acknowledged: 'Acknowledged', fulfilled: 'Fulfilled', cancelled: 'Cancelled', reverted: 'Reverted to Draft', created: 'Created', notes_updated: 'Notes Updated', edi_sent: 'Sent via EDI', edi_acknowledged: 'EDI Acknowledged', edi_shipped: 'EDI Ship Notice', edi_invoiced: 'EDI Invoice Received' };
        return labels[action] || action;
      };

      const statusBadge = (s) => {
        const cls = { draft: 'badge-draft', sent: 'badge-sent', acknowledged: 'badge-acknowledged', fulfilled: 'badge-fulfilled', cancelled: 'badge-cancelled' };
        return <span className={'badge ' + (cls[s] || 'badge-draft')}>{s}</span>;
      };

      if (loading) return <div className="loading">Loading purchase order...</div>;
      if (!po) return <div className="loading">Purchase order not found</div>;

      return (
        <div>
          <div className="content-header">
            <button className="btn btn-secondary btn-sm" onClick={() => navigate('purchase-orders')}>&larr; Back to Purchase Orders</button>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '1.5rem' }}>
            <h1 style={{ margin: 0 }}><code style={{ fontSize: 'inherit', background: 'var(--stone-50)', padding: '0.1rem 0.5rem', borderRadius: '6px', border: '1px solid var(--stone-200)' }}>{po.po_number}</code></h1>
            {statusBadge(po.status)}
          </div>

          {/* PO Status Stepper */}
          {(() => {
            const steps = ['draft', 'sent', 'acknowledged', 'fulfilled'];
            const stepLabels = { draft: 'Draft', sent: 'Sent', acknowledged: 'Acknowledged', fulfilled: 'Fulfilled' };
            const stepTimestamps = {
              draft: po.created_at,
              sent: activity.find(a => a.action === 'sent' || a.action === 'edi_sent')?.created_at,
              acknowledged: activity.find(a => a.action === 'acknowledged' || a.action === 'edi_acknowledged')?.created_at,
              fulfilled: activity.find(a => a.action === 'fulfilled')?.created_at
            };
            const isCancelled = po.status === 'cancelled';
            const currentIdx = isCancelled
              ? (stepTimestamps.acknowledged ? 2 : stepTimestamps.sent ? 1 : 0)
              : steps.indexOf(po.status);
            const getStepState = (idx) => {
              if (isCancelled) return idx <= currentIdx ? 'cancelled' : 'upcoming';
              if (idx < currentIdx) return 'completed';
              if (idx === currentIdx) return 'current';
              return 'upcoming';
            };

            return (
              <div className="form-card">
                <h3>PO Status</h3>

                {isCancelled && (
                  <div className="stepper-cancelled-banner">Purchase Order Cancelled</div>
                )}

                <div className="order-stepper">
                  {steps.slice(1).map((step, idx) => {
                    const prevState = getStepState(idx);
                    const curState = getStepState(idx + 1);
                    const connClass = (prevState === 'completed' && (curState === 'completed' || curState === 'current'))
                      ? 'completed'
                      : (prevState === 'cancelled' ? 'completed' : 'upcoming');
                    const pct = 100 / (steps.length - 1);
                    const leftPct = idx * pct;
                    return (
                      <div key={'conn-' + idx} className={'stepper-connector ' + connClass}
                        style={{ left: 'calc(' + (leftPct + pct * 0.15) + '% + 18px)', width: 'calc(' + (pct * 0.7) + '% - 36px)' }} />
                    );
                  })}
                  {steps.map((step, idx) => {
                    const state = getStepState(idx);
                    const ts = stepTimestamps[step];
                    return (
                      <div key={step} className={'stepper-step ' + state}>
                        <div className="stepper-circle">
                          {state === 'completed' ? '\u2713' : state === 'cancelled' ? '\u2717' : (idx + 1)}
                        </div>
                        <div className="stepper-label">{stepLabels[step]}</div>
                        {ts && (state === 'completed' || state === 'current' || state === 'cancelled') && (
                          <div className="stepper-timestamp">{new Date(ts).toLocaleDateString()}</div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {canManage && (
                  <div className="stepper-actions">
                    {isDraft && items.length > 0 && (
                      <button className="btn btn-primary" disabled={poUpdating} onClick={sendPOToVendor}>
                        {poUpdating ? 'Sending...' : 'Send to Vendor'}

                    )}
                    {po.status === 'sent' && (
                      <button className="btn btn-primary" disabled={poUpdating} onClick={() => updatePOStatus('acknowledged')}>Mark Acknowledged</button>
                    )}
                    {po.status === 'acknowledged' && (
                      <button className="btn btn-primary" disabled={poUpdating} onClick={() => updatePOStatus('fulfilled')}>Mark Fulfilled</button>
                    )}
                    {['sent', 'acknowledged'].includes(po.status) && (
                      <button className="stepper-revert-link" disabled={poUpdating} onClick={() => updatePOStatus('draft')}>Revert to Draft</button>
                    )}
                    {!['cancelled', 'fulfilled'].includes(po.status) && (
                      <button className="stepper-cancel-link" disabled={poUpdating} onClick={() => updatePOStatus('cancelled')}>Cancel PO</button>
                    )}
                  </div>
                )}
              </div>
            );
          })()}

    // ========== DataQualityView (consolidated with Vendor Health) ==========
    function DataQualityView({ navigate }) {
      const [data, setData] = useState(null);
      const [vendorHealth, setVendorHealth] = useState([]);
      const [loading, setLoading] = useState(true);
      const [refreshing, setRefreshing] = useState(false);
      const [activeTab, setActiveTab] = useState('overview');
      const [selectedVendor, setSelectedVendor] = useState(null);
      const [vendorDetail, setVendorDetail] = useState(null);
      const [vendorDetailLoading, setVendorDetailLoading] = useState(false);
      const [detailTab, setDetailTab] = useState('images');

      const load = useCallback(async () => {
        try {
          const [dq, vh] = await Promise.all([
            adminFetch('/api/admin/data-quality/summary'),
            adminFetch('/api/admin/vendor-health')
          ]);
          setData(dq);
          setVendorHealth(vh.vendors || []);
        } catch (e) { console.error(e); }
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleRefresh = async () => {
        setRefreshing(true);
        try {
          await adminFetch('/api/admin/data-quality/refresh', { method: 'POST' });
          await load();
        } catch (e) { console.error(e); }
        setRefreshing(false);
      };

      const openVendorDetail = async (vendorId) => {
        setSelectedVendor(vendorId);
        setVendorDetailLoading(true);
        setDetailTab('images');
        try {
          setVendorDetail(await adminFetch('/api/admin/vendor-health/' + vendorId));
        } catch (e) { console.error(e); setVendorDetail(null); }
        setVendorDetailLoading(false);
      };

      const closeVendorDetail = () => { setSelectedVendor(null); setVendorDetail(null); };

      if (loading) return React.createElement('div', { className: 'loading-spinner' }, 'Loading data quality report...');
      if (!data) return React.createElement('div', { className: 'empty-state' }, 'Failed to load data quality report.');

      const { overall: o, vendors, worst_skus, governance } = data;
      const scoreColor = (s) => s >= 80 ? '#16a34a' : s >= 50 ? '#d97706' : '#dc2626';
      const pct = (num, den) => den > 0 ? ((num / den) * 100).toFixed(1) : '0.0';
      const pctColor = (num, den) => { const p = den > 0 ? (num / den) * 100 : 0; return p >= 90 ? '#16a34a' : p >= 60 ? '#ca8a04' : '#dc2626'; };

      const CoverageBarSmall = (value, total, label) => {
        const p = total > 0 ? (value / total) * 100 : 0;
        const color = pctColor(value, total);
        return React.createElement('div', { style: { flex: 1, minWidth: '90px' } },
          React.createElement('div', { style: { fontSize: '0.7rem', color: 'var(--stone-500)', marginBottom: '2px' } }, label),
          React.createElement('div', { style: { background: 'var(--stone-100)', borderRadius: '4px', height: '8px', overflow: 'hidden', position: 'relative' } },
            React.createElement('div', { style: { position: 'absolute', left: 0, top: 0, bottom: 0, width: Math.min(p, 100) + '%', background: color, borderRadius: '4px', transition: 'width 0.3s' } })
          ),
          React.createElement('div', { style: { fontSize: '0.7rem', color, fontWeight: 600, marginTop: '1px' } }, pct(value, total) + '%')
        );
      };

      // Merge vendor-health data with data-quality vendor data by vendor name
      const mergedVendors = vendors.map(v => {
        const vh = vendorHealth.find(h => h.vendor_name === v.vendor_name);
        return { ...v, ...(vh || {}) };
      });

      const tabs = [
        { key: 'overview', label: 'Overview' },
        { key: 'vendors', label: 'By Vendor' },
        { key: 'issues', label: 'Worst SKUs' },
        { key: 'governance', label: 'Attribute Gaps' },
        { key: 'enrichment', label: 'AI Enrichment' },
      ];

      // Vendor detail drilldown panel
      const renderVendorDetail = () => {
        if (vendorDetailLoading) return React.createElement('div', { className: 'loading-spinner', style: { padding: '2rem' } }, 'Loading vendor details...');
        if (!vendorDetail) return React.createElement('div', { style: { padding: '2rem', textAlign: 'center', color: 'var(--stone-400)' } }, 'Failed to load vendor details.');

        const { vendor, stats, missing, scrape_jobs } = vendorDetail;
        const coverageItems = [
          { label: 'Images', value: stats.skus_with_images, total: stats.total_skus },
          { label: 'Pricing', value: stats.skus_with_pricing, total: stats.total_skus },

    // ========== AI Enrichment Panel ==========
    function EnrichmentPanel() {
      const [status, setStatus] = useState(null);
      const [loading, setLoading] = useState(true);
      const [running, setRunning] = useState(false);
      const [reviewItems, setReviewItems] = useState([]);
      const [selectedVendor, setSelectedVendor] = useState('');
      const [vendorList, setVendorList] = useState([]);

      const loadStatus = useCallback(async () => {
        try {
          const data = await adminFetch('/api/admin/enrichment/status');
          setStatus(data);
          setRunning((data.recent_jobs || []).some(j => j.status === 'running'));
        } catch (e) { console.error('Enrichment status error:', e); }
        setLoading(false);
      }, []);

      const loadReview = useCallback(async () => {
        try { setReviewItems(await adminFetch('/api/admin/enrichment/review')); }
        catch (e) { console.error('Enrichment review error:', e); }
      }, []);

      const loadVendors = useCallback(async () => {
        try { const d = await adminFetch('/api/admin/vendors'); setVendorList(d.vendors || d || []); }
        catch (e) { console.error('Vendors load error:', e); }
      }, []);

      useEffect(() => { loadStatus(); loadReview(); loadVendors(); }, []);

      useEffect(() => {
        if (!running) return;
        const iv = setInterval(() => loadStatus(), 5000);
        return () => clearInterval(iv);
      }, [running]);

      const runJob = async (jobType) => {
        try {
          const scope = selectedVendor ? { vendor_id: selectedVendor } : {};
          await adminFetch('/api/admin/enrichment/run', { method: 'POST', body: JSON.stringify({ job_type: jobType, scope }) });
          setRunning(true);
          setTimeout(loadStatus, 1000);
        } catch (e) { alert('Failed to start job: ' + e.message); }
      };

      const cancelJob = async (jobId) => {
        try { await adminFetch('/api/admin/enrichment/cancel/' + jobId, { method: 'POST' }); setTimeout(loadStatus, 1000); }
        catch (e) { console.error(e); }
      };

      const handleReview = async (id, action) => {
        try {
          await adminFetch('/api/admin/enrichment/review/' + id, { method: 'POST', body: JSON.stringify({ action }) });
          setReviewItems(prev => prev.filter(r => r.id !== id));
        } catch (e) { console.error(e); }
      };

      if (loading) return React.createElement('div', { className: 'loading-spinner' }, 'Loading enrichment data...');
      if (!status) return React.createElement('div', { className: 'empty-state' }, 'Failed to load enrichment status.');

      const { gaps, recent_jobs, cost_summary } = status;

      const jobTypes = [
        { key: 'descriptions', label: 'Descriptions', gap: gaps.missing_descriptions, icon: 'T' },
        { key: 'attributes', label: 'Attributes', gap: gaps.missing_attributes, icon: 'A' },
        { key: 'categorization', label: 'Categories', gap: gaps.uncategorized, icon: 'C' },
        { key: 'image_classification', label: 'Images', gap: gaps.unclassified_images, icon: 'I' },
      ];

      const formatDuration = (start, end) => {
        if (!start) return '--';
        const s = new Date(start);
        const e = end ? new Date(end) : new Date();
        const secs = Math.round((e - s) / 1000);
        if (secs < 60) return secs + 's';
        return Math.round(secs / 60) + 'm ' + (secs % 60) + 's';
      };

      const statusBadge = (s) => {
        const colors = { pending: '#6b7280', running: '#2563eb', completed: '#16a34a', failed: '#dc2626', cancelled: '#d97706' };
        return React.createElement('span', { style: { display: 'inline-block', padding: '2px 8px', borderRadius: '12px', fontSize: '0.75rem', fontWeight: 500, color: '#fff', background: colors[s] || '#6b7280' } }, s);
      };

      return React.createElement('div', null,
        // Vendor scope selector
        React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.25rem' } },
          React.createElement('label', { style: { fontSize: '0.875rem', fontWeight: 500 } }, 'Scope:'),
          React.createElement('select', {
            value: selectedVendor,
            onChange: e => setSelectedVendor(e.target.value),
            style: { padding: '0.375rem 0.75rem', borderRadius: '6px', border: '1px solid var(--stone-300)', fontSize: '0.875rem' }
          },
            React.createElement('option', { value: '' }, 'All Vendors'),
            vendorList.map(v => React.createElement('option', { key: v.id, value: v.id }, v.name))
          )
        ),

        // A. Status Cards with Run buttons
        React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem', marginBottom: '1.5rem' } },
          jobTypes.map(jt =>
            React.createElement('div', { key: jt.key, style: { background: 'var(--stone-50)', border: '1px solid var(--stone-200)', borderRadius: '10px', padding: '1rem' } },
              React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' } },
                React.createElement('div', { style: { fontSize: '0.8125rem', color: 'var(--stone-500)', fontWeight: 500 } }, 'Missing ' + jt.label),
                React.createElement('span', { style: { width: '28px', height: '28px', display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: '6px', background: 'var(--stone-200)', fontWeight: 600, fontSize: '0.8125rem' } }, jt.icon)
              ),
              React.createElement('div', { style: { fontSize: '1.75rem', fontWeight: 700, color: jt.gap > 0 ? '#dc2626' : '#16a34a', marginBottom: '0.75rem' } }, jt.gap.toLocaleString()),
              React.createElement('button', {
                className: 'btn btn-primary',
                style: { width: '100%', fontSize: '0.8125rem', padding: '0.375rem' },
                disabled: jt.gap === 0 || running,
                onClick: () => runJob(jt.key)
              }, running ? 'Running...' : 'Run ' + jt.label)
            )
          )
        ),

        // B. Jobs Table
        React.createElement('h3', { style: { fontSize: '1rem', marginBottom: '0.75rem' } }, 'Recent Jobs'),
        React.createElement('div', { className: 'table-container', style: { marginBottom: '1.5rem' } },
          React.createElement('table', { className: 'admin-table' },
            React.createElement('thead', null,
              React.createElement('tr', null,
                ['Type', 'Status', 'Progress', 'Updated', 'Tokens', 'Cost', 'Duration', ''].map(h =>
                  React.createElement('th', { key: h }, h)
                )
              )
            ),
            React.createElement('tbody', null,
              (recent_jobs || []).map(j => {
                const pct = j.total_items > 0 ? Math.round(j.processed_items / j.total_items * 100) : 0;
                return React.createElement('tr', { key: j.id },
                  React.createElement('td', { style: { fontWeight: 500, textTransform: 'capitalize' } }, j.job_type.replace('_', ' ')),
                  React.createElement('td', null, statusBadge(j.status)),
                  React.createElement('td', null,
                    React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '0.5rem', minWidth: '120px' } },
                      React.createElement('div', { style: { flex: 1, background: 'var(--stone-100)', borderRadius: '4px', height: '8px' } },
                        React.createElement('div', { style: { width: pct + '%', background: j.status === 'running' ? '#2563eb' : '#16a34a', borderRadius: '4px', height: '100%', transition: 'width 0.3s' } })
                      ),
                      React.createElement('span', { style: { fontSize: '0.75rem', whiteSpace: 'nowrap' } }, j.processed_items + '/' + j.total_items)
                    )
                  ),
                  React.createElement('td', null, (j.updated_items || 0).toLocaleString()),
                  React.createElement('td', { style: { fontSize: '0.8125rem', fontFamily: 'monospace' } }, ((j.prompt_tokens_used || 0) + (j.completion_tokens_used || 0)).toLocaleString()),
                  React.createElement('td', { style: { fontSize: '0.8125rem' } }, '$' + parseFloat(j.estimated_cost_usd || 0).toFixed(4)),
                  React.createElement('td', { style: { fontSize: '0.8125rem' } }, formatDuration(j.started_at, j.completed_at)),
                  React.createElement('td', null,
                    j.status === 'running' && React.createElement('button', {
                      className: 'btn btn-secondary', style: { fontSize: '0.75rem', padding: '2px 8px' },
                      onClick: () => cancelJob(j.id)
                    }, 'Cancel')
                  )
                );
              })
            )
          )
        ),

        // C. Review Queue
        reviewItems.length > 0 && React.createElement('div', { style: { marginBottom: '1.5rem' } },
          React.createElement('h3', { style: { fontSize: '1rem', marginBottom: '0.75rem' } }, 'Review Queue (' + reviewItems.length + ')'),
          React.createElement('div', { className: 'table-container' },
            React.createElement('table', { className: 'admin-table' },
              React.createElement('thead', null,
                React.createElement('tr', null,
                  ['Product', 'Field', 'Suggested Value', 'Confidence', 'Actions'].map(h =>
                    React.createElement('th', { key: h }, h)
                  )
                )
              ),
              React.createElement('tbody', null,
                reviewItems.map(r =>
                  React.createElement('tr', { key: r.id },
                    React.createElement('td', null,
                      React.createElement('div', { style: { fontWeight: 500 } }, r.entity_name || r.entity_id.slice(0, 8)),
                      r.entity_collection && React.createElement('div', { style: { fontSize: '0.75rem', color: 'var(--stone-400)' } }, r.entity_collection)
                    ),
                    React.createElement('td', null, r.field_name),
                    React.createElement('td', { style: { fontWeight: 500 } }, r.new_value),
                    React.createElement('td', null,
                      React.createElement('span', { style: { fontWeight: 600, color: parseFloat(r.confidence) >= 0.7 ? '#d97706' : '#dc2626' } },
                        (parseFloat(r.confidence) * 100).toFixed(0) + '%'
                      )
                    ),
                    React.createElement('td', null,
                      React.createElement('div', { style: { display: 'flex', gap: '0.375rem' } },
                        React.createElement('button', { className: 'btn btn-primary', style: { fontSize: '0.75rem', padding: '2px 10px' }, onClick: () => handleReview(r.id, 'approve') }, 'Approve'),
                        React.createElement('button', { className: 'btn btn-secondary', style: { fontSize: '0.75rem', padding: '2px 10px' }, onClick: () => handleReview(r.id, 'reject') }, 'Reject')
                      )
                    )
                  )
                )
              )
            )
          )
        ),

        // D. Cost Summary
        cost_summary && cost_summary.length > 0 && React.createElement('div', null,
          React.createElement('h3', { style: { fontSize: '1rem', marginBottom: '0.75rem' } }, 'Cost Summary'),
          React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1rem' } },
            cost_summary.map(cs =>
              React.createElement('div', { key: cs.job_type, style: { background: 'var(--stone-50)', border: '1px solid var(--stone-200)', borderRadius: '10px', padding: '1rem' } },
                React.createElement('div', { style: { fontSize: '0.8125rem', fontWeight: 600, textTransform: 'capitalize', marginBottom: '0.5rem' } }, cs.job_type.replace('_', ' ')),
                React.createElement('div', { style: { fontSize: '0.8125rem', color: 'var(--stone-600)' } },
                  React.createElement('div', null, cs.runs + ' runs'),
                  React.createElement('div', null, (cs.total_updated || 0).toLocaleString() + ' items updated'),
                  React.createElement('div', null, ((cs.total_prompt_tokens || 0) + (cs.total_completion_tokens || 0)).toLocaleString() + ' tokens'),
                  React.createElement('div', { style: { fontWeight: 600, marginTop: '0.25rem' } }, '$' + parseFloat(cs.total_cost || 0).toFixed(4))
                )
              )
            )
          )
        )
      );
    }

    ReactDOM.render(<AdminApp />, document.getElementById('root'));
  </script>
</body>
</html>
