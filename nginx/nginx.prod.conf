# Granular rate limit zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_search:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_checkout:10m rate=3r/s;

# Connection limiting for slowloris protection
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

map $http_user_agent $is_crawler {
    default                    0;
    "~*googlebot"              1;
    "~*bingbot"                1;
    "~*slurp"                  1;
    "~*duckduckbot"            1;
    "~*baiduspider"            1;
    "~*yandexbot"              1;
    "~*facebookexternalhit"    1;
    "~*twitterbot"             1;
    "~*linkedinbot"            1;
    "~*whatsapp"               1;
    "~*telegrambot"            1;
    "~*slackbot"               1;
    "~*discordbot"             1;
    "~*applebot"               1;
    "~*pinterestbot"           1;
}

# Bad bot blocking
map $http_user_agent $is_bad_bot {
    default                    0;
    "~*AhrefsBot"              1;
    "~*SemrushBot"             1;
    "~*MJ12bot"                1;
    "~*DotBot"                 1;
    "~*BLEXBot"                1;
    "~*PetalBot"               1;
    "~*MegaIndex"              1;
    "~*Bytespider"             1;
    "~*GPTBot"                 1;
    "~*CCBot"                  1;
    "~*ClaudeBot"              1;
    "~*anthropic-ai"           1;
    "~*DataForSeoBot"          1;
    "~*ZoominfoBot"            1;
    "~*Sogou"                  1;
    "~*YisouSpider"            1;
    "~*Go-http-client"         1;
    "~*python-requests"        1;
    "~*Java/"                  1;
    "~*libwww-perl"            1;
    "~*wget"                   1;
    "~*curl/"                  1;
    "~*scrapy"                 1;
    "~*Headless"               1;
}

# www → non-www redirect
server {
    listen 80;
    listen 443 ssl http2;
    server_name www.romaflooringdesigns.com;

    ssl_certificate /etc/letsencrypt/live/romaflooringdesigns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/romaflooringdesigns.com/privkey.pem;

    return 301 https://romaflooringdesigns.com$request_uri;
}

server {
    listen 80;
    server_name romaflooringdesigns.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name romaflooringdesigns.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/romaflooringdesigns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/romaflooringdesigns.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Connection limiting
    limit_conn conn_per_ip 50;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://js.stripe.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com; connect-src 'self' https://api.stripe.com https://maps.googleapis.com; frame-src https://js.stripe.com;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;

    # Block bad bots
    if ($is_bad_bot) { return 403; }

    # Block empty User-Agent
    if ($http_user_agent = "") { return 403; }

    # Block dotfiles
    location ~ /\. { deny all; return 403; }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    root /usr/share/nginx/html;
    index storefront.html;

    location @seo_proxy {
        proxy_pass http://api:3001/api/seo/render?path=$uri&$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://js.stripe.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com; connect-src 'self' https://api.stripe.com https://maps.googleapis.com; frame-src https://js.stripe.com;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        add_header Vary "User-Agent" always;
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        proxy_pass http://api:3001/api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # Auth endpoints — strict rate limiting (5/min)
    location /api/staff/login    { limit_req zone=api_auth burst=3 nodelay; limit_req_status 429; proxy_pass http://api:3001; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_hide_header X-Powered-By; }
    location /api/trade/login     { limit_req zone=api_auth burst=3 nodelay; limit_req_status 429; proxy_pass http://api:3001; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_hide_header X-Powered-By; }
    location /api/rep/login       { limit_req zone=api_auth burst=3 nodelay; limit_req_status 429; proxy_pass http://api:3001; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_hide_header X-Powered-By; }
    location /api/customer/login  { limit_req zone=api_auth burst=3 nodelay; limit_req_status 429; proxy_pass http://api:3001; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_hide_header X-Powered-By; }
    location /api/customer/reset-password { limit_req zone=api_auth burst=3 nodelay; limit_req_status 429; proxy_pass http://api:3001; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_hide_header X-Powered-By; }

    # Search — moderate rate limiting (10/s)
    location /api/storefront/search/ {
        limit_req zone=api_search burst=15 nodelay;
        limit_req_status 429;
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # Checkout — tight rate limiting (3/s)
    location /api/checkout/ {
        limit_req zone=api_checkout burst=5 nodelay;
        limit_req_status 429;
        client_max_body_size 20m;
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # API catch-all — general rate limiting (15/s)
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;

        client_max_body_size 20m;
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # Uploads with long cache
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }

    # Static assets cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }

    # SPA routes with crawler detection
    location = / {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }
