version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: flooring-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-flooring_pim}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  minio:
    image: minio/minio:latest
    container_name: flooring-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  api:
    build: ./backend
    container_name: flooring-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-flooring_pim}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      EASYPOST_API_KEY: ${EASYPOST_API_KEY:-}
      RLC_API_KEY: ${RLC_API_KEY:-}
      FEDEX_CLIENT_ID: ${FEDEX_CLIENT_ID:-}
      FEDEX_CLIENT_SECRET: ${FEDEX_CLIENT_SECRET:-}
      FEDEX_FREIGHT_ACCOUNT: ${FEDEX_FREIGHT_ACCOUNT:-}
      ESTES_CLIENT_ID: ${ESTES_CLIENT_ID:-}
      ESTES_CLIENT_SECRET: ${ESTES_CLIENT_SECRET:-}
      ESTES_USERNAME: ${ESTES_USERNAME:-}
      ESTES_PASSWORD: ${ESTES_PASSWORD:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      MSI_PORTAL_USERNAME: ${MSI_PORTAL_USERNAME:-}
      MSI_PORTAL_PASSWORD: ${MSI_PORTAL_PASSWORD:-}
      TRADEPRO_USERNAME: ${TRADEPRO_USERNAME:-}
      TRADEPRO_PASSWORD: ${TRADEPRO_PASSWORD:-}
      ELYSIUM_USERNAME: ${ELYSIUM_USERNAME:-}
      ELYSIUM_PASSWORD: ${ELYSIUM_PASSWORD:-}
      ARIZONA_USERNAME: ${ARIZONA_USERNAME:-}
      ARIZONA_PASSWORD: ${ARIZONA_PASSWORD:-}
      TRIWEST_USERNAME: ${TRIWEST_USERNAME:-}
      TRIWEST_PASSWORD: ${TRIWEST_PASSWORD:-}
      EF_B2B_API_KEY: ${EF_B2B_API_KEY:-ENGFLOORWSV1}
      EF_B2B_SECRET_KEY: ${EF_B2B_SECRET_KEY:-1WDE34}
      EF_CLIENT_ID: ${EF_CLIENT_ID:-18110}
      EF_FTP_USER: ${EF_FTP_USER:-18110}
      EF_FTP_PASS: ${EF_FTP_PASS:-}
      EF_CLOUDINARY_API_KEY: ${EF_CLOUDINARY_API_KEY:-}
      EF_CLOUDINARY_API_SECRET: ${EF_CLOUDINARY_API_SECRET:-}
      PENTZ_API_KEY: ${PENTZ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UPLOADS_PATH: /app/uploads
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: trade-documents
      S3_REGION: us-east-1
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@romaflooringdesigns.com}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    networks:
      - frontend_net
      - backend_net

  frontend:
    image: nginx:alpine
    container_name: flooring-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./uploads:/usr/share/nginx/html/uploads:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - frontend_net

networks:
  frontend_net:
  backend_net:

volumes:
  postgres_data:
  minio_data:
