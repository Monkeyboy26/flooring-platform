map $http_user_agent $is_crawler {
    default                    0;
    "~*googlebot"              1;
    "~*bingbot"                1;
    "~*slurp"                  1;
    "~*duckduckbot"            1;
    "~*baiduspider"            1;
    "~*yandexbot"              1;
    "~*facebookexternalhit"    1;
    "~*twitterbot"             1;
    "~*linkedinbot"            1;
    "~*whatsapp"               1;
    "~*telegrambot"            1;
    "~*slackbot"               1;
    "~*discordbot"             1;
    "~*applebot"               1;
    "~*pinterestbot"           1;
}

# Bad bot blocking — returns 1 for known malicious/scraper bots
map $http_user_agent $is_bad_bot {
    default                    0;
    "~*AhrefsBot"              1;
    "~*SemrushBot"             1;
    "~*MJ12bot"                1;
    "~*DotBot"                 1;
    "~*BLEXBot"                1;
    "~*PetalBot"               1;
    "~*MegaIndex"              1;
    "~*Bytespider"             1;
    "~*GPTBot"                 1;
    "~*CCBot"                  1;
    "~*ClaudeBot"              1;
    "~*anthropic-ai"           1;
    "~*DataForSeoBot"          1;
    "~*ZoominfoBot"            1;
    "~*Sogou"                  1;
    "~*YisouSpider"            1;
    "~*Go-http-client"         1;
    "~*python-requests"        1;
    "~*Java/"                  1;
    "~*libwww-perl"            1;
    "~*wget"                   1;
    "~*curl/"                  1;
    "~*scrapy"                 1;
    "~*Headless"               1;
}

server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html;
    index storefront.html;

    # Block bad bots
    if ($is_bad_bot) { return 403; }

    # Block empty User-Agent
    if ($http_user_agent = "") { return 403; }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;

    # Block dotfiles
    location ~ /\. { deny all; return 403; }

    location @seo_proxy {
        proxy_pass http://api:3001/api/seo/render?path=$uri&$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        add_header Vary "User-Agent" always;
    }

    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        proxy_pass http://api:3001/api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }

    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }

    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files $uri =404;
    }

    # SPA routes with crawler detection
    location = / {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }
    location /shop {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }
    location /shop/ {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }
    location /collections {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }
    location /collections/ {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }
    location /trade {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }
    location /trade/ {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }

    location = /privacy {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }
    location = /terms {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }

    location = /sale {
        error_page 418 = @seo_proxy;
        if ($is_crawler) { return 418; }
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
        try_files /storefront.html =404;
    }

    # SPA routes without crawler detection (no SEO value)
    location /visit/ { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /account { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /cart { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /checkout { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /wishlist { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /reset-password { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /inspiration { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /design-services { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /installation { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location /about { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /storefront.html =404; }
    location = /admin { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /admin.html =404; }
    location = /rep { add_header Cache-Control "no-cache"; add_header X-Frame-Options "SAMEORIGIN" always; add_header X-Content-Type-Options "nosniff" always; add_header Referrer-Policy "strict-origin-when-cross-origin" always; add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always; try_files /rep.html =404; }
    location / { try_files $uri $uri/ /storefront.html; }
}
